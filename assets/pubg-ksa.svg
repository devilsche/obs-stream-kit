<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"
     font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1a0a22"/>
      <stop offset="55%"  stop-color="#2a1238"/>
      <stop offset="100%" stop-color="#0d0414"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#fde08a"/>
      <stop offset="50%"  stop-color="#f2b705"/>
      <stop offset="100%" stop-color="#a87a02"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#8b3fb0"/>
      <stop offset="100%" stop-color="#5e2a79"/>
    </linearGradient>
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="hex" x="0" y="0" width="56" height="48.5"
             patternUnits="userSpaceOnUse">
      <polygon points="14,0 42,0 56,24.25 42,48.5 14,48.5 0,24.25"
               fill="none" stroke="#5e2a79" stroke-opacity="0.18"
               stroke-width="0.6"/>
    </pattern>
  </defs>

  <!-- Hintergrund -->
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#hex)"/>

  <!-- Diagonale Akzent-Linien -->
  <g stroke="url(#gold)" stroke-opacity="0.12" stroke-width="1">
    <line x1="0" y1="120" x2="1200" y2="60"/>
    <line x1="0" y1="730" x2="1200" y2="780"/>
  </g>

  <!-- Header -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="6" height="56" fill="url(#gold)"/>
    <text x="22" y="22" fill="#f2b705" font-size="13"
          letter-spacing="6" font-weight="700">PUBG · KSA · PERFORMANCE</text>
    <text x="22" y="48" fill="#ffffff" font-size="34"
          font-weight="700" letter-spacing="1">PEX_LuCKoR</text>

    <!-- Scope Tag -->
    <g transform="translate(560, 8)">
      <rect x="0" y="0" width="180" height="42" rx="3"
            fill="none" stroke="url(#gold)" stroke-width="1.2"/>
      <rect x="0" y="0" width="6" height="42" fill="url(#gold)"/>
      <text x="20" y="18" fill="#f2b705" font-size="9"
            letter-spacing="3" font-weight="700">SCOPE</text>
      <text x="20" y="35" fill="#ffffff" font-size="14"
            letter-spacing="2" font-weight="700">154 MATCHES</text>
    </g>
    <g transform="translate(770, 8)">
      <rect x="0" y="0" width="120" height="42" rx="3"
            fill="rgba(94,42,121,0.4)" stroke="#5e2a79" stroke-width="1"/>
      <text x="14" y="18" fill="#caa6dd" font-size="9"
            letter-spacing="3" font-weight="700">SOURCE</text>
      <text x="14" y="35" fill="#ffffff" font-size="14"
            letter-spacing="2" font-weight="700">TELEMETRY</text>
    </g>
  </g>

  <!-- Hero: KSA-INDEX -->
  <g transform="translate(600, 220)" text-anchor="middle">
    <text fill="#f2b705" font-size="14"
          letter-spacing="6" font-weight="700">KSA-INDEX · PRO MATCH</text>
    <text y="120" fill="url(#gold)" font-size="160"
          font-weight="700" filter="url(#goldGlow)">3.98</text>
    <text y="170" fill="#caa6dd" font-size="13" letter-spacing="3" font-weight="700">
      K  +  A  +  DMG / 100
    </text>
  </g>

  <!-- KSA Breakdown — drei Spalten -->
  <g transform="translate(60, 470)">
    <!-- ░ K — Kills ░ -->
    <g transform="translate(0, 0)">
      <text fill="#f2b705" font-size="14"
            letter-spacing="6" font-weight="700">K · KILLS</text>
      <text y="78" fill="#ffffff" font-size="78" font-weight="700">1.30</text>
      <text y="108" fill="#caa6dd" font-size="11"
            letter-spacing="3" font-weight="700">Ø PRO MATCH</text>
      <line x1="0" y1="130" x2="280" y2="130"
            stroke="url(#gold)" stroke-opacity="0.4"/>
      <text y="156" fill="#7d5a8e" font-size="11"
            letter-spacing="2" font-weight="700">TOTAL</text>
      <text x="280" y="156" text-anchor="end" fill="#ffffff"
            font-size="18" font-weight="700">200</text>
      <text y="180" fill="#7d5a8e" font-size="11"
            letter-spacing="2" font-weight="700">BEST MATCH</text>
      <text x="280" y="180" text-anchor="end" fill="#f2b705"
            font-size="18" font-weight="700">11</text>
    </g>

    <!-- ░ S — Schaden ░ -->
    <g transform="translate(380, 0)">
      <text fill="#f2b705" font-size="14"
            letter-spacing="6" font-weight="700">S · SCHADEN</text>
      <text y="78" fill="#ffffff" font-size="78" font-weight="700">222</text>
      <text y="108" fill="#caa6dd" font-size="11"
            letter-spacing="3" font-weight="700">Ø PRO MATCH</text>
      <line x1="0" y1="130" x2="280" y2="130"
            stroke="url(#gold)" stroke-opacity="0.4"/>
      <text y="156" fill="#7d5a8e" font-size="11"
            letter-spacing="2" font-weight="700">TOTAL</text>
      <text x="280" y="156" text-anchor="end" fill="#ffffff"
            font-size="18" font-weight="700">34,132</text>
      <text y="180" fill="#7d5a8e" font-size="11"
            letter-spacing="2" font-weight="700">BEST MATCH</text>
      <text x="280" y="180" text-anchor="end" fill="#f2b705"
            font-size="18" font-weight="700">1,247</text>
    </g>

    <!-- ░ A — Assists ░ -->
    <g transform="translate(760, 0)">
      <text fill="#f2b705" font-size="14"
            letter-spacing="6" font-weight="700">A · ASSISTS</text>
      <text y="78" fill="#ffffff" font-size="78" font-weight="700">0.46</text>
      <text y="108" fill="#caa6dd" font-size="11"
            letter-spacing="3" font-weight="700">Ø PRO MATCH</text>
      <line x1="0" y1="130" x2="280" y2="130"
            stroke="url(#gold)" stroke-opacity="0.4"/>
      <text y="156" fill="#7d5a8e" font-size="11"
            letter-spacing="2" font-weight="700">TOTAL</text>
      <text x="280" y="156" text-anchor="end" fill="#ffffff"
            font-size="18" font-weight="700">71</text>
      <text y="180" fill="#7d5a8e" font-size="11"
            letter-spacing="2" font-weight="700">BEST MATCH</text>
      <text x="280" y="180" text-anchor="end" fill="#f2b705"
            font-size="18" font-weight="700">4</text>
    </g>
  </g>

  <!-- Extras: DBNOs · Revives -->
  <g transform="translate(60, 700)">
    <line x1="0" y1="-20" x2="1080" y2="-20"
          stroke="url(#gold)" stroke-opacity="0.35" stroke-width="1"/>

    <g transform="translate(0, 0)">
      <text fill="#caa6dd" font-size="11"
            letter-spacing="3" font-weight="700">DBNOs (KNOCKED)</text>
      <text y="32" fill="#ffffff" font-size="26" font-weight="700">
        178 <tspan fill="#f2b705" font-size="14">· Ø 1.16</tspan>
      </text>
    </g>

    <g transform="translate(360, 0)">
      <text fill="#caa6dd" font-size="11"
            letter-spacing="3" font-weight="700">REVIVES (TEAM)</text>
      <text y="32" fill="#ffffff" font-size="26" font-weight="700">
        54 <tspan fill="#f2b705" font-size="14">· Ø 0.35</tspan>
      </text>
    </g>

    <g transform="translate(720, 0)">
      <text fill="#caa6dd" font-size="11"
            letter-spacing="3" font-weight="700">A/K-RATIO</text>
      <text y="32" fill="#ffffff" font-size="26" font-weight="700">
        0.36 <tspan fill="#f2b705" font-size="14">· TEAM-PLAY</tspan>
      </text>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(60, 760)">
    <text fill="#5e2a79" font-size="10" letter-spacing="2" font-weight="700">
      OBS-STREAM-KIT · PUBG · KSA-AUSWERTUNG
    </text>
    <text x="1080" y="0" text-anchor="end"
          fill="#5e2a79" font-size="10" letter-spacing="2">
      LAST REFRESHED · 2026-05-07
    </text>
  </g>

  <!-- Eck-Akzente Gold -->
  <g stroke="url(#gold)" stroke-width="2" fill="none" stroke-opacity="0.7">
    <polyline points="20,20 20,60 60,20"/>
    <polyline points="1180,20 1180,60 1140,20"/>
    <polyline points="20,780 20,740 60,780"/>
    <polyline points="1180,780 1180,740 1140,780"/>
  </g>
</svg>
