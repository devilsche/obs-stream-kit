{# Top-Nav im Theme-/Mockup-Stil (dn-*). Theme-Wahl liegt in Settings. #}
<header class="dn-nav" role="banner">
  <a class="dn-brand" href="/app/" aria-label="stream-overlay — Dashboard">
    <span class="sq" aria-hidden="true"></span>STREAM<span class="b">_</span>OVERLAY
  </a>
  <nav class="dn-links" aria-label="Hauptnavigation">
    <a href="/app/" {% if request.path == '/app/' %}aria-current="page"{% endif %}>dashboard</a>
    <a href="/app/urls" {% if request.path.startswith('/app/urls') %}aria-current="page"{% endif %}>urls</a>
    <a href="/app/tools" {% if request.path.startswith('/app/tools') %}aria-current="page"{% endif %}>tools</a>
    <a href="/app/settings" {% if request.path.startswith('/app/settings') %}aria-current="page"{% endif %}>settings</a>
    {% if user.is_admin %}<a href="/admin/" {% if request.path.startswith('/admin') %}aria-current="page"{% endif %}>admin</a>{% endif %}
    <a href="/app/logout">logout</a>
  </nav>
  <div class="dn-right">
    <span class="dn-chip">
      <span class="uav" aria-hidden="true">{% if user.avatar_url %}<img src="{{ user.avatar_url }}" alt="">{% else %}{{ (user.display_name or '?')[0]|upper }}{% endif %}</span>
      <b>{{ user.display_name }}</b>
    </span>
  </div>
</header>
