{% extends "base.html" %}
{% block title %}Pending approval — OBS Stream Kit{% endblock %}
{% block body %}
<div class="dn-pending">
  <div class="dn-pending-card">
    <h1>Hi {{ user.display_name }}</h1>
    <p>Your account is registered and waiting for admin approval.</p>
    <p>Once approved, you'll be redirected automatically.</p>
    <a href="/app/logout" class="dn-btn ghost">Logout</a>
  </div>
</div>
<script>
  setInterval(async () => {
    const r = await fetch("/app/pending-check");
    const j = await r.json();
    if (j.approved) location.href = "/app/";
  }, 30000);
</script>
{% endblock %}
