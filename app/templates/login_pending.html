{% extends "base.html" %}
{% block title %}Pending approval — OBS Stream Kit{% endblock %}
{% block body %}
<div class="pending">
  <div class="pending-card">
    <h1>👋 Hi {{ user.display_name }}</h1>
    <p>Your account is registered and waiting for admin approval.</p>
    <p style="color: var(--text-dim); font-size: 13px;">Once approved, you'll be redirected to the dashboard automatically.</p>
    <p style="margin-top: 24px;"><a href="/app/logout" class="btn btn-sm">Logout</a></p>
  </div>
</div>
<script>
  setInterval(async () => {
    const r = await fetch("/app/pending-check");
    const j = await r.json();
    if (j.approved) location.href = "/app/";
  }, 30000);
</script>
{% endblock %}
