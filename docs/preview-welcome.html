<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Welcome-Widget Preview — PUBG BG</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
    }

    .stage {
      position: relative;
      width: 1920px;
      height: 1080px;
      background: url('https://assets.vg247.com/current//2017/12/pubg_in_game_screen_desert_1.jpg') center/cover no-repeat;
      transform-origin: top left;
    }

    /* Skaliere die Stage, damit sie auf kleinere Bildschirme passt */
    @media (max-width: 1920px) {
      body { overflow: auto; }
    }

    .widget-slot {
      position: absolute;
      inset: 0;
      transform-origin: top left;
    }

    .widget-slot iframe {
      width: 1920px;
      height: 1080px;
      border: 0;
      background: transparent;
      display: block;
    }

    .reload-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      border: 1px solid #f2b705;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
      font-family: sans-serif;
      z-index: 10;
    }

    .reload-btn:hover {
      background: rgba(242, 183, 5, 0.3);
    }
  </style>
</head>
<body>

  <div class="stage">
    <div class="widget-slot">
      <iframe id="widgetFrame" src="../widgets/welcome.html?name=NeuerChatter"></iframe>
    </div>
    <button class="reload-btn" onclick="document.getElementById('widgetFrame').src = document.getElementById('widgetFrame').src">
      Widget neu laden (Pop-Burst)
    </button>
  </div>

</body>
</html>
