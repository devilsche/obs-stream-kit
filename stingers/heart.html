<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <script src="../js/stinger-ready.js"></script>
  <title>Heart Stinger</title>
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-display: block;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }

    @keyframes bgFadeIn   { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeOutAll { from { opacity: 1; } to { opacity: 0; } }

    @keyframes heartGroupAppear {
      0%   { transform: translate(-50%, -50%) scale(0);   opacity: 0; }
      70%  { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
    }

    /* Heartbeat pattern: lub-DUB ... rest ... lub-DUB */
    @keyframes heartbeat {
      0%    { transform: translate(-50%, -50%) scale(1); }
      8%    { transform: translate(-50%, -50%) scale(1.10); }
      16%   { transform: translate(-50%, -50%) scale(1); }
      22%   { transform: translate(-50%, -50%) scale(1.16); }
      30%   { transform: translate(-50%, -50%) scale(1); }
      60%   { transform: translate(-50%, -50%) scale(1); }
      66%   { transform: translate(-50%, -50%) scale(1.08); }
      74%   { transform: translate(-50%, -50%) scale(1); }
      80%   { transform: translate(-50%, -50%) scale(1.14); }
      88%   { transform: translate(-50%, -50%) scale(1); }
      100%  { transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes sparkleTwinkle {
      0%, 100% { opacity: 0.15; transform: scale(0.5); }
      25%      { opacity: 1;    transform: scale(1.2); }
      50%      { opacity: 0.55; transform: scale(0.9); }
      75%      { opacity: 1;    transform: scale(1.3); }
    }

    @keyframes floatUp {
      0%   { transform: translate(0, 0) rotate(0deg); opacity: 0; }
      15%  { opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity: 0; }
    }

    @keyframes nameIn {
      0%   { transform: translateX(-50%) translateY(30px); opacity: 0; letter-spacing: 28px; }
      100% { transform: translateX(-50%) translateY(0);    opacity: 1; letter-spacing: 6px; }
    }

    .bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at center,
          rgba(80, 15, 40, 0.55) 0%,
          rgba(32, 8, 22, 0.88) 60%,
          rgba(12, 3, 8, 0.96) 100%
        );
      z-index: 1;
      opacity: 0;
      animation: bgFadeIn 0.4s ease-out forwards;
    }

    .float-layer {
      position: absolute; inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .float-spark {
      position: absolute;
      color: #ffb8d0;
      font-size: 22px;
      line-height: 1;
      opacity: 0;
      text-shadow:
        0 0 10px rgba(255, 180, 210, 0.85),
        0 0 22px rgba(255, 100, 160, 0.55);
      animation: floatUp var(--dur) ease-out var(--delay) infinite;
    }

    /* Sparkle-Herz (Outline aus leuchtenden Sparkles) */
    .heart-group {
      position: absolute;
      top: 45%; left: 50%;
      width: 420px;
      height: 380px;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      z-index: 3;
      animation:
        heartGroupAppear 0.7s cubic-bezier(0.22, 1.5, 0.36, 1) 0.3s forwards,
        heartbeat 2.6s ease-in-out 1.2s 2;
    }

    .sparkle {
      position: absolute;
      color: #ffffff;
      font-size: 32px;
      line-height: 1;
      opacity: 0;
      transform: scale(0.5);
      will-change: transform, opacity;
      text-shadow:
        0 0 12px rgba(255, 255, 255, 0.95),
        0 0 26px rgba(255, 150, 190, 0.85),
        0 0 48px rgba(255, 80, 130, 0.55);
      animation: sparkleTwinkle var(--dur) ease-in-out var(--delay) infinite;
    }

    .sparkle.gold {
      color: #ffe080;
      text-shadow:
        0 0 12px rgba(255, 220, 120, 0.95),
        0 0 26px rgba(242, 183, 5, 0.85),
        0 0 48px rgba(255, 150, 30, 0.55);
    }

    .sparkle.pink {
      color: #ffb8d0;
      text-shadow:
        0 0 12px rgba(255, 180, 210, 0.95),
        0 0 26px rgba(255, 100, 160, 0.85),
        0 0 48px rgba(220, 60, 130, 0.55);
    }

    .sparkle.rose {
      color: #ff6b9d;
      text-shadow:
        0 0 12px rgba(255, 120, 170, 0.95),
        0 0 26px rgba(232, 58, 104, 0.85),
        0 0 48px rgba(166, 28, 68, 0.55);
    }

    .username {
      position: absolute;
      top: calc(50% + 260px);
      left: 50%;
      transform: translateX(-50%) translateY(30px);
      font-size: 84px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: 6px;
      line-height: 1;
      white-space: nowrap;
      z-index: 5;
      opacity: 0;
      text-shadow:
        0 0 24px rgba(255, 120, 170, 0.9),
        0 0 50px rgba(255, 60, 130, 0.55),
        0 0 90px rgba(220, 40, 100, 0.4),
        4px 4px 0 rgba(0, 0, 0, 0.6);
      animation: nameIn 0.9s cubic-bezier(0.2, 0.8, 0.3, 1) 1.3s forwards;
    }

    .stage {
      position: absolute; inset: 0;
      animation: fadeOutAll 0.8s ease-in 4.6s forwards;
    }
  </style>
</head>
<body>

  <div class="stage">
    <div class="bg"></div>
    <div class="float-layer" id="floatLayer"></div>

    <div class="heart-group" id="heartGroup"></div>

    <div class="username" id="username">Liebling</div>
  </div>

  <audio data-stinger-autoplay preload="auto" src="../assets/stingers/heartbeat.mp3"></audio>

  <script>
    (function () {
      'use strict';

      /* URL-Parameter */
      var params = new URLSearchParams(window.location.search);
      var name = params.get('name') || 'Liebling';
      document.getElementById('username').textContent = name;

      /* Herz-Outline via parametrischer Herzkurve:
         x = 16 * sin(t)^3
         y = 13*cos(t) - 5*cos(2t) - 2*cos(3t) - cos(4t)
         Sampled an 30 gleichmäßigen Winkeln. */
      var HEART_POINTS = [];
      var CENTER_X = 210;   // Mitte innerhalb heart-group (420/2)
      var CENTER_Y = 190;   // Mitte innerhalb heart-group (380/2)
      var SCALE    = 11;    // Skalierung

      var STEPS = 30;
      for (var i = 0; i < STEPS; i++) {
        var t = (i / STEPS) * Math.PI * 2;
        var x = 16 * Math.pow(Math.sin(t), 3);
        var y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
        HEART_POINTS.push({
          x: CENTER_X + x * SCALE,
          y: CENTER_Y - y * SCALE  // y-Flip für Bildschirm-Koordinaten
        });
      }

      /* Zusätzliche 6 Innen-Glitter-Punkte für mehr Dichte (nicht am Outline) */
      var INNER_POINTS = [
        { x: 210, y: 110 },
        { x: 155, y: 145 },
        { x: 265, y: 145 },
        { x: 180, y: 200 },
        { x: 240, y: 200 },
        { x: 210, y: 245 }
      ];

      var STAR = '\u2726';      // ✦
      var STAR_SMALL = '\u2727'; // ✧
      var COLORS = ['', 'pink', 'gold', '', 'pink', 'rose'];

      var group = document.getElementById('heartGroup');

      /* Outline-Sparkles */
      HEART_POINTS.forEach(function (p, i) {
        var el = document.createElement('div');
        var cls = 'sparkle';
        var c = COLORS[i % COLORS.length];
        if (c) cls += ' ' + c;
        el.className = cls;
        var size = (24 + Math.random() * 20);
        var dur = (1.4 + Math.random() * 1.8) + 's';
        var delay = (Math.random() * 2.2) + 's';
        el.textContent = STAR;
        el.style.cssText =
          'left:' + p.x.toFixed(1) + 'px;' +
          'top:'  + p.y.toFixed(1) + 'px;' +
          'font-size:' + size.toFixed(0) + 'px;' +
          '--dur:' + dur + ';' +
          '--delay:' + delay + ';';
        group.appendChild(el);
      });

      /* Innen-Glitter, etwas kleiner und seltener */
      INNER_POINTS.forEach(function (p, i) {
        var el = document.createElement('div');
        el.className = 'sparkle ' + (i % 2 === 0 ? 'pink' : 'gold');
        var size = (14 + Math.random() * 10);
        var dur = (1.8 + Math.random() * 2.2) + 's';
        var delay = (0.5 + Math.random() * 2) + 's';
        el.textContent = STAR_SMALL;
        el.style.cssText =
          'left:' + p.x + 'px;' +
          'top:' + p.y + 'px;' +
          'font-size:' + size.toFixed(0) + 'px;' +
          '--dur:' + dur + ';' +
          '--delay:' + delay + ';';
        group.appendChild(el);
      });

      /* Schwebende Hintergrund-Sparkles */
      var floatLayer = document.getElementById('floatLayer');
      var FLOAT_COUNT = 18;
      for (var i = 0; i < FLOAT_COUNT; i++) {
        var el = document.createElement('div');
        el.className = 'float-spark';
        el.textContent = STAR;
        var startX = (Math.random() * 1920) + 'px';
        var startY = (440 + Math.random() * 640) + 'px';
        var dx = (Math.random() * 120 - 60) + 'px';
        var dy = (-(220 + Math.random() * 320)) + 'px';
        var rot = (Math.random() * 360 - 180) + 'deg';
        var dur = (3.5 + Math.random() * 2.5) + 's';
        var delay = (Math.random() * 4) + 's';
        el.style.cssText =
          'left:' + startX + ';' +
          'top:' + startY + ';' +
          'font-size:' + (14 + Math.random() * 14).toFixed(0) + 'px;' +
          '--dx:' + dx + ';' +
          '--dy:' + dy + ';' +
          '--rot:' + rot + ';' +
          '--dur:' + dur + ';' +
          '--delay:' + delay + ';';
        floatLayer.appendChild(el);
      }
    })();
  </script>

</body>
</html>
