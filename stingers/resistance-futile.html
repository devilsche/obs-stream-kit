<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <script src="../js/stinger-ready.js"></script>
  <title>We Are The Borg Stinger</title>
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-display: block;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'DM Sans', 'Courier New', monospace;
    }

    @keyframes bgFadeIn   { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeOutAll { from { opacity: 1; } to { opacity: 0; } }

    @keyframes scanlineSweep {
      0%   { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    @keyframes hexPulse {
      0%, 100% { opacity: 0.2; }
      50%      { opacity: 0.55; }
    }

    @keyframes cursorBlink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    @keyframes lineIn {
      0%   { transform: translate(-50%, -50%) translateY(16px); opacity: 0; letter-spacing: 18px; }
      100% { transform: translate(-50%, -50%) translateY(0);    opacity: 1; letter-spacing: 4px; }
    }

    @keyframes lineOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    .bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at center,
          rgba(15, 50, 25, 0.6) 0%,
          rgba(5, 20, 10, 0.9) 60%,
          rgba(0, 5, 0, 0.98) 100%
        );
      z-index: 1;
      opacity: 0;
      animation: bgFadeIn 0.3s ease-out forwards;
    }

    .hex-bg {
      position: absolute; inset: 0;
      z-index: 2;
      opacity: 0;
      background-image:
        repeating-linear-gradient(60deg, rgba(120, 255, 160, 0.18) 0 1px, transparent 1px 80px),
        repeating-linear-gradient(-60deg, rgba(120, 255, 160, 0.18) 0 1px, transparent 1px 80px),
        repeating-linear-gradient(0deg, rgba(120, 255, 160, 0.12) 0 1px, transparent 1px 80px);
      animation: hexPulse 2.4s ease-in-out 0.3s infinite;
    }

    .scanline {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 160px;
      z-index: 3;
      background: linear-gradient(180deg,
        transparent 0%,
        rgba(100, 255, 140, 0.08) 45%,
        rgba(100, 255, 140, 0.25) 50%,
        rgba(100, 255, 140, 0.08) 55%,
        transparent 100%
      );
      mix-blend-mode: screen;
      pointer-events: none;
      animation: scanlineSweep 2.2s linear infinite;
    }

    .crt {
      position: absolute; inset: 0;
      z-index: 4;
      pointer-events: none;
      background: repeating-linear-gradient(
        180deg,
        transparent 0 3px,
        rgba(0, 0, 0, 0.25) 3px 4px
      );
      mix-blend-mode: multiply;
      opacity: 0;
      animation: bgFadeIn 0.4s ease-out 0.2s forwards;
    }

    .kicker {
      position: absolute;
      top: 12%;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      font-size: 28px;
      font-weight: 700;
      color: rgba(120, 255, 160, 0.7);
      letter-spacing: 18px;
      text-transform: uppercase;
      font-family: 'Courier New', 'DM Sans', monospace;
      z-index: 5;
      opacity: 0;
      animation: bgFadeIn 0.5s ease-out 0.3s forwards;
    }

    .line {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) translateY(16px);
      font-weight: 900;
      color: #7cff9d;
      line-height: 1.15;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 4px;
      font-family: 'Courier New', 'DM Sans', monospace;
      white-space: pre-line;
      max-width: 1700px;
      z-index: 6;
      opacity: 0;
      text-shadow:
        0 0 18px rgba(120, 255, 160, 0.9),
        0 0 40px rgba(80, 200, 110, 0.7),
        0 0 80px rgba(50, 160, 80, 0.4);
    }

    .line.big   { font-size: 160px; }
    .line.mid   { font-size: 90px;  }
    .line.small { font-size: 62px;  }

    /* Sequenz — Timings zur 16.3s Audio */
    .line.l1 { animation:
      lineIn  0.5s ease-out 1.5s forwards,
      lineOut 0.4s ease-in  2.8s forwards; }
    .line.l2 { animation:
      lineIn  0.5s ease-out 3.6s forwards,
      lineOut 0.4s ease-in  6.5s forwards; }
    .line.l3 { animation:
      lineIn  0.6s ease-out 6.9s forwards,
      lineOut 0.4s ease-in  11.6s forwards; }
    .line.l4 { animation:
      lineIn  0.5s ease-out 12.0s forwards,
      lineOut 0.4s ease-in  14.4s forwards; }
    .line.l5 { animation:
      lineIn  0.6s ease-out 14.7s forwards; }

    .cursor {
      display: inline-block;
      width: 20px;
      height: 1em;
      background: #7cff9d;
      vertical-align: -0.1em;
      margin-left: 8px;
      animation: cursorBlink 0.8s steps(2) infinite;
      box-shadow: 0 0 20px rgba(120, 255, 160, 1);
    }

    .stage {
      position: absolute; inset: 0;
      animation: fadeOutAll 0.8s ease-in 16.0s forwards;
    }
  </style>
</head>
<body>

  <div class="stage">
    <div class="bg"></div>
    <div class="hex-bg"></div>
    <div class="scanline"></div>
    <div class="crt"></div>

    <div class="kicker">&gt;&gt; Collective Signal Detected</div>

    <div class="line big l1">We are the Borg.</div>
    <div class="line mid l2">Lower your shields&#10;and surrender your ships.</div>
    <div class="line small l3">Your biological and technological&#10;distinctiveness will be added to our own.</div>
    <div class="line mid l4">Your culture will adapt&#10;to service us.</div>
    <div class="line big l5">Resistance is futile.<span class="cursor"></span></div>
  </div>

  <audio data-stinger-autoplay preload="auto" src="../assets/stingers/borg.mp3"></audio>

</body>
</html>
