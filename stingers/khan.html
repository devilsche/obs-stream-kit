<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>KHAN Stinger</title>
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-display: block;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }

    @keyframes bgFadeIn   { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeOutAll { from { opacity: 1; } to { opacity: 0; } }

    @keyframes vignettePulse {
      0%, 100% { box-shadow: inset 0 0 200px 100px rgba(120, 0, 0, 0.85); }
      50%      { box-shadow: inset 0 0 280px 140px rgba(180, 0, 0, 1);    }
    }

    @keyframes zoomCircle {
      0%   { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      50%  { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.6); opacity: 0.85; }
    }

    @keyframes khanSlam {
      0%   { transform: translate(-50%, -50%) scale(0.3) rotate(-3deg); opacity: 0; letter-spacing: 40px; }
      40%  { transform: translate(-50%, -50%) scale(1.2) rotate(1deg);  opacity: 1; letter-spacing: -6px; }
      60%  { transform: translate(-50%, -50%) scale(0.96) rotate(-1deg); }
      100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; letter-spacing: -4px; }
    }

    @keyframes khanGhost {
      0%   { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
      100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
    }

    @keyframes khanFadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    @keyframes khanFadeBackIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes shake {
      0%, 100% { transform: translate(0, 0); }
      15%      { transform: translate(-12px, 10px); }
      30%      { transform: translate(12px, -8px); }
      45%      { transform: translate(-10px, -12px); }
      60%      { transform: translate(14px, 8px); }
      75%      { transform: translate(-8px, 10px); }
    }

    @keyframes starStreak {
      0%   { transform: translate(var(--x), 50vh); opacity: 0; }
      15%  { opacity: 1; }
      100% { transform: translate(var(--x), -50vh); opacity: 0; }
    }

    .bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at center,
          rgba(100, 10, 10, 0.6) 0%,
          rgba(40, 5, 5, 0.88) 40%,
          rgba(10, 0, 0, 0.98) 80%
        );
      z-index: 1;
      opacity: 0;
      animation:
        bgFadeIn 0.2s ease-out forwards,
        vignettePulse 0.9s ease-in-out 0.2s infinite;
    }

    /* Zoom-in dark red circle (Kirk extreme close-up vibe) */
    .zoom-circle {
      position: absolute;
      top: 50%; left: 50%;
      width: 1800px; height: 1800px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      z-index: 2;
      background: radial-gradient(circle,
        rgba(180, 30, 30, 0.35) 0%,
        rgba(90, 10, 10, 0.7) 55%,
        rgba(30, 0, 0, 0.95) 100%
      );
      mix-blend-mode: multiply;
      animation: zoomCircle 1.8s ease-out 0.1s forwards;
    }

    /* Falling star streaks (drama) */
    .streaks {
      position: absolute; inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    .streak {
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 180px;
      background: linear-gradient(180deg, transparent, rgba(255, 120, 120, 0.8), transparent);
      transform: translate(var(--x), 50vh);
      opacity: 0;
      animation: starStreak var(--dur) linear var(--delay) infinite;
    }

    .shaker {
      position: absolute; inset: 0;
      z-index: 4;
      animation: shake 0.16s ease-in-out 0.4s 30;
    }

    /* Ghost layers for echo effect */
    .khan-ghost {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(1);
      font-size: 360px;
      font-weight: 900;
      color: rgba(255, 60, 60, 0.4);
      letter-spacing: -4px;
      line-height: 1;
      white-space: nowrap;
      text-transform: uppercase;
      z-index: 5;
      opacity: 0;
      -webkit-text-stroke: 3px rgba(120, 0, 0, 0.6);
      animation: khanGhost 1.2s ease-out var(--delay) infinite;
    }

    .khan-ghost.g1 { --delay: 0.6s; }
    .khan-ghost.g2 { --delay: 0.9s; }
    .khan-ghost.g3 { --delay: 1.2s; }

    .khan {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.3) rotate(-3deg);
      font-size: 360px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: 40px;
      line-height: 1;
      white-space: nowrap;
      text-transform: uppercase;
      z-index: 7;
      opacity: 0;
      -webkit-text-stroke: 6px #3a0000;
      text-shadow:
        0 12px 0 #5a0000,
        0 20px 40px rgba(0, 0, 0, 0.85),
        0 0 50px rgba(255, 60, 60, 1),
        0 0 120px rgba(200, 20, 20, 0.7);
      animation:
        khanSlam 0.5s cubic-bezier(0.22, 1.6, 0.36, 1) 1.0s forwards,
        khanFadeOut 0.3s ease-in 2.2s forwards,
        khanFadeBackIn 0.35s ease-out 3.5s forwards;
    }

    .sub {
      position: absolute;
      top: calc(50% + 260px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 36px;
      font-weight: 700;
      color: rgba(255, 180, 180, 0.9);
      letter-spacing: 14px;
      text-transform: uppercase;
      z-index: 7;
      opacity: 0;
      font-style: italic;
      text-shadow:
        0 0 14px rgba(200, 20, 20, 0.8),
        2px 2px 0 #000;
      animation: bgFadeIn 0.5s ease-out 3.9s forwards;
    }

    .stage {
      position: absolute; inset: 0;
      animation: fadeOutAll 0.7s ease-in 5.9s forwards;
    }
  </style>
</head>
<body>

  <div class="stage">
    <div class="bg"></div>
    <div class="zoom-circle"></div>

    <div class="streaks" id="streaks"></div>

    <div class="shaker">
      <div class="khan-ghost g1">Khaaaan!</div>
      <div class="khan-ghost g2">Khaaaan!</div>
      <div class="khan-ghost g3">Khaaaan!</div>
      <div class="khan">Khaaaan!</div>
    </div>

    <div class="sub">&#151; Admiral James T. Kirk</div>
  </div>

  <audio autoplay src="../assets/stingers/khan.mp3"></audio>

  <script>
    (function () {
      'use strict';
      var layer = document.getElementById('streaks');
      var COUNT = 24;
      for (var i = 0; i < COUNT; i++) {
        var el = document.createElement('div');
        el.className = 'streak';
        var x = (Math.random() * 1920) + 'px';
        var dur = (1.0 + Math.random() * 1.2) + 's';
        var delay = (Math.random() * 1.5) + 's';
        el.style.cssText =
          '--x:' + x + ';' +
          '--dur:' + dur + ';' +
          '--delay:' + delay + ';';
        layer.appendChild(el);
      }
    })();
  </script>

</body>
</html>
