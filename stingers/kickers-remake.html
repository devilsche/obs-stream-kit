<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <script src="../js/stinger-ready.js"></script>
  <title>Kickers Intro Remake</title>
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-display: block;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }

    /* Ball-Sprite-Sheet: 32 Frames horizontal */
    .ball {
      position: absolute;
      width: var(--size, 180px);
      height: var(--size, 180px);
      background-image: url('../assets/stingers/ball_sheet.png');
      background-repeat: no-repeat;
      background-size: calc(var(--size, 180px) * 32) var(--size, 180px);
      background-position: 0 0;
      filter: drop-shadow(0 8px 14px rgba(0, 0, 0, 0.45));
      will-change: transform, background-position;
    }

    @keyframes roll {
      from { background-position-x: 0; }
      to   { background-position-x: calc(var(--size, 180px) * -32); }
    }

    /* Flug-Bahnen — translate von Start zu Ziel */
    @keyframes fly1 {
      0%   { transform: translate(-400px, 1100px) rotate(0deg);   opacity: 0; }
      10%  { opacity: 1; }
      100% { transform: translate(1800px, -300px) rotate(720deg); opacity: 1; }
    }
    @keyframes fly2 {
      0%   { transform: translate(2200px, 900px) rotate(0deg);    opacity: 0; }
      10%  { opacity: 1; }
      100% { transform: translate(-400px, 200px) rotate(-540deg); opacity: 1; }
    }
    @keyframes fly3 {
      0%   { transform: translate(-300px, 400px) rotate(0deg);    opacity: 0; }
      10%  { opacity: 1; }
      100% { transform: translate(2100px, 800px) rotate(480deg);  opacity: 1; }
    }
    @keyframes fly4 {
      0%   { transform: translate(900px, 1200px) rotate(0deg);    opacity: 0; }
      15%  { opacity: 1; }
      100% { transform: translate(1100px, -300px) rotate(900deg); opacity: 1; }
    }
    @keyframes fly5 {
      0%   { transform: translate(2100px, 100px) rotate(0deg);    opacity: 0; }
      10%  { opacity: 1; }
      100% { transform: translate(-400px, 950px) rotate(-660deg); opacity: 1; }
    }
    @keyframes flyHero {
      0%   { transform: translate(-800px, 540px) scale(0.3) rotate(0deg);    opacity: 0; }
      20%  { transform: translate(500px, 460px)  scale(1.1) rotate(180deg);  opacity: 1; }
      55%  { transform: translate(760px, 400px)  scale(1.3) rotate(420deg);  opacity: 1; }
      100% { transform: translate(2600px, 200px) scale(0.6) rotate(900deg);  opacity: 0; }
    }

    /* Hintergrund — Gras-Radial, sanft */
    @keyframes bgIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes bgOut { from { opacity: 1; } to { opacity: 0; } }

    .bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 50% 70%,
          rgba(60, 150, 50, 0.55) 0%,
          rgba(30, 90, 30, 0.55) 40%,
          rgba(10, 40, 15, 0.7) 100%);
      opacity: 0;
      z-index: 1;
      animation: bgIn 0.3s ease-out 0.05s forwards;
    }

    /* Sweep-Streifen — Comic-Lines die vorbeiziehen */
    @keyframes sweep {
      0%   { transform: translateX(-100%); opacity: 0; }
      15%  { opacity: 0.85; }
      85%  { opacity: 0.85; }
      100% { transform: translateX(100%); opacity: 0; }
    }
    .sweep {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        -12deg,
        transparent 0 30px,
        rgba(255, 255, 255, 0.08) 30px 48px,
        transparent 48px 90px
      );
      mix-blend-mode: screen;
      z-index: 2;
      animation: sweep 1.2s ease-in-out 0.2s 1 both;
    }

    /* Ball-Container: z-index gestaffelt */
    .balls { position: absolute; inset: 0; z-index: 3; }

    /* Einzelne Bälle */
    .ball.b1 { --size: 120px; animation: fly1 2.4s cubic-bezier(0.5, 0.1, 0.5, 0.9) 0.15s forwards, roll 0.5s steps(32) 0.15s infinite; }
    .ball.b2 { --size: 160px; animation: fly2 2.6s cubic-bezier(0.5, 0.1, 0.5, 0.9) 0.35s forwards, roll 0.6s steps(32) reverse 0.35s infinite; }
    .ball.b3 { --size: 100px; animation: fly3 2.2s cubic-bezier(0.5, 0.1, 0.5, 0.9) 0.6s forwards,  roll 0.45s steps(32) 0.6s infinite; }
    .ball.b4 { --size: 140px; animation: fly4 2.5s cubic-bezier(0.5, 0.1, 0.5, 0.9) 0.9s forwards,  roll 0.55s steps(32) reverse 0.9s infinite; }
    .ball.b5 { --size: 110px; animation: fly5 2.3s cubic-bezier(0.5, 0.1, 0.5, 0.9) 1.1s forwards,  roll 0.5s steps(32) 1.1s infinite; }

    .ball.hero {
      --size: 340px;
      z-index: 4;
      animation:
        flyHero 3.4s cubic-bezier(0.4, 0, 0.3, 1) 0.2s forwards,
        roll 0.7s steps(32) 0.2s infinite;
    }

    /* Titel */
    @keyframes titleSlam {
      0%   { transform: translate(-50%, -50%) scale(0)    rotate(-8deg); opacity: 0; }
      45%  { transform: translate(-50%, -50%) scale(1.2)  rotate(3deg);  opacity: 1; }
      65%  { transform: translate(-50%, -50%) scale(0.95) rotate(-1deg); }
      100% { transform: translate(-50%, -50%) scale(1)    rotate(0deg);  opacity: 1; }
    }
    @keyframes titleOut {
      from { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      to   { opacity: 0; transform: translate(-50%, -50%) scale(1.15); }
    }

    .title-wrap {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 5;
      opacity: 0;
      animation:
        titleSlam 0.6s cubic-bezier(0.22, 1.6, 0.36, 1) 2.2s forwards,
        titleOut  0.5s ease-in 4.2s forwards;
      text-align: center;
      white-space: nowrap;
    }

    .title-line1 {
      display: block;
      font-size: 56px;
      font-weight: 700;
      color: #f2b705;
      letter-spacing: 12px;
      text-transform: uppercase;
      text-shadow: 0 4px 0 #0d0d0d, 0 0 24px rgba(242, 183, 5, 0.8);
      margin-bottom: 6px;
    }
    .title-line2 {
      display: block;
      font-size: 180px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -4px;
      text-transform: uppercase;
      line-height: 1;
      -webkit-text-stroke: 5px #5e2a79;
      text-shadow:
        0 10px 0 #3a1650,
        0 14px 30px rgba(0, 0, 0, 0.6),
        0 0 40px rgba(242, 183, 5, 0.8);
    }

    /* Finaler Fade-Out */
    .stage {
      position: absolute; inset: 0;
      animation: bgOut 0.5s ease-in 4.7s forwards;
    }
  </style>
</head>
<body>

  <div class="stage">
    <div class="bg"></div>
    <div class="sweep"></div>

    <div class="balls">
      <div class="ball b1"></div>
      <div class="ball b2"></div>
      <div class="ball b3"></div>
      <div class="ball b4"></div>
      <div class="ball b5"></div>
      <div class="ball hero"></div>
    </div>

    <div class="title-wrap">
      <span class="title-line1">Die tollen</span>
      <span class="title-line2">Fußballstars</span>
    </div>
  </div>

  <audio data-stinger-autoplay preload="auto" src="../assets/stingers/kickers-hurra.mp3"></audio>

</body>
</html>
