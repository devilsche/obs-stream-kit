<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <script src="../js/stinger-ready.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
  <title>Kickers Intro Remake</title>
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-display: block;
    }
    @font-face {
      font-family: 'Kickers';
      src: url('../assets/fonts/Kickers-Regular.ttf') format('truetype');
      font-weight: normal;
      font-display: block;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }

    :root {
      --hero-in:     0.10s;
      --hero-out:    1.90s;
      --swarm-start: 1.50s;
      --swarm-end:   5.20s;
      --hurra1-in:   1.40s;
      --hurra1-out:  2.30s;
      --hurra2-in:   4.50s;
      --hurra2-out:  6.80s;
      --title-in:    1.40s;
      --title-out:   7.20s;
      --stage-out:   7.70s;
      --time-offset: 0s;
    }

    html.paused *, html.paused *::before, html.paused *::after {
      animation-play-state: paused !important;
    }

    /* Ball-Grundform */
    .ball {
      position: absolute;
      top: 50%; left: 50%;
      width: var(--size, 180px); height: var(--size, 180px);
      margin-left: calc(var(--size, 180px) * -0.5);
      margin-top:  calc(var(--size, 180px) * -0.5);
      background-image: url('../assets/stingers/ball_sheet.png');
      background-repeat: no-repeat;
      background-size: calc(var(--size, 180px) * 32) var(--size, 180px);
      background-position: 0 0;
      filter: drop-shadow(0 8px 14px rgba(0, 0, 0, 0.45));
      opacity: 0;
      will-change: transform, background-position, opacity;
    }
    @keyframes roll {
      from { background-position-x: 0; }
      to   { background-position-x: calc(var(--size, 180px) * -32); }
    }

    /* HERO */
    @keyframes heroIn {
      0%   { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
      15%  { transform: translate(-50%, -50%) scale(7.6); opacity: 1; }
      70%  { transform: translate(-50%, -50%) scale(7.0); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(8.5); opacity: 0; }
    }
    @keyframes heroRoll {
      from { background-position-x: 0; }
      to   { background-position-x: calc(560px * -32); }
    }
    .hero {
      position: absolute; top: 50%; left: 50%;
      width: 560px; height: 560px; margin: 0;
      background-image: url('../assets/stingers/ball_sheet.png');
      background-repeat: no-repeat;
      background-size: calc(560px * 32) 560px;
      background-position: 0 0;
      filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.7));
      z-index: 4;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.3);
      animation:
        heroIn   calc(var(--hero-out) - var(--hero-in)) cubic-bezier(0.3, 0, 0.4, 1) calc(var(--hero-in) - var(--time-offset)) forwards,
        heroRoll 0.6s steps(32) calc(var(--hero-in) - var(--time-offset)) infinite;
      will-change: transform, background-position, opacity;
    }

    /* Swarm-Richtungen — Start deutlich weiter ausserhalb, opacity schnell hoch */
    @keyframes flyDir1 { 0%{transform:translate(-2500px,-1500px) scale(2.5) rotate(0);opacity:0;} 4%{opacity:1;} 92%{opacity:1;} 100%{transform:translate(-40px,0) scale(0.08) rotate(540deg);opacity:0;} }
    @keyframes flyDir2 { 0%{transform:translate(-2500px, -600px) scale(2.3) rotate(0);opacity:0;} 4%{opacity:1;} 92%{opacity:1;} 100%{transform:translate(-30px,20px) scale(0.08) rotate(480deg);opacity:0;} }
    @keyframes flyDir3 { 0%{transform:translate(-2500px,  800px) scale(2.4) rotate(0);opacity:0;} 4%{opacity:1;} 92%{opacity:1;} 100%{transform:translate(-50px,-20px) scale(0.08) rotate(-420deg);opacity:0;} }
    @keyframes flyDir4 { 0%{transform:translate(-2500px, 1500px) scale(2.6) rotate(0);opacity:0;} 4%{opacity:1;} 92%{opacity:1;} 100%{transform:translate(0,30px) scale(0.08) rotate(660deg);opacity:0;} }
    @keyframes flyDir5 { 0%{transform:translate( 2500px,-1500px) scale(2.5) rotate(0);opacity:0;} 4%{opacity:1;} 92%{opacity:1;} 100%{transform:translate(40px,-10px) scale(0.08) rotate(-540deg);opacity:0;} }
    @keyframes flyDir6 { 0%{transform:translate( 2500px, -600px) scale(2.3) rotate(0);opacity:0;} 4%{opacity:1;} 92%{opacity:1;} 100%{transform:translate(30px,10px) scale(0.08) rotate(-480deg);opacity:0;} }
    @keyframes flyDir7 { 0%{transform:translate( 2500px,  800px) scale(2.4) rotate(0);opacity:0;} 4%{opacity:1;} 92%{opacity:1;} 100%{transform:translate(50px,-30px) scale(0.08) rotate(420deg);opacity:0;} }
    @keyframes flyDir8 { 0%{transform:translate( 2500px, 1500px) scale(2.6) rotate(0);opacity:0;} 4%{opacity:1;} 92%{opacity:1;} 100%{transform:translate(-20px,0) scale(0.08) rotate(-660deg);opacity:0;} }
    @keyframes flyDir9  { 0%{transform:translate(-1100px,-1600px) scale(2.5) rotate(0);opacity:0;} 4%{opacity:1;} 92%{opacity:1;} 100%{transform:translate(10px,0) scale(0.08) rotate(540deg);opacity:0;} }
    @keyframes flyDir10 { 0%{transform:translate( 1100px,-1600px) scale(2.5) rotate(0);opacity:0;} 4%{opacity:1;} 92%{opacity:1;} 100%{transform:translate(-20px,-10px) scale(0.08) rotate(-540deg);opacity:0;} }
    @keyframes flyDir11 { 0%{transform:translate(-1100px, 1600px) scale(2.5) rotate(0);opacity:0;} 4%{opacity:1;} 92%{opacity:1;} 100%{transform:translate(30px,-20px) scale(0.08) rotate(420deg);opacity:0;} }
    @keyframes flyDir12 { 0%{transform:translate( 1100px, 1600px) scale(2.5) rotate(0);opacity:0;} 4%{opacity:1;} 92%{opacity:1;} 100%{transform:translate(-10px,20px) scale(0.08) rotate(-420deg);opacity:0;} }

    /* Hintergrund: Fussballfeld — Mitte deutlich sichtbar, nach aussen kreisfoermig ausblendend */
    @keyframes bgIn { from { opacity: 0; } to { opacity: 0.75; } }
    .bg {
      position: absolute; inset: 0;
      background:
        /* Rasen-Streifen (volle Farbdichte, Verblendung passiert via Mask) */
        repeating-linear-gradient(90deg,
          rgba(48, 120, 42, 1) 0 160px,
          rgba(30,  92, 30, 1) 160px 320px);
      opacity: 0;
      z-index: 1;
      animation: bgIn 0.3s ease-out 0.05s forwards;
      /* Kreisfoermige Maske: Mitte opak, Rand transparent */
      -webkit-mask-image: radial-gradient(circle at 50% 50%, #000 0%, #000 30%, transparent 75%);
              mask-image: radial-gradient(circle at 50% 50%, #000 0%, #000 30%, transparent 75%);
    }

    @keyframes fieldIn { from { opacity: 0; } to { opacity: 0.70; } }
    .field-lines {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      z-index: 2;
      opacity: 0;
      animation: fieldIn 0.4s ease-out 0.1s forwards;
      pointer-events: none;
      -webkit-mask-image: radial-gradient(circle at 50% 50%, #000 0%, #000 35%, transparent 80%);
              mask-image: radial-gradient(circle at 50% 50%, #000 0%, #000 35%, transparent 80%);
    }

    .swarm { position: absolute; inset: 0; z-index: 3; }

    /* Swarm z-index muss ueber Feld-Linien sein */

    /* ── HURRA-Ausschrei: getrennte IN- und OUT-Phasen ── */
    @keyframes hurraIn {
      0%   { transform: translate(-50%, -50%) scale(0);    opacity: 0; }
      55%  { transform: translate(-50%, -50%) scale(1.55); opacity: 1; }
      78%  { transform: translate(-50%, -50%) scale(0.92); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.0);  opacity: 1; }
    }
    @keyframes hurraOut {
      0%   { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
    }

    /* Wackel-Varianten mit fester Schraeg-Basis */
    @keyframes wobbleLeft {
      0%,100% { transform: rotate(-14deg) scale(1);    }
      25%     { transform: rotate( -8deg) scale(1.06); }
      50%     { transform: rotate(-18deg) scale(0.97); }
      75%     { transform: rotate(-12deg) scale(1.04); }
    }
    @keyframes wobbleRight {
      0%,100% { transform: rotate( 14deg) scale(1);    }
      25%     { transform: rotate(  8deg) scale(1.06); }
      50%     { transform: rotate( 18deg) scale(0.97); }
      75%     { transform: rotate( 12deg) scale(1.04); }
    }

    .hurra {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 6;
      opacity: 0;
      pointer-events: none;
    }
    .hurra-text {
      display: inline-block;
      font-family: 'DM Sans', sans-serif;
      font-size: 260px;
      font-weight: 900;
      font-style: italic;
      color: #ffe74c;
      letter-spacing: 6px;
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
      -webkit-text-stroke: 10px #000000;
      text-shadow:
        /* Anime 3D-Block-Shadow: gestaffelt rechts-unten */
        3px  3px 0 #000,
        6px  6px 0 #000,
        9px  9px 0 #000,
        12px 12px 0 rgba(0, 0, 0, 0.6),
        /* Gold-Glow */
        0 0 50px rgba(255, 220, 60, 1),
        0 0 100px rgba(242, 140, 20, 0.85),
        0 0 160px rgba(255, 100, 0, 0.5);
    }

    .hurra.h1 {
      margin-left: -240px; margin-top: -120px;
      animation:
        hurraIn  0.45s cubic-bezier(0.25, 1.7, 0.4, 1) calc(var(--hurra1-in)  - var(--time-offset)) forwards,
        hurraOut 0.35s ease-in                         calc(var(--hurra1-out) - var(--time-offset)) forwards;
    }
    .hurra.h1 .hurra-text { animation: wobbleLeft 0.14s linear infinite; }

    .hurra.h2 {
      margin-left: 240px; margin-top: 120px;
      animation:
        hurraIn  0.45s cubic-bezier(0.25, 1.7, 0.4, 1) calc(var(--hurra2-in)  - var(--time-offset)) forwards,
        hurraOut 0.35s ease-in                         calc(var(--hurra2-out) - var(--time-offset)) forwards;
    }
    .hurra.h2 .hurra-text { animation: wobbleRight 0.14s linear infinite; }

    /* ── Haupttitel ── */
    @keyframes titleRise {
      0%   { transform: translate(-50%, 40%)  scale(0.6); opacity: 0; }
      55%  { transform: translate(-50%, -55%) scale(1.1); opacity: 1; }
      75%  { transform: translate(-50%, -50%) scale(0.97); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
    }
    @keyframes titleFade {
      from { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      to   { opacity: 0; transform: translate(-50%, -50%) scale(1.12); }
    }

    .title-wrap {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, 40%) scale(0.6);
      z-index: 5;
      opacity: 0;
      text-align: center;
      white-space: nowrap;
      animation:
        titleRise 0.7s cubic-bezier(0.22, 1.6, 0.36, 1) calc(var(--title-in)  - var(--time-offset)) forwards,
        titleFade 0.5s ease-in                          calc(var(--title-out) - var(--time-offset)) forwards;
    }

    .title-daddeln {
      display: block;
      font-family: 'Kickers', 'Bangers', 'DM Sans', sans-serif;
      font-size: 200px;
      font-style: italic;
      color: #ffe74c;
      letter-spacing: 8px;
      line-height: 1;
      text-transform: uppercase;
      -webkit-text-stroke: 8px #000000;
      text-shadow:
        3px  3px 0 #000,
        6px  6px 0 #000,
        9px  9px 0 rgba(0,0,0,0.6),
        0 0 40px rgba(255, 220, 60, 1),
        0 0 80px rgba(255, 140, 0, 0.8);
    }

    /* Stage Fade-Out */
    @keyframes stageOut { from { opacity: 1; } to { opacity: 0; } }
    .stage {
      position: absolute; inset: 0;
      animation: stageOut 0.5s ease-in calc(var(--stage-out) - var(--time-offset)) forwards;
    }

    /* ── Tune-Panel ── */
    .tune-panel {
      position: fixed; top: 80px; right: 16px; width: 440px;
      background: rgba(30, 25, 5, 0.92);
      border: 2px solid #f2b705; padding: 16px; border-radius: 10px;
      color: #f2b705; font-family: 'Courier New', monospace; font-size: 13px;
      z-index: 1000; display: none;
      box-shadow: 0 0 30px rgba(242, 183, 5, 0.4);
    }
    .tune-panel.visible { display: block; }
    .tune-panel h2 { font-size: 16px; margin-bottom: 12px; letter-spacing: 2px; text-transform: uppercase; }
    .tune-panel table { width: 100%; border-collapse: collapse; }
    .tune-panel th, .tune-panel td { padding: 4px 6px; text-align: left; border-bottom: 1px solid rgba(242, 183, 5, 0.2); }
    .tune-panel th { font-size: 11px; text-transform: uppercase; }
    .tune-panel input {
      width: 70px; background: rgba(242, 183, 5, 0.1); border: 1px solid rgba(242, 183, 5, 0.4);
      color: #f2b705; padding: 3px 6px; font-family: inherit; font-size: 12px;
      text-align: right; border-radius: 3px;
    }
    .tune-panel input:focus { outline: 1px solid #f2b705; }
    .tune-panel tr.clickable { cursor: pointer; }
    .tune-panel tr.clickable:hover { background: rgba(242, 183, 5, 0.15); }
    .tune-panel tr.clickable:hover .tune-label { color: #fff; }
    .tune-panel .tune-label { font-size: 11px; color: rgba(255, 220, 150, 0.75); max-width: 200px; }
    .tune-actions { display: flex; gap: 8px; margin-top: 12px; }
    .tune-btn {
      flex: 1; background: rgba(242, 183, 5, 0.15); border: 1px solid #f2b705;
      color: #f2b705; padding: 8px 10px; font-family: inherit; font-size: 12px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      border-radius: 4px; cursor: pointer;
    }
    .tune-btn:hover { background: rgba(242, 183, 5, 0.3); }
    .tune-btn.reset { border-color: #ff8888; color: #ff8888; }
    .tune-btn.reset:hover { background: rgba(255, 136, 136, 0.2); }
    .tune-hint { margin-top: 10px; font-size: 10px; color: rgba(255, 220, 150, 0.6); line-height: 1.4; }
    .time-indicator {
      position: fixed; bottom: 16px; right: 16px;
      background: rgba(30, 25, 5, 0.85); border: 1px solid #f2b705;
      color: #f2b705; padding: 6px 14px; font-family: 'Courier New', monospace;
      font-size: 14px; z-index: 1000; display: none; border-radius: 4px;
    }
    .time-indicator.visible { display: block; }
  </style>
</head>
<body>

  <div class="stage">
    <div class="bg"></div>

    <svg class="field-lines" viewBox="0 0 1920 1080" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <g stroke="rgba(255,255,255,0.32)" stroke-width="5" fill="none">
        <!-- Spielfeld-Rand -->
        <rect x="60" y="60" width="1800" height="960"/>
        <!-- Mittellinie -->
        <line x1="960" y1="60" x2="960" y2="1020"/>
        <!-- Mittelkreis -->
        <circle cx="960" cy="540" r="180"/>
        <!-- Strafraum links -->
        <rect x="60" y="290" width="260" height="500"/>
        <!-- Torraum links -->
        <rect x="60" y="400" width="110" height="280"/>
        <!-- Strafraum rechts -->
        <rect x="1600" y="290" width="260" height="500"/>
        <!-- Torraum rechts -->
        <rect x="1750" y="400" width="110" height="280"/>
      </g>
      <!-- Mittelpunkt + Elfmeterpunkte -->
      <circle cx="960"  cy="540" r="7" fill="rgba(255,255,255,0.42)"/>
      <circle cx="235"  cy="540" r="7" fill="rgba(255,255,255,0.42)"/>
      <circle cx="1685" cy="540" r="7" fill="rgba(255,255,255,0.42)"/>
    </svg>

    <div class="hero"></div>
    <div class="swarm" id="swarm"></div>

    <div class="hurra h1"><span class="hurra-text">HURRA!</span></div>
    <div class="hurra h2"><span class="hurra-text">HURRA!</span></div>

    <div class="title-wrap">
      <span class="title-daddeln">DADDELN</span>
    </div>
  </div>

  <audio id="audio" data-stinger-autoplay preload="auto" src="../assets/stingers/kickers-hurra.mp3"></audio>

  <div class="tune-panel" id="tunePanel">
    <h2>Kickers Tune Mode</h2>
    <table id="tuneTable"></table>
    <div class="tune-actions">
      <button class="tune-btn" id="applyBtn">&gt; Apply</button>
      <button class="tune-btn" id="copyBtn">&#128203; Copy</button>
      <button class="tune-btn reset" id="resetBtn">Reset</button>
    </div>
    <div style="margin-top: 14px; border-top: 1px solid rgba(242,183,5,0.3); padding-top: 12px;">
      <div style="font-size: 11px; text-transform: uppercase; margin-bottom: 6px;">Playback</div>
      <div class="tune-actions" style="margin-top: 6px;">
        <button class="tune-btn" id="pauseBtn">&#9208; Pause</button>
        <button class="tune-btn" id="replayBtn">&#8634; Replay 0s</button>
      </div>
      <div style="margin-top: 10px; display: flex; align-items: center; gap: 6px; font-size: 11px;">
        <span>Von:</span>
        <input type="number" id="fromInput" value="0" step="0.1" min="0" max="10" style="width: 60px;">
        <span>Bis:</span>
        <input type="number" id="toInput" value="10" step="0.1" min="0" max="10" style="width: 60px;">
        <button class="tune-btn" id="segmentBtn" style="flex: 0 0 auto; padding: 6px 12px;">&#9658; Play</button>
      </div>
    </div>
    <div class="tune-hint">
      <b>Apply</b>: speichert + Reload. <b>Pause</b>/<b>Replay</b>/<b>Play Segment</b>: ohne Reload.<br>
      Shortcuts: <b>Space</b> = Pause, <b>R</b> = Replay, <b>S</b> = Apply, <b>C</b> = Copy.
    </div>
  </div>

  <div class="time-indicator" id="timeInd">t = 0.00s</div>

  <script>
    (function () {
      'use strict';
      var DEFAULTS = {
        'hero-in':     0.10,
        'hero-out':    1.90,
        'swarm-start': 1.50,
        'swarm-end':   5.20,
        'hurra1-in':   1.40,
        'hurra1-out':  2.30,
        'hurra2-in':   4.50,
        'hurra2-out':  6.80,
        'title-in':    1.40,
        'title-out':   7.20,
        'stage-out':   7.70
      };
      var LABELS = {
        'hero-in':     'Hero-Ball IN',
        'hero-out':    'Hero-Ball OUT',
        'swarm-start': 'Ball-Swarm Start',
        'swarm-end':   'Ball-Swarm End',
        'hurra1-in':   'KICKERS Nr. 1 IN',
        'hurra1-out':  'KICKERS Nr. 1 OUT',
        'hurra2-in':   'KICKERS Nr. 2 IN',
        'hurra2-out':  'KICKERS Nr. 2 OUT',
        'title-in':    'Titel IN (hochkommend)',
        'title-out':   'Titel OUT (fade)',
        'stage-out':   'Stage Fade-Out'
      };
      var KEYS = ['hero-in','hero-out','swarm-start','swarm-end','hurra1-in','hurra1-out','hurra2-in','hurra2-out','title-in','title-out','stage-out'];
      var STORAGE_KEY = 'kickers-tune-values';

      var params = new URLSearchParams(window.location.search);
      var tuneMode = params.get('tune') === '1';

      var saved = {};
      try { var raw = localStorage.getItem(STORAGE_KEY); if (raw) saved = JSON.parse(raw); } catch (e) {}
      function getValue(key) { return (saved[key] !== undefined) ? saved[key] : DEFAULTS[key]; }

      function applyToRoot() {
        var root = document.documentElement;
        KEYS.forEach(function (k) { root.style.setProperty('--' + k, getValue(k) + 's'); });
      }
      applyToRoot();

      // Audio-Fade am Ende — ab title-out linear runterfadet ueber 0.8s
      var audioEl = document.getElementById('audio');
      var FADE_DUR = 0.8;
      function audioFadeTick() {
        if (audioEl) {
          var t = audioEl.currentTime;
          var fadeStart = getValue('title-out');
          if (t < fadeStart) {
            if (audioEl.volume !== 1) audioEl.volume = 1;
          } else {
            var p = Math.min(1, (t - fadeStart) / FADE_DUR);
            audioEl.volume = Math.max(0, 1 - p);
            if (p >= 1 && !audioEl.paused) audioEl.pause();
          }
        }
        requestAnimationFrame(audioFadeTick);
      }
      requestAnimationFrame(audioFadeTick);

      var swarm = document.getElementById('swarm');
      var COUNT = 50;
      var DIRS = 12;
      function spawnSwarm() {
        swarm.innerHTML = '';
        var wStart = getValue('swarm-start');
        var wEnd   = getValue('swarm-end');
        for (var i = 0; i < COUNT; i++) {
          var el = document.createElement('div');
          el.className = 'ball';
          var size  = 120 + Math.random() * 180;
          var dir   = (i % DIRS) + 1;
          var dur   = 1.32 + Math.random() * 0.96;  // 20% langsamer als vorher (war 1.1-1.9s)
          var maxDelay = Math.max(0.05, wEnd - wStart - dur);
          var delay = wStart + Math.random() * maxDelay;
          var rollDur = 0.42 + Math.random() * 0.42;  // 20% langsamer
          var rollDir = Math.random() < 0.5 ? 'reverse' : 'normal';
          el.style.cssText =
            '--size:' + size.toFixed(0) + 'px;' +
            'animation:' +
              'flyDir' + dir + ' ' + dur.toFixed(2) + 's cubic-bezier(0.3,0,0.7,1) ' + delay.toFixed(2) + 's forwards,' +
              'roll ' + rollDur.toFixed(2) + 's steps(32) ' + rollDir + ' ' + delay.toFixed(2) + 's infinite;';
          swarm.appendChild(el);
        }
      }
      spawnSwarm();

      if (!tuneMode) return;

      var table = document.getElementById('tuneTable');
      var header = document.createElement('tr');
      header.innerHTML = '<th>Event</th><th>Zeit</th>';
      table.appendChild(header);

      function addRow(label, key) {
        var tr = document.createElement('tr');
        tr.className = 'clickable';
        var tdLabel = document.createElement('td');
        tdLabel.className = 'tune-label';
        tdLabel.textContent = label;
        tdLabel.title = 'Click: Von/Bis befuellen';
        tr.appendChild(tdLabel);

        var td = document.createElement('td');
        var inp = document.createElement('input');
        inp.type = 'number'; inp.step = '0.05'; inp.min = '0'; inp.max = '12';
        inp.value = getValue(key); inp.dataset.key = key;
        td.appendChild(inp);
        tr.appendChild(td);

        tr.addEventListener('click', function (e) {
          if (e.target.tagName === 'INPUT') return;
          var v = currentVals();
          var from = Math.max(0, v[key] - 0.3);
          var to   = v[key] + 0.8;
          document.getElementById('fromInput').value = from.toFixed(2);
          document.getElementById('toInput').value   = to.toFixed(2);
        });
        table.appendChild(tr);
      }
      KEYS.forEach(function (k) { addRow(LABELS[k], k); });

      document.getElementById('tunePanel').classList.add('visible');
      document.getElementById('timeInd').classList.add('visible');

      function currentVals() {
        var vals = {};
        document.querySelectorAll('.tune-panel input').forEach(function (inp) {
          if (inp.dataset.key) vals[inp.dataset.key] = parseFloat(inp.value) || 0;
        });
        return vals;
      }

      function apply() {
        var vals = currentVals();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(vals));
        try { var a = document.getElementById('audio'); if (a) { a.pause(); a.currentTime = 0; } } catch (e) {}
        location.reload();
      }
      function reset() { localStorage.removeItem(STORAGE_KEY); location.reload(); }

      document.getElementById('applyBtn').addEventListener('click', apply);
      document.getElementById('resetBtn').addEventListener('click', reset);

      function copyValues() {
        var v = currentVals();
        var lines = ['Kickers Tune Values:'];
        KEYS.forEach(function (k) {
          lines.push((LABELS[k] + ':').padEnd(34) + v[k].toFixed(2) + 's');
        });
        var text = lines.join('\n');
        var btn = document.getElementById('copyBtn');
        var original = btn.innerHTML;
        var restore = function () { btn.innerHTML = original; };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () {
            btn.innerHTML = '&#10003; Copied!';
            setTimeout(restore, 1200);
          }).catch(function () { fallbackCopy(text, btn, restore); });
        } else { fallbackCopy(text, btn, restore); }
      }
      function fallbackCopy(text, btn, restore) {
        var ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); btn.innerHTML = '&#10003; Copied!'; }
        catch (e) { btn.innerHTML = 'Error'; }
        document.body.removeChild(ta);
        setTimeout(restore, 1200);
      }
      document.getElementById('copyBtn').addEventListener('click', copyValues);

      var html = document.documentElement;
      var audio = audioEl;
      var pauseBtn = document.getElementById('pauseBtn');
      var replayBtn = document.getElementById('replayBtn');
      var segmentBtn = document.getElementById('segmentBtn');
      var fromInp = document.getElementById('fromInput');
      var toInp = document.getElementById('toInput');
      var segmentTimer = null;

      function setPaused(paused) {
        if (paused) { html.classList.add('paused'); audio.pause(); pauseBtn.innerHTML = '&#9654; Resume'; }
        else        { html.classList.remove('paused'); audio.play().catch(function () {}); pauseBtn.innerHTML = '&#9208; Pause'; }
      }
      function togglePause() { setPaused(!html.classList.contains('paused')); }

      function resetAnimations(offsetSec) {
        clearTimeout(segmentTimer);
        html.style.setProperty('--time-offset', (offsetSec || 0) + 's');
        var stage = document.querySelector('.stage');
        var clone = stage.cloneNode(true);
        stage.parentNode.replaceChild(clone, stage);
        html.classList.remove('paused');
        pauseBtn.innerHTML = '&#9208; Pause';
        swarm = document.getElementById('swarm');
        spawnSwarm();
      }
      function replayFrom0() {
        resetAnimations(0);
        try { audio.currentTime = 0; audio.play().catch(function () {}); } catch (e) {}
      }
      function playSegment() {
        var from = parseFloat(fromInp.value) || 0;
        var to   = parseFloat(toInp.value) || getValue('stage-out');
        if (to <= from) return;
        resetAnimations(from);
        try { audio.currentTime = from; audio.play().catch(function () {}); } catch (e) {}
        segmentTimer = setTimeout(function () { setPaused(true); }, (to - from) * 1000);
      }
      pauseBtn.addEventListener('click', togglePause);
      replayBtn.addEventListener('click', replayFrom0);
      segmentBtn.addEventListener('click', playSegment);

      document.addEventListener('keydown', function (e) {
        if (e.target.tagName === 'INPUT') return;
        if (e.key === 'r' || e.key === 'R') replayFrom0();
        else if (e.key === 's' || e.key === 'S') apply();
        else if (e.key === 'c' || e.key === 'C') copyValues();
        else if (e.key === ' ') { e.preventDefault(); togglePause(); }
      });

      var events = [];
      KEYS.forEach(function (k) { events.push({ t: getValue(k), label: LABELS[k] }); });
      events.sort(function (a, b) { return a.t - b.t; });

      var timeInd = document.getElementById('timeInd');
      function tick() {
        if (html.classList.contains('stinger-loading')) { requestAnimationFrame(tick); return; }
        var t = audio.currentTime;
        var currentEvent = null;
        for (var i = 0; i < events.length; i++) {
          if (events[i].t <= t) currentEvent = events[i]; else break;
        }
        var txt = 't = ' + t.toFixed(2) + 's';
        if (html.classList.contains('paused')) txt += ' [PAUSED]';
        if (currentEvent) txt += '  |  ' + currentEvent.label + ' @ ' + currentEvent.t.toFixed(2) + 's';
        timeInd.textContent = txt;
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })();
  </script>

</body>
</html>
