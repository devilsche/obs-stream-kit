<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <script src="../js/stinger-ready.js"></script>
  <title>Kickers Stinger</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
    }

    @keyframes fadeOutAll { from { opacity: 1; } to { opacity: 0; } }

    @keyframes videoFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Fullscreen Video — Schwarz wird per screen-Blend transparent,
       nur die hellen Bälle bleiben sichtbar */
    .bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      opacity: 0;
      mix-blend-mode: screen;
      animation: videoFadeIn 0.3s ease-out 0.1s forwards;
    }

    .stage {
      position: absolute; inset: 0;
      animation: fadeOutAll 0.4s ease-in 8.6s forwards;
    }
  </style>
</head>
<body>

  <div class="stage">
    <video class="bg-video" data-stinger-autoplay autoplay preload="auto" playsinline src="../assets/stingers/kickers-intro.mp4"></video>
  </div>

</body>
</html>
