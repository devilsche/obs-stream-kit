<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Kamehameha Stinger</title>
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-display: block;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }

    @keyframes bgFadeIn   { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeOutAll { from { opacity: 1; } to { opacity: 0; } }

    @keyframes orbGrow {
      0%   { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    @keyframes orbPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1);    box-shadow: 0 0 80px 40px rgba(80, 180, 255, 0.7), 0 0 150px 60px rgba(50, 140, 230, 0.4); }
      50%      { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 120px 60px rgba(120, 220, 255, 0.95), 0 0 220px 90px rgba(60, 180, 255, 0.6); }
    }

    @keyframes wordPop {
      0%   { transform: translate(-50%, -50%) scale(0);    opacity: 0; }
      60%  { transform: translate(-50%, -50%) scale(1.2);  opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1);    opacity: 1; }
    }

    @keyframes wordOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    @keyframes beamLaunch {
      0%   { transform: translateY(-50%) scaleX(0); opacity: 0; transform-origin: left center; }
      10%  { opacity: 1; }
      100% { transform: translateY(-50%) scaleX(1); opacity: 1; transform-origin: left center; }
    }

    @keyframes finalWord {
      0%   { transform: translate(-50%, -50%) scale(0) rotate(-6deg); opacity: 0; }
      45%  { transform: translate(-50%, -50%) scale(1.35) rotate(3deg); opacity: 1; }
      65%  { transform: translate(-50%, -50%) scale(0.95) rotate(-1deg); }
      100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
    }

    @keyframes orbVanish {
      from { opacity: 1; }
      to   { opacity: 0; transform: translate(-50%, -50%) scale(3); }
    }

    .bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at center,
          rgba(20, 40, 80, 0.7) 0%,
          rgba(10, 15, 35, 0.92) 55%,
          rgba(5, 5, 15, 0.98) 100%
        );
      z-index: 1;
      opacity: 0;
      animation: bgFadeIn 0.25s ease-out forwards;
    }

    /* Ki orb — the charging blue ball */
    .orb {
      position: absolute;
      top: 50%; left: 50%;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle,
        #ffffff 0%,
        #a8e4ff 25%,
        #4ea9ff 55%,
        #1e5fc8 80%,
        transparent 100%
      );
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      z-index: 4;
      box-shadow: 0 0 80px 40px rgba(80, 180, 255, 0.7), 0 0 150px 60px rgba(50, 140, 230, 0.4);
      animation:
        orbGrow 0.4s ease-out 0.2s forwards,
        orbPulse 0.8s ease-in-out 0.6s 3,
        orbVanish 0.3s ease-out 2.7s forwards;
    }

    /* Chant words — appear one after the other */
    .chant-word {
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 150px;
      font-weight: 900;
      color: #a8e4ff;
      letter-spacing: -3px;
      line-height: 1;
      white-space: nowrap;
      text-transform: uppercase;
      z-index: 6;
      opacity: 0;
      -webkit-text-stroke: 4px #0d1a40;
      text-shadow:
        0 0 30px rgba(100, 180, 255, 0.9),
        0 0 60px rgba(50, 140, 230, 0.6),
        4px 4px 0 #0a0a1a;
    }

    .chant-word.w1 {
      animation:
        wordPop 0.3s cubic-bezier(0.22, 1.6, 0.36, 1) 0.6s forwards,
        wordOut 0.3s ease-in 1.1s forwards;
    }
    .chant-word.w2 {
      animation:
        wordPop 0.3s cubic-bezier(0.22, 1.6, 0.36, 1) 1.3s forwards,
        wordOut 0.3s ease-in 1.8s forwards;
    }

    /* Final "HA!" — bigger, explosive */
    .ha {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0) rotate(-6deg);
      font-size: 380px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -10px;
      line-height: 1;
      white-space: nowrap;
      text-transform: uppercase;
      z-index: 7;
      opacity: 0;
      -webkit-text-stroke: 6px #0d1a40;
      text-shadow:
        0 0 50px rgba(150, 220, 255, 1),
        0 0 100px rgba(80, 180, 255, 0.8),
        0 0 180px rgba(50, 140, 230, 0.5),
        8px 8px 0 #0a0a1a;
      animation: finalWord 0.55s cubic-bezier(0.22, 1.6, 0.36, 1) 2.6s forwards;
    }

    /* Horizontal beam blasting across */
    .beam {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 200%;
      height: 260px;
      transform: translateY(-50%) scaleX(0);
      transform-origin: left center;
      background: linear-gradient(90deg,
        rgba(255, 255, 255, 1) 0%,
        rgba(180, 230, 255, 0.95) 10%,
        rgba(80, 180, 255, 0.9) 30%,
        rgba(40, 130, 230, 0.85) 55%,
        rgba(30, 100, 200, 0.7) 80%,
        transparent 100%
      );
      z-index: 5;
      opacity: 0;
      filter: blur(2px);
      box-shadow: 0 0 80px rgba(100, 200, 255, 0.9);
      animation: beamLaunch 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) 2.7s forwards;
    }

    .stage {
      position: absolute; inset: 0;
      animation: fadeOutAll 0.5s ease-in 3.5s forwards;
    }
  </style>
</head>
<body>

  <div class="stage">
    <div class="bg"></div>

    <div class="chant-word w1">Kame...</div>
    <div class="chant-word w2">Hame...</div>

    <div class="orb"></div>
    <div class="beam"></div>
    <div class="ha">HA!!!</div>
  </div>

</body>
</html>
