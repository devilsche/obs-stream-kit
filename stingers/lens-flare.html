<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <script src="../js/stinger-ready.js"></script>
  <title>Lens Flare Overlay</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
    }

    .bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* Schwarzer Hintergrund wird per screen-Blend transparent,
         Lens-Flares bleiben sichtbar */
      mix-blend-mode: screen;
    }
  </style>
</head>
<body>

  <video class="bg-video" data-stinger-autoplay preload="auto" playsinline loop muted
         src="../assets/stingers/lens-flare.mp4"></video>

</body>
</html>
