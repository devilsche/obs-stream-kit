<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Noice Stinger</title>
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-display: block;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }

    @keyframes stripeSlideIn {
      0%   { transform: translate(-120%, -50%) rotate(-12deg); }
      70%  { transform: translate(-48%, -50%) rotate(-12deg); }
      100% { transform: translate(-50%, -50%) rotate(-12deg); }
    }

    @keyframes noiceIn {
      0%   { transform: translate(-50%, 200%) scale(0.85); opacity: 0; }
      60%  { transform: translate(-50%, -60%) scale(1.05); opacity: 1; }
      80%  { transform: translate(-50%, -45%) scale(0.98); }
      100% { transform: translate(-50%, -50%) scale(1);    opacity: 1; }
    }

    @keyframes dotPop {
      0%   { transform: scale(0); opacity: 0; }
      70%  { transform: scale(1.3); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes subIn {
      0%   { transform: translateX(-50%) translateY(16px); opacity: 0; }
      100% { transform: translateX(-50%) translateY(0);    opacity: 1; }
    }

    @keyframes fadeOutAll {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    .stripe {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-120%, -50%) rotate(-12deg);
      width: 2400px;
      height: 420px;
      background: linear-gradient(90deg,
        rgba(94, 42, 121, 0.95) 0%,
        rgba(94, 42, 121, 0.95) 45%,
        rgba(242, 183, 5, 0.95) 55%,
        rgba(242, 183, 5, 0.95) 100%
      );
      box-shadow:
        0 0 40px rgba(0, 0, 0, 0.5),
        inset 0 0 60px rgba(0, 0, 0, 0.25);
      z-index: 2;
      animation: stripeSlideIn 0.5s cubic-bezier(0.2, 1.2, 0.4, 1) forwards;
    }

    .stripe::before,
    .stripe::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 6px;
      background: #0d0d0d;
    }
    .stripe::before { top: 0; }
    .stripe::after  { bottom: 0; }

    .noice-wrap {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      display: flex;
      align-items: baseline;
      gap: 0;
    }

    .noice-text {
      font-size: 300px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -6px;
      line-height: 1;
      text-transform: none;
      -webkit-text-stroke: 5px #0d0d0d;
      text-shadow:
        8px 8px 0 #0d0d0d,
        0 0 22px rgba(242, 183, 5, 0.95),
        0 0 45px rgba(242, 183, 5, 0.75),
        0 0 90px rgba(255, 210, 80, 0.55);
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, 200%) scale(0.85);
      white-space: nowrap;
      z-index: 10;
      opacity: 0;
      animation: noiceIn 0.5s cubic-bezier(0.22, 1.5, 0.36, 1) 0.5s forwards;
    }

    .noice-dot {
      display: inline-block;
      color: #f2b705;
      transform: scale(0);
      opacity: 0;
      text-shadow:
        0 0 20px rgba(242, 183, 5, 1),
        0 0 40px rgba(255, 210, 80, 0.8);
      animation: dotPop 0.3s cubic-bezier(0.22, 1.5, 0.36, 1) 0.95s forwards;
      margin-left: 4px;
    }

    .sub {
      position: absolute;
      top: calc(50% + 180px);
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      font-size: 32px;
      font-weight: 700;
      color: #0d0d0d;
      letter-spacing: 10px;
      text-transform: uppercase;
      z-index: 11;
      opacity: 0;
      text-shadow: 2px 2px 0 rgba(242, 183, 5, 0.6);
      animation: subIn 0.35s ease-out 1.1s forwards;
    }

    .stage {
      position: absolute; inset: 0;
      animation: fadeOutAll 0.35s ease-in 2.1s forwards;
    }
  </style>
</head>
<body>

  <div class="stage">
    <div class="stripe"></div>
    <div class="noice-text">Noice<span class="noice-dot">.</span></div>
    <div class="sub">Title of your sex tape</div>
  </div>

  <audio autoplay src="../assets/stingers/noice.mp3"></audio>

</body>
</html>
