<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <script src="../js/stinger-ready.js"></script>
  <title>Nani Stinger</title>
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-display: block;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }

    :root {
      --audio-delay: 0.00s;
      --shock-in:    0.35s;
      --jp-in:       0.65s;
      --nani-in:     0.80s;
      --stage-out:   2.90s;
      --time-offset: 0s;
    }

    html.paused *, html.paused *::before, html.paused *::after {
      animation-play-state: paused !important;
    }

    @keyframes darkFade {
      from { opacity: 0; }
      to   { opacity: 0.9; }
    }

    @keyframes shockExplode {
      0%   { transform: translate(-50%, -50%) scale(0);    opacity: 0; }
      40%  { transform: translate(-50%, -50%) scale(1.1);  opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1);    opacity: 1; }
    }

    @keyframes shockPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1)    rotate(0deg); }
      50%      { transform: translate(-50%, -50%) scale(1.04) rotate(1deg); }
    }

    @keyframes naniSlam {
      0%   { transform: translate(-50%, -50%) scale(0) rotate(-8deg); opacity: 0; }
      50%  { transform: translate(-50%, -50%) scale(1.3) rotate(2deg); opacity: 1; }
      70%  { transform: translate(-50%, -50%) scale(0.92) rotate(-1deg); }
      100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
    }

    @keyframes jpFadeIn {
      0%   { transform: translateX(-50%) translateY(40px); opacity: 0; }
      100% { transform: translateX(-50%) translateY(0);    opacity: 1; }
    }

    @keyframes pulseGlow {
      0%, 100% {
        text-shadow:
          -6px -6px 0 #000, 6px -6px 0 #000, -6px 6px 0 #000, 6px 6px 0 #000,
          0 0 40px rgba(255, 0, 0, 0.9), 0 0 80px rgba(200, 0, 0, 0.6);
      }
      50% {
        text-shadow:
          -6px -6px 0 #000, 6px -6px 0 #000, -6px 6px 0 #000, 6px 6px 0 #000,
          0 0 60px rgba(255, 50, 50, 1), 0 0 120px rgba(255, 0, 0, 0.9);
      }
    }

    @keyframes shakeNani {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(-6px, 4px); }
      50% { transform: translate(5px, -5px); }
      75% { transform: translate(-4px, -4px); }
    }

    @keyframes fadeOutAll {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    .dark-overlay {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center,
        rgba(40, 0, 0, 0.7) 0%,
        rgba(0, 0, 0, 0.98) 80%
      );
      z-index: 1;
      opacity: 0;
      animation: darkFade 0.4s ease-out forwards;
    }

    /* Radial shock lines via SVG */
    .shock-lines {
      position: absolute;
      top: 50%; left: 50%;
      width: 2600px;
      height: 2600px;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      z-index: 2;
      animation:
        shockExplode 0.4s cubic-bezier(0.3, 1.5, 0.5, 1) calc(var(--shock-in) - var(--time-offset)) forwards,
        shockPulse 1.2s ease-in-out calc(var(--shock-in) + 0.4s - var(--time-offset)) infinite;
    }

    .shock-lines svg {
      width: 100%; height: 100%;
    }

    .shaker {
      position: absolute; inset: 0;
      z-index: 4;
      animation: shakeNani 0.16s linear 0.8s 10;
    }

    .nani-jp {
      position: absolute;
      top: calc(50% - 220px);
      left: 50%;
      transform: translateX(-50%) translateY(40px);
      font-size: 52px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 10px;
      opacity: 0;
      white-space: nowrap;
      text-shadow: 0 0 18px rgba(255, 40, 40, 0.9), 3px 3px 0 #000;
      font-family: "Noto Sans JP", "Yu Gothic", "Hiragino Sans", sans-serif;
      animation: jpFadeIn 0.5s ease-out calc(var(--jp-in) - var(--time-offset)) forwards;
    }

    .nani-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 320px;
      font-weight: 900;
      color: #ff1a1a;
      letter-spacing: -8px;
      white-space: nowrap;
      text-transform: uppercase;
      -webkit-text-stroke: 2px #000;
      opacity: 0;
      text-shadow:
        -6px -6px 0 #000, 6px -6px 0 #000, -6px 6px 0 #000, 6px 6px 0 #000,
        0 0 40px rgba(255, 0, 0, 0.9), 0 0 80px rgba(200, 0, 0, 0.6);
      animation:
        naniSlam 0.55s cubic-bezier(0.22, 1.6, 0.36, 1) calc(var(--nani-in) - var(--time-offset)) forwards,
        pulseGlow 0.8s ease-in-out calc(var(--nani-in) + 0.6s - var(--time-offset)) infinite;
    }

    .stage {
      position: absolute; inset: 0;
      animation: fadeOutAll 0.5s ease-in var(--stage-out) forwards;
    }

    /* ── Tune-Panel ── */
    .tune-panel {
      position: fixed; top: 80px; right: 16px; width: 420px;
      background: rgba(20, 10, 30, 0.92);
      border: 2px solid #f2b705; padding: 16px; border-radius: 10px;
      color: #f2b705; font-family: 'Courier New', monospace; font-size: 13px;
      z-index: 1000; display: none;
      box-shadow: 0 0 30px rgba(242, 183, 5, 0.4);
    }
    .tune-panel.visible { display: block; }
    .tune-panel h2 { font-size: 16px; margin-bottom: 12px; letter-spacing: 2px; text-transform: uppercase; }
    .tune-panel table { width: 100%; border-collapse: collapse; }
    .tune-panel th, .tune-panel td { padding: 4px 6px; text-align: left; border-bottom: 1px solid rgba(242, 183, 5, 0.2); }
    .tune-panel th { font-size: 11px; text-transform: uppercase; }
    .tune-panel input {
      width: 70px; background: rgba(242, 183, 5, 0.1); border: 1px solid rgba(242, 183, 5, 0.4);
      color: #f2b705; padding: 3px 6px; font-family: inherit; font-size: 12px;
      text-align: right; border-radius: 3px;
    }
    .tune-panel input:focus { outline: 1px solid #f2b705; }
    .tune-panel tr.clickable { cursor: pointer; }
    .tune-panel tr.clickable:hover { background: rgba(242, 183, 5, 0.15); }
    .tune-panel tr.clickable:hover .tune-label { color: #fff; }
    .tune-panel .tune-label { font-size: 11px; color: rgba(255, 220, 150, 0.75); max-width: 200px; }
    .tune-actions { display: flex; gap: 8px; margin-top: 12px; }
    .tune-btn {
      flex: 1; background: rgba(242, 183, 5, 0.15); border: 1px solid #f2b705;
      color: #f2b705; padding: 8px 10px; font-family: inherit; font-size: 12px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      border-radius: 4px; cursor: pointer;
    }
    .tune-btn:hover { background: rgba(242, 183, 5, 0.3); }
    .tune-btn.reset { border-color: #ff8888; color: #ff8888; }
    .tune-btn.reset:hover { background: rgba(255, 136, 136, 0.2); }
    .tune-hint { margin-top: 10px; font-size: 10px; color: rgba(255, 220, 150, 0.6); line-height: 1.4; }
    .time-indicator {
      position: fixed; bottom: 16px; right: 16px;
      background: rgba(20, 10, 30, 0.85); border: 1px solid #f2b705;
      color: #f2b705; padding: 6px 14px; font-family: 'Courier New', monospace;
      font-size: 14px; z-index: 1000; display: none; border-radius: 4px;
    }
    .time-indicator.visible { display: block; }
  </style>
</head>
<body>

  <div class="stage">
    <div class="dark-overlay"></div>

    <div class="shock-lines">
      <svg viewBox="0 0 100 100" preserveAspectRatio="none">
        <defs>
          <g id="ray">
            <polygon points="50,50 49.5,0 50.5,0" fill="rgba(255,255,255,0.7)"/>
          </g>
        </defs>
        <use href="#ray"/>
        <use href="#ray" transform="rotate(15 50 50)"/>
        <use href="#ray" transform="rotate(30 50 50)"/>
        <use href="#ray" transform="rotate(45 50 50)"/>
        <use href="#ray" transform="rotate(60 50 50)"/>
        <use href="#ray" transform="rotate(75 50 50)"/>
        <use href="#ray" transform="rotate(90 50 50)"/>
        <use href="#ray" transform="rotate(105 50 50)"/>
        <use href="#ray" transform="rotate(120 50 50)"/>
        <use href="#ray" transform="rotate(135 50 50)"/>
        <use href="#ray" transform="rotate(150 50 50)"/>
        <use href="#ray" transform="rotate(165 50 50)"/>
        <use href="#ray" transform="rotate(180 50 50)"/>
        <use href="#ray" transform="rotate(195 50 50)"/>
        <use href="#ray" transform="rotate(210 50 50)"/>
        <use href="#ray" transform="rotate(225 50 50)"/>
        <use href="#ray" transform="rotate(240 50 50)"/>
        <use href="#ray" transform="rotate(255 50 50)"/>
        <use href="#ray" transform="rotate(270 50 50)"/>
        <use href="#ray" transform="rotate(285 50 50)"/>
        <use href="#ray" transform="rotate(300 50 50)"/>
        <use href="#ray" transform="rotate(315 50 50)"/>
        <use href="#ray" transform="rotate(330 50 50)"/>
        <use href="#ray" transform="rotate(345 50 50)"/>
      </svg>
    </div>

    <div class="shaker">
      <div class="nani-jp">&#12362;&#21069;&#12399;&#12418;&#12358;&#27515;&#12435;&#12391;&#12356;&#12427;</div>
      <div class="nani-text">Nani!?</div>
    </div>
  </div>

  <audio id="audio" data-stinger-autoplay preload="auto" src="../assets/stingers/nani.mp3"></audio>

  <div class="tune-panel" id="tunePanel">
    <h2>Nani Tune Mode</h2>
    <table id="tuneTable"></table>
    <div class="tune-actions">
      <button class="tune-btn" id="applyBtn">&gt; Apply</button>
      <button class="tune-btn" id="copyBtn">&#128203; Copy</button>
      <button class="tune-btn reset" id="resetBtn">Reset</button>
    </div>
    <div style="margin-top: 14px; border-top: 1px solid rgba(242,183,5,0.3); padding-top: 12px;">
      <div style="font-size: 11px; text-transform: uppercase; margin-bottom: 6px;">Playback</div>
      <div class="tune-actions" style="margin-top: 6px;">
        <button class="tune-btn" id="pauseBtn">&#9208; Pause</button>
        <button class="tune-btn" id="replayBtn">&#8634; Replay 0s</button>
      </div>
      <div style="margin-top: 10px; display: flex; align-items: center; gap: 6px; font-size: 11px;">
        <span>Von:</span>
        <input type="number" id="fromInput" value="0" step="0.05" min="0" max="5" style="width: 60px;">
        <span>Bis:</span>
        <input type="number" id="toInput" value="3" step="0.05" min="0" max="5" style="width: 60px;">
        <button class="tune-btn" id="segmentBtn" style="flex: 0 0 auto; padding: 6px 12px;">&#9658; Play</button>
      </div>
    </div>
    <div class="tune-hint">
      <b>Apply</b>: speichert + Reload. <b>Pause</b>/<b>Replay</b>/<b>Play Segment</b>: ohne Reload.<br>
      Shortcuts: <b>Space</b> = Pause, <b>R</b> = Replay, <b>S</b> = Apply, <b>C</b> = Copy.
    </div>
  </div>

  <div class="time-indicator" id="timeInd">t = 0.00s</div>

  <script>
    (function () {
      'use strict';
      var DEFAULTS = {
        'audio-delay': 0.00,
        'shock-in':    0.35,
        'jp-in':       0.65,
        'nani-in':     0.80,
        'stage-out':   2.90
      };
      var LABELS = {
        'audio-delay': 'Audio-Start (data-delay)',
        'shock-in':    'Shock-Linien Explode',
        'jp-in':       'Japanischer Text IN',
        'nani-in':     '"Nani!?" Slam',
        'stage-out':   'Stage Fade-Out'
      };
      var KEYS = ['audio-delay','shock-in','jp-in','nani-in','stage-out'];
      var STORAGE_KEY = 'nani-tune-values';

      var params = new URLSearchParams(window.location.search);
      var tuneMode = params.get('tune') === '1';

      var saved = {};
      try { var raw = localStorage.getItem(STORAGE_KEY); if (raw) saved = JSON.parse(raw); } catch (e) {}
      function getValue(key) { return (saved[key] !== undefined) ? saved[key] : DEFAULTS[key]; }

      function applyToRoot() {
        var root = document.documentElement;
        KEYS.forEach(function (k) {
          if (k === 'audio-delay') return;
          root.style.setProperty('--' + k, getValue(k) + 's');
        });
      }
      applyToRoot();

      var audioEl = document.getElementById('audio');
      if (audioEl) {
        audioEl.setAttribute('data-delay', String(Math.round(getValue('audio-delay') * 1000)));
      }

      if (!tuneMode) return;

      var table = document.getElementById('tuneTable');
      var header = document.createElement('tr');
      header.innerHTML = '<th>Event</th><th>Zeit</th>';
      table.appendChild(header);

      function addRow(label, key) {
        var tr = document.createElement('tr');
        tr.className = 'clickable';
        var tdLabel = document.createElement('td');
        tdLabel.className = 'tune-label';
        tdLabel.textContent = label;
        tdLabel.title = 'Click: Von/Bis befuellen';
        tr.appendChild(tdLabel);
        var td = document.createElement('td');
        var inp = document.createElement('input');
        inp.type = 'number'; inp.step = '0.05'; inp.min = '0'; inp.max = '5';
        inp.value = getValue(key); inp.dataset.key = key;
        td.appendChild(inp);
        tr.appendChild(td);
        tr.addEventListener('click', function (e) {
          if (e.target.tagName === 'INPUT') return;
          var v = currentVals();
          var from = Math.max(0, v[key] - 0.2);
          var to   = v[key] + 0.6;
          document.getElementById('fromInput').value = from.toFixed(2);
          document.getElementById('toInput').value   = to.toFixed(2);
        });
        table.appendChild(tr);
      }
      KEYS.forEach(function (k) { addRow(LABELS[k], k); });

      document.getElementById('tunePanel').classList.add('visible');
      document.getElementById('timeInd').classList.add('visible');

      function currentVals() {
        var vals = {};
        document.querySelectorAll('.tune-panel input').forEach(function (inp) {
          if (inp.dataset.key) vals[inp.dataset.key] = parseFloat(inp.value) || 0;
        });
        return vals;
      }

      function apply() {
        var vals = currentVals();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(vals));
        try { if (audioEl) { audioEl.pause(); audioEl.currentTime = 0; } } catch (e) {}
        location.reload();
      }
      function reset() { localStorage.removeItem(STORAGE_KEY); location.reload(); }

      document.getElementById('applyBtn').addEventListener('click', apply);
      document.getElementById('resetBtn').addEventListener('click', reset);

      function copyValues() {
        var v = currentVals();
        var lines = ['Nani Tune Values:'];
        KEYS.forEach(function (k) {
          lines.push((LABELS[k] + ':').padEnd(34) + v[k].toFixed(2) + 's');
        });
        var text = lines.join('\n');
        var btn = document.getElementById('copyBtn');
        var original = btn.innerHTML;
        var restore = function () { btn.innerHTML = original; };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () {
            btn.innerHTML = '&#10003; Copied!';
            setTimeout(restore, 1200);
          }).catch(function () { fallbackCopy(text, btn, restore); });
        } else { fallbackCopy(text, btn, restore); }
      }
      function fallbackCopy(text, btn, restore) {
        var ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); btn.innerHTML = '&#10003; Copied!'; }
        catch (e) { btn.innerHTML = 'Error'; }
        document.body.removeChild(ta);
        setTimeout(restore, 1200);
      }
      document.getElementById('copyBtn').addEventListener('click', copyValues);

      var html = document.documentElement;
      var pauseBtn = document.getElementById('pauseBtn');
      var replayBtn = document.getElementById('replayBtn');
      var segmentBtn = document.getElementById('segmentBtn');
      var fromInp = document.getElementById('fromInput');
      var toInp = document.getElementById('toInput');
      var segmentTimer = null;

      function setPaused(paused) {
        if (paused) { html.classList.add('paused'); if (audioEl) audioEl.pause(); pauseBtn.innerHTML = '&#9654; Resume'; }
        else        { html.classList.remove('paused'); if (audioEl) audioEl.play().catch(function () {}); pauseBtn.innerHTML = '&#9208; Pause'; }
      }
      function togglePause() { setPaused(!html.classList.contains('paused')); }

      function resetAnimations(offsetSec) {
        clearTimeout(segmentTimer);
        html.style.setProperty('--time-offset', (offsetSec || 0) + 's');
        var stage = document.querySelector('.stage');
        var clone = stage.cloneNode(true);
        stage.parentNode.replaceChild(clone, stage);
        html.classList.remove('paused');
        pauseBtn.innerHTML = '&#9208; Pause';
      }
      function replayFrom0() {
        resetAnimations(0);
        try { if (audioEl) { audioEl.currentTime = 0; audioEl.play().catch(function () {}); } } catch (e) {}
      }
      function playSegment() {
        var from = parseFloat(fromInp.value) || 0;
        var to   = parseFloat(toInp.value) || getValue('stage-out');
        if (to <= from) return;
        resetAnimations(from);
        try { if (audioEl) { audioEl.currentTime = Math.max(0, from - getValue('audio-delay')); audioEl.play().catch(function () {}); } } catch (e) {}
        segmentTimer = setTimeout(function () { setPaused(true); }, (to - from) * 1000);
      }
      pauseBtn.addEventListener('click', togglePause);
      replayBtn.addEventListener('click', replayFrom0);
      segmentBtn.addEventListener('click', playSegment);

      document.addEventListener('keydown', function (e) {
        if (e.target.tagName === 'INPUT') return;
        if (e.key === 'r' || e.key === 'R') replayFrom0();
        else if (e.key === 's' || e.key === 'S') apply();
        else if (e.key === 'c' || e.key === 'C') copyValues();
        else if (e.key === ' ') { e.preventDefault(); togglePause(); }
      });

      var events = [];
      KEYS.forEach(function (k) { events.push({ t: getValue(k), label: LABELS[k] }); });
      events.sort(function (a, b) { return a.t - b.t; });

      var timeInd = document.getElementById('timeInd');
      var startRef = null;
      function tick() {
        if (html.classList.contains('stinger-loading')) { requestAnimationFrame(tick); return; }
        if (startRef === null) startRef = performance.now();
        var t = (performance.now() - startRef) / 1000;
        if (html.classList.contains('paused')) t = 0;
        var currentEvent = null;
        for (var i = 0; i < events.length; i++) {
          if (events[i].t <= t) currentEvent = events[i]; else break;
        }
        var txt = 't = ' + t.toFixed(2) + 's';
        if (html.classList.contains('paused')) txt += ' [PAUSED]';
        if (currentEvent) txt += '  |  ' + currentEvent.label + ' @ ' + currentEvent.t.toFixed(2) + 's';
        timeInd.textContent = txt;
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })();
  </script>

</body>
</html>
