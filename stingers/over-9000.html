<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <script src="../js/stinger-ready.js"></script>
  <title>Over 9000 Stinger</title>
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-display: block;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }

    /* Default-Timings als CSS-Vars (via JS ueberschreibbar im ?tune=1 Modus) */
    :root {
      --number-in: 1.0s;
      --title-in:  0.3s;
      --shake-in:  1.1s;
      --sub-in:    0.1s;
      --crack-in:  0.5s;
      --stage-out: 3.0s;
      --time-offset: 0s;
    }

    html.paused *, html.paused *::before, html.paused *::after {
      animation-play-state: paused !important;
    }

    @keyframes flashWhite { 0% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes bgFadeIn   { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeOutAll { from { opacity: 1; } to { opacity: 0; } }

    @keyframes scannerSweep {
      0%   { transform: translateX(-100%); opacity: 0; }
      10%  { opacity: 0.9; }
      90%  { opacity: 0.9; }
      100% { transform: translateX(100%); opacity: 0; }
    }

    @keyframes numberTick {
      0%   { opacity: 0; transform: translateY(-20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes titleSlam {
      0%   { transform: translate(-50%, -50%) scale(0)    rotate(-6deg); opacity: 0; }
      45%  { transform: translate(-50%, -50%) scale(1.25) rotate(2deg);  opacity: 1; }
      65%  { transform: translate(-50%, -50%) scale(0.92) rotate(-1deg); }
      100% { transform: translate(-50%, -50%) scale(1)    rotate(0deg);  opacity: 1; }
    }

    @keyframes shakeHeavy {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-14px, 10px); }
      20% { transform: translate(12px, -8px); }
      30% { transform: translate(-10px, -12px); }
      40% { transform: translate(14px, 8px); }
      50% { transform: translate(-8px, 10px); }
      60% { transform: translate(10px, -8px); }
      70% { transform: translate(-12px, 8px); }
      80% { transform: translate(8px, -10px); }
      90% { transform: translate(-6px, 6px); }
    }

    @keyframes auraPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1);   opacity: 0.8; }
      50%      { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }

    @keyframes auraFadeIn {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
      to   { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes crackIn {
      0%, 100% { opacity: 0; }
      60%      { opacity: 0; }
      65%      { opacity: 1; transform: scale(1.05); }
      100%     { opacity: 0.9; transform: scale(1); }
    }

    @keyframes sparkRise {
      0%   { transform: translate(calc(-50% + var(--sx)), 100vh) rotate(0deg); opacity: 0; }
      15%  { opacity: 1; }
      100% { transform: translate(calc(-50% + var(--sx) + var(--dx)), -20vh) rotate(360deg); opacity: 0; }
    }

    .flash {
      position: absolute; inset: 0;
      background: #fff;
      z-index: 20;
      animation: flashWhite 0.12s ease-out forwards;
    }

    .bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at center,
          rgba(255, 200, 60, 0.6) 0%,
          rgba(230, 100, 20, 0.55) 30%,
          rgba(80, 20, 10, 0.92) 75%,
          rgba(10, 5, 5, 0.98) 100%
        );
      z-index: 1;
      opacity: 0;
      animation: bgFadeIn 0.2s ease-out 0.1s forwards;
    }

    .aura {
      position: absolute;
      top: 50%; left: 50%;
      width: 1600px; height: 1600px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(255, 220, 80, 0.55) 0%,
        rgba(255, 140, 30, 0.4) 35%,
        rgba(200, 60, 10, 0.2) 65%,
        transparent 85%
      );
      mix-blend-mode: screen;
      transform: translate(-50%, -50%) scale(0.4);
      opacity: 0;
      z-index: 2;
      animation:
        auraFadeIn 0.5s ease-out 0.15s forwards,
        auraPulse 1.4s ease-in-out 0.65s infinite;
    }

    .scanner {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(100, 255, 140, 0.15) 48%,
        rgba(100, 255, 140, 0.4) 50%,
        rgba(100, 255, 140, 0.15) 52%,
        transparent 100%
      );
      mix-blend-mode: screen;
      z-index: 3;
      animation: scannerSweep 1s ease-in-out 0.2s 2;
    }

    .number {
      position: absolute;
      top: 22%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 88px;
      font-weight: 700;
      color: #7cff9d;
      letter-spacing: 6px;
      text-shadow:
        0 0 14px rgba(120, 255, 150, 0.9),
        0 0 28px rgba(80, 200, 100, 0.7),
        3px 3px 0 #000;
      z-index: 7;
      opacity: 0;
      animation: numberTick 0.15s ease-out calc(var(--number-in) - var(--time-offset)) forwards;
    }

    .shaker {
      position: absolute; inset: 0;
      z-index: 4;
      animation: shakeHeavy 0.14s linear calc(var(--shake-in) - var(--time-offset)) infinite;
    }

    .title {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0) rotate(-6deg);
      font-size: 200px;
      font-weight: 900;
      color: #ffe74c;
      letter-spacing: -4px;
      line-height: 1;
      white-space: nowrap;
      text-transform: uppercase;
      z-index: 6;
      opacity: 0;
      -webkit-text-stroke: 5px #3a1500;
      text-shadow:
        0 12px 0 #6b2a00,
        0 20px 30px rgba(0, 0, 0, 0.6),
        0 0 40px rgba(255, 180, 40, 0.8),
        0 0 80px rgba(255, 140, 20, 0.6);
      animation: titleSlam 0.55s cubic-bezier(0.22, 1.6, 0.36, 1) calc(var(--title-in) - var(--time-offset)) forwards;
    }

    .sub {
      position: absolute;
      top: calc(50% + 200px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 46px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 10px;
      text-transform: uppercase;
      z-index: 6;
      opacity: 0;
      text-shadow:
        3px 3px 0 #000,
        0 0 18px rgba(255, 180, 40, 0.9);
      animation: bgFadeIn 0.4s ease-out calc(var(--sub-in) - var(--time-offset)) forwards;
    }

    .crack {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 1000px;
      z-index: 8;
      opacity: 0;
      animation: crackIn 0.4s ease-out calc(var(--crack-in) - var(--time-offset)) forwards;
      pointer-events: none;
    }

    .crack svg { width: 100%; }

    .spark {
      position: absolute;
      top: 0; left: 50%;
      width: 8px; height: 22px;
      border-radius: 4px;
      background: linear-gradient(180deg, #fff5a0, #ff9624);
      box-shadow: 0 0 12px #ffb547, 0 0 28px rgba(255, 150, 40, 0.7);
      z-index: 5;
      opacity: 0;
      animation: sparkRise var(--dur) linear var(--delay) forwards;
    }

    .stage {
      position: absolute; inset: 0;
      animation: fadeOutAll 0.5s ease-in calc(var(--stage-out) - var(--time-offset)) forwards;
    }

    /* ── Tune-Panel (nur bei ?tune=1) ── */
    .tune-panel {
      position: fixed;
      top: 80px;
      right: 16px;
      width: 420px;
      background: rgba(30, 15, 5, 0.92);
      border: 2px solid #ffe74c;
      padding: 16px;
      border-radius: 10px;
      color: #ffe74c;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      z-index: 1000;
      display: none;
      box-shadow: 0 0 30px rgba(255, 200, 60, 0.4);
    }
    .tune-panel.visible { display: block; }
    .tune-panel h2 { font-size: 16px; margin-bottom: 12px; letter-spacing: 2px; text-transform: uppercase; }
    .tune-panel table { width: 100%; border-collapse: collapse; }
    .tune-panel th, .tune-panel td { padding: 4px 6px; text-align: left; border-bottom: 1px solid rgba(255, 231, 76, 0.2); }
    .tune-panel th { font-size: 11px; text-transform: uppercase; }
    .tune-panel input {
      width: 70px; background: rgba(255, 231, 76, 0.1); border: 1px solid rgba(255, 231, 76, 0.4);
      color: #ffe74c; padding: 3px 6px; font-family: inherit; font-size: 12px;
      text-align: right; border-radius: 3px;
    }
    .tune-panel input:focus { outline: 1px solid #ffe74c; }
    .tune-panel tr.clickable { cursor: pointer; transition: background 0.1s; }
    .tune-panel tr.clickable:hover { background: rgba(255, 231, 76, 0.15); }
    .tune-panel tr.clickable:hover .tune-label { color: #fff; }
    .tune-panel .tune-label { font-size: 11px; color: rgba(255, 230, 150, 0.75); max-width: 180px; }
    .tune-actions { display: flex; gap: 8px; margin-top: 12px; }
    .tune-btn {
      flex: 1; background: rgba(255, 231, 76, 0.15); border: 1px solid #ffe74c;
      color: #ffe74c; padding: 8px 10px; font-family: inherit; font-size: 12px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      border-radius: 4px; cursor: pointer;
    }
    .tune-btn:hover { background: rgba(255, 231, 76, 0.3); }
    .tune-btn.reset { border-color: #ff8888; color: #ff8888; }
    .tune-btn.reset:hover { background: rgba(255, 136, 136, 0.2); }
    .tune-hint { margin-top: 10px; font-size: 10px; color: rgba(255, 220, 120, 0.6); line-height: 1.4; }

    .time-indicator {
      position: fixed; bottom: 16px; right: 16px;
      background: rgba(30, 15, 5, 0.85); border: 1px solid #ffe74c;
      color: #ffe74c; padding: 6px 14px; font-family: 'Courier New', monospace;
      font-size: 14px; z-index: 1000; display: none; border-radius: 4px;
    }
    .time-indicator.visible { display: block; }
  </style>
</head>
<body>

  <div class="stage">
    <div class="flash"></div>
    <div class="bg"></div>
    <div class="aura"></div>

    <div class="scanner"></div>

    <div class="number" id="powerLvl">POWER LVL: 9001</div>

    <div id="spark-layer"></div>

    <div class="shaker">
      <div class="title">It's over 9000!!!</div>
      <div class="sub">Vegeta, what does the scouter say?</div>
    </div>

    <div class="crack">
      <svg viewBox="0 0 1000 400" preserveAspectRatio="xMidYMid meet">
        <g stroke="rgba(255,255,255,0.85)" stroke-width="3" fill="none">
          <polyline points="100,80 260,150 190,220 360,280 280,340 440,390"/>
          <polyline points="900,60 780,140 860,200 720,280 830,340"/>
          <polyline points="500,30 460,130 540,190 470,260 520,340"/>
          <polyline points="260,150 320,140 310,170 350,155"/>
          <polyline points="780,140 740,130 760,160 720,150"/>
        </g>
      </svg>
    </div>
  </div>

  <audio id="audio" data-stinger-autoplay preload="auto" src="../assets/stingers/over9000.swf.mp3"></audio>

  <div class="tune-panel" id="tunePanel">
    <h2>Over 9000 Tune Mode</h2>
    <table id="tuneTable"></table>
    <div class="tune-actions">
      <button class="tune-btn" id="applyBtn">&gt; Apply</button>
      <button class="tune-btn" id="copyBtn">&#128203; Copy</button>
      <button class="tune-btn reset" id="resetBtn">Reset</button>
    </div>

    <div style="margin-top: 14px; border-top: 1px solid rgba(255,231,76,0.3); padding-top: 12px;">
      <div style="font-size: 11px; text-transform: uppercase; margin-bottom: 6px;">Playback</div>
      <div class="tune-actions" style="margin-top: 6px;">
        <button class="tune-btn" id="pauseBtn">&#9208; Pause</button>
        <button class="tune-btn" id="replayBtn">&#8634; Replay 0s</button>
      </div>
      <div style="margin-top: 10px; display: flex; align-items: center; gap: 6px; font-size: 11px;">
        <span>Von:</span>
        <input type="number" id="fromInput" value="0" step="0.1" min="0" max="10" style="width: 60px;">
        <span>Bis:</span>
        <input type="number" id="toInput" value="3" step="0.1" min="0" max="10" style="width: 60px;">
        <button class="tune-btn" id="segmentBtn" style="flex: 0 0 auto; padding: 6px 12px;">&#9658; Play</button>
      </div>
    </div>

    <div class="tune-hint">
      <b>Apply</b>: speichert + Reload. <b>Pause</b>/<b>Replay</b>/<b>Play Segment</b>: ohne Reload.<br>
      Shortcuts: <b>Space</b> = Pause, <b>R</b> = Replay, <b>S</b> = Apply, <b>C</b> = Copy.
    </div>
  </div>

  <div class="time-indicator" id="timeInd">t = 0.00s</div>

  <script>
    (function () {
      'use strict';
      var DEFAULTS = {
        'number-in': 1.0,
        'title-in':  0.3,
        'shake-in':  1.1,
        'sub-in':    0.1,
        'crack-in':  0.5,
        'stage-out': 3.0
      };
      var LABELS = {
        'number-in': '"POWER LVL 9001" IN',
        'title-in':  '"IT\'S OVER 9000" IN',
        'shake-in':  'Screen-Shake Start',
        'sub-in':    '"Vegeta, what..." IN',
        'crack-in':  'Scouter-Crack IN',
        'stage-out': 'Stage Fade-Out'
      };
      var KEYS = ['number-in','title-in','shake-in','sub-in','crack-in','stage-out'];
      var STORAGE_KEY = 'over9000-tune-values';

      var params = new URLSearchParams(window.location.search);
      var tuneMode = params.get('tune') === '1';

      // POWER LVL via ?level=X ueberschreiben
      var levelParam = params.get('level');
      if (levelParam) {
        var lvlEl = document.getElementById('powerLvl');
        if (lvlEl) lvlEl.textContent = 'POWER LVL: ' + levelParam;
      }

      var saved = {};
      try { var raw = localStorage.getItem(STORAGE_KEY); if (raw) saved = JSON.parse(raw); } catch (e) {}
      function getValue(key) { return (saved[key] !== undefined) ? saved[key] : DEFAULTS[key]; }

      function applyToRoot() {
        var root = document.documentElement;
        KEYS.forEach(function (k) { root.style.setProperty('--' + k, getValue(k) + 's'); });
      }
      applyToRoot();

      // Sparks layer (immer erzeugen)
      var sparkLayer = document.getElementById('spark-layer');
      var SPARK_COUNT = 28;
      for (var i = 0; i < SPARK_COUNT; i++) {
        var el = document.createElement('div');
        el.className = 'spark';
        var sx = (Math.random() * 1700 - 850) + 'px';
        var dx = (Math.random() * 200 - 100) + 'px';
        var dur = (1.4 + Math.random() * 1.0) + 's';
        var delay = (Math.random() * 1.2) + 's';
        var w = (5 + Math.random() * 6) + 'px';
        var h = (16 + Math.random() * 18) + 'px';
        el.style.cssText =
          'width:' + w + ';height:' + h + ';' +
          '--sx:' + sx + ';--dx:' + dx + ';--dur:' + dur + ';--delay:' + delay + ';';
        sparkLayer.appendChild(el);
      }

      if (!tuneMode) return;

      // Tune-Panel aufbauen
      var table = document.getElementById('tuneTable');
      var header = document.createElement('tr');
      header.innerHTML = '<th>Event</th><th>Start</th><th>End</th>';
      table.appendChild(header);

      function addPairRow(label, startKey, endKey) {
        var tr = document.createElement('tr');
        tr.className = 'clickable';
        var tdLabel = document.createElement('td');
        tdLabel.className = 'tune-label';
        tdLabel.textContent = label;
        tdLabel.title = 'Click: Von/Bis befuellen';
        tr.appendChild(tdLabel);

        function makeCell(key) {
          var td = document.createElement('td');
          if (!key) {
            td.textContent = '—'; td.style.textAlign = 'center'; td.style.color = 'rgba(255,231,76,0.3)';
          } else {
            var inp = document.createElement('input');
            inp.type = 'number'; inp.step = '0.1'; inp.min = '0'; inp.max = '10';
            inp.value = getValue(key); inp.dataset.key = key;
            td.appendChild(inp);
          }
          return td;
        }
        tr.appendChild(makeCell(startKey));
        tr.appendChild(makeCell(endKey));

        tr.addEventListener('click', function (e) {
          if (e.target.tagName === 'INPUT') return;
          var v = currentVals();
          var from = startKey ? v[startKey] : 0;
          var to = endKey ? v[endKey] : (from + 1.0);
          document.getElementById('fromInput').value = from.toFixed(2);
          document.getElementById('toInput').value   = to.toFixed(2);
        });
        table.appendChild(tr);
      }

      addPairRow('POWER LVL: 9001', 'number-in', null);
      addPairRow('IT\'S OVER 9000', 'title-in',  null);
      addPairRow('Screen-Shake',    'shake-in',  null);
      addPairRow('Vegeta-Sub',      'sub-in',    null);
      addPairRow('Scouter-Crack',   'crack-in',  null);
      addPairRow('Stage Fade-Out',  null,        'stage-out');

      document.getElementById('tunePanel').classList.add('visible');
      document.getElementById('timeInd').classList.add('visible');

      function currentVals() {
        var vals = {};
        document.querySelectorAll('.tune-panel input').forEach(function (inp) {
          if (inp.dataset.key) vals[inp.dataset.key] = parseFloat(inp.value) || 0;
        });
        return vals;
      }

      function apply() {
        var vals = currentVals();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(vals));
        try { var a = document.getElementById('audio'); if (a) { a.pause(); a.currentTime = 0; } } catch (e) {}
        location.reload();
      }
      function reset() { localStorage.removeItem(STORAGE_KEY); location.reload(); }

      document.getElementById('applyBtn').addEventListener('click', apply);
      document.getElementById('resetBtn').addEventListener('click', reset);

      function copyValues() {
        var v = currentVals();
        var lines = [
          'Over 9000 Tune Values:',
          'POWER LVL 9001   : ' + v['number-in'].toFixed(2) + 's',
          'IT\'S OVER 9000   : ' + v['title-in'].toFixed(2)  + 's',
          'Screen-Shake     : ' + v['shake-in'].toFixed(2)  + 's',
          'Vegeta-Sub       : ' + v['sub-in'].toFixed(2)    + 's',
          'Scouter-Crack    : ' + v['crack-in'].toFixed(2)  + 's',
          'Stage Fade-Out   : ' + v['stage-out'].toFixed(2) + 's'
        ];
        var text = lines.join('\n');
        var btn = document.getElementById('copyBtn');
        var original = btn.innerHTML;
        var restore = function () { btn.innerHTML = original; };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () {
            btn.innerHTML = '&#10003; Copied!';
            setTimeout(restore, 1200);
          }).catch(function () { fallbackCopy(text, btn, restore); });
        } else { fallbackCopy(text, btn, restore); }
      }
      function fallbackCopy(text, btn, restore) {
        var ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); btn.innerHTML = '&#10003; Copied!'; }
        catch (e) { btn.innerHTML = 'Error'; }
        document.body.removeChild(ta);
        setTimeout(restore, 1200);
      }
      document.getElementById('copyBtn').addEventListener('click', copyValues);

      // Playback-Controls
      var html = document.documentElement;
      var audio = document.getElementById('audio');
      var pauseBtn = document.getElementById('pauseBtn');
      var replayBtn = document.getElementById('replayBtn');
      var segmentBtn = document.getElementById('segmentBtn');
      var fromInp = document.getElementById('fromInput');
      var toInp = document.getElementById('toInput');
      var segmentTimer = null;

      function setPaused(paused) {
        if (paused) {
          html.classList.add('paused');
          audio.pause();
          pauseBtn.innerHTML = '&#9654; Resume';
        } else {
          html.classList.remove('paused');
          audio.play().catch(function () {});
          pauseBtn.innerHTML = '&#9208; Pause';
        }
      }
      function togglePause() { setPaused(!html.classList.contains('paused')); }

      function resetAnimations(offsetSec) {
        clearTimeout(segmentTimer);
        html.style.setProperty('--time-offset', (offsetSec || 0) + 's');
        var stage = document.querySelector('.stage');
        var clone = stage.cloneNode(true);
        stage.parentNode.replaceChild(clone, stage);
        html.classList.remove('paused');
        pauseBtn.innerHTML = '&#9208; Pause';
      }
      function replayFrom0() {
        resetAnimations(0);
        try { audio.currentTime = 0; audio.play().catch(function () {}); } catch (e) {}
      }
      function playSegment() {
        var from = parseFloat(fromInp.value) || 0;
        var to   = parseFloat(toInp.value) || getValue('stage-out');
        if (to <= from) return;
        resetAnimations(from);
        try { audio.currentTime = from; audio.play().catch(function () {}); } catch (e) {}
        segmentTimer = setTimeout(function () { setPaused(true); }, (to - from) * 1000);
      }
      pauseBtn.addEventListener('click', togglePause);
      replayBtn.addEventListener('click', replayFrom0);
      segmentBtn.addEventListener('click', playSegment);

      document.addEventListener('keydown', function (e) {
        if (e.target.tagName === 'INPUT') return;
        if (e.key === 'r' || e.key === 'R') replayFrom0();
        else if (e.key === 's' || e.key === 'S') apply();
        else if (e.key === 'c' || e.key === 'C') copyValues();
        else if (e.key === ' ') { e.preventDefault(); togglePause(); }
      });

      // Live-Zeit-Indikator
      var events = [];
      KEYS.forEach(function (k) { events.push({ t: getValue(k), label: LABELS[k] }); });
      events.sort(function (a, b) { return a.t - b.t; });

      var timeInd = document.getElementById('timeInd');
      function tick() {
        if (html.classList.contains('stinger-loading')) { requestAnimationFrame(tick); return; }
        var t = audio.currentTime;
        var currentEvent = null;
        for (var i = 0; i < events.length; i++) {
          if (events[i].t <= t) currentEvent = events[i]; else break;
        }
        var txt = 't = ' + t.toFixed(2) + 's';
        if (html.classList.contains('paused')) txt += ' [PAUSED]';
        if (currentEvent) txt += '  |  ' + currentEvent.label + ' @ ' + currentEvent.t.toFixed(2) + 's';
        timeInd.textContent = txt;
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })();
  </script>

</body>
