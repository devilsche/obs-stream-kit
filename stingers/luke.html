<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Luke Stinger</title>
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-display: block;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }

    @keyframes bgFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes lukeIn {
      0%   { transform: translate(-50%, -50%) scale(0.2) rotate(-8deg); opacity: 0; filter: blur(20px) saturate(1.1) contrast(1.05); }
      60%  { transform: translate(-50%, -50%) scale(1.08) rotate(2deg); opacity: 1; filter: blur(0) saturate(1.1) contrast(1.05); }
      80%  { transform: translate(-50%, -50%) scale(0.96) rotate(-1deg); filter: blur(0) saturate(1.1) contrast(1.05); }
      100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; filter: blur(0) saturate(1.1) contrast(1.05); }
    }

    @keyframes ringSpin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @keyframes ringFadeIn {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.6) rotate(0deg); }
      to   { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    }

    @keyframes nameSlideIn {
      0%   { transform: translateX(-50%) translateY(40px) scale(0.9); opacity: 0; }
      60%  { transform: translateX(-50%) translateY(-8px) scale(1.05); opacity: 1; }
      100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
    }

    @keyframes kickerFadeIn {
      from { transform: translateX(-50%) translateY(16px); opacity: 0; }
      to   { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    @keyframes pawFloat {
      0%   { transform: translate(0, 30px) scale(0) rotate(var(--start-rot)); opacity: 0; }
      40%  { opacity: 1; transform: translate(calc(var(--dx) * 0.5), calc(-20px + var(--dy) * 0.5)) scale(1) rotate(var(--mid-rot)); }
      100% { transform: translate(var(--dx), calc(-120px + var(--dy))) scale(1.1) rotate(var(--end-rot)); opacity: 0; }
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50%      { transform: translate(-50%, -50%) scale(1.04); }
    }

    @keyframes fadeOutAll {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    .forest-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 50% 60%,
          rgba(60, 85, 45, 0.55) 0%,
          rgba(35, 48, 25, 0.85) 45%,
          rgba(18, 22, 14, 0.95) 90%
        );
      z-index: 1;
      opacity: 0;
      animation: bgFadeIn 0.4s ease-out forwards;
    }

    /* Light rays through trees */
    .rays {
      position: absolute; inset: 0;
      background:
        linear-gradient(100deg, transparent 20%, rgba(255, 210, 120, 0.08) 35%, transparent 45%),
        linear-gradient(80deg,  transparent 50%, rgba(255, 210, 120, 0.06) 62%, transparent 72%),
        linear-gradient(110deg, transparent 70%, rgba(255, 210, 120, 0.05) 80%, transparent 88%);
      z-index: 2;
      opacity: 0;
      mix-blend-mode: screen;
      animation: bgFadeIn 0.6s ease-out 0.1s forwards;
    }

    /* Ring behind Luke — warm halo */
    .halo-ring {
      position: absolute;
      top: 50%; left: 50%;
      width: 720px; height: 720px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0.6);
      opacity: 0;
      background:
        radial-gradient(circle at center,
          rgba(255, 190, 90, 0.35) 0%,
          rgba(255, 150, 50, 0.2) 35%,
          transparent 70%
        );
      z-index: 3;
      animation:
        ringFadeIn 0.5s ease-out 0.15s forwards,
        pulse 2.4s ease-in-out 0.7s infinite;
    }

    /* Spinning accent ring */
    .accent-ring {
      position: absolute;
      top: 50%; left: 50%;
      width: 700px; height: 700px;
      border-radius: 50%;
      border: 3px dashed rgba(242, 183, 5, 0.55);
      transform: translate(-50%, -50%) rotate(0deg);
      opacity: 0;
      z-index: 4;
      animation:
        bgFadeIn 0.5s ease-out 0.3s forwards,
        ringSpin 24s linear infinite;
    }

    /* Luke image with radial mask to fade edges into forest bg */
    .luke-img {
      position: absolute;
      top: 50%; left: 50%;
      width: 620px; height: 620px;
      transform: translate(-50%, -50%) scale(0.2) rotate(-8deg);
      border-radius: 50%;
      background: url('../assets/stingers/luke.jpg') center/cover no-repeat;
      z-index: 5;
      opacity: 0;
      filter: saturate(1.1) contrast(1.05);
      box-shadow:
        0 0 40px rgba(255, 160, 60, 0.5),
        0 0 90px rgba(200, 100, 30, 0.35),
        inset 0 0 60px rgba(0, 0, 0, 0.35);
      mask-image: radial-gradient(circle at center, black 55%, transparent 95%);
      -webkit-mask-image: radial-gradient(circle at center, black 55%, transparent 95%);
      animation: lukeIn 0.7s cubic-bezier(0.22, 1.4, 0.36, 1) 0.3s forwards;
    }

    /* Paw prints floating around */
    .paws {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 1100px;
      height: 800px;
      z-index: 6;
      pointer-events: none;
    }

    .paw {
      position: absolute;
      font-size: 72px;
      line-height: 1;
      color: #f2b705;
      text-shadow:
        0 0 14px rgba(242, 183, 5, 0.8),
        0 0 28px rgba(255, 160, 60, 0.5),
        2px 2px 0 rgba(0, 0, 0, 0.5);
      opacity: 0;
      animation: pawFloat 2.4s ease-out forwards;
    }

    .name {
      position: absolute;
      top: calc(50% + 380px);
      left: 50%;
      transform: translateX(-50%) translateY(40px) scale(0.9);
      font-size: 180px;
      font-weight: 900;
      color: #f2b705;
      letter-spacing: -2px;
      line-height: 1;
      white-space: nowrap;
      text-transform: uppercase;
      z-index: 7;
      opacity: 0;
      -webkit-text-stroke: 4px #2a1a0a;
      text-shadow:
        8px 8px 0 rgba(0, 0, 0, 0.6),
        0 0 30px rgba(242, 183, 5, 0.7),
        0 0 60px rgba(255, 160, 60, 0.5);
      animation: nameSlideIn 0.55s cubic-bezier(0.22, 1.6, 0.36, 1) 0.55s forwards;
    }

    .kicker {
      position: absolute;
      top: calc(50% - 430px);
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      font-size: 38px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 14px;
      text-transform: uppercase;
      z-index: 7;
      opacity: 0;
      text-shadow:
        0 0 16px rgba(255, 190, 90, 0.9),
        2px 2px 0 rgba(0, 0, 0, 0.6);
      animation: kickerFadeIn 0.4s ease-out 0.4s forwards;
    }

    .stage {
      position: absolute; inset: 0;
      animation: fadeOutAll 0.5s ease-in 3.2s forwards;
    }
  </style>
</head>
<body>

  <div class="stage">
    <div class="forest-bg"></div>
    <div class="rays"></div>

    <div class="kicker">&#10022; Unser Guter &#10022;</div>

    <div class="halo-ring"></div>
    <div class="accent-ring"></div>
    <div class="luke-img"></div>

    <div class="paws" id="paws"></div>

    <div class="name">Luke</div>
  </div>

  <script>
    (function () {
      'use strict';
      var layer = document.getElementById('paws');
      var POSITIONS = [
        { x:  -50, y: -340 }, { x:  320, y: -260 }, { x: -380, y: -180 },
        { x:  470, y:  -60 }, { x: -510, y:   20 }, { x:  380, y:  180 },
        { x: -320, y:  240 }, { x:   80, y: -380 }, { x:  -80, y:  320 }
      ];
      var PAW = '\u{1F43E}'; /* 🐾 */

      POSITIONS.forEach(function (p, i) {
        var el = document.createElement('div');
        el.className = 'paw';
        var startRot = (Math.random() * 60 - 30) + 'deg';
        var midRot   = (Math.random() * 60 - 30) + 'deg';
        var endRot   = (Math.random() * 120 - 60) + 'deg';
        var dx = (Math.random() * 60 - 30) + 'px';
        var dy = (Math.random() * 60 - 30) + 'px';
        var delay = (0.7 + i * 0.12 + Math.random() * 0.15) + 's';
        var size = (60 + Math.random() * 30) + 'px';
        el.textContent = PAW;
        el.style.cssText =
          'left:' + (550 + p.x) + 'px;' +
          'top:'  + (400 + p.y) + 'px;' +
          'font-size:' + size + ';' +
          '--start-rot:' + startRot + ';' +
          '--mid-rot:' + midRot + ';' +
          '--end-rot:' + endRot + ';' +
          '--dx:' + dx + ';' +
          '--dy:' + dy + ';' +
          'animation-delay:' + delay + ';';
        layer.appendChild(el);
      });
    })();
  </script>

</body>
</html>
