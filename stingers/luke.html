<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <script src="../js/stinger-ready.js"></script>
  <title>Luke Stinger</title>
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-display: block;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }

    :root {
      --kicker-in:   0.40s;
      --luke-in:     0.30s;
      --name-in:     0.55s;
      --stage-out:   3.20s;
      --time-offset: 0s;
    }

    html.paused *, html.paused *::before, html.paused *::after {
      animation-play-state: paused !important;
    }

    @keyframes bgFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes lukeIn {
      0%   { transform: translate(-50%, -50%) scale(0.2) rotate(-8deg); opacity: 0; filter: blur(20px) saturate(1.1) contrast(1.05); }
      60%  { transform: translate(-50%, -50%) scale(1.08) rotate(2deg); opacity: 1; filter: blur(0) saturate(1.1) contrast(1.05); }
      80%  { transform: translate(-50%, -50%) scale(0.96) rotate(-1deg); filter: blur(0) saturate(1.1) contrast(1.05); }
      100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; filter: blur(0) saturate(1.1) contrast(1.05); }
    }

    @keyframes ringSpin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @keyframes ringFadeIn {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.6) rotate(0deg); }
      to   { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    }

    @keyframes nameSlideIn {
      0%   { transform: translateX(-50%) translateY(40px) scale(0.9); opacity: 0; }
      60%  { transform: translateX(-50%) translateY(-8px) scale(1.05); opacity: 1; }
      100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
    }

    @keyframes kickerFadeIn {
      from { transform: translateX(-50%) translateY(16px); opacity: 0; }
      to   { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    @keyframes pawFloat {
      0%   { transform: translate(0, 30px) scale(0) rotate(var(--start-rot)); opacity: 0; }
      40%  { opacity: 1; transform: translate(calc(var(--dx) * 0.5), calc(-20px + var(--dy) * 0.5)) scale(1) rotate(var(--mid-rot)); }
      100% { transform: translate(var(--dx), calc(-120px + var(--dy))) scale(1.1) rotate(var(--end-rot)); opacity: 0; }
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50%      { transform: translate(-50%, -50%) scale(1.04); }
    }

    @keyframes fadeOutAll {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    .forest-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 50% 60%,
          rgba(60, 85, 45, 0.55) 0%,
          rgba(35, 48, 25, 0.85) 45%,
          rgba(18, 22, 14, 0.95) 90%
        );
      z-index: 1;
      opacity: 0;
      animation: bgFadeIn 0.4s ease-out forwards;
    }

    /* Light rays through trees */
    .rays {
      position: absolute; inset: 0;
      background:
        linear-gradient(100deg, transparent 20%, rgba(255, 210, 120, 0.08) 35%, transparent 45%),
        linear-gradient(80deg,  transparent 50%, rgba(255, 210, 120, 0.06) 62%, transparent 72%),
        linear-gradient(110deg, transparent 70%, rgba(255, 210, 120, 0.05) 80%, transparent 88%);
      z-index: 2;
      opacity: 0;
      mix-blend-mode: screen;
      animation: bgFadeIn 0.6s ease-out 0.1s forwards;
    }

    /* Ring behind Luke — warm halo */
    .halo-ring {
      position: absolute;
      top: 50%; left: 50%;
      width: 720px; height: 720px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0.6);
      opacity: 0;
      background:
        radial-gradient(circle at center,
          rgba(255, 190, 90, 0.35) 0%,
          rgba(255, 150, 50, 0.2) 35%,
          transparent 70%
        );
      z-index: 3;
      animation:
        ringFadeIn 0.5s ease-out 0.15s forwards,
        pulse 2.4s ease-in-out 0.7s infinite;
    }

    /* Spinning accent ring */
    .accent-ring {
      position: absolute;
      top: 50%; left: 50%;
      width: 700px; height: 700px;
      border-radius: 50%;
      border: 3px dashed rgba(242, 183, 5, 0.55);
      transform: translate(-50%, -50%) rotate(0deg);
      opacity: 0;
      z-index: 4;
      animation:
        bgFadeIn 0.5s ease-out 0.3s forwards,
        ringSpin 24s linear infinite;
    }

    /* Luke image with radial mask to fade edges into forest bg */
    .luke-img {
      position: absolute;
      top: 50%; left: 50%;
      width: 620px; height: 620px;
      transform: translate(-50%, -50%) scale(0.2) rotate(-8deg);
      border-radius: 50%;
      background: url('../assets/stingers/luke.jpg') center/cover no-repeat;
      z-index: 5;
      opacity: 0;
      filter: saturate(1.1) contrast(1.05);
      box-shadow:
        0 0 40px rgba(255, 160, 60, 0.5),
        0 0 90px rgba(200, 100, 30, 0.35),
        inset 0 0 60px rgba(0, 0, 0, 0.35);
      mask-image: radial-gradient(circle at center, black 55%, transparent 95%);
      -webkit-mask-image: radial-gradient(circle at center, black 55%, transparent 95%);
      animation: lukeIn 0.7s cubic-bezier(0.22, 1.4, 0.36, 1) calc(var(--luke-in) - var(--time-offset)) forwards;
    }

    @keyframes heartFloat {
      0%   { transform: translate(0, 20px) scale(0) rotate(var(--start-rot)); opacity: 0; }
      30%  { opacity: 1; transform: translate(calc(var(--dx) * 0.4), calc(-30px + var(--dy) * 0.4)) scale(1.15) rotate(var(--mid-rot)); }
      100% { transform: translate(var(--dx), calc(-160px + var(--dy))) scale(0.8) rotate(var(--end-rot)); opacity: 0; }
    }

    /* Hearts floating around */
    .hearts {
      position: absolute;
      top: 0; left: 0;
      width: 1920px;
      height: 1080px;
      z-index: 6;
      pointer-events: none;
    }

    .heart {
      position: absolute;
      line-height: 1;
      opacity: 0;
      animation: heartFloat 2.2s ease-out forwards;
    }

    /* Paw prints floating around */
    .paws {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 1100px;
      height: 800px;
      z-index: 6;
      pointer-events: none;
    }

    .paw {
      position: absolute;
      font-size: 72px;
      line-height: 1;
      color: #f2b705;
      text-shadow:
        0 0 14px rgba(242, 183, 5, 0.8),
        0 0 28px rgba(255, 160, 60, 0.5),
        2px 2px 0 rgba(0, 0, 0, 0.5);
      opacity: 0;
      animation: pawFloat 2.4s ease-out forwards;
    }

    .name {
      position: absolute;
      top: calc(50% + 350px);
      left: 50%;
      transform: translateX(-50%) translateY(40px) scale(0.9);
      font-size: 180px;
      font-weight: 900;
      color: #f2b705;
      letter-spacing: -2px;
      line-height: 1;
      white-space: nowrap;
      text-transform: uppercase;
      z-index: 7;
      opacity: 0;
      -webkit-text-stroke: 4px #2a1a0a;
      text-shadow:
        8px 8px 0 rgba(0, 0, 0, 0.6),
        0 0 30px rgba(242, 183, 5, 0.7),
        0 0 60px rgba(255, 160, 60, 0.5);
      animation: nameSlideIn 0.55s cubic-bezier(0.22, 1.6, 0.36, 1) calc(var(--name-in) - var(--time-offset)) forwards;
    }

    .kicker {
      position: absolute;
      top: calc(50% - 430px);
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      font-size: 38px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 14px;
      text-transform: uppercase;
      z-index: 7;
      opacity: 0;
      text-shadow:
        0 0 16px rgba(255, 190, 90, 0.9),
        2px 2px 0 rgba(0, 0, 0, 0.6);
      animation: kickerFadeIn 0.4s ease-out calc(var(--kicker-in) - var(--time-offset)) forwards;
    }

    .stage {
      position: absolute; inset: 0;
      animation: fadeOutAll 0.5s ease-in var(--stage-out) forwards;
    }

    /* ── Tune-Panel ── */
    .tune-panel {
      position: fixed; top: 80px; right: 16px; width: 420px;
      background: rgba(20, 10, 30, 0.92);
      border: 2px solid #f2b705; padding: 16px; border-radius: 10px;
      color: #f2b705; font-family: 'Courier New', monospace; font-size: 13px;
      z-index: 1000; display: none;
      box-shadow: 0 0 30px rgba(242, 183, 5, 0.4);
    }
    .tune-panel.visible { display: block; }
    .tune-panel h2 { font-size: 16px; margin-bottom: 12px; letter-spacing: 2px; text-transform: uppercase; }
    .tune-panel table { width: 100%; border-collapse: collapse; }
    .tune-panel th, .tune-panel td { padding: 4px 6px; text-align: left; border-bottom: 1px solid rgba(242, 183, 5, 0.2); }
    .tune-panel th { font-size: 11px; text-transform: uppercase; }
    .tune-panel input {
      width: 70px; background: rgba(242, 183, 5, 0.1); border: 1px solid rgba(242, 183, 5, 0.4);
      color: #f2b705; padding: 3px 6px; font-family: inherit; font-size: 12px;
      text-align: right; border-radius: 3px;
    }
    .tune-panel input:focus { outline: 1px solid #f2b705; }
    .tune-panel tr.clickable { cursor: pointer; }
    .tune-panel tr.clickable:hover { background: rgba(242, 183, 5, 0.15); }
    .tune-panel tr.clickable:hover .tune-label { color: #fff; }
    .tune-panel .tune-label { font-size: 11px; color: rgba(255, 220, 150, 0.75); max-width: 200px; }
    .tune-actions { display: flex; gap: 8px; margin-top: 12px; }
    .tune-btn {
      flex: 1; background: rgba(242, 183, 5, 0.15); border: 1px solid #f2b705;
      color: #f2b705; padding: 8px 10px; font-family: inherit; font-size: 12px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      border-radius: 4px; cursor: pointer;
    }
    .tune-btn:hover { background: rgba(242, 183, 5, 0.3); }
    .tune-btn.reset { border-color: #ff8888; color: #ff8888; }
    .tune-btn.reset:hover { background: rgba(255, 136, 136, 0.2); }
    .tune-hint { margin-top: 10px; font-size: 10px; color: rgba(255, 220, 150, 0.6); line-height: 1.4; }
    .time-indicator {
      position: fixed; bottom: 16px; right: 16px;
      background: rgba(20, 10, 30, 0.85); border: 1px solid #f2b705;
      color: #f2b705; padding: 6px 14px; font-family: 'Courier New', monospace;
      font-size: 14px; z-index: 1000; display: none; border-radius: 4px;
    }
    .time-indicator.visible { display: block; }
  </style>
</head>
<body>

  <div class="stage">
    <div class="forest-bg"></div>
    <div class="rays"></div>

    <div class="kicker">&#10022; Herzensbrecher &#10022;</div>

    <div class="halo-ring"></div>
    <div class="accent-ring"></div>
    <div class="luke-img"></div>

    <div class="hearts" id="hearts"></div>
    <div class="paws" id="paws"></div>

    <div class="name">Luke</div>
  </div>

  <div class="tune-panel" id="tunePanel">
    <h2>Luke Tune Mode</h2>
    <table id="tuneTable"></table>
    <div class="tune-actions">
      <button class="tune-btn" id="applyBtn">&gt; Apply</button>
      <button class="tune-btn" id="copyBtn">&#128203; Copy</button>
      <button class="tune-btn reset" id="resetBtn">Reset</button>
    </div>
    <div style="margin-top: 14px; border-top: 1px solid rgba(242,183,5,0.3); padding-top: 12px;">
      <div style="font-size: 11px; text-transform: uppercase; margin-bottom: 6px;">Playback</div>
      <div class="tune-actions" style="margin-top: 6px;">
        <button class="tune-btn" id="pauseBtn">&#9208; Pause</button>
        <button class="tune-btn" id="replayBtn">&#8634; Replay 0s</button>
      </div>
      <div style="margin-top: 10px; display: flex; align-items: center; gap: 6px; font-size: 11px;">
        <span>Von:</span>
        <input type="number" id="fromInput" value="0" step="0.05" min="0" max="5" style="width: 60px;">
        <span>Bis:</span>
        <input type="number" id="toInput" value="3" step="0.05" min="0" max="5" style="width: 60px;">
        <button class="tune-btn" id="segmentBtn" style="flex: 0 0 auto; padding: 6px 12px;">&#9658; Play</button>
      </div>
    </div>
    <div class="tune-hint">
      <b>Apply</b>: speichert + Reload. <b>Pause</b>/<b>Replay</b>/<b>Play Segment</b>: ohne Reload.<br>
      Shortcuts: <b>Space</b> = Pause, <b>R</b> = Replay, <b>S</b> = Apply, <b>C</b> = Copy.
    </div>
  </div>

  <div class="time-indicator" id="timeInd">t = 0.00s</div>

  <script>
    (function () {
      'use strict';
      var DEFAULTS = {
        'kicker-in':  0.40,
        'luke-in':    0.30,
        'name-in':    0.55,
        'stage-out':  3.20
      };
      var LABELS = {
        'kicker-in':  'Kicker-Text IN',
        'luke-in':    'Luke-Bild IN',
        'name-in':    '"Luke" Name IN',
        'stage-out':  'Stage Fade-Out'
      };
      var KEYS = ['kicker-in','luke-in','name-in','stage-out'];
      var STORAGE_KEY = 'luke-tune-values';

      var params = new URLSearchParams(window.location.search);
      var tuneMode = params.get('tune') === '1';

      var saved = {};
      try { var raw = localStorage.getItem(STORAGE_KEY); if (raw) saved = JSON.parse(raw); } catch (e) {}
      function getValue(key) { return (saved[key] !== undefined) ? saved[key] : DEFAULTS[key]; }

      function applyToRoot() {
        var root = document.documentElement;
        KEYS.forEach(function (k) {
          root.style.setProperty('--' + k, getValue(k) + 's');
        });
      }
      applyToRoot();

      if (!tuneMode) return;

      var table = document.getElementById('tuneTable');
      var header = document.createElement('tr');
      header.innerHTML = '<th>Event</th><th>Zeit</th>';
      table.appendChild(header);

      function addRow(label, key) {
        var tr = document.createElement('tr');
        tr.className = 'clickable';
        var tdLabel = document.createElement('td');
        tdLabel.className = 'tune-label';
        tdLabel.textContent = label;
        tdLabel.title = 'Click: Von/Bis befuellen';
        tr.appendChild(tdLabel);
        var td = document.createElement('td');
        var inp = document.createElement('input');
        inp.type = 'number'; inp.step = '0.05'; inp.min = '0'; inp.max = '5';
        inp.value = getValue(key); inp.dataset.key = key;
        td.appendChild(inp);
        tr.appendChild(td);
        tr.addEventListener('click', function (e) {
          if (e.target.tagName === 'INPUT') return;
          var v = currentVals();
          var from = Math.max(0, v[key] - 0.2);
          var to   = v[key] + 0.6;
          document.getElementById('fromInput').value = from.toFixed(2);
          document.getElementById('toInput').value   = to.toFixed(2);
        });
        table.appendChild(tr);
      }
      KEYS.forEach(function (k) { addRow(LABELS[k], k); });

      document.getElementById('tunePanel').classList.add('visible');
      document.getElementById('timeInd').classList.add('visible');

      function currentVals() {
        var vals = {};
        document.querySelectorAll('.tune-panel input').forEach(function (inp) {
          if (inp.dataset.key) vals[inp.dataset.key] = parseFloat(inp.value) || 0;
        });
        return vals;
      }

      function apply() {
        var vals = currentVals();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(vals));
        location.reload();
      }
      function reset() { localStorage.removeItem(STORAGE_KEY); location.reload(); }

      document.getElementById('applyBtn').addEventListener('click', apply);
      document.getElementById('resetBtn').addEventListener('click', reset);

      function copyValues() {
        var v = currentVals();
        var lines = ['Luke Tune Values:'];
        KEYS.forEach(function (k) {
          lines.push((LABELS[k] + ':').padEnd(34) + v[k].toFixed(2) + 's');
        });
        var text = lines.join('\n');
        var btn = document.getElementById('copyBtn');
        var original = btn.innerHTML;
        var restore = function () { btn.innerHTML = original; };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () {
            btn.innerHTML = '&#10003; Copied!';
            setTimeout(restore, 1200);
          }).catch(function () { fallbackCopy(text, btn, restore); });
        } else { fallbackCopy(text, btn, restore); }
      }
      function fallbackCopy(text, btn, restore) {
        var ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); btn.innerHTML = '&#10003; Copied!'; }
        catch (e) { btn.innerHTML = 'Error'; }
        document.body.removeChild(ta);
        setTimeout(restore, 1200);
      }
      document.getElementById('copyBtn').addEventListener('click', copyValues);

      var html = document.documentElement;
      var pauseBtn = document.getElementById('pauseBtn');
      var replayBtn = document.getElementById('replayBtn');
      var segmentBtn = document.getElementById('segmentBtn');
      var fromInp = document.getElementById('fromInput');
      var toInp = document.getElementById('toInput');
      var segmentTimer = null;

      function setPaused(paused) {
        if (paused) { html.classList.add('paused'); pauseBtn.innerHTML = '&#9654; Resume'; }
        else        { html.classList.remove('paused'); pauseBtn.innerHTML = '&#9208; Pause'; }
      }
      function togglePause() { setPaused(!html.classList.contains('paused')); }

      function resetAnimations(offsetSec) {
        clearTimeout(segmentTimer);
        html.style.setProperty('--time-offset', (offsetSec || 0) + 's');
        var stage = document.querySelector('.stage');
        var clone = stage.cloneNode(true);
        stage.parentNode.replaceChild(clone, stage);
        html.classList.remove('paused');
        pauseBtn.innerHTML = '&#9208; Pause';
      }
      function replayFrom0() { resetAnimations(0); }
      function playSegment() {
        var from = parseFloat(fromInp.value) || 0;
        var to   = parseFloat(toInp.value) || getValue('stage-out');
        if (to <= from) return;
        resetAnimations(from);
        segmentTimer = setTimeout(function () { setPaused(true); }, (to - from) * 1000);
      }
      pauseBtn.addEventListener('click', togglePause);
      replayBtn.addEventListener('click', replayFrom0);
      segmentBtn.addEventListener('click', playSegment);

      document.addEventListener('keydown', function (e) {
        if (e.target.tagName === 'INPUT') return;
        if (e.key === 'r' || e.key === 'R') replayFrom0();
        else if (e.key === 's' || e.key === 'S') apply();
        else if (e.key === 'c' || e.key === 'C') copyValues();
        else if (e.key === ' ') { e.preventDefault(); togglePause(); }
      });

      var events = [];
      KEYS.forEach(function (k) { events.push({ t: getValue(k), label: LABELS[k] }); });
      events.sort(function (a, b) { return a.t - b.t; });

      var timeInd = document.getElementById('timeInd');
      var startRef = null;
      function tick() {
        if (html.classList.contains('stinger-loading')) { requestAnimationFrame(tick); return; }
        if (startRef === null) startRef = performance.now();
        var t = (performance.now() - startRef) / 1000;
        if (html.classList.contains('paused')) t = 0;
        var currentEvent = null;
        for (var i = 0; i < events.length; i++) {
          if (events[i].t <= t) currentEvent = events[i]; else break;
        }
        var txt = 't = ' + t.toFixed(2) + 's';
        if (html.classList.contains('paused')) txt += ' [PAUSED]';
        if (currentEvent) txt += '  |  ' + currentEvent.label + ' @ ' + currentEvent.t.toFixed(2) + 's';
        timeInd.textContent = txt;
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })();
  </script>

  <script>
    (function () {
      'use strict';
      var heartsLayer = document.getElementById('hearts');
      var COLORS = ['#ff4d6d','#ff85a1','#ff6b9d','#c77dff','#f2b705','#ff9f1c','#e63946','#ff47ba','#ffa8c5','#b5179e'];
      var COUNT = 22;
      for (var h = 0; h < COUNT; h++) {
        var el = document.createElement('div');
        el.className = 'heart';
        var size   = (22 + Math.random() * 28).toFixed(0);
        var x      = 80 + Math.random() * 1760;
        var y      = 120 + Math.random() * 840;
        var color  = COLORS[Math.floor(Math.random() * COLORS.length)];
        var sRot   = (Math.random() * 40 - 20) + 'deg';
        var mRot   = (Math.random() * 40 - 20) + 'deg';
        var eRot   = (Math.random() * 80 - 40) + 'deg';
        var dx     = (Math.random() * 80 - 40) + 'px';
        var dy     = (Math.random() * 50 - 25) + 'px';
        var delay  = (0.5 + Math.random() * 1.8).toFixed(2) + 's';
        el.textContent = '♥';
        el.style.cssText =
          'left:' + x + 'px;top:' + y + 'px;' +
          'font-size:' + size + 'px;color:' + color + ';' +
          'text-shadow:0 0 ' + (parseInt(size)*0.6) + 'px ' + color + ',0 0 ' + parseInt(size) + 'px ' + color + ';' +
          '--start-rot:' + sRot + ';--mid-rot:' + mRot + ';--end-rot:' + eRot + ';' +
          '--dx:' + dx + ';--dy:' + dy + ';' +
          'animation-delay:' + delay + ';';
        heartsLayer.appendChild(el);
      }
    })();
  </script>

  <script>
    (function () {
      'use strict';
      var layer = document.getElementById('paws');
      var POSITIONS = [
        { x:  -50, y: -340 }, { x:  320, y: -260 }, { x: -380, y: -180 },
        { x:  470, y:  -60 }, { x: -510, y:   20 }, { x:  380, y:  180 },
        { x: -320, y:  240 }, { x:   80, y: -380 }, { x:  -80, y:  320 }
      ];
      var PAW = '\u{1F43E}'; /* 🐾 */

      POSITIONS.forEach(function (p, i) {
        var el = document.createElement('div');
        el.className = 'paw';
        var startRot = (Math.random() * 60 - 30) + 'deg';
        var midRot   = (Math.random() * 60 - 30) + 'deg';
        var endRot   = (Math.random() * 120 - 60) + 'deg';
        var dx = (Math.random() * 60 - 30) + 'px';
        var dy = (Math.random() * 60 - 30) + 'px';
        var delay = (0.7 + i * 0.12 + Math.random() * 0.15) + 's';
        var size = (60 + Math.random() * 30) + 'px';
        el.textContent = PAW;
        el.style.cssText =
          'left:' + (550 + p.x) + 'px;' +
          'top:'  + (400 + p.y) + 'px;' +
          'font-size:' + size + ';' +
          '--start-rot:' + startRot + ';' +
          '--mid-rot:' + midRot + ';' +
          '--end-rot:' + endRot + ';' +
          '--dx:' + dx + ';' +
          '--dy:' + dy + ';' +
          'animation-delay:' + delay + ';';
        layer.appendChild(el);
      });
    })();
  </script>

</body>
</html>
