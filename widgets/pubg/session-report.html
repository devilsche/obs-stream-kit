<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG After-Session Report</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      padding: 16px;
      background: linear-gradient(180deg, rgba(20,12,30,0.6), rgba(10,5,16,0.6));
    }
    .report { max-width: 900px; margin: 0 auto; padding: 22px 26px; }
    .report h1 {
      margin: 0 0 6px;
      color: var(--pubg-gold);
      font-size: 1.6em;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .report .subtitle { color: var(--pubg-muted); font-size: 0.9em; margin-bottom: 18px; }

    .totals {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }
    .totals .cell { display: flex; flex-direction: column; }
    .totals .cell .pubg-stat-value { font-size: 1.4em; }

    .phase {
      margin-bottom: 18px;
      padding: 14px 16px;
      background: rgba(94,42,121,0.12);
      border-left: 3px solid var(--pubg-purple);
      border-radius: 6px;
    }
    .phase h2 {
      margin: 0 0 4px;
      font-size: 1em;
      letter-spacing: 0.04em;
    }
    .phase h2 .num { color: var(--pubg-gold); margin-right: 8px; }
    .phase .squad {
      color: var(--pubg-muted);
      font-size: 0.85em;
      margin-bottom: 10px;
    }
    .phase .squad b { color: var(--pubg-text); }
    .phase-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 10px 14px;
      margin-bottom: 12px;
    }
    .phase-stats span {
      display: flex;
      flex-direction: column;
      color: var(--pubg-muted);
      font-size: 0.7em;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.2;
    }
    .phase-stats span b {
      color: var(--pubg-text);
      font-variant-numeric: tabular-nums;
      font-size: 1.7em;
      letter-spacing: 0;
      text-transform: none;
      margin-bottom: 2px;
      line-height: 1.05;
    }

    .matches-list {
      display: flex; flex-direction: column;
      gap: 4px;
      font-size: 0.78em;
      font-variant-numeric: tabular-nums;
    }
    /* Match-Row: Spaltenbreiten so dass alles match-übergreifend bündig ist.
       Stats ist Sub-Grid mit fixen Spaltenbreiten — Werte untereinander
       zwischen Zeilen sichtbar. */
    .matches-list .m {
      display: grid;
      grid-template-columns: 240px 60px 1fr 70px 90px 90px;
      gap: 10px;
      padding: 6px 8px;
      border-radius: 3px;
      align-items: center;
      cursor: pointer;
      transition: background 0.15s;
    }
    .matches-list .m:hover { background: rgba(94, 42, 121, 0.18); }
    .matches-list .m.expanded { background: rgba(94, 42, 121, 0.25); }
    .matches-list .header-row {
      display: grid;
      grid-template-columns: 240px 60px 1fr 70px 90px 90px;
      gap: 10px;
      padding: 2px 8px 4px;
      font-size: 0.85em;
      color: var(--pubg-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px dashed rgba(255,255,255,0.1);
      margin-bottom: 4px;
    }
    /* Place-Spalte: # untereinander ausrichten — gold-Marker bei Win */
    .matches-list .m .place {
      font-variant-numeric: tabular-nums;
      position: relative;
      padding-left: 22px;
    }
    .matches-list .m.win .place::before {
      content: "★";
      color: var(--pubg-gold);
      font-weight: 700;
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
    }
    /* Stats-Spalten: rechtsbündig, fixe Breite, tabular-nums  */
    .matches-list .stat {
      text-align: right;
      font-size: 0.9em;
      color: var(--pubg-muted);
      font-variant-numeric: tabular-nums;
    }
    .matches-list .stat b {
      color: var(--pubg-text);
    }
    .squad-detail {
      padding: 8px 14px 12px 28px;
      margin-bottom: 4px;
      background: rgba(94, 42, 121, 0.10);
      border-radius: 0 0 4px 4px;
      font-size: 0.78em;
      display: none;
    }
    .squad-detail.show { display: block; animation: pubg-fade-in 0.25s; }
    .squad-detail table {
      width: 100%;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
    }
    .squad-detail th, .squad-detail td {
      padding: 4px 8px;
      text-align: right;
    }
    .squad-detail th:first-child, .squad-detail td:first-child {
      text-align: left;
    }
    .squad-detail th {
      color: var(--pubg-muted);
      font-weight: 400;
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .squad-detail .self {
      color: var(--pubg-gold);
      font-weight: 700;
    }
    .squad-detail tr.win td { color: var(--pubg-gold); }
    .matches-list .time-range { color: var(--pubg-muted); }
    .matches-list .time-range b { color: var(--pubg-text); font-weight: 400; }
    .matches-list .m:hover { background: rgba(255,255,255,0.04); }
    .matches-list .m.win {
      background: rgba(242,183,5,0.15);
      border-left: 2px solid var(--pubg-gold);
    }
    .matches-list .m .num {
      color: var(--pubg-muted);
      font-size: 0.78em;
      opacity: 0.55;
      font-variant-numeric: tabular-nums;
    }
    .matches-list .m .time { color: var(--pubg-muted); }
    .matches-list .m .place { color: var(--pubg-gold); font-weight: 700; }
    .matches-list .m .map { color: var(--pubg-text); }
    .matches-list .m .stats { color: var(--pubg-muted); text-align: right; }
    .matches-list .m .stats b { color: var(--pubg-text); }

    /* Trend / Streaks / Achievements im Report */
    .extras-h {
      margin: 24px 0 8px;
      color: var(--pubg-muted);
      font-size: 0.8em;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .trend-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }
    .trend-cell {
      padding: 10px 12px;
      border-radius: 6px;
      background: rgba(94, 42, 121, 0.18);
      border: 1px solid var(--pubg-border);
    }
    .trend-label {
      color: var(--pubg-muted);
      font-size: 0.75em;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .trend-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-top: 4px;
    }
    .trend-val {
      font-size: 1.4em;
      font-weight: 700;
      color: var(--pubg-text);
      font-variant-numeric: tabular-nums;
    }
    .trend-delta {
      font-weight: 700;
      font-size: 0.95em;
      font-variant-numeric: tabular-nums;
    }
    .delta-pos { color: #7be57b; }
    .delta-neg { color: #e57b7b; }
    .delta-zero { color: var(--pubg-muted); }
    .streaks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }
    .streak-cell {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 6px;
      background: rgba(94, 42, 121, 0.18);
      border: 1px solid var(--pubg-border);
    }
    .streak-cell.cold { opacity: 0.55; }
    .streak-icon { font-size: 1.5em; }
    .streak-num {
      font-size: 1.6em;
      font-weight: 700;
      color: var(--pubg-gold);
      font-variant-numeric: tabular-nums;
    }
    .streak-label {
      color: var(--pubg-muted);
      font-size: 0.85em;
      margin-left: auto;
      text-align: right;
    }
    .ach-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .ach-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 10px;
      border-radius: 3px;
      background: rgba(255,255,255,0.04);
      font-size: 0.9em;
    }
    .ach-icon { font-size: 1.2em; }
    .ach-label { flex: 1; color: var(--pubg-text); font-weight: 700; }
    .ach-when { color: var(--pubg-muted); font-size: 0.85em; }

    .highlights {
      margin-top: 22px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .highlights .col h3 {
      margin: 0 0 8px;
      color: var(--pubg-muted);
      font-size: 0.8em;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .highlight-item {
      padding: 6px 10px;
      margin-bottom: 4px;
      font-size: 0.85em;
      border-radius: 3px;
      background: rgba(255,255,255,0.04);
    }
    .empty {
      text-align: center;
      color: var(--pubg-muted);
      padding: 40px;
      font-style: italic;
    }
    .range-picker {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      padding: 10px 14px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--pubg-border);
      border-radius: 6px;
      flex-wrap: wrap;
    }
    .range-picker label {
      color: var(--pubg-muted);
      font-size: 0.78em;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .range-picker input[type=date],
    .range-picker input[type=time] {
      background: rgba(0,0,0,0.4);
      color: var(--pubg-text);
      border: 1px solid var(--pubg-border);
      padding: 4px 6px;
      border-radius: 3px;
      font-family: inherit;
      font-size: inherit;
      color-scheme: dark;
    }
    .range-picker .presets {
      display: flex; gap: 4px;
      margin-left: auto;
    }
    .range-picker .preset {
      padding: 4px 10px;
      background: rgba(94,42,121,0.18);
      border: 1px solid transparent;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.85em;
      color: var(--pubg-text);
      font-family: inherit;
    }
    .range-picker .preset:hover { background: rgba(94,42,121,0.4); }
    .range-picker button.apply {
      background: var(--pubg-gold);
      color: #1a0d2a;
      border: none;
      padding: 5px 14px;
      border-radius: 3px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .session-picker {
      margin-bottom: 18px;
      padding: 12px 14px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--pubg-border);
      border-radius: 6px;
    }
    .session-picker .controls {
      display: flex; gap: 10px; align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .session-picker .controls select {
      background: rgba(0,0,0,0.4);
      color: var(--pubg-text);
      border: 1px solid var(--pubg-border);
      padding: 5px 8px;
      border-radius: 3px;
      font-family: inherit;
      cursor: pointer;
    }
    .session-picker .controls .month-tabs {
      display: flex; gap: 4px; flex-wrap: wrap; flex: 1;
    }
    .session-picker .controls .month-tab {
      padding: 4px 10px;
      background: rgba(94,42,121,0.18);
      border: 1px solid transparent;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.78em;
      color: var(--pubg-text);
      font-family: inherit;
    }
    .session-picker .controls .month-tab:hover { background: rgba(94,42,121,0.4); }
    .session-picker .controls .month-tab.active {
      background: var(--pubg-purple);
      border-color: var(--pubg-gold);
    }
    .session-picker .summary {
      color: var(--pubg-muted);
      font-size: 0.8em;
      letter-spacing: 0.04em;
    }
    .session-picker .toggle-all {
      background: rgba(94,42,121,0.3);
      border: 1px solid var(--pubg-border);
      padding: 4px 10px;
      border-radius: 3px;
      font-size: 0.78em;
      color: var(--pubg-text);
      cursor: pointer;
      font-family: inherit;
    }
    .session-picker .month-header {
      color: var(--pubg-gold);
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin: 12px 0 6px;
      padding-bottom: 3px;
      border-bottom: 1px solid var(--pubg-border);
    }
    .session-picker .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 6px;
    }
    .session-picker .item {
      padding: 6px 10px;
      background: rgba(94,42,121,0.18);
      border: 1px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.78em;
      transition: all 0.15s;
    }
    .session-picker .item:hover {
      background: rgba(94,42,121,0.4);
    }
    .session-picker .item.active {
      background: var(--pubg-purple);
      border-color: var(--pubg-gold);
      color: var(--pubg-text);
    }
    .session-picker .item .label {
      color: var(--pubg-gold); font-weight: 700;
      display: block;
      margin-bottom: 2px;
      font-size: 1.05em;
    }
    .session-picker .item .meta {
      color: var(--pubg-muted);
      font-variant-numeric: tabular-nums;
    }
    .session-picker .item.current {
      background: rgba(242,183,5,0.15);
      border-color: rgba(242,183,5,0.4);
    }
  </style>
</head>
<body>
  <div class="range-picker">
    <label>From</label>
    <input type="date" id="dateFrom">
    <input type="time" id="timeFrom" value="00:00" step="60">
    <label>To</label>
    <input type="date" id="dateTo">
    <input type="time" id="timeTo" value="23:59" step="60">
    <button class="apply" id="applyRange">Apply</button>
    <div class="presets">
      <button class="preset" data-preset="current">▶ Current</button>
      <button class="preset" data-preset="today">Today</button>
      <button class="preset" data-preset="yesterday">Yesterday</button>
      <button class="preset" data-preset="last7">Last 7 days</button>
      <button class="preset" data-preset="all">All (DB)</button>
    </div>
  </div>
  <div id="picker" class="session-picker" style="display:none"></div>
  <div class="pubg-card report pubg-fade-in" id="report">
    <div class="empty">— wird geladen —</div>
  </div>

  <script src="_pubg.js"></script>
  <script>
    const FROM = PubgUI.qs("from", "");
    const TO = PubgUI.qs("to", "");

    // Date-Range-Picker initialisieren mit aktuellen URL-Werten
    function isoLocal(date) {
      // Local-Date → "YYYY-MM-DD"
      return date.toISOString().slice(0, 10);
    }
    function pad(n) { return String(n).padStart(2, "0"); }

    if (FROM) {
      const d = new Date(FROM);
      document.getElementById("dateFrom").value = isoLocal(d);
      document.getElementById("timeFrom").value = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    if (TO) {
      const d = new Date(TO);
      document.getElementById("dateTo").value = isoLocal(d);
      document.getElementById("timeTo").value = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function applyRange(fromIso, toIso) {
      const u = new URL(location.href);
      if (fromIso) u.searchParams.set("from", fromIso);
      else u.searchParams.delete("from");
      if (toIso) u.searchParams.set("to", toIso);
      else u.searchParams.delete("to");
      location.href = u.toString();
    }

    document.getElementById("applyRange").addEventListener("click", () => {
      const df = document.getElementById("dateFrom").value;
      const tf = document.getElementById("timeFrom").value || "00:00";
      const dt = document.getElementById("dateTo").value;
      const tt = document.getElementById("timeTo").value || "23:59";
      const from = df ? new Date(`${df}T${tf}:00`).toISOString() : "";
      const to = dt ? new Date(`${dt}T${tt}:00`).toISOString() : "";
      applyRange(from, to);
    });

    document.querySelectorAll(".preset").forEach(btn => {
      btn.addEventListener("click", () => {
        const p = btn.dataset.preset;
        const now = new Date();
        const today = new Date(now); today.setHours(0,0,0,0);
        let from = "", to = "";
        if (p === "current") {
          // alles leer = aktuelle Session
        } else if (p === "today") {
          from = today.toISOString();
          const e = new Date(today); e.setHours(23,59,59,0);
          to = e.toISOString();
        } else if (p === "yesterday") {
          const ys = new Date(today); ys.setDate(ys.getDate() - 1);
          from = ys.toISOString();
          const ye = new Date(ys); ye.setHours(23,59,59,0);
          to = ye.toISOString();
        } else if (p === "last7") {
          const s = new Date(today); s.setDate(s.getDate() - 7);
          from = s.toISOString();
          // to leer = jetzt
        } else if (p === "all") {
          from = "1970-01-01T00:00:00Z";
        }
        applyRange(from, to);
      });
    });

    // Sessions-Picker: Monats-Tabs + Sort-Dropdown.
    // Default: aktueller Monat, sortiert nach neueste-zuerst.
    let allSessions = [];
    let activeMonth = null;       // null = aktueller (=neuester) Monat
    let sortBy = "newest";

    function monthKey(iso) {
      const d = new Date(iso);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    }
    function monthLabel(key) {
      const [y, m] = key.split("-").map(Number);
      return new Date(y, m-1, 1).toLocaleDateString("de-DE", { month: "long", year: "numeric" });
    }

    function buildPickerShell() {
      const picker = document.getElementById("picker");
      if (!allSessions.length) { picker.style.display = "none"; return; }
      picker.style.display = "block";

      // Alle Monate aus den Sessions, neueste zuerst
      const months = [...new Set(allSessions.map(s => monthKey(s.from)))]
        .sort((a, b) => b.localeCompare(a));
      if (!activeMonth) activeMonth = months[0];

      const monthTabs = months.map(k => {
        const cnt = allSessions.filter(s => monthKey(s.from) === k).length;
        const cls = "month-tab" + (k === activeMonth ? " active" : "");
        return `<button class="${cls}" data-month="${k}">${monthLabel(k)} (${cnt})</button>`;
      }).join("");

      picker.innerHTML = `
        <div class="controls">
          <div class="month-tabs">${monthTabs}</div>
          <select id="sortBy">
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
            <option value="wins">Meiste CHICKEN Wins</option>
            <option value="matches">Meiste Matches</option>
            <option value="kills">Meiste Kills</option>
          </select>
          <span class="summary" id="sessionSummary"></span>
        </div>
        <div id="sessionList"></div>
      `;
      document.getElementById("sortBy").value = sortBy;
      document.getElementById("sortBy").addEventListener("change", (e) => {
        sortBy = e.target.value;
        renderItems();
      });
      picker.querySelectorAll(".month-tab").forEach(btn => {
        btn.addEventListener("click", () => {
          activeMonth = btn.dataset.month;
          buildPickerShell();
          renderItems();
        });
      });
    }

    function renderItems() {
      const inMonth = allSessions.filter(s => monthKey(s.from) === activeMonth);
      const sortFns = {
        newest:  (a, b) => b.from.localeCompare(a.from),
        oldest:  (a, b) => a.from.localeCompare(b.from),
        wins:    (a, b) => (b.wins||0) - (a.wins||0) || b.from.localeCompare(a.from),
        matches: (a, b) => (b.matches||0) - (a.matches||0) || b.from.localeCompare(a.from),
        kills:   (a, b) => (b.kills||0) - (a.kills||0) || b.from.localeCompare(a.from),
      };
      const sorted = [...inMonth].sort(sortFns[sortBy] || sortFns.newest);

      const items = sorted.map(s => {
        const origIdx = allSessions.indexOf(s);
        const isCurrent = origIdx === 0 && !FROM;
        const isActive = FROM === s.from;
        const cls = ["item"];
        if (isCurrent) cls.push("current");
        if (isActive) cls.push("active");
        const mate = s.topMate
          ? ` · 👥 ${s.topMate}${s.topMateCount > 1 ? ` (${s.topMateCount})` : ""}`
          : "";
        return `<div class="${cls.join(' ')}" data-from="${s.from}" data-to="${s.to}">
          <span class="label">${PubgUI.fmtDate(s.from)} ${PubgUI.fmtTime(s.from)}${isCurrent ? " ▶" : ""}</span>
          <span class="meta">${s.matches}M · ${s.wins} CHICKEN · ${s.kills}K${mate}</span>
        </div>`;
      }).join("") || `<div style="padding:20px;color:var(--pubg-muted);text-align:center;font-style:italic">— keine Sessions in diesem Monat —</div>`;

      document.getElementById("sessionList").innerHTML = `<div class="grid">${items}</div>`;
      document.getElementById("sessionSummary").textContent =
        `${inMonth.length} Sessions · ${allSessions.length} gesamt`;
    }

    function renderPicker() {
      buildPickerShell();
      renderItems();
    }

    PubgUI.fetchJson("/api/pubg/sessions").then(sessions => {
      allSessions = sessions || [];
      // Wenn URL-Range gesetzt: Monat der aktiven Session vorauswählen
      if (FROM) activeMonth = monthKey(FROM);
      renderPicker();
    }).catch(() => {});

    // Click-Handler delegiert auf body
    document.addEventListener("click", (e) => {
      const it = e.target.closest(".session-picker .item");
      if (!it) return;
      const u = new URL(location.href);
      if (it.classList.contains("current")) {
        u.searchParams.delete("from");
        u.searchParams.delete("to");
      } else {
        u.searchParams.set("from", it.dataset.from);
        u.searchParams.set("to", it.dataset.to);
      }
      location.href = u.toString();
    });

    function fmtDuration(secs) {
      if (!secs) return "0min";
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      return h ? `${h}h ${m}min` : `${m}min`;
    }

    function fmtSurv(secs) {
      const m = Math.floor((secs||0)/60);
      const s = (secs||0) % 60;
      return `${m}:${String(s).padStart(2,"0")}`;
    }

    function fmtSquadDetail(m) {
      // Du oben, dann Mates sortiert nach Damage absteigend
      const all = [m.myStats, ...(m.squad || [])];
      all.sort((a, b) => {
        if (a.isSelf) return -1;
        if (b.isSelf) return 1;
        return (b.damage_dealt || 0) - (a.damage_dealt || 0);
      });
      const isWin = m.place === 1;
      const rows = all.map(p => {
        const cls = (p.isSelf ? "self " : "") + (isWin ? "win" : "");
        const kd = (p.kills || 0);  // pro Match — nicht aggregierte K/D
        return `<tr class="${cls.trim()}">
          <td>${p.name}${p.isSelf ? " (du)" : ""}</td>
          <td>${p.kills || 0}</td>
          <td>${p.headshot_kills || 0}</td>
          <td>${p.assists || 0}</td>
          <td>${p.dbnos || 0}</td>
          <td>${Math.round(p.damage_dealt || 0)}</td>
          <td>${fmtSurv(p.time_survived)}</td>
        </tr>`;
      }).join("");
      return `
        <table>
          <thead><tr>
            <th>Squad</th><th>K</th><th>HS</th><th>Ass</th><th>DBNO</th><th>DMG</th><th>Survived</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function fmtMatchRow(m, idx, matchNum) {
      const startIso = PubgUI.matchStartIso(m.matchEnd, m.durationSec);
      const mySurv = m.timeSurvived || 0;
      const squadSurv = m.squadTimeSurvived || mySurv;
      const isWin = m.place === 1;
      const squadOutIso = new Date(new Date(startIso).getTime() + squadSurv * 1000).toISOString();
      // Datum nur zeigen wenn Match anderen Tag als Match-End hat (Mitternacht-Übergang)
      const startD = PubgUI.fmtDate(startIso);
      const outD = PubgUI.fmtDate(squadOutIso);
      const startTimeStr = (startD === outD)
        ? PubgUI.fmtTime(startIso)
        : `${startD.slice(0,5)} ${PubgUI.fmtTime(startIso)}`;
      const outTimeStr = (startD === outD)
        ? PubgUI.fmtTime(squadOutIso)
        : `${outD.slice(0,5)} ${PubgUI.fmtTime(squadOutIso)}`;
      const numStr = matchNum != null ? `<span class="num">#${matchNum}</span> ` : "";
      return `
        <div class="m ${isWin ? 'win' : ''}" data-idx="${idx}">
          <span class="time-range">${numStr}<b>${startTimeStr}</b> → <b>${outTimeStr}</b></span>
          <span class="place">#${m.place}</span>
          <span class="map">${PubgUI.fmtMap(m.map)}</span>
          <span class="stat"><b>${m.kills}</b> K</span>
          <span class="stat"><b>${Math.round(m.damage||0)}</b> DMG</span>
          <span class="stat"><b>${fmtSurv(mySurv)}</b></span>
        </div>
        <div class="squad-detail" data-idx-detail="${idx}">${fmtSquadDetail(m)}</div>`;
    }

    function render(d) {
      const root = document.getElementById("report");
      if (!d.totalMatches) {
        root.innerHTML = `<div class="empty">— no matches in session yet —</div>`;
        return;
      }
      const t = d.totals;
      const startIso = PubgUI.matchStartIso(t.startTime, 0);  // approx
      const subtitle = `${PubgUI.fmtDate(t.startTime)} · ${PubgUI.fmtTime(d.sessionStartedAt)} – ${PubgUI.fmtTime(t.endTime)} · ${fmtDuration(t.totalSurvivedSec)} active playtime`;

      const totalsHtml = `
        <div class="totals">
          <div class="cell"><span class="pubg-stat-value">${t.matches}</span><span class="pubg-stat-label">Matches</span></div>
          <div class="cell"><span class="pubg-stat-value">${t.wins}</span><span class="pubg-stat-label">CHICKEN Wins</span></div>
          <div class="cell"><span class="pubg-stat-value">${t.kills}</span><span class="pubg-stat-label">Kills</span></div>
          <div class="cell"><span class="pubg-stat-value">${PubgUI.fmtNum(Math.round(t.damage))}</span><span class="pubg-stat-label">Damage</span></div>
          <div class="cell"><span class="pubg-stat-value">${PubgUI.fmtKD(t.kd)}</span><span class="pubg-stat-label">K/D</span></div>
          <div class="cell"><span class="pubg-stat-value">${PubgUI.fmtKD(t.squadKd || 0)}</span><span class="pubg-stat-label">Squad K/D</span></div>
          <div class="cell"><span class="pubg-stat-value">${PubgUI.fmtKD(t.lobbyTop3Kd || 0)}</span><span class="pubg-stat-label">Top-3 Lobby K/D</span></div>
          <div class="cell"><span class="pubg-stat-value">${PubgUI.fmtKD(t.avgKills)}</span><span class="pubg-stat-label">Ø My Kills/Match</span></div>
          <div class="cell"><span class="pubg-stat-value">${(t.squadKillsPerMatch || 0).toFixed(1)}</span><span class="pubg-stat-label">Ø Squad Kills/Match</span></div>
          <div class="cell"><span class="pubg-stat-value">${Math.round(t.avgDamage)}</span><span class="pubg-stat-label">Ø Damage/Match</span></div>
          <div class="cell"><span class="pubg-stat-value">${fmtDuration(Math.round(t.avgSurvivedSec))}</span><span class="pubg-stat-label">Ø Survive</span></div>
          <div class="cell"><span class="pubg-stat-value">#${t.avgPlace.toFixed(1)}</span><span class="pubg-stat-label">Ø Place</span></div>
          <div class="cell"><span class="pubg-stat-value">${t.headshots}</span><span class="pubg-stat-label">Headshots</span></div>
          <div class="cell"><span class="pubg-stat-value">${t.dbnos}</span><span class="pubg-stat-label">Knocks</span></div>
          <div class="cell"><span class="pubg-stat-value">${PubgUI.hotIf(t.longestKill, 300, Math.round(t.longestKill) + "m")}</span><span class="pubg-stat-label">Longest</span></div>
          <div class="cell"><span class="pubg-stat-value">${t.uniqueMaps}</span><span class="pubg-stat-label">Maps</span></div>
        </div>`;

      // Chronologische Match-Nummer ueber alle Phases (key = matchEnd
       // Iso-String). Robust gegen interne Sortierung der phases.
      const _allMatches = d.phases.flatMap(ph => ph.matches || []);
      const _sorted = [..._allMatches].sort((a, b) =>
        new Date(a.matchEnd || 0) - new Date(b.matchEnd || 0));
      const matchNumMap = new Map();
      _sorted.forEach((m, idx) => matchNumMap.set(m.matchEnd, idx + 1));

      const phasesHtml = d.phases.map((ph, i) => {
        const s = ph.stats;
        const core = ph.coreSquad && ph.coreSquad.length
          ? ph.coreSquad.map(n => `<b>${n}</b>`).join(" + ")
          : "<i>Solo</i>";
        const fillersStr = (ph.fillers && ph.fillers.length)
          ? ` <span style="opacity:0.7">+ wechselnd: ${ph.fillers.map(f => `${f.name} (${f.count})`).join(", ")}</span>`
          : "";
        // Datum + Zeit. Bei Tageswechsel auch das End-Datum zeigen.
        const startD = PubgUI.fmtDate(s.startTime);
        const endD = PubgUI.fmtDate(s.endTime);
        const startStr = `${startD} ${PubgUI.fmtTime(s.startTime)}`;
        const endStr = (startD === endD)
          ? PubgUI.fmtTime(s.endTime)
          : `${endD} ${PubgUI.fmtTime(s.endTime)}`;
        return `
          <div class="phase">
            <h2><span class="num">Phase ${i+1}</span> ${startStr} → ${endStr} · ${s.matches} ${s.matches===1?'Match':'Matches'}</h2>
            <div class="squad">Stamm: ${core}${fillersStr}</div>
            <div class="phase-stats">
              <span><b>${s.kills}</b> Kills</span>
              <span><b>${PubgUI.fmtNum(Math.round(s.damage))}</b> DMG</span>
              <span><b>${s.wins}</b> Wins</span>
              <span><b>${PubgUI.fmtKD(s.kd)}</b> K/D</span>
              ${(s.squadMatchesWithMapping||0) > 0 ? `<span><b>${PubgUI.fmtKD(s.squadKd||0)}</b> Squad K/D</span>` : ""}
              ${(s.lobbyTop3Matches||0) > 0 ? `<span><b>${PubgUI.fmtKD(s.lobbyTop3Kd||0)}</b> Top-3 Lobby K/D</span>` : ""}
              <span><b>${Math.round(s.avgDamage)}</b> Ø DMG</span>
              <span><b>${fmtDuration(Math.round(s.avgSurvivedSec))}</b> Ø Surv</span>
              <span><b>#${s.avgPlace.toFixed(1)}</b> Avg #</span>
            </div>
            <div class="matches-list">
              <div class="header-row">
                <span>Squad in Match</span><span>Place</span><span>Map</span>
                <span style="text-align:right">Kills</span>
                <span style="text-align:right">Damage</span>
                <span style="text-align:right">Survived</span>
              </div>
              ${ph.matches.map((m, i) => fmtMatchRow(m, `${ph.coreSquad.join('-')}-${i}`, matchNumMap.get(m.matchEnd))).join("")}
            </div>
          </div>`;
      }).join("");

      // Map-Performance
      const mp = d.mapsPerf || [];
      const mapsHtml = mp.length ? `
        <h3 class="extras-h">Map-Performance</h3>
        <table style="width:100%;border-collapse:collapse;font-size:0.85em;font-variant-numeric:tabular-nums;margin-top:8px">
          <thead><tr style="color:var(--pubg-muted);font-size:0.85em">
            <th style="text-align:left;padding:4px 8px;border-bottom:1px solid rgba(255,255,255,0.1)">Map</th>
            <th style="text-align:right;padding:4px 8px;border-bottom:1px solid rgba(255,255,255,0.1)">Matches</th>
            <th style="text-align:right;padding:4px 8px;border-bottom:1px solid rgba(255,255,255,0.1)">Wins</th>
            <th style="text-align:right;padding:4px 8px;border-bottom:1px solid rgba(255,255,255,0.1)">K/D</th>
            <th style="text-align:right;padding:4px 8px;border-bottom:1px solid rgba(255,255,255,0.1)">Ø Kills</th>
            <th style="text-align:right;padding:4px 8px;border-bottom:1px solid rgba(255,255,255,0.1)">Ø DMG</th>
            <th style="text-align:right;padding:4px 8px;border-bottom:1px solid rgba(255,255,255,0.1)">Ø Place</th>
            <th style="text-align:right;padding:4px 8px;border-bottom:1px solid rgba(255,255,255,0.1)">Ø Surv</th>
          </tr></thead>
          <tbody>
            ${mp.map(m => `<tr ${m.wins?'style="color:var(--pubg-gold)"':''}>
              <td style="padding:4px 8px">${PubgUI.fmtMap(m.map)}</td>
              <td style="text-align:right;padding:4px 8px">${m.matches}</td>
              <td style="text-align:right;padding:4px 8px">${m.wins || '—'}</td>
              <td style="text-align:right;padding:4px 8px">${m.kd.toFixed(2)}</td>
              <td style="text-align:right;padding:4px 8px">${m.avgKills.toFixed(1)}</td>
              <td style="text-align:right;padding:4px 8px">${Math.round(m.avgDamage)}</td>
              <td style="text-align:right;padding:4px 8px">#${m.avgPlace.toFixed(1)}</td>
              <td style="text-align:right;padding:4px 8px">${fmtDuration(Math.round(m.avgSurvivedSec))}</td>
            </tr>`).join("")}
          </tbody>
        </table>` : "";

      const hl = d.highlights || [];
      const ll = d.lowlights || [];
      const highlightsHtml = (hl.length || ll.length) ? `
        <div class="highlights">
          <div class="col">
            <h3>★ Top-DMG matches</h3>
            ${hl.map(m => {
              const startIso = PubgUI.matchStartIso(m.matchEnd, m.durationSec);
              return `<div class="highlight-item">${PubgUI.fmtTime(startIso)} · ${PubgUI.fmtMap(m.map)} · <b>#${m.place}</b> · <b>${m.kills}</b>K · <b>${Math.round(m.damage)}</b>DMG</div>`;
            }).join("")}
          </div>
          <div class="col">
            <h3>✘ Early deaths</h3>
            ${ll.map(m => {
              const startIso = PubgUI.matchStartIso(m.matchEnd, m.durationSec);
              const surv = m.timeSurvived || 0;
              return `<div class="highlight-item">${PubgUI.fmtTime(startIso)} · ${PubgUI.fmtMap(m.map)} · #${m.place} after <b>${Math.floor(surv/60)}:${String(surv%60).padStart(2,"0")}</b></div>`;
            }).join("")}
          </div>
        </div>` : "";

      // Trend / Achievements / Streaks — extra Sektion mit eigenem Fetch
      const extrasPlaceholder = `<div class="extras-placeholder"></div>`;

      root.innerHTML = `
        <h1>After-Session Report</h1>
        <div class="subtitle">${subtitle}</div>
        ${totalsHtml}
        ${extrasPlaceholder}
        ${d.phases && d.phases.length ? '<h3 class="extras-h">Phases</h3>' : ''}
        ${phasesHtml}
        ${mapsHtml}
        ${highlightsHtml}
      `;

      renderExtras();
    }

    // Trend, Achievements und Streaks fetchen + in den Report einhängen.
    // Streaks werden client-seitig aus session-matches berechnet (matches
    // sind absteigend sortiert: neueste zuerst).
    async function renderExtras() {
      // Range an alle Extras durchreichen — sonst zeigen Trend/Achievements/
      // Streaks immer die aktuelle Session unabhängig von gewählter Phase.
      const fromTo = (FROM || TO)
        ? "?" + new URLSearchParams({
            ...(FROM ? {from: FROM} : {}),
            ...(TO   ? {to:   TO}   : {}),
          }).toString()
        : "";
      const matchesUrl = (FROM || TO)
        ? `/api/pubg/session-matches${fromTo}`
        : `/api/pubg/session-matches?range=session`;
      const [trend, achievements, matches] = await Promise.all([
        PubgUI.fetchJson(`/api/pubg/trend-deltas${fromTo}`).catch(() => null),
        PubgUI.fetchJson(`/api/pubg/session-achievements${fromTo}`).catch(() => []),
        PubgUI.fetchJson(matchesUrl).catch(() => []),
      ]);

      const placeholder = document.querySelector(".extras-placeholder");
      if (!placeholder) return;

      const arrow = (v) => v > 0.001 ? "↑" : (v < -0.001 ? "↓" : "·");
      const cls = (v) => v > 0.001 ? "delta-pos" : (v < -0.001 ? "delta-neg" : "delta-zero");

      let trendHtml = "";
      if (trend && trend.deltas && trend.current) {
        const d = trend.deltas;
        trendHtml = `
          <h3 class="extras-h">Trend vs. last session</h3>
          <div class="trend-grid">
            <div class="trend-cell">
              <div class="trend-label">K/D</div>
              <div class="trend-row"><span class="trend-val">${(trend.current.kd||0).toFixed(2)}</span>
                <span class="trend-delta ${cls(d.kd)}">${arrow(d.kd)}${Math.abs(d.kd).toFixed(2)}</span></div>
            </div>
            <div class="trend-cell">
              <div class="trend-label">Wins</div>
              <div class="trend-row"><span class="trend-val">${trend.current.wins||0}</span>
                <span class="trend-delta ${cls(d.wins)}">${arrow(d.wins)}${Math.abs(d.wins)}</span></div>
            </div>
            <div class="trend-cell">
              <div class="trend-label">Ø Damage</div>
              <div class="trend-row"><span class="trend-val">${Math.round(trend.current.avgDmg||0)}</span>
                <span class="trend-delta ${cls(d.avgDmg)}">${arrow(d.avgDmg)}${Math.round(Math.abs(d.avgDmg))}</span></div>
            </div>
            <div class="trend-cell">
              <div class="trend-label">Matches</div>
              <div class="trend-row"><span class="trend-val">${trend.current.matches||0}</span>
                <span class="trend-delta ${cls(d.matches)}">${arrow(d.matches)}${Math.abs(d.matches)}</span></div>
            </div>
          </div>`;
      }

      // Streaks aus session-matches berechnen — current = vom neuesten
      // Match rückwärts; best = längster Run im Range (chronologisch)
      const computeCurrent = (test) => {
        let n = 0;
        for (const m of (matches || [])) {
          if (test(m)) n++; else break;
        }
        return n;
      };
      const computeBest = (test) => {
        // matches kommt newest-first. Für best brauchen wir chrono ASC.
        const arr = (matches || []).slice().reverse();
        let run = 0, best = 0;
        for (const m of arr) {
          if (test(m)) { run++; if (run > best) best = run; }
          else run = 0;
        }
        return best;
      };
      const tests = {
        chicken: m => (m.place || 99) === 1,
        top10:   m => (m.place || 99) <= 10,
        kd1:     m => (m.kills || 0) >= 1,
        kd2:     m => (m.kills || 0) >= 2,
      };
      const chickenCur = computeCurrent(tests.chicken), chickenBest = computeBest(tests.chicken);
      const top10Cur   = computeCurrent(tests.top10),   top10Best   = computeBest(tests.top10);
      const kd1Cur     = computeCurrent(tests.kd1),     kd1Best     = computeBest(tests.kd1);
      const kd2Cur     = computeCurrent(tests.kd2),     kd2Best     = computeBest(tests.kd2);
      const streakItem = (label, cur, best) =>
        `<div class="streak-cell ${cur > 0 ? '' : 'cold'}">
           <span class="streak-num">${cur}</span>
           <span class="streak-label">${label}<br><span style="font-size:0.85em;opacity:0.7">best ${best}</span></span>
         </div>`;
      const streaksHtml = `
        <h3 class="extras-h">Streaks (current · best)</h3>
        <div class="streaks-grid">
          ${streakItem("Chicken (#1)", chickenCur, chickenBest)}
          ${streakItem("Top-10", top10Cur, top10Best)}
          ${streakItem("Kills ≥ 1", kd1Cur, kd1Best)}
          ${streakItem("Kills ≥ 2", kd2Cur, kd2Best)}
        </div>`;

      let achievementsHtml = "";
      if (achievements && achievements.length) {
        achievementsHtml = `
          <h3 class="extras-h">Achievements</h3>
          <div class="ach-list">
            ${achievements.map(a => `
              <div class="ach-item">
                <span class="ach-icon">${a.icon || ""}</span>
                <span class="ach-label">${a.label || a.id}</span>
                <span class="ach-when">${PubgUI.fmtTime(a.playedAt)}</span>
              </div>`).join("")}
          </div>`;
      }

      placeholder.innerHTML = trendHtml + streaksHtml + achievementsHtml;
    }

    // Click-Handler: Match-Zeile expandiert Squad-Detail
    document.addEventListener("click", (e) => {
      const row = e.target.closest(".m[data-idx]");
      if (!row) return;
      const idx = row.getAttribute("data-idx");
      const detail = document.querySelector(`[data-idx-detail="${idx}"]`);
      if (!detail) return;
      const wasExpanded = row.classList.contains("expanded");
      row.classList.toggle("expanded");
      detail.classList.toggle("show", !wasExpanded);
    });

    const reportUrl = "/api/pubg/session-report" +
      ((FROM || TO) ? "?" + new URLSearchParams({
        ...(FROM ? {from: FROM} : {}), ...(TO ? {to: TO} : {})
      }).toString() : "");
    PubgUI.poll(reportUrl, 60000, render, console.error);
  </script>
</body>
</html>
