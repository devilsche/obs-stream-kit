<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG After-Session Report</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      padding: 16px;
      background: linear-gradient(180deg, rgba(20,12,30,0.6), rgba(10,5,16,0.6));
    }
    .report { max-width: 900px; margin: 0 auto; padding: 22px 26px; }
    .report h1 {
      margin: 0 0 6px;
      color: var(--pubg-gold);
      font-size: 1.6em;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .report .subtitle { color: var(--pubg-muted); font-size: 0.9em; margin-bottom: 18px; }

    .totals {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }
    .totals .cell { display: flex; flex-direction: column; }
    .totals .cell .pubg-stat-value { font-size: 1.4em; }

    .phase {
      margin-bottom: 18px;
      padding: 14px 16px;
      background: rgba(94,42,121,0.12);
      border-left: 3px solid var(--pubg-purple);
      border-radius: 6px;
    }
    .phase h2 {
      margin: 0 0 4px;
      font-size: 1em;
      letter-spacing: 0.04em;
    }
    .phase h2 .num { color: var(--pubg-gold); margin-right: 8px; }
    .phase .squad {
      color: var(--pubg-muted);
      font-size: 0.85em;
      margin-bottom: 10px;
    }
    .phase .squad b { color: var(--pubg-text); }
    .phase-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 8px;
      font-size: 0.8em;
      margin-bottom: 10px;
    }
    .phase-stats span { color: var(--pubg-muted); }
    .phase-stats span b {
      color: var(--pubg-text);
      font-variant-numeric: tabular-nums;
      font-size: 1.15em;
      margin-right: 4px;
    }

    .matches-list {
      display: flex; flex-direction: column;
      gap: 4px;
      font-size: 0.78em;
      font-variant-numeric: tabular-nums;
    }
    .matches-list .m {
      display: grid;
      grid-template-columns: 240px 70px 1fr 130px;
      gap: 10px;
      padding: 6px 8px;
      border-radius: 3px;
      align-items: center;
      cursor: pointer;
      transition: background 0.15s;
    }
    .matches-list .m:hover { background: rgba(94, 42, 121, 0.18); }
    .matches-list .m.expanded { background: rgba(94, 42, 121, 0.25); }
    .matches-list .header-row {
      display: grid;
      grid-template-columns: 240px 70px 1fr 130px;
      gap: 10px;
      padding: 2px 8px 4px;
      font-size: 0.85em;
      color: var(--pubg-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px dashed rgba(255,255,255,0.1);
      margin-bottom: 4px;
    }
    /* Place-Spalte: # untereinander ausrichten — 🍗 als CSS-pseudo bei Win */
    .matches-list .m .place {
      font-variant-numeric: tabular-nums;
      position: relative;
      padding-left: 22px;
    }
    .matches-list .m.win .place::before {
      content: "🍗";
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
    }
    /* Stats-Spalte: 3 Zeilen untereinander */
    .matches-list .m .stats {
      display: flex;
      flex-direction: column;
      gap: 1px;
      text-align: right;
      font-size: 0.85em;
      color: var(--pubg-muted);
      line-height: 1.25;
    }
    .matches-list .m .stats b {
      color: var(--pubg-text);
      font-variant-numeric: tabular-nums;
    }
    .squad-detail {
      padding: 8px 14px 12px 28px;
      margin-bottom: 4px;
      background: rgba(94, 42, 121, 0.10);
      border-radius: 0 0 4px 4px;
      font-size: 0.78em;
      display: none;
    }
    .squad-detail.show { display: block; animation: pubg-fade-in 0.25s; }
    .squad-detail table {
      width: 100%;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
    }
    .squad-detail th, .squad-detail td {
      padding: 4px 8px;
      text-align: right;
    }
    .squad-detail th:first-child, .squad-detail td:first-child {
      text-align: left;
    }
    .squad-detail th {
      color: var(--pubg-muted);
      font-weight: 400;
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .squad-detail .self {
      color: var(--pubg-gold);
      font-weight: 700;
    }
    .squad-detail tr.win td { color: var(--pubg-gold); }
    .matches-list .time-range { color: var(--pubg-muted); }
    .matches-list .time-range b { color: var(--pubg-text); font-weight: 400; }
    .matches-list .m:hover { background: rgba(255,255,255,0.04); }
    .matches-list .m.win {
      background: rgba(242,183,5,0.15);
      border-left: 2px solid var(--pubg-gold);
    }
    .matches-list .m .time { color: var(--pubg-muted); }
    .matches-list .m .place { color: var(--pubg-gold); font-weight: 700; }
    .matches-list .m .map { color: var(--pubg-text); }
    .matches-list .m .stats { color: var(--pubg-muted); text-align: right; }
    .matches-list .m .stats b { color: var(--pubg-text); }

    .highlights {
      margin-top: 22px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .highlights .col h3 {
      margin: 0 0 8px;
      color: var(--pubg-muted);
      font-size: 0.8em;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .highlight-item {
      padding: 6px 10px;
      margin-bottom: 4px;
      font-size: 0.85em;
      border-radius: 3px;
      background: rgba(255,255,255,0.04);
    }
    .empty {
      text-align: center;
      color: var(--pubg-muted);
      padding: 40px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="pubg-card report pubg-fade-in" id="report">
    <div class="empty">— wird geladen —</div>
  </div>

  <script src="_pubg.js"></script>
  <script>
    PubgUI.buildFilter([]);

    function fmtDuration(secs) {
      if (!secs) return "0min";
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      return h ? `${h}h ${m}min` : `${m}min`;
    }

    function fmtSurv(secs) {
      const m = Math.floor((secs||0)/60);
      const s = (secs||0) % 60;
      return `${m}:${String(s).padStart(2,"0")}`;
    }

    function fmtSquadDetail(m) {
      // Du oben, dann Mates sortiert nach Damage absteigend
      const all = [m.myStats, ...(m.squad || [])];
      all.sort((a, b) => {
        if (a.isSelf) return -1;
        if (b.isSelf) return 1;
        return (b.damage_dealt || 0) - (a.damage_dealt || 0);
      });
      const isWin = m.place === 1;
      const rows = all.map(p => {
        const cls = (p.isSelf ? "self " : "") + (isWin ? "win" : "");
        const kd = (p.kills || 0);  // pro Match — nicht aggregierte K/D
        return `<tr class="${cls.trim()}">
          <td>${p.name}${p.isSelf ? " (du)" : ""}</td>
          <td>${p.kills || 0}</td>
          <td>${p.headshot_kills || 0}</td>
          <td>${p.assists || 0}</td>
          <td>${p.dbnos || 0}</td>
          <td>${Math.round(p.damage_dealt || 0)}</td>
          <td>${fmtSurv(p.time_survived)}</td>
        </tr>`;
      }).join("");
      return `
        <table>
          <thead><tr>
            <th>Squad</th><th>K</th><th>HS</th><th>Ass</th><th>DBNO</th><th>DMG</th><th>Survived</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function fmtMatchRow(m, idx) {
      const startIso = PubgUI.matchStartIso(m.matchEnd, m.durationSec);
      const mySurv = m.timeSurvived || 0;
      const squadSurv = m.squadTimeSurvived || mySurv;
      const isWin = m.place === 1;
      const squadOutIso = new Date(new Date(startIso).getTime() + squadSurv * 1000).toISOString();
      return `
        <div class="m ${isWin ? 'win' : ''}" data-idx="${idx}">
          <span class="time-range"><b>${PubgUI.fmtTime(startIso)}</b> → <b>${PubgUI.fmtTime(squadOutIso)}</b></span>
          <span class="place">#${m.place}</span>
          <span class="map">${PubgUI.fmtMap(m.map)}</span>
          <span class="stats">
            <span><b>${m.kills}</b> Kills</span>
            <span><b>${Math.round(m.damage||0)}</b> DMG</span>
            <span>meine <b>${fmtSurv(mySurv)}</b></span>
          </span>
        </div>
        <div class="squad-detail" data-idx-detail="${idx}">${fmtSquadDetail(m)}</div>`;
    }

    function render(d) {
      const root = document.getElementById("report");
      if (!d.totalMatches) {
        root.innerHTML = `<div class="empty">— noch keine Matches in der Session —</div>`;
        return;
      }
      const t = d.totals;
      const startIso = PubgUI.matchStartIso(t.startTime, 0);  // approx
      const subtitle = `${PubgUI.fmtDate(t.startTime)} · ${PubgUI.fmtTime(d.sessionStartedAt)} – ${PubgUI.fmtTime(t.endTime)} · ${fmtDuration(t.totalSurvivedSec)} aktiv gespielt`;

      const totalsHtml = `
        <div class="totals">
          <div class="cell"><span class="pubg-stat-value">${t.matches}</span><span class="pubg-stat-label">Matches</span></div>
          <div class="cell"><span class="pubg-stat-value">${t.wins}</span><span class="pubg-stat-label">🍗 Wins</span></div>
          <div class="cell"><span class="pubg-stat-value">${t.kills}</span><span class="pubg-stat-label">Kills</span></div>
          <div class="cell"><span class="pubg-stat-value">${PubgUI.fmtNum(Math.round(t.damage))}</span><span class="pubg-stat-label">Damage</span></div>
          <div class="cell"><span class="pubg-stat-value">${PubgUI.fmtKD(t.kd)}</span><span class="pubg-stat-label">K/D</span></div>
          <div class="cell"><span class="pubg-stat-value">#${t.avgPlace.toFixed(1)}</span><span class="pubg-stat-label">Avg Place</span></div>
          <div class="cell"><span class="pubg-stat-value">${t.headshots}</span><span class="pubg-stat-label">Headshots</span></div>
          <div class="cell"><span class="pubg-stat-value">${t.dbnos}</span><span class="pubg-stat-label">Knocks</span></div>
          <div class="cell"><span class="pubg-stat-value">${Math.round(t.longestKill)}m</span><span class="pubg-stat-label">Longest</span></div>
          <div class="cell"><span class="pubg-stat-value">${t.uniqueMaps}</span><span class="pubg-stat-label">Maps</span></div>
        </div>`;

      const phasesHtml = d.phases.map((ph, i) => {
        const s = ph.stats;
        const core = ph.coreSquad && ph.coreSquad.length
          ? ph.coreSquad.map(n => `<b>${n}</b>`).join(" + ")
          : "<i>Solo</i>";
        const fillersStr = (ph.fillers && ph.fillers.length)
          ? ` <span style="opacity:0.7">+ wechselnd: ${ph.fillers.join(", ")}</span>`
          : "";
        const startStr = PubgUI.fmtTime(s.startTime);
        const endStr = PubgUI.fmtTime(s.endTime);
        return `
          <div class="phase">
            <h2><span class="num">Phase ${i+1}</span> ${startStr} → ${endStr} · ${s.matches} ${s.matches===1?'Match':'Matches'}</h2>
            <div class="squad">Stamm: ${core}${fillersStr}</div>
            <div class="phase-stats">
              <span><b>${s.kills}</b>Kills</span>
              <span><b>${PubgUI.fmtNum(Math.round(s.damage))}</b>DMG</span>
              <span><b>${s.wins}</b>🍗</span>
              <span><b>${PubgUI.fmtKD(s.kd)}</b>K/D</span>
              <span><b>#${s.avgPlace.toFixed(1)}</b>Avg</span>
              <span><b>${fmtDuration(s.totalSurvivedSec)}</b>überlebt</span>
            </div>
            <div class="matches-list">
              <div class="header-row">
                <span>Squad im Match</span><span>Place</span><span>Map</span><span>Stats / meine Surv</span>
              </div>
              ${ph.matches.map((m, i) => fmtMatchRow(m, `${ph.coreSquad.join('-')}-${i}`)).join("")}
            </div>
          </div>`;
      }).join("");

      const hl = d.highlights || [];
      const ll = d.lowlights || [];
      const highlightsHtml = (hl.length || ll.length) ? `
        <div class="highlights">
          <div class="col">
            <h3>★ Top-DMG-Matches</h3>
            ${hl.map(m => {
              const startIso = PubgUI.matchStartIso(m.matchEnd, m.durationSec);
              return `<div class="highlight-item">${PubgUI.fmtTime(startIso)} · ${PubgUI.fmtMap(m.map)} · <b>#${m.place}</b> · <b>${m.kills}</b>K · <b>${Math.round(m.damage)}</b>DMG</div>`;
            }).join("")}
          </div>
          <div class="col">
            <h3>✘ Frühe Deaths</h3>
            ${ll.map(m => {
              const startIso = PubgUI.matchStartIso(m.matchEnd, m.durationSec);
              const surv = m.timeSurvived || 0;
              return `<div class="highlight-item">${PubgUI.fmtTime(startIso)} · ${PubgUI.fmtMap(m.map)} · #${m.place} nach <b>${Math.floor(surv/60)}:${String(surv%60).padStart(2,"0")}</b></div>`;
            }).join("")}
          </div>
        </div>` : "";

      root.innerHTML = `
        <h1>After-Session Report</h1>
        <div class="subtitle">${subtitle}</div>
        ${totalsHtml}
        ${phasesHtml}
        ${highlightsHtml}
      `;
    }

    // Click-Handler: Match-Zeile expandiert Squad-Detail
    document.addEventListener("click", (e) => {
      const row = e.target.closest(".m[data-idx]");
      if (!row) return;
      const idx = row.getAttribute("data-idx");
      const detail = document.querySelector(`[data-idx-detail="${idx}"]`);
      if (!detail) return;
      const wasExpanded = row.classList.contains("expanded");
      row.classList.toggle("expanded");
      detail.classList.toggle("show", !wasExpanded);
    });

    PubgUI.poll("/api/pubg/session-report", 60000, render, console.error);
  </script>
</body>
</html>
