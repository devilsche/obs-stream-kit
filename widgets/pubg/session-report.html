<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG After-Session Report</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      padding: 16px;
      background: linear-gradient(180deg, rgba(20,12,30,0.6), rgba(10,5,16,0.6));
    }
    .report { max-width: 1280px; margin: 0 auto; padding: 22px 32px; }
    .report h1 {
      margin: 0 0 6px;
      color: var(--pubg-gold);
      font-size: 1.6em;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .report .subtitle { color: var(--pubg-muted); font-size: 0.9em; margin-bottom: 18px; }

    .totals {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }
    .totals .cell { display: flex; flex-direction: column; }
    .totals .cell .pubg-stat-value { font-size: 1.4em; }

    .phase {
      margin-bottom: 18px;
      padding: 14px 16px;
      background: rgba(94,42,121,0.12);
      border-left: 3px solid var(--pubg-purple);
      border-radius: 6px;
    }
    .phase h2 {
      margin: 0 0 4px;
      font-size: 1em;
      letter-spacing: 0.04em;
    }
    .phase h2 .num { color: var(--pubg-gold); margin-right: 8px; }
    .phase .squad {
      color: var(--pubg-muted);
      font-size: 0.85em;
      margin-bottom: 10px;
    }
    .phase .squad b { color: var(--pubg-text); }
    .phase-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 10px 14px;
      margin-bottom: 12px;
    }
    .phase-stats span {
      display: flex;
      flex-direction: column;
      color: var(--pubg-muted);
      font-size: 0.7em;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.2;
    }
    .phase-stats span b {
      color: var(--pubg-text);
      font-variant-numeric: tabular-nums;
      font-size: 1.7em;
      letter-spacing: 0;
      text-transform: none;
      margin-bottom: 2px;
      line-height: 1.05;
    }

    .matches-list {
      display: flex; flex-direction: column;
      gap: 4px;
      font-size: 0.78em;
      font-variant-numeric: tabular-nums;
    }
    /* Match-Row: Spaltenbreiten so dass alles match-übergreifend bündig ist.
       Stats ist Sub-Grid mit fixen Spaltenbreiten — Werte untereinander
       zwischen Zeilen sichtbar. */
    .matches-list .m {
      display: grid;
      grid-template-columns: 240px 60px 1fr 80px 70px 70px 90px 90px;
      gap: 10px;
      padding: 6px 8px;
      border-radius: 3px;
      align-items: center;
      cursor: pointer;
      transition: background 0.15s;
    }
    .matches-list .m:hover { background: rgba(94, 42, 121, 0.18); }
    .matches-list .m.expanded { background: rgba(94, 42, 121, 0.25); }
    .matches-list .header-row {
      display: grid;
      grid-template-columns: 240px 60px 1fr 80px 70px 70px 90px 90px;
      gap: 10px;
      padding: 2px 8px 4px;
      font-size: 0.85em;
      color: var(--pubg-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px dashed rgba(255,255,255,0.1);
      margin-bottom: 4px;
    }
    /* Place-Spalte: # untereinander ausrichten — gold-Marker bei Win */
    .matches-list .m .place {
      font-variant-numeric: tabular-nums;
      position: relative;
      padding-left: 22px;
    }
    .matches-list .m.win .place::before {
      content: "★";
      color: var(--pubg-gold);
      font-weight: 700;
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
    }
    /* Stats-Spalten: rechtsbündig, fixe Breite, tabular-nums  */
    .bot-kills {
      color: var(--pubg-muted);
      font-size: 0.85em;
      font-weight: 400;
    }
    .matches-list .bot-teams {
      color: var(--pubg-muted);
    }
    .matches-list .bot-teams b {
      color: var(--pubg-text);
    }
    .matches-list .stat {
      text-align: right;
      font-size: 0.9em;
      color: var(--pubg-muted);
      font-variant-numeric: tabular-nums;
    }
    .matches-list .stat b {
      color: var(--pubg-text);
    }
    .squad-detail {
      padding: 8px 14px 12px 28px;
      margin-bottom: 4px;
      background: rgba(94, 42, 121, 0.10);
      border-radius: 0 0 4px 4px;
      font-size: 0.95em;
      display: none;
    }
    .squad-detail.show { display: block; animation: pubg-fade-in 0.25s; }
    .squad-detail .detail-row {
      display: flex;
      flex-direction: row;
      gap: 16px;
      align-items: flex-start;
    }
    .squad-detail .detail-row > .squad-table-wrap { flex: 1; min-width: 0; }
    /* Event-Detail-Panel (PAYDAY/Heist) — ersetzt die Mini-Map in Events */
    .event-detail {
      width: 260px;
      flex: none;
      background: rgba(13,6,26,0.6);
      border: 1px solid rgba(216,180,255,0.35);
      border-radius: 6px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .event-detail-empty {
      color: var(--pubg-muted);
      font-size: 0.8em;
      text-align: center;
      padding: 14px;
      font-style: italic;
    }
    .event-detail-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5px;
    }
    .event-stat {
      padding: 5px 7px;
      background: rgba(216,180,255,0.10);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      gap: 1px;
      text-align: center;
    }
    .event-stat .v {
      color: #e0c8ff;
      font-size: 1.1em;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .event-stat .l {
      color: var(--pubg-muted);
      font-size: 0.66em;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .event-detail-loot {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .squad-detail table {
      width: 100%;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
    }
    .squad-detail th, .squad-detail td {
      padding: 4px 8px;
      text-align: right;
    }
    .squad-detail th:first-child, .squad-detail td:first-child {
      text-align: left;
    }
    .squad-detail th {
      color: var(--pubg-muted);
      font-weight: 400;
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .squad-detail .self {
      color: var(--pubg-gold);
      font-weight: 700;
    }
    .squad-detail tr.win td { color: var(--pubg-gold); }
    /* Special-Event-Badges (Vehicle-Kill etc.) — aufklappbar */
    .squad-detail .name-cell { white-space: nowrap; vertical-align: top; }
    .sd-row-wrap { display: inline-flex; gap: 4px; margin-left: 6px; }
    details.sd { display: inline-block; vertical-align: middle; }
    details.sd > summary {
      list-style: none; cursor: pointer;
      display: inline-flex; align-items: center; gap: 3px;
      padding: 1px 5px;
      background: rgba(13,6,26,0.45);
      border: 1px solid var(--pubg-border);
      border-radius: 3px;
      font-size: 0.78em;
      color: var(--pubg-muted);
    }
    details.sd[open] > summary {
      border-color: var(--pubg-gold);
      color: var(--pubg-gold);
    }
    details.sd > summary::-webkit-details-marker { display: none; }
    details.sd .sd-icon.veh { height: 16px; max-width: 24px; object-fit: contain; }
    details.sd .sd-emoji { font-size: 0.95em; line-height: 1; }
    details.sd .sd-cnt { font-variant-numeric: tabular-nums; }
    details.sd .sd-body {
      display: block;
      margin-top: 4px;
      padding: 6px 8px;
      background: rgba(13,6,26,0.7);
      border: 1px solid var(--pubg-border);
      border-radius: 4px;
      font-size: 0.85em;
      min-width: 220px;
    }
    details.sd .sd-row {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    details.sd .sd-row:last-child { border-bottom: 0; }
    details.sd .sd-w { color: var(--pubg-text); font-weight: 600; }
    details.sd .sd-opp { color: var(--pubg-muted); }
    details.sd .sd-opp b { color: var(--pubg-text); }
    details.sd .sd-poi { color: var(--pubg-gold); }
    details.sd .sd-dist {
      color: var(--pubg-muted);
      font-variant-numeric: tabular-nums;
      margin-left: auto;
    }
    /* Match-Detail v2 — Two-Canvas 300x300 + Scrub-Bar + Cards-Col */
    .md-host {
      flex: 1;
      min-width: 0;
    }
    .md-grid {
      display: grid;
      /* Linke Spalte = Map-Breite (360px) + ~14px Border/Padding */
      grid-template-columns: 374px 1fr;
      gap: 14px;
      align-items: start;
    }
    .md-mapcol { display: flex; flex-direction: column; gap: 6px; }
    .md-rightcol { display: flex; flex-direction: column; gap: 10px; min-width: 0; }
    .md-rightcol .squad-table-wrap { max-height: 220px; overflow-y: auto; }
    .md-matchid {
      font-family: ui-monospace, "Cascadia Mono", monospace;
      font-size: 0.72em;
      color: var(--pubg-muted, #8a7d99);
      background: rgba(94,42,121,0.15);
      border: 1px solid rgba(94,42,121,0.35);
      border-radius: 3px;
      padding: 4px 8px;
      cursor: pointer;
      user-select: all;
      word-break: break-all;
    }
    .md-matchid:hover { background: rgba(94,42,121,0.25); }
    .md-mapwrap {
      position: relative;
      width: 360px; height: 360px;
      margin: 0;
      background: #0d061a;
      border: 1px solid var(--pubg-border);
      border-radius: 6px;
      overflow: hidden;
      user-select: none;
    }
    .md-mapwrap canvas {
      position: absolute; inset: 0;
      width: 360px; height: 360px; display: block;
    }
    .md-mapwrap canvas.md-overlay { pointer-events: none; }
    .md-mapwrap .md-zoombtns {
      position: absolute; top: 6px; right: 6px;
      display: flex; flex-direction: column; gap: 3px;
      z-index: 5;
    }
    .md-zoombtns button {
      width: 22px; height: 22px;
      background: rgba(13,6,26,0.85);
      border: 1px solid var(--pubg-border);
      color: var(--pubg-gold);
      font-size: 13px; line-height: 18px; text-align: center;
      border-radius: 3px; cursor: pointer; padding: 0;
    }
    .md-zoombtns button:hover { border-color: var(--pubg-gold); }
    .md-mapwrap .md-hover-label {
      position: absolute;
      background: rgba(13,6,26,0.92);
      color: var(--pubg-gold);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.78em;
      pointer-events: none;
      white-space: nowrap;
      z-index: 6;
      display: none;
    }
    .md-mapwrap .md-hover-label.show { display: block; }
    /* Scrub-Bar */
    .md-scrub {
      display: flex; gap: 6px; align-items: center;
      padding: 4px 6px;
      background: rgba(13,6,26,0.55);
      border: 1px solid var(--pubg-border);
      border-radius: 4px;
      font-size: 0.8em;
      color: var(--pubg-muted);
    }
    .md-scrub button {
      background: rgba(242,183,5,0.12);
      border: 1px solid rgba(242,183,5,0.4);
      color: var(--pubg-gold);
      padding: 2px 8px;
      border-radius: 3px;
      font-family: inherit; cursor: pointer; font-size: 0.95em;
    }
    .md-scrub button:hover { background: rgba(242,183,5,0.22); }
    .md-scrub input[type=range] {
      flex: 1; cursor: pointer;
      accent-color: var(--pubg-gold);
    }
    .md-scrub .md-time {
      font-variant-numeric: tabular-nums;
      min-width: 90px; text-align: right;
      color: var(--pubg-text);
    }
    .md-speedbar { display: flex; gap: 4px; }
    .md-speedbtn {
      flex: 1;
      background: rgba(13,6,26,0.5);
      border: 1px solid var(--pubg-border);
      color: var(--pubg-muted);
      padding: 2px 0;
      border-radius: 3px;
      font-family: inherit; cursor: pointer; font-size: 0.78em;
      font-variant-numeric: tabular-nums;
    }
    .md-speedbtn:hover { color: var(--pubg-text); border-color: var(--pubg-gold); }
    .md-speedbtn.active {
      background: rgba(242,183,5,0.18);
      border-color: var(--pubg-gold);
      color: var(--pubg-gold);
    }
    /* Cards-Col */
    .md-cardcol { display: flex; flex-direction: column; gap: 8px; }
    .md-allebar {
      display: flex; align-items: center; gap: 8px;
    }
    .md-allebtn {
      background: rgba(242,183,5,0.16);
      border: 1px solid var(--pubg-gold);
      color: var(--pubg-gold);
      padding: 5px 14px;
      border-radius: 4px;
      font-family: inherit; font-weight: 700;
      font-size: 0.9em; cursor: pointer;
    }
    .md-allebtn:hover { background: var(--pubg-gold); color: #1a0d2a; }
    .md-allebtn.solo-active { background: var(--pubg-gold); color: #1a0d2a; }
    .md-cards { display: flex; flex-direction: column; gap: 6px; }
    .md-card {
      background: rgba(94,42,121,0.18);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 5px;
      padding: 8px 10px;
      font-size: 0.9em;
      line-height: 1.45;
      color: var(--pubg-text);
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .md-card:hover { background: rgba(255,255,255,0.04); }
    .md-card.hidden {
      opacity: 0.35;
      filter: grayscale(0.5);
    }
    .md-card.hidden .md-name { text-decoration: line-through; }
    .md-card .md-head {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 4px;
    }
    .md-card .md-dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.4);
      flex-shrink: 0;
    }
    .md-card .md-name { font-weight: 700; }
    .md-card.md-self .md-name { color: var(--pubg-gold); }
    .md-card .md-badge {
      margin-left: auto; padding: 1px 6px;
      background: rgba(0,0,0,0.3);
      font-size: 0.82em; border-radius: 3px;
      color: var(--pubg-muted);
    }
    .md-card .md-badge.alive { color: var(--pubg-gold); }
    .md-card .md-badge.died  { color: #e57b7b; }
    .md-card .md-life { padding-left: 4px; font-size: 0.93em; color: var(--pubg-muted); }
    .md-card .md-life b { color: var(--pubg-text); }
    .md-card .md-life .md-died { color: #e57b7b; }
    .md-card .md-life .md-veh {
      color: var(--pubg-muted);
      font-size: 0.92em;
    }
    .md-card .md-life .md-veh b { color: var(--pubg-gold); font-weight: 700; }
    .md-card .md-life .md-veh .material-symbols-outlined {
      color: var(--pubg-gold);
      vertical-align: -3px;
    }
    .md-card .md-empty { font-style: italic; opacity: 0.6; }
    .md-warning {
      background: rgba(229,123,123,0.12);
      border: 1px solid rgba(229,123,123,0.4);
      color: #e57b7b;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 0.82em;
      line-height: 1.45;
    }
    .matches-list .time-range { color: var(--pubg-muted); }
    .matches-list .time-range b { color: var(--pubg-text); font-weight: 400; }
    .matches-list .m:hover { background: rgba(255,255,255,0.04); }
    .matches-list .m.is-event {
      opacity: 0.6;
      background: rgba(50, 50, 60, 0.18);
    }
    .matches-list .m.is-event .stat b,
    .matches-list .m.is-event .map { color: var(--pubg-muted); }
    /* Event-Badge MUSS nach .m .place stehen (Specificity-Tie, last
       wins). Sonst zieht die globale .place { color:gold } und der
       EVENT-Text ist gold-auf-lila → unlesbar. */
    .matches-list .m.win {
      background: rgba(242,183,5,0.15);
      border-left: 2px solid var(--pubg-gold);
    }
    .matches-list .m .num {
      color: var(--pubg-muted);
      font-size: 0.78em;
      opacity: 0.55;
      font-variant-numeric: tabular-nums;
    }
    .matches-list .m .time { color: var(--pubg-muted); }
    .matches-list .m .place { color: var(--pubg-gold); font-weight: 700; }
    /* Event-Badge ueberschreibt die gold-Farbe (nach .m .place damit
       Specificity-Tie hier last-wins gewinnt). */
    .matches-list .m .place.event-badge {
      color: #1a0d2a;
      background: #d8b4ff;
      padding: 0 5px;
      border-radius: 3px;
      font-weight: 700;
      font-size: 0.78em;
      letter-spacing: 0.08em;
      text-align: center;
      padding-left: 5px;
    }
    .matches-list .m .map { color: var(--pubg-text); }
    .matches-list .m .stats { color: var(--pubg-muted); text-align: right; }
    .matches-list .m .stats b { color: var(--pubg-text); }
    .hot-drop-badge {
      display: inline-block;
      margin-left: 6px;
      font-size: 0.9em;
      line-height: 1;
      vertical-align: middle;
    }
    .hot-drop-badge:empty { display: none; }
    .hot-drop-badge.hot {
      filter: none;
    }
    .hot-drop-badge.died {
      filter: grayscale(1);
      opacity: 0.55;
    }
    .hot-drop-badge.hot[title],
    .hot-drop-badge.died[title] {
      cursor: help;
    }

    /* Trend / Streaks / Achievements im Report */
    .extras-h {
      margin: 24px 0 8px;
      color: var(--pubg-muted);
      font-size: 0.8em;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .vehicle-events { font-size: 0.9em; }
    .ve-member { margin-bottom: 8px; }
    .ve-name { color: var(--pubg-text); font-weight: 700; margin-bottom: 3px; }
    details.ve { margin-left: 8px; }
    details.ve > summary {
      cursor: pointer; list-style: none;
      padding: 3px 6px;
      color: var(--pubg-muted);
      border-left: 2px solid var(--pubg-border);
      transition: border-color 0.12s;
    }
    details.ve[open] > summary { border-left-color: var(--pubg-gold); color: var(--pubg-gold); }
    details.ve > summary::-webkit-details-marker { display: none; }
    .ve-row {
      display: grid;
      grid-template-columns: 110px 130px 1fr auto auto;
      gap: 8px;
      padding: 3px 6px 3px 22px;
      font-size: 0.92em;
      color: var(--pubg-muted);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .ve-row:last-child { border-bottom: 0; }
    .ve-t { color: var(--pubg-text); font-variant-numeric: tabular-nums; }
    .ve-tsub {
      color: var(--pubg-muted); font-size: 0.82em;
      font-variant-numeric: tabular-nums;
      margin-left: 3px;
    }
    .ve-match-head {
      margin: 8px 0 4px;
      padding: 4px 10px 4px 22px;
      color: var(--pubg-gold);
      font-size: 0.82em;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 700;
      border-left: 2px solid var(--pubg-gold);
      background: rgba(242, 183, 5, 0.06);
    }
    .ve-match-head:first-child { margin-top: 2px; }
    .ve-veh { color: var(--pubg-text); }
    .ve-poi { color: var(--pubg-gold); }
    .ve-act b { color: var(--pubg-text); }
    .ve-kind {
      color: var(--pubg-muted);
      font-size: 0.78em;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .trend-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }
    .trend-cell {
      padding: 10px 12px;
      border-radius: 6px;
      background: rgba(94, 42, 121, 0.18);
      border: 1px solid var(--pubg-border);
    }
    .trend-label {
      color: var(--pubg-muted);
      font-size: 0.75em;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .trend-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-top: 4px;
    }
    .trend-val {
      font-size: 1.4em;
      font-weight: 700;
      color: var(--pubg-text);
      font-variant-numeric: tabular-nums;
    }
    .trend-delta {
      font-weight: 700;
      font-size: 0.95em;
      font-variant-numeric: tabular-nums;
    }
    .delta-pos { color: #7be57b; }
    .delta-neg { color: #e57b7b; }
    .delta-zero { color: var(--pubg-muted); }
    .streaks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }
    .streak-cell {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 6px;
      background: rgba(94, 42, 121, 0.18);
      border: 1px solid var(--pubg-border);
    }

<body>
  <div class="range-picker">
    <label>From</label>
    <input type="date" id="dateFrom">
    <input type="time" id="timeFrom" value="00:00" step="60">
    <label>To</label>
    <input type="date" id="dateTo">
    <input type="time" id="timeTo" value="23:59" step="60">
    <button class="apply" id="applyRange">Apply</button>
    <div class="presets">
      <button class="preset" data-preset="current">▶ Current</button>
      <button class="preset" data-preset="today">Today</button>
      <button class="preset" data-preset="yesterday">Yesterday</button>
      <button class="preset" data-preset="last7">Last 7 days</button>
      <button class="preset" data-preset="all">All (DB)</button>
    </div>
  </div>
  <div id="picker" class="session-picker" style="display:none"></div>
  <div class="pubg-card report pubg-fade-in" id="report">
    <div class="empty">— wird geladen —</div>
  </div>

  <script src="_pubg.js"></script>
  <script src="_pubg_pois.js"></script>
  <script>
    const FROM = PubgUI.qs("from", "");
    const TO = PubgUI.qs("to", "");

    // ── Match-Detail v2 Globals ──────────────────────────────────────────
    // Fallback-Palette wenn kein Slot bekannt ist (alte Matches vor der
    // Slot-Capture-Migration). Reihenfolge irrelevant fuer Lesbarkeit.
    const MD_COLORS = [
      "#f2b705", "#e74c3c", "#3498db", "#2ecc71",
      "#ff7a1f", "#9b59b6", "#1abc9c", "#ec407a",
    ];
    // PUBG-In-Game Squad-Plate-Farben — index = slot-1 (Roster-Slot 1..4).
    // Reihenfolge per User-Vorgabe: Slot 1 gelb, 2 rot/orange, 3 blau, 4 grün.
    const MD_SLOT_COLORS = [
      "#f2b705",  // Slot 1 — gelb (PUBG-Gold)
      "#ff5a3d",  // Slot 2 — rot/orange
      "#4ec9ff",  // Slot 3 — blau
      "#3dd668",  // Slot 4 — grün
    ];
    // Canvas-Display-Size (px). devicePixelRatio wird in mdRenderBasemap
    // separat angewendet, damit das Bitmap-Buffer hoeher aufgeloest ist
    // als die CSS-Box — fuer scharfe HD-Maps auch auf Retina-Screens.
    const MD_MAP_PX = 360;
    const MD_PAD_500M_CM = 50000;   // 500m padding fuer Default-Bbox
    const MD_MIN_ZOOM_CM = 5000;    // 50m minimal sichtbarer Radius
    const MD_MAX_ZOOM_CM = 800000;  // 8km — ganze Map default Erangel-Range
    // 1x = 1 Match-Sekunde pro Real-Sekunde. 4x = 4 Match-Sekunden pro Real-Sekunde.
    // (frueher: ganzes Match in 60s — match-laengen-abhaengig, verwirrend.)
    const MD_SPEEDS = [1, 2, 4, 8, 16];
    const MD_DEFAULT_SPEED = 4;

    // Cache fuer match-detail responses
    const _mdCache = new Map();
    async function mdLoad(matchId) {
      if (!matchId) return null;
      if (_mdCache.has(matchId)) return _mdCache.get(matchId);
      let d = null;
      try {
        d = await PubgUI.fetchJson(
          (window.__SERVE_BASE__||"/") + `api/pubg/match-detail?matchId=${encodeURIComponent(matchId)}`,
          60000);
      } catch (e) { console.warn("mdLoad failed", matchId, e); }
      // Wenn die Anfrage fehlschlug, NICHT cachen — sonst friert ein
      // einmaliger Timeout das Match permanent ein.
      if (!d) return { detail: null, colorByAcc: {} };
      const colorByAcc = {};
      if (d.members) {
        d.members.forEach((m, i) => {
          // Slot-basierte PUBG-Plate-Farbe wenn verfuegbar (neue Matches),
          // sonst MD_COLORS-Fallback (alte Matches ohne slot).
          const slot = m.slot;
          colorByAcc[m.accountId] = (slot >= 1 && slot <= MD_SLOT_COLORS.length)
            ? MD_SLOT_COLORS[slot - 1]
            : MD_COLORS[i % MD_COLORS.length];
        });
      }
      const cached = { detail: d, colorByAcc };
      _mdCache.set(matchId, cached);
      return cached;
    }

    // Map-Image-Cache: _hd.webp zuerst (8192px webp, ~6-13MB) — gleiche
    // Aufloesung wie das High_Res-PNG aber 10x kleiner. .png als Fallback
    // wenn _hd.webp fuer eine Map noch nicht erzeugt wurde.
    const _mdImgCache = new Map();
    function mdMapImage(mapName) {
      if (!mapName) return Promise.resolve(null);
      if (_mdImgCache.has(mapName)) return _mdImgCache.get(mapName);
      const p = new Promise((res) => {
        const img = new Image();
        img.onload = () => res(img);
        img.onerror = () => {
          const img2 = new Image();
          img2.onload = () => res(img2);
          img2.onerror = () => res(null);
          img2.src = `${window.__STATIC_BASE__||"/widgets/"}pubg/maps/${mapName}.png`;
        };
        img.src = `${window.__STATIC_BASE__||"/widgets/"}pubg/maps/${mapName}_hd.webp`;
      });
      _mdImgCache.set(mapName, p);
      return p;
    }

    // Pin-Calibration (identisch poi-editor.html)
    function mdApplyPinCal(xCm, yCm, mapKm, cal) {
      if (!cal) return [xCm, yCm];
      const mc = mapKm * 100000 / 2;
      let x = xCm, y = yCm;
      if (cal.flipX) x = 2 * mc - x;
      if (cal.flipY) y = 2 * mc - y;
      const rot = ((cal.rotate || 0) % 360 + 360) % 360;
      if (rot !== 0) {
        const dx = x - mc, dy = y - mc;
        if (rot === 90)  { x = mc - dy; y = mc + dx; }
        if (rot === 180) { x = mc - dx; y = mc - dy; }
        if (rot === 270) { x = mc + dy; y = mc - dx; }
      }
      const ex = (x - mc) * (cal.scaleX || 1) + mc + (cal.offsetX || 0);
      const ey = (y - mc) * (cal.scaleY || 1) + mc + (cal.offsetY || 0);
      return [ex, ey];
    }

    // State pro Host (DOM-Element) als WeakMap
    const _mdState = new WeakMap();
    function mdGetState(host) {
      let s = _mdState.get(host);
      if (!s) {
        s = {
          detail: null,           // match-detail-response
          colorByAcc: {},
          hiddenAccs: new Set(),   // accountIds die ausgeblendet sind
          viewport: null,          // {centerX, centerY, zoom, autoFollow}
          playSpeed: MD_DEFAULT_SPEED,  // Multiplikator (siehe MD_SPEEDS)
          zeitraffer: {            // cursorTs in ms relativ zu matchStart
            cursorTs: 0, playing: false,
            playStartWallTs: 0, playStartCursor: 0,
            matchStart: 0, matchEnd: 0,
          },
          hoveredMarker: null,
          playToken: 0,
          dragPan: null,            // {startX, startY, startCenterX, startCenterY}
        };
        _mdState.set(host, s);
      }
      return s;
    }

    // Cm-zu-Canvas-Pixel umrechnen anhand Viewport + Calibration
    function mdCmToCanvas(host, xCm, yCm) {
      const s = mdGetState(host);
      const vp = s.viewport;
      if (!vp) return [0, 0];
      const mapKm = parseFloat(host.dataset.mapKm) || 8;
      let cal = {};
      try { cal = JSON.parse(host.dataset.cal || "{}"); } catch (e) {}
      const [ex, ey] = mdApplyPinCal(xCm, yCm, mapKm, cal);
      // Viewport.zoom = Pixel pro cm
      const px = (MD_MAP_PX / 2) + (ex - vp.centerX) * vp.zoom;
      const py = (MD_MAP_PX / 2) + (ey - vp.centerY) * vp.zoom;
      return [px, py];
    }

    // Inverse: Canvas-Pixel → cm (fuer Click-Hit-Testing)
    function mdCanvasToCm(host, px, py) {
      const s = mdGetState(host);
      const vp = s.viewport;
      if (!vp) return [0, 0];
      return [
        vp.centerX + (px - MD_MAP_PX / 2) / vp.zoom,
        vp.centerY + (py - MD_MAP_PX / 2) / vp.zoom,
      ];
    }

    // Bbox aus Liste von [x, y] cm-Coords + Padding
    function mdBboxFitViewport(coords, paddingCm) {
      if (!coords.length) {
        return { centerX: 400000, centerY: 400000, zoom: MD_MAP_PX / 800000,
                  autoFollow: true };
      }
      let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
      for (const [x, y] of coords) {
        if (x < x0) x0 = x; if (y < y0) y0 = y;
        if (x > x1) x1 = x; if (y > y1) y1 = y;
      }
      const cx = (x0 + x1) / 2;
      const cy = (y0 + y1) / 2;
      const w = Math.max(MD_PAD_500M_CM * 2,
                          (x1 - x0) + 2 * paddingCm,
                          (y1 - y0) + 2 * paddingCm);
      return {
        centerX: cx, centerY: cy,
        zoom: MD_MAP_PX / w,
        autoFollow: true,
      };
    }

    async function mdRenderBasemap(host) {
      const canvas = host.querySelector("canvas.md-basemap");
      if (!canvas) return;
      const mapName = host.getAttribute("data-map");
      const blob = (window._poiData || {})[mapName] || {};
      const mapKm = blob.mapKm || 8;
      const cal = blob.pinCalibration || {};
      host.dataset.mapKm = mapKm;
      host.dataset.cal = JSON.stringify(cal);

      // Bitmap-Buffer immer 2x CSS-Size (mit DPR-Boost auf Retina) →
      // HD-Webp Source nutzt Aufloesung, statt downscaled darzustellen.
      const dpr = Math.max(2, Math.min(3, window.devicePixelRatio || 1));
      const BUF = Math.round(MD_MAP_PX * dpr);
      canvas.width = BUF; canvas.height = BUF;
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ctx.fillStyle = "#0d061a";
      ctx.fillRect(0, 0, BUF, BUF);

      const img = await mdMapImage(mapName);
      if (!img || !img.naturalWidth) return;

      const s = mdGetState(host);
      const vp = s.viewport;
      if (!vp) return;

      // Quell-Region berechnen: Viewport in Map-cm → in Bild-pixel
      const side = Math.min(img.naturalWidth, img.naturalHeight);
      const cropOffX = (img.naturalWidth  - side) / 2;
      const cropOffY = (img.naturalHeight - side) / 2;
      const mapCm = mapKm * 100000;

      // Welche cm-Region wollen wir zeichnen? Viewport: centerX +/- (150/zoom) cm
      const halfVisibleCm = (MD_MAP_PX / 2) / vp.zoom;
      let cmX0 = vp.centerX - halfVisibleCm;
      let cmY0 = vp.centerY - halfVisibleCm;
      let cmX1 = vp.centerX + halfVisibleCm;
      let cmY1 = vp.centerY + halfVisibleCm;

      // cm → Bild-Pixel: (cm / mapCm) * side + cropOff
      function cmToImg(cm, axis) {
        return (cm / mapCm) * side + (axis === "x" ? cropOffX : cropOffY);
      }
      const sx = cmToImg(cmX0, "x");
      const sy = cmToImg(cmY0, "y");
      const sw = ((cmX1 - cmX0) / mapCm) * side;
      const sh = ((cmY1 - cmY0) / mapCm) * side;

      // Clamping wenn Viewport ueber Karten-Rand geht — pad mit Hintergrund
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, BUF, BUF);
    }

    function mdRenderOverlay(host) {
      const canvas = host.querySelector("canvas.md-overlay");
      if (!canvas) return;
      // Buffer auf DPR skalieren + ctx.scale damit unsere Zeichen-
      // koordinaten weiter in CSS-Pixeln (0..MD_MAP_PX) liegen.
      const dpr = Math.max(2, Math.min(3, window.devicePixelRatio || 1));
      const BUF = Math.round(MD_MAP_PX * dpr);
      canvas.width = BUF; canvas.height = BUF;
      const ctx = canvas.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, MD_MAP_PX, MD_MAP_PX);

      const s = mdGetState(host);
      if (!s.detail || !s.detail.members) return;
      const cursorTs = s.zeitraffer.cursorTs;
      const matchStart = s.zeitraffer.matchStart;
      const absTs = matchStart + cursorTs;
      const inDefault = (cursorTs === 0);
      const visibleMembers = s.detail.members.filter(
        m => !s.hiddenAccs.has(m.accountId));

      for (const m of visibleMembers) {
        const color = s.colorByAcc[m.accountId] || "#999";
        if (!m.lives) continue;
        for (const life of m.lives) {
          const planeStartTs = life.planeRoute.length
            ? life.planeRoute[0][2] : null;
          const landingTs = life.landing ? life.landing.tsMs : null;
          const showPlaneRoute = inDefault
            || (landingTs && absTs <= landingTs && planeStartTs && absTs >= planeStartTs);
          if (showPlaneRoute && life.planeRoute.length >= 2) {
            ctx.strokeStyle = color;
            ctx.globalAlpha = 0.6;
            ctx.setLineDash([4, 4]);
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            life.planeRoute.forEach(([xCm, yCm], i) => {
              const [cx, cy] = mdCmToCanvas(host, xCm, yCm);
              if (i === 0) ctx.moveTo(cx, cy); else ctx.lineTo(cx, cy);
            });
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.globalAlpha = 1;
          }

          // Landing-Pin (sobald cursor >= landing-ts oder im Default)
          const showLanding = inDefault
            || (landingTs && absTs >= landingTs);
          if (showLanding && life.landing) {
            const [cx, cy] = mdCmToCanvas(host, life.landing.x, life.landing.y);
            ctx.beginPath();
            ctx.arc(cx, cy, 3.5, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.9)";
            ctx.lineWidth = 0.75;
            ctx.stroke();
          }

          // groundPath als Trail bis cursor (nicht im Default-View) —
          // interpoliert das letzte Segment damit das Wegende GLEICHMAESSIG
          // mit dem Pin mitwandert (sonst springt der Weg in 10s-Stufen).
          if (!inDefault && landingTs && life.groundPath.length >= 2) {
            const trailEnd = life.death
              ? Math.min(absTs, life.death.tsMs)
              : absTs;
            if (trailEnd > landingTs) {
              ctx.strokeStyle = color;
              ctx.globalAlpha = 0.7;
              ctx.lineWidth = 1.5;
              ctx.beginPath();
              let started = false;
              let lastDrawnIdx = -1;
              for (let i = 0; i < life.groundPath.length; i++) {
                const [xCm, yCm, ts] = life.groundPath[i];
                if (ts > trailEnd) break;
                const [cx, cy] = mdCmToCanvas(host, xCm, yCm);
                if (!started) { ctx.moveTo(cx, cy); started = true; }
                else { ctx.lineTo(cx, cy); }
                lastDrawnIdx = i;
              }
              // Interpoliertes letztes Segment: zwischen lastDrawn und naechstem Sample
              if (started && lastDrawnIdx >= 0
                  && lastDrawnIdx < life.groundPath.length - 1) {
                const [, , tsA] = life.groundPath[lastDrawnIdx];
                const [xB, yB, tsB] = life.groundPath[lastDrawnIdx + 1];
                if (tsB > tsA && trailEnd > tsA) {
                  const f = Math.min(1, (trailEnd - tsA) / (tsB - tsA));
                  const [xA, yA] = life.groundPath[lastDrawnIdx];
                  const ix = xA + (xB - xA) * f;
                  const iy = yA + (yB - yA) * f;
                  const [icx, icy] = mdCmToCanvas(host, ix, iy);
                  ctx.lineTo(icx, icy);
                }
              }
              ctx.stroke();
              ctx.globalAlpha = 1;
            }
          }

          // Crawl-Path nach Knock (gekrochener Weg zwischen DBNO und Tod) —
          // gestrichelt in heller Member-Farbe. Letztes Segment interpoliert.
          if (!inDefault && life.death && life.death.knockTsMs
              && life.death.crawl && life.death.crawl.length >= 2) {
            const knockTs = life.death.knockTsMs;
            const trailEnd = Math.min(absTs, life.death.tsMs);
            if (trailEnd > knockTs) {
              ctx.strokeStyle = color;
              ctx.globalAlpha = 0.55;
              ctx.lineWidth = 1.5;
              ctx.setLineDash([3, 3]);
              ctx.beginPath();
              let started = false;
              let lastIdx = -1;
              for (let i = 0; i < life.death.crawl.length; i++) {
                const [xCm, yCm, ts] = life.death.crawl[i];
                if (ts > trailEnd) break;
                const [cx, cy] = mdCmToCanvas(host, xCm, yCm);
                if (!started) { ctx.moveTo(cx, cy); started = true; }
                else { ctx.lineTo(cx, cy); }
                lastIdx = i;
              }
              if (started && lastIdx >= 0 && lastIdx < life.death.crawl.length - 1) {
                const [xA, yA, tsA] = life.death.crawl[lastIdx];
                const [xB, yB, tsB] = life.death.crawl[lastIdx + 1];
                if (tsB > tsA && trailEnd > tsA) {
                  const f = Math.min(1, (trailEnd - tsA) / (tsB - tsA));
                  const ix = xA + (xB - xA) * f;
                  const iy = yA + (yB - yA) * f;
                  const [icx, icy] = mdCmToCanvas(host, ix, iy);
                  ctx.lineTo(icx, icy);
                }
              }
              ctx.stroke();
              ctx.setLineDash([]);
              ctx.globalAlpha = 1;
            }
          }

          // Death-Pin (sobald cursor >= death-ts)
          if (!inDefault && life.death && absTs >= life.death.tsMs) {
            const [cx, cy] = mdCmToCanvas(host, life.death.x, life.death.y);
            ctx.beginPath();
            ctx.arc(cx, cy, 5, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = "white";
            ctx.lineWidth = 1;
            ctx.stroke();
            // Knock-Pin: kleiner offener Ring am Anfang des Crawls
            if (life.death.knockTsMs && life.death.crawl && life.death.crawl.length) {
              const [kx, ky] = life.death.crawl[0];
              const [kcx, kcy] = mdCmToCanvas(host, kx, ky);
              ctx.beginPath();
              ctx.arc(kcx, kcy, 4.5, 0, Math.PI * 2);
              ctx.strokeStyle = color;
              ctx.lineWidth = 1.2;
              ctx.stroke();
            }
          }

          // Kill-Marker (sobald cursor >= kill-ts) — nur das Opfer-X.
          // Kein Schuetze-Pin, keine Schusslinie (Userwunsch: weniger
          // Cluttering, Distanz steht im Hover-Label).
          if (!inDefault) {
            for (const k of life.kills) {
              if (absTs < k.tsMs) continue;
              if (k.victimX == null) continue;
              const [vx, vy] = mdCmToCanvas(host, k.victimX, k.victimY);
              ctx.strokeStyle = color;
              ctx.lineWidth = 2;
              const xs = 4.5;
              ctx.beginPath();
              ctx.moveTo(vx - xs, vy - xs); ctx.lineTo(vx + xs, vy + xs);
              ctx.moveTo(vx - xs, vy + xs); ctx.lineTo(vx + xs, vy - xs);
              ctx.stroke();
            }
          }
        }

        // Revive-Pins (nur bis cursor erreicht)
        if (m.revivePts) {
          for (const [xCm, yCm, ts] of m.revivePts) {
            if (!inDefault && absTs < ts) continue;
            const [cx, cy] = mdCmToCanvas(host, xCm, yCm);
            ctx.beginPath();
            ctx.arc(cx, cy, 3, 0, Math.PI * 2);
            ctx.fillStyle = "#2ecc71";
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.85)";
            ctx.lineWidth = 0.6;
            ctx.stroke();
          }
        }

        // Aktiver Zeitraffer-Pin (interpolated Position)
        if (!inDefault && s.zeitraffer.playing || (!inDefault && cursorTs > 0)) {
          const activePin = mdInterpolatePin(m, absTs);
          if (activePin) {
            const [cx, cy] = mdCmToCanvas(host, activePin.x, activePin.y);
            ctx.beginPath();
            ctx.arc(cx, cy, 4, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = "white";
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      }
    }

    // Liefert {x, y} fuer Member m zum Absolut-Timestamp absTs
    // durch Interpolation im aktuellen Leben.
    function mdInterpolatePin(m, absTs) {
      if (!m.lives) return null;
      for (const life of m.lives) {
        if (!life.landing) continue;
        if (life.death && absTs > life.death.tsMs) continue;
        const fullPath = [...(life.planeRoute || []), ...(life.groundPath || [])];
        if (fullPath.length < 2) {
          if (life.landing) return { x: life.landing.x, y: life.landing.y };
          continue;
        }
        if (absTs < fullPath[0][2]) return null;
        // Bisect
        for (let i = 0; i < fullPath.length - 1; i++) {
          const [x0, y0, t0] = fullPath[i];
          const [x1, y1, t1] = fullPath[i + 1];
          if (absTs >= t0 && absTs <= t1) {
            const f = (absTs - t0) / Math.max(1, (t1 - t0));
            return { x: x0 + (x1 - x0) * f, y: y0 + (y1 - y0) * f };
          }
        }
        const last = fullPath[fullPath.length - 1];
        return { x: last[0], y: last[1] };
      }
      return null;
    }

    function mdRenderCards(host) {
      const wrap = host.querySelector(".md-cards");
      if (!wrap) return;
      const s = mdGetState(host);
      if (!s.detail || !s.detail.members) {
        wrap.innerHTML = "";
        return;
      }
      function fmtMinSec(sec) {
        if (sec == null) return "?";
        const m = Math.floor(sec / 60);
        const ss = sec % 60;
        return `${m}:${String(ss).padStart(2, "0")}`;
      }
      function poi(x, y, mapName) {
        if (x == null || y == null) return null;
        if (PubgUI.POI && PubgUI.POI.fromCoords)
          return PubgUI.POI.fromCoords(mapName, x, y);
        return null;
      }
      const mapName = host.getAttribute("data-map");
      const html = s.detail.members.map((m) => {
        const color = s.colorByAcc[m.accountId] || "#999";
        const active = s.hiddenAccs.has(m.accountId) ? " hidden" : "";
        const selfCls = m.isSelf ? " md-self" : "";
        const who = m.isSelf ? "Du" : m.name;
        // Overall-Badge: alive falls letztes Leben ohne Death, sonst der letzte Death
        let badge = '<span class="md-badge alive">ueberlebt</span>';
        if (m.lives && m.lives.length) {
          const last = m.lives[m.lives.length - 1];
          if (last.death) {
            const sec = Math.floor(
              (last.death.tsMs - (s.zeitraffer.matchStart || 0)) / 1000);
            badge = `<span class="md-badge died">† ${fmtMinSec(sec)}</span>`;
          }
        }
        // Lives-Detail (eine Zeile pro Leben)
        const livesHtml = (m.lives || []).map((life, idx) => {
          const prefix = m.lives.length > 1 ? `Leben ${life.lifeIndex}: ` : "";
          const landP = life.landing
            ? poi(life.landing.x, life.landing.y, mapName) : null;
          let row = `${prefix}landete <b>${landP || "?"}</b>`;
          if (life.death) {
            const deathP = poi(life.death.x, life.death.y, mapName);
            const killer = life.death.killerName || "Gegner";
            const wn = life.death.weaponName || "?";
            const dist = life.death.distanceM
              ? ` auf <b>${life.death.distanceM.toFixed(0)}m</b>` : "";
            // Cause-Label-Prioritaet: death > knock > Standard
            const causeLbl = life.death.causeLabel || life.death.knockCauseLabel;
            // Fahrzeug-Kontext: war Opfer beim Tod (oder beim Knock) im Fahrzeug
            const vehLbl = life.death.victimVehicleLabel
                        || life.death.knockVictimVehicleLabel;
            const vehTag = vehLbl
              ? ` <span class="md-veh">aus <b>${vehLbl}</b> <span class="material-symbols-outlined icon-sm" aria-hidden="true">directions_bus</span></span>`
              : "";
            if (causeLbl) {
              const verb = life.death.causeLabel ? "gestorben" : "geknockt+gestorben";
              row += ` <span class="md-died">— ${verb} in <b>${deathP || "?"}</b> — <b>${causeLbl}</b>${vehTag}</span>`;
            } else {
              row += ` <span class="md-died">— gestorben in <b>${deathP || "?"}</b> durch <b>${killer}</b> mit <b>${wn}</b>${dist}${vehTag}</span>`;
            }
          } else if (m.lives.length > 1) {
            row += ` <span style="color:var(--pubg-gold)">— survived</span>`;
          }
          return `<div class="md-life">${row}</div>`;
        }).join("");
        return `<div class="md-card${active}${selfCls}" data-acc="${m.accountId}">
          <div class="md-head">
            <span class="md-dot" style="background:${color}"></span>
            <span class="md-name">${who}</span>
            ${badge}
          </div>
          ${livesHtml}
        </div>`;
      }).join("");
      wrap.innerHTML = html;
    }

    function mdRenderState(host) {
      const s = mdGetState(host);
      if (!s.detail) return;
      mdRenderBasemap(host);
      mdRenderOverlay(host);
      mdRenderCards(host);
      mdUpdateScrubBar(host);
      mdUpdateAlleBar(host);
    }

    function mdUpdateScrubBar(host) {
      const s = mdGetState(host);
      const z = s.zeitraffer;
      const slider = host.querySelector("input.md-scrub-slider");
      const timeEl = host.querySelector(".md-scrub .md-time");
      const playBtn = host.querySelector(".md-scrub .md-play-btn");
      if (!slider || !timeEl) return;
      const dur = z.matchEnd - z.matchStart;
      slider.min = 0; slider.max = dur; slider.step = 1000;
      slider.value = z.cursorTs;
      function fmt(ms) {
        const sec = Math.floor(ms / 1000);
        return `${Math.floor(sec/60)}:${String(sec%60).padStart(2,"0")}`;
      }
      timeEl.textContent = `${fmt(z.cursorTs)} / ${fmt(dur)}`;
      if (playBtn) playBtn.textContent = z.playing ? "⏸" : "▶";
      host.querySelectorAll(".md-speedbtn").forEach(btn => {
        btn.classList.toggle("active",
          parseFloat(btn.dataset.speed) === (s.playSpeed || MD_DEFAULT_SPEED));
      });
    }

    function mdUpdateAlleBar(host) {
      const s = mdGetState(host);
      const btn = host.querySelector(".md-allebtn");
      if (!btn) return;
      const anyHidden = s.hiddenAccs && s.hiddenAccs.size > 0;
      btn.classList.toggle("solo-active", anyHidden);
      btn.textContent = anyHidden ? "↺ Alle anzeigen" : "● Alle sichtbar";
    }

    function _fmtSurvSec(secs) {
      const m = Math.floor((secs||0)/60);
      const s = (secs||0) % 60;
      return `${m}:${String(s).padStart(2,"0")}`;
    }
    function renderMdSquadTable(members, colorByAcc) {
      const rows = members.map(m => {
        const color = colorByAcc[m.accountId] || "#999";
        const place = (m.place != null) ? `#${m.place}` : "—";
        const kills = m.kills || 0;
        const bk    = m.botKills || 0;
        const killsCell = bk
          ? `${kills} <span class="bot-kills" title="${bk} davon Bot-Kills">(${bk})</span>`
          : `${kills}`;
        return `<tr${m.isSelf ? ' class="self"' : ""}>
          <td class="md-st-name"><span class="md-dot" style="background:${color}"></span>
              <b>${m.name}${m.isSelf ? " (du)" : ""}</b></td>
          <td>${place}</td>
          <td>${killsCell}</td>
          <td>${m.headshotKills || 0}</td>
          <td>${m.assists || 0}</td>
          <td>${m.dbnos || 0}</td>
          <td title="Wie oft wurde dieser Spieler wiederbelebt">${m.revivesReceived || 0}</td>
          <td title="Wie oft hat dieser Spieler Squadmates wiederbelebt">${m.revivesGiven || 0}</td>
          <td>${Math.round(m.damageDealt || 0)}</td>
          <td>${_fmtSurvSec(m.timeSurvived)}</td>
        </tr>`;
      }).join("");
      return `<table class="md-squad-table">
        <thead><tr>
          <th>Member</th>
          <th title="Platzierung">#</th>
          <th>K</th>
          <th title="Headshot Kills">HS</th>
          <th title="Assists">Ass</th>
          <th title="DBNOs gegeben (Knocks auf Gegner)">DBNO</th>
          <th title="Wie oft wurde dieser Spieler knocked-out und revived (ohne Tod dazwischen)">KO</th>
          <th title="Wie oft hat dieser Spieler Squadmates wiederbelebt">REV</th>
          <th>DMG</th>
          <th>Surv</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    // ── Match-Detail Timeline (englisch, natuerlichsprachlich) ────────
    // Filter-Chips: All / Me / Knocks / Kills / Revives
    const _MD_TIMELINE_FILTERS = [
      ["all",     "All",     null],
      ["me",      "Me",      null],
      ["knocks",  "Knocks",  ["knock"]],
      ["kills",   "Kills",   ["kill", "kill_finish", "kill_steal", "kill_bleedout",
                              "kill_self_eject", "kill_fall", "kill_bluezone",
                              "kill_redzone", "kill_drown", "kill_self"]],
      ["revives", "Revives", ["revive", "revive_inferred", "redeploy"]],
    ];

    // Enemy-Team-Farben: HSL-Generativ. Multiplikator 67 (prim) gibt
    // schoenen Spread ueber den Farbkreis — Team 18 (126°) vs Team 26
    // (302°) sind klar unterscheidbar. Funktioniert kollisionsfrei fuer
    // Team-IDs 1..30+ (cycle: 360/gcd(67,360) = 360).
    function mdTlEnemyTeamColor(teamId) {
      if (teamId == null) return "var(--pubg-muted)";
      const hue = (Math.abs(teamId | 0) * 67) % 360;
      return `hsl(${hue}, 65%, 70%)`;
    }

    function mdTlActorColor(ev, role, colorByAcc) {
      // role: "actor" | "target" | "knocker"
      const acc  = ev[role + "Account"];
      const slot = ev[role + "Slot"];
      const teamId = ev[role + "TeamId"];
      const isSquad = ev[role + "IsSquad"];
      if (isSquad) {
        if (acc && colorByAcc && colorByAcc[acc]) return colorByAcc[acc];
        if (slot >= 1 && slot <= MD_SLOT_COLORS.length)
          return MD_SLOT_COLORS[slot - 1];
      }
      // Enemy → Team-Farbe
      return mdTlEnemyTeamColor(teamId);
    }

    function mdTlFmtMatchTime(tsMs) {
      // Ingame-Zeit seit Match-Start als M:SS / MM:SS.
      if (tsMs == null) return "?";
      const sec = Math.max(0, Math.floor(tsMs / 1000));
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function mdTlPoi(ctx, x, y) {
      if (ctx.mapName && PubgUI.POI && PubgUI.POI.fromCoords
          && x != null && y != null) {
        const p = PubgUI.POI.fromCoords(ctx.mapName, x, y);
        if (p) return p;
      }
      return "&lt;unknown&gt;";
    }

    function mdTlNameSpan(ev, role, colorByAcc) {
      const name = ev[role + "Name"] || "?";
      const color = mdTlActorColor(ev, role, colorByAcc);
      const teamLbl = ev[role + "TeamLabel"];
      const teamSpan = teamLbl
        ? ` <span class="md-tl-teamtag" style="color:${color};border-color:${color}">${teamLbl}</span>`
        : "";
      return `<b style="color:${color}">${name}</b>${teamSpan}`;
    }

    function mdTlWeaponMeta(ev) {
      const parts = [];
      if (ev.weaponName) parts.push(`with <b>${ev.weaponName}</b>`);
      if (ev.distanceM) parts.push(`· ${ev.distanceM.toFixed(0)}m`);
      // Fahrzeug-Kontext: Opfer war im Auto oder Schuetze schoss aus Auto
      if (ev.victimVehicleLabel) parts.push(`· victim in <b>${ev.victimVehicleLabel}</b>`);
      if (ev.shooterVehicleLabel) parts.push(`· from <b>${ev.shooterVehicleLabel}</b>`);
      return parts.length ? " " + parts.join(" ") : "";
    }

    function mdTlSentence(ev, ctx) {
      const cba = ctx.colorByAcc;
      const A = mdTlNameSpan(ev, "actor",  cba);
      const T = mdTlNameSpan(ev, "target", cba);
      const meta = mdTlWeaponMeta(ev);
      switch (ev.type) {
        case "knock":
          return `${A} knocked ${T}${meta}`;
        case "kill":
          return `${A} killed ${T}${meta}`;
        case "kill_bleedout":
          // Wer geknockt hat war (laut PUBG) der gleiche Actor — Knocker-
          // Info redundant. Just: "X bled out and died".
          return `${T} bled out and died`;
        case "kill_finish": {
          const K = mdTlNameSpan(ev, "knocker", cba);
          const kw = ev.knockerWeaponName ? `knocked with <b>${ev.knockerWeaponName}</b>` : "knocked";
          const kd = ev.knockerDistanceM ? ` · ${ev.knockerDistanceM.toFixed(0)}m` : "";
          return `${A} finished ${T} (${kw}${kd} by ${K})${meta}`;
        }
        case "kill_steal": {
          const K = mdTlNameSpan(ev, "knocker", cba);
          const kw = ev.knockerWeaponName ? `knocked with <b>${ev.knockerWeaponName}</b>` : "knocked";
          const kd = ev.knockerDistanceM ? ` · ${ev.knockerDistanceM.toFixed(0)}m` : "";
          return `${A} stole the knock from ${K} (${kw}${kd}) — killed ${T}${meta}`;
        }
        case "revive":
          return `${A} revived ${T}`;
        case "revive_inferred":
          return `${T} was revived by a teammate`;
        case "redeploy":
          return ev.targetName
            ? `${A} used the revive antenna for ${T}`
            : `${A} used the revive antenna`;
        case "kill_self_eject": {
          const veh = ev.victimVehicleLabel
            ? ` from <b>${ev.victimVehicleLabel}</b>` : "";
          return `${T} died after jumping${veh}`;
        }
        case "kill_fall":
          return `${T} fell to their death`;
        case "kill_bluezone":
          return `${T} died in the Blue Zone`;
        case "kill_redzone":
          return `${T} died in the Red Zone`;
        case "kill_drown":
          return `${T} drowned`;
        case "kill_self":
          return `${T} died`;
        default:
          return `${A} ${ev.type} ${T}${meta}`;
      }
    }

    function mdTlRowHtml(ev, ctx) {
      const tCell = mdTlFmtMatchTime(ev.tsMs);
      const poi   = mdTlPoi(ctx, ev.victimX, ev.victimY);
      const sentence = mdTlSentence(ev, ctx);
      const myAccount = ctx.myAccount;
      const involvesMe = ev.actorAccount === myAccount
                      || ev.targetAccount === myAccount
                      || ev.knockerAccount === myAccount;
      return `<div class="md-tl-row" data-ev-type="${ev.type}"
                   data-ev-me="${involvesMe}">
        <span class="md-tl-t">${tCell}</span>
        <span class="md-tl-poi">${poi}</span>
        <span class="md-tl-text">${sentence}</span>
      </div>`;
    }

    function renderMdTimeline(events, ctx) {
      const filters = _MD_TIMELINE_FILTERS.map(([key, lbl]) =>
        `<button type="button" class="md-timeline__chip${key === "all" ? " is-active" : ""}"
                 data-tl-filter="${key}">${lbl}</button>`).join("");
      if (!events || !events.length) {
        return `<details class="md-timeline-details" open>
          <summary class="md-timeline__title">Timeline</summary>
          <div class="md-tl-empty">No squad events in this match.</div>
        </details>`;
      }
      const rows = events.map(ev => mdTlRowHtml(ev, ctx)).join("");
      return `<details class="md-timeline-details" open>
        <summary class="md-timeline__title">Timeline (${events.length} events)</summary>
        <div class="md-timeline__head">
          <div class="md-timeline__filters">${filters}</div>
        </div>
        <div class="md-timeline__list">${rows}</div>
      </details>`;
    }

    function wireMdTimelineFilters(rootEl, myAccount) {
      const chips = rootEl.querySelectorAll(".md-timeline__chip");
      const rows  = rootEl.querySelectorAll(".md-tl-row");
      chips.forEach(chip => {
        chip.addEventListener("click", () => {
          chips.forEach(c => c.classList.remove("is-active"));
          chip.classList.add("is-active");
          const key = chip.getAttribute("data-tl-filter");
          const spec = _MD_TIMELINE_FILTERS.find(f => f[0] === key);
          const allow = spec ? spec[2] : null;
          rows.forEach(r => {
            const t = r.getAttribute("data-ev-type");
            const me = r.getAttribute("data-ev-me") === "true";
            let show = true;
            if (key === "me") show = me;
            else if (allow) show = allow.indexOf(t) >= 0;
            r.style.display = show ? "" : "none";
          });
        });
      });
    }

    async function mdMount(host) {
      if (host.dataset.mounted === "1") return;
      host.dataset.mounted = "1";
      const matchId = host.getAttribute("data-match-id");
      const mapName = host.getAttribute("data-map");
      host.innerHTML = `
        <div class="md-grid">
          <div class="md-mapcol">
            <div class="md-matchid" title="Klick = Match-ID kopieren">${matchId}</div>
            <div class="md-mapwrap">
              <canvas class="md-basemap"></canvas>
              <canvas class="md-overlay"></canvas>
              <div class="md-zoombtns">
                <button class="md-zoom-in" title="Reinzoomen">+</button>
                <button class="md-zoom-out" title="Rauszoomen">−</button>
                <button class="md-zoom-reset" title="Reset">⊙</button>
              </div>
              <div class="md-hover-label"></div>
            </div>
            <div class="md-scrub">
              <button class="md-play-btn">▶</button>
              <input type="range" class="md-scrub-slider" min="0" max="100" value="0">
              <span class="md-time">0:00 / 0:00</span>
            </div>
            <div class="md-speedbar">
              ${MD_SPEEDS.map(sp => `<button class="md-speedbtn" data-speed="${sp}">${sp}×</button>`).join("")}
            </div>
          </div>
          <div class="md-rightcol">
            <div class="squad-table-wrap" id="mdSquadTableWrap_${matchId}"></div>
            <div class="md-allebar">
              <button class="md-allebtn">● Alle sichtbar</button>
            </div>
            <div class="md-cards"></div>
          </div>
        </div>`;
      // Map-Bild parallel zum Telemetrie-Fetch starten — sonst kettet sich
      // das (mdLoad ~30s fuer 99-Spieler-Matches, danach 2-3s fuer das Bild
      // = 40s schwarz). Promise wird gecached, also gleich verfuegbar.
      mdMapImage(mapName);
      const md = await mdLoad(matchId);
      const s = mdGetState(host);
      if (!md || !md.detail) {
        host.querySelector(".md-cards").innerHTML =
          `<div class="md-empty md-card">— keine Telemetrie verfuegbar —</div>`;
        return;
      }
      s.detail = md.detail;
      s.colorByAcc = md.colorByAcc;
      // Map-Name nachträglich ins Host-Attribut schreiben — Panel-Mount
      // setzt data-map="" leer, weil die Map erst aus md.detail.mapName
      // bekannt ist. Ohne diesen Schritt liefert mdRenderBasemap
      // (host.getAttribute("data-map") → "") keine Map-Image.
      if (md.detail.mapName) {
        host.setAttribute("data-map", md.detail.mapName);
        // Map-Image vorab anstossen damit mdRenderBasemap nicht warten muss
        mdMapImage(md.detail.mapName);
      }
      // Squad-Tabelle aus Match-Detail-Response rendern.
      // Liefert das gleiche `<table>` wie zuvor fmtSquadDetail im
      // session-report-Kontext — aber datenbasiert aus md.detail.members
      // statt aus dem Session-Match-Objekt.
      const tableWrap = host.querySelector(
        `#mdSquadTableWrap_${CSS.escape(matchId)}`);
      if (tableWrap && md && md.detail && md.detail.members) {
        tableWrap.innerHTML = renderMdSquadTable(md.detail.members,
                                                  md.colorByAcc);
      }
      // Panel-Titel aktualisieren (Map + Match-Nr + Uhrzeit)
      const panelTitle = document.getElementById("mdPanelTitle");
      if (panelTitle && md && md.detail) {
        const mapLbl = PubgUI.fmtMap(md.detail.mapName);
        panelTitle.textContent = `Match · ${mapLbl}`;
      }
      // Timeline-Sektion fuellen — absTs kommt jetzt direkt vom Backend
      // (kein playedAt-Frontend-Lookup mehr).
      const tlSect = document.getElementById("mdTimelineSection");
      if (tlSect && md && md.detail) {
        tlSect.hidden = false;
        const myAcc = (md.detail.members.find(x => x.isSelf) || {}).accountId;
        const ctx = {
          mapName:    md.detail.mapName,
          colorByAcc: md.colorByAcc,
          myAccount:  myAcc,
        };
        tlSect.innerHTML = renderMdTimeline(md.detail.events || [], ctx);
        wireMdTimelineFilters(tlSect, myAcc);
      }
      // Match-Zeitraum aus allen Pfaden ableiten
      let mStart = Infinity, mEnd = -Infinity;
      for (const m of s.detail.members) {
        if (!m.lives) continue;
        for (const life of m.lives) {
          const fullPath = [...(life.planeRoute||[]), ...(life.groundPath||[])];
          if (!fullPath.length) continue;
          const t0 = fullPath[0][2], tN = fullPath[fullPath.length - 1][2];
          if (t0 < mStart) mStart = t0;
          if (tN > mEnd) mEnd = tN;
        }
      }
      s.zeitraffer.matchStart = isFinite(mStart) ? mStart : 0;
      s.zeitraffer.matchEnd = isFinite(mEnd) ? mEnd : 1;
      s.zeitraffer.cursorTs = 0;

      // Viewport-Default: bbox(alle Landings) + 500m
      const landingCoords = [];
      for (const m of s.detail.members) {
        if (!m.lives) continue;
        for (const life of m.lives) {
          if (life.landing) landingCoords.push([life.landing.x, life.landing.y]);
        }
      }
      s.viewport = mdBboxFitViewport(landingCoords, MD_PAD_500M_CM);
      s.viewport.autoFollow = true;
      mdClampViewport(host);

      // Telemetrie-Pfad-Check: wenn KEIN Member einen Pfad hat (weder
      // planeRoute noch groundPath fuer irgendein Leben), zeigen wir
      // einen Hinweis statt einer halb-leeren Karte.
      let anyPath = false;
      for (const m of s.detail.members) {
        if (!m.lives) continue;
        for (const life of m.lives) {
          if ((life.planeRoute && life.planeRoute.length) ||
              (life.groundPath && life.groundPath.length)) {
            anyPath = true; break;
          }
        }
        if (anyPath) break;
      }
      if (!anyPath) {
        const banner = document.createElement("div");
        banner.className = "md-warning";
        banner.textContent = "Kein Bewegungspfad in der Telemetrie. "
          + "Eventuell historischer Match — 'python -m pubg.cli hidrive-refill' "
          + "fuellt fehlende Position-Events nach.";
        host.querySelector(".md-mapcol").appendChild(banner);
      }
      mdRenderState(host);
      // Auto-Play: Zeitraffer startet sofort, Kamera folgt automatisch
      if (anyPath) {
        mdTogglePlay(host);
      }
    }

    // Begrenze viewport.center so dass das sichtbare Fenster die Map nicht
    // verlaesst. Wenn das Fenster groesser als die Map ist, zentrieren wir.
    function mdClampViewport(host) {
      const s = mdGetState(host);
      const vp = s.viewport;
      if (!vp) return;
      const mapKm = parseFloat(host.dataset.mapKm) || 8;
      const mapCm = mapKm * 100000;
      const halfVis = (MD_MAP_PX / 2) / vp.zoom;
      if (halfVis * 2 >= mapCm) {
        vp.centerX = mapCm / 2;
        vp.centerY = mapCm / 2;
        return;
      }
      vp.centerX = Math.max(halfVis, Math.min(mapCm - halfVis, vp.centerX));
      vp.centerY = Math.max(halfVis, Math.min(mapCm - halfVis, vp.centerY));
    }

    function mdTogglePlay(host) {
      const s = mdGetState(host);
      const z = s.zeitraffer;
      if (z.playing) {
        z.playing = false;
        s.playToken++;
        mdRenderState(host);
        return;
      }
      z.playing = true;
      z.playStartWallTs = performance.now();
      z.playStartCursor = z.cursorTs;
      if (z.cursorTs >= z.matchEnd - z.matchStart) {
        z.cursorTs = 0;
        z.playStartCursor = 0;
      }
      const token = ++s.playToken;
      const dur = z.matchEnd - z.matchStart;
      function frame(now) {
        if (token !== s.playToken) return;
        if (host.dataset.mounted !== "1") return;
        const realElapsed = now - z.playStartWallTs;
        // 1x = 1 ms cursor pro 1 ms real-time. Multiplikator skaliert.
        const scaledCursor = z.playStartCursor
          + realElapsed * (s.playSpeed || MD_DEFAULT_SPEED);
        z.cursorTs = Math.min(dur, scaledCursor);
        if (s.viewport && s.viewport.autoFollow) {
          mdAutoFollow(host);
        }
        mdRenderBasemap(host);
        mdRenderOverlay(host);
        mdUpdateScrubBar(host);
        if (z.cursorTs < dur) {
          requestAnimationFrame(frame);
        } else {
          z.playing = false;
          mdUpdateScrubBar(host);
        }
      }
      requestAnimationFrame(frame);
    }

    function mdAutoFollow(host) {
      const s = mdGetState(host);
      const absTs = s.zeitraffer.matchStart + s.zeitraffer.cursorTs;
      const coords = [];
      const visibleMembers = s.detail.members.filter(
        m => !s.hiddenAccs.has(m.accountId));
      for (const m of visibleMembers) {
        const pin = mdInterpolatePin(m, absTs);
        if (pin) coords.push([pin.x, pin.y]);
      }
      if (coords.length === 0) return;
      const target = mdBboxFitViewport(coords, MD_PAD_500M_CM);
      // Smooth ease toward target (lerp 0.18 / frame) — Zoom bleibt
      // bewusst auf User-Wert, nur Center bewegt sich mit der Action.
      const t = 0.18;
      s.viewport.centerX += (target.centerX - s.viewport.centerX) * t;
      s.viewport.centerY += (target.centerY - s.viewport.centerY) * t;
      mdClampViewport(host);
    }

    // Slider-Input setzt cursor — Playback laeuft weiter (Anker rebasen).
    function mdScrubTo(host, cursorMs) {
      const s = mdGetState(host);
      const z = s.zeitraffer;
      z.cursorTs = Math.max(0, Math.min(z.matchEnd - z.matchStart, cursorMs));
      if (z.playing) {
        z.playStartWallTs = performance.now();
        z.playStartCursor = z.cursorTs;
      }
      mdRenderOverlay(host);
      mdUpdateScrubBar(host);
    }

    // Globale Event-Delegations
    document.addEventListener("click", (e) => {
      const mid = e.target.closest && e.target.closest(".md-matchid");
      if (mid) {
        const id = mid.textContent.trim();
        if (id && navigator.clipboard) {
          navigator.clipboard.writeText(id).then(() => {
            const orig = mid.textContent;
            mid.textContent = "✓ kopiert";
            setTimeout(() => { mid.textContent = orig; }, 1200);
          });
        }
        e.stopPropagation();
        return;
      }
      const playBtn = e.target.closest && e.target.closest(".md-play-btn");
      if (playBtn) {
        const host = playBtn.closest(".md-host");
        if (host) { mdTogglePlay(host); e.stopPropagation(); }
        return;
      }
      const speedBtn = e.target.closest && e.target.closest(".md-speedbtn");
      if (speedBtn) {
        const host = speedBtn.closest(".md-host");
        if (host) {
          const s = mdGetState(host);
          const newSpeed = parseFloat(speedBtn.dataset.speed) || 1;
          // Wenn gerade Playback laeuft: Zeit-Anker neu setzen damit der
          // Speed-Wechsel ohne Cursor-Sprung passiert.
          if (s.zeitraffer.playing) {
            s.zeitraffer.playStartWallTs = performance.now();
            s.zeitraffer.playStartCursor = s.zeitraffer.cursorTs;
          }
          s.playSpeed = newSpeed;
          mdUpdateScrubBar(host);
          e.stopPropagation();
        }
        return;
      }
    });

    document.addEventListener("input", (e) => {
      const slider = e.target.closest && e.target.closest(".md-scrub-slider");
      if (!slider) return;
      const host = slider.closest(".md-host");
      if (!host) return;
      mdScrubTo(host, parseInt(slider.value, 10) || 0);
    });

    document.addEventListener("keydown", (e) => {
      // Pfeil-Tasten ±1s wenn ein Match-Detail focused
      if (e.key !== "ArrowLeft" && e.key !== "ArrowRight") return;
      // nicht in Inputs
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
      const host = document.querySelector(".md-host[data-mounted='1']");
      if (!host) return;
      const s = mdGetState(host);
      const delta = e.key === "ArrowLeft" ? -1000 : 1000;
      mdScrubTo(host, s.zeitraffer.cursorTs + delta);
      e.preventDefault();
    });

    function mdZoomAt(host, deltaScale, anchorPx, anchorPy) {
      const s = mdGetState(host);
      const vp = s.viewport;
      if (!vp) return;
      // Neuer zoom mit Limits
      const maxZoom = MD_MAP_PX / MD_MIN_ZOOM_CM;
      const minZoom = MD_MAP_PX / MD_MAX_ZOOM_CM;
      let newZoom = Math.max(minZoom, Math.min(maxZoom, vp.zoom * deltaScale));
      vp.zoom = newZoom;
      if (vp.autoFollow) {
        // Auto-Follow ist an → Zoom soll Pins zentriert lassen, NICHT
        // an Maus-Anker. Direkt auf Pin-bbox snappen, naechster Frame
        // lerpt dann weiter.
        const absTs = s.zeitraffer.matchStart + s.zeitraffer.cursorTs;
        const coords = [];
        for (const m of s.detail.members) {
          if (s.hiddenAccs.has(m.accountId)) continue;
          const pin = mdInterpolatePin(m, absTs);
          if (pin) coords.push([pin.x, pin.y]);
        }
        if (coords.length) {
          let mnX = Infinity, mxX = -Infinity, mnY = Infinity, mxY = -Infinity;
          for (const [x, y] of coords) {
            if (x < mnX) mnX = x; if (x > mxX) mxX = x;
            if (y < mnY) mnY = y; if (y > mxY) mxY = y;
          }
          vp.centerX = (mnX + mxX) / 2;
          vp.centerY = (mnY + mxY) / 2;
        }
      } else {
        // Manueller Modus (nach Drag-Pan) → Zoom an Maus-Anker
        const [acmX, acmY] = mdCanvasToCm(host, anchorPx, anchorPy);
        vp.centerX = acmX - (anchorPx - MD_MAP_PX / 2) / vp.zoom;
        vp.centerY = acmY - (anchorPy - MD_MAP_PX / 2) / vp.zoom;
      }
      mdClampViewport(host);
      mdRenderBasemap(host);
      mdRenderOverlay(host);
    }

    document.addEventListener("wheel", (e) => {
      const wrap = e.target.closest && e.target.closest(".md-mapwrap");
      if (!wrap) return;
      e.preventDefault();
      const host = wrap.closest(".md-host");
      if (!host) return;
      const rect = wrap.getBoundingClientRect();
      const px = e.clientX - rect.left;
      const py = e.clientY - rect.top;
      const scale = e.deltaY < 0 ? 1.15 : 1 / 1.15;
      mdZoomAt(host, scale, px, py);
    }, { passive: false });

    // Aktueller Drag-Host (modul-global), damit mousemove/up den richtigen
    // Host treffen wenn mehrere Match-Details gleichzeitig ausgeklappt sind.
    let _mdDragHost = null;
    document.addEventListener("mousedown", (e) => {
      const wrap = e.target.closest && e.target.closest(".md-mapwrap");
      if (!wrap) return;
      if (e.target.closest(".md-zoombtns")) return;
      const host = wrap.closest(".md-host");
      if (!host) return;
      if (e.button !== 0) return;
      const s = mdGetState(host);
      s.dragPan = {
        startX: e.clientX, startY: e.clientY,
        startCenterX: s.viewport.centerX, startCenterY: s.viewport.centerY,
      };
      _mdDragHost = host;
    });

    document.addEventListener("mousemove", (e) => {
      const host = _mdDragHost;
      if (!host) return;
      const s = mdGetState(host);
      if (!s.dragPan) return;
      const dx = e.clientX - s.dragPan.startX;
      const dy = e.clientY - s.dragPan.startY;
      s.viewport.centerX = s.dragPan.startCenterX - dx / s.viewport.zoom;
      s.viewport.centerY = s.dragPan.startCenterY - dy / s.viewport.zoom;
      s.viewport.autoFollow = false;
      mdClampViewport(host);
      mdRenderBasemap(host);
      mdRenderOverlay(host);
    });

    document.addEventListener("mouseup", () => {
      if (!_mdDragHost) return;
      const s = mdGetState(_mdDragHost);
      s.dragPan = null;
      _mdDragHost = null;
    });

    document.addEventListener("dblclick", (e) => {
      const wrap = e.target.closest && e.target.closest(".md-mapwrap");
      if (!wrap) return;
      const host = wrap.closest(".md-host");
      if (!host) return;
      mdResetView(host);
    });

    function mdResetView(host) {
      const s = mdGetState(host);
      if (!s.detail) return;
      const coords = [];
      for (const m of s.detail.members) {
        if (!m.lives) continue;
        for (const life of m.lives) {
          if (life.landing) coords.push([life.landing.x, life.landing.y]);
        }
      }
      s.viewport = mdBboxFitViewport(coords, MD_PAD_500M_CM);
      s.viewport.autoFollow = true;
      mdClampViewport(host);
      mdRenderState(host);
    }

    document.addEventListener("click", (e) => {
      const zi = e.target.closest && e.target.closest(".md-zoom-in");
      if (zi) {
        const host = zi.closest(".md-host");
        mdZoomAt(host, 1.5, MD_MAP_PX / 2, MD_MAP_PX / 2);
        e.stopPropagation(); return;
      }
      const zo = e.target.closest && e.target.closest(".md-zoom-out");
      if (zo) {
        const host = zo.closest(".md-host");
        mdZoomAt(host, 1 / 1.5, MD_MAP_PX / 2, MD_MAP_PX / 2);
        e.stopPropagation(); return;
      }
      const zr = e.target.closest && e.target.closest(".md-zoom-reset");
      if (zr) {
        const host = zr.closest(".md-host");
        mdResetView(host);
        e.stopPropagation(); return;
      }
    });

    // Date-Range-Picker initialisieren mit aktuellen URL-Werten
    function isoLocal(date) {
      // Local-Date → "YYYY-MM-DD"
      return date.toISOString().slice(0, 10);
    }
    function pad(n) { return String(n).padStart(2, "0"); }

    if (FROM) {
      const d = new Date(FROM);
      document.getElementById("dateFrom").value = isoLocal(d);
      document.getElementById("timeFrom").value = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    if (TO) {
      const d = new Date(TO);
      document.getElementById("dateTo").value = isoLocal(d);
      document.getElementById("timeTo").value = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function applyRange(fromIso, toIso) {
      const u = new URL(location.href);
      if (fromIso) u.searchParams.set("from", fromIso);
      else u.searchParams.delete("from");
      if (toIso) u.searchParams.set("to", toIso);
      else u.searchParams.delete("to");
      location.href = u.toString();
    }

    document.getElementById("applyRange").addEventListener("click", () => {
      const df = document.getElementById("dateFrom").value;
      const tf = document.getElementById("timeFrom").value || "00:00";
      const dt = document.getElementById("dateTo").value;
      const tt = document.getElementById("timeTo").value || "23:59";
      const from = df ? new Date(`${df}T${tf}:00`).toISOString() : "";
      const to = dt ? new Date(`${dt}T${tt}:00`).toISOString() : "";
      applyRange(from, to);
    });

    document.querySelectorAll(".preset").forEach(btn => {
      btn.addEventListener("click", () => {
        const p = btn.dataset.preset;
        const now = new Date();
        const today = new Date(now); today.setHours(0,0,0,0);
        let from = "", to = "";
        if (p === "current") {
          // alles leer = aktuelle Session
        } else if (p === "today") {
          from = today.toISOString();
          const e = new Date(today); e.setHours(23,59,59,0);
          to = e.toISOString();
        } else if (p === "yesterday") {
          const ys = new Date(today); ys.setDate(ys.getDate() - 1);
          from = ys.toISOString();
          const ye = new Date(ys); ye.setHours(23,59,59,0);
          to = ye.toISOString();
        } else if (p === "last7") {
          const s = new Date(today); s.setDate(s.getDate() - 7);
          from = s.toISOString();
          // to leer = jetzt
        } else if (p === "all") {
          from = "1970-01-01T00:00:00Z";
        }
        applyRange(from, to);
      });
    });

    // Sessions-Picker: Monats-Tabs + Sort-Dropdown.
    // Default: aktueller Monat, sortiert nach neueste-zuerst.
    let allSessions = [];
    let sortBy = "newest";

    function monthKey(iso) {
      const d = new Date(iso);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    }
    function buildPickerShell() {
      const picker = document.getElementById("picker");
      if (!allSessions.length) { picker.style.display = "none"; return; }
      picker.style.display = "block";

      picker.innerHTML = `
        <div class="controls">
          <select id="sortBy">
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
            <option value="wins">Meiste CHICKEN Wins</option>
            <option value="matches">Meiste Matches</option>
            <option value="kills">Meiste Kills</option>
          </select>
          <span class="summary" id="sessionSummary"></span>
        </div>
        <div class="session-picker__header">
          <span id="monthCounter" class="session-picker__counter">—</span>
        </div>
        <div id="sessionList"></div>
      `;
      document.getElementById("sortBy").value = sortBy;
      document.getElementById("sortBy").addEventListener("change", (e) => {
        sortBy = e.target.value;
        renderItems();
      });
    }

    function renderItems() {
      const months = [...new Set(allSessions.map(s => monthKey(s.from)))]
        .sort().reverse();
      const sortFns = {
        newest:  (a, b) => b.from.localeCompare(a.from),
        oldest:  (a, b) => a.from.localeCompare(b.from),
        wins:    (a, b) => (b.wins||0) - (a.wins||0) || b.from.localeCompare(a.from),
        matches: (a, b) => (b.matches||0) - (a.matches||0) || b.from.localeCompare(a.from),
        kills:   (a, b) => (b.kills||0) - (a.kills||0) || b.from.localeCompare(a.from),
      };
      if (!months.length) {
        document.getElementById("sessionList").innerHTML =
          `<div class="empty">Keine Sessions im Zeitraum.</div>`;
        return;
      }
      const currentMonth = months[0];  // hoechster Key = neuester Monat
      const html = months.map(k => {
        const inMonth = allSessions.filter(s => monthKey(s.from) === k);
        const sorted = [...inMonth].sort(sortFns[sortBy] || sortFns.newest);
        const totalMatches = inMonth.reduce((n, s) => n + (s.matches || 0), 0);
        // LocalStorage: Default = aktueller Monat offen, andere zu
        const lsKey = "obs.month." + k + ".open";
        let openLs = localStorage.getItem(lsKey);
        if (openLs === null) openLs = (k === currentMonth) ? "1" : "0";
        const isOpen = openLs === "1";
        const items = sorted.map(s => {
          const origIdx = allSessions.indexOf(s);
          const isCurrent = origIdx === 0 && !FROM;
          const cls = "item" + (isCurrent ? " current" : "");
          const timeStr = PubgUI.fmtTime ? PubgUI.fmtTime(s.from) : "";
          const playMarker = isCurrent ? ' <span class="item-live">&#9654;</span>' : '';
          const kills = (s.kills != null) ? ` · ${s.kills} K` : "";
          return `<div class="${cls}" data-from="${s.from}" data-to="${s.to}"
                       data-idx="${origIdx}">
            <div class="item-date">${PubgUI.fmtDate(s.from)}${timeStr ? " · " + timeStr : ""}${playMarker}</div>
            <div class="item-meta">${s.matches || 0} Matches · ${s.wins || 0} W${kills}</div>
          </div>`;
        }).join("");
        const monthLabelStr = _monthLabel(k);
        return `<details class="month-group" data-month-key="${k}"${isOpen ? " open" : ""}>
          <summary class="month-group__head">
            <span class="month-group__name">${monthLabelStr}</span>
            <span class="month-group__count">${inMonth.length} Sessions · ${totalMatches} Matches</span>
            <span class="material-symbols-outlined month-group__chev" aria-hidden="true">expand_more</span>
          </summary>
          <div class="month-group__body">${items}</div>
        </details>`;
      }).join("");
      document.getElementById("sessionList").innerHTML = html;
      document.getElementById("monthCounter").textContent =
        `${months.length} Monate · ${allSessions.length} Sessions gesamt`;
      // LocalStorage-Persistenz: erfolgt via globalem 'toggle'-Delegate
      // (siehe _ensureMonthGroupToggleListener), wird einmalig installiert.
      _ensureMonthGroupToggleListener();
    }

    let _monthGroupToggleInstalled = false;
    function _ensureMonthGroupToggleListener() {
      if (_monthGroupToggleInstalled) return;
      _monthGroupToggleInstalled = true;
      // 'toggle' bubbelt nicht. Listener wird per Capture-Phase auf
      // document gebunden — damit ein einziger Listener alle aktuellen
      // und zukuenftigen .month-group-Toggles auffaengt.
      document.addEventListener("toggle", (e) => {
        const el = e.target;
        if (!el || !el.classList || !el.classList.contains("month-group")) return;
        const k = el.getAttribute("data-month-key");
