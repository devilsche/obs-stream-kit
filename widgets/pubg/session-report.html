<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG After-Session Report</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      padding: 16px;
      background: linear-gradient(180deg, rgba(20,12,30,0.6), rgba(10,5,16,0.6));
    }
    .report { max-width: 1280px; margin: 0 auto; padding: 22px 32px; }
    .report h1 {
      margin: 0 0 6px;
      color: var(--pubg-gold);
      font-size: 1.6em;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .report .subtitle { color: var(--pubg-muted); font-size: 0.9em; margin-bottom: 18px; }

    .totals {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }
    .totals .cell { display: flex; flex-direction: column; }
    .totals .cell .pubg-stat-value { font-size: 1.4em; }

    .phase {
      margin-bottom: 18px;
      padding: 14px 16px;
      background: rgba(94,42,121,0.12);
      border-left: 3px solid var(--pubg-purple);
      border-radius: 6px;
    }
    .phase h2 {
      margin: 0 0 4px;
      font-size: 1em;
      letter-spacing: 0.04em;
    }
    .phase h2 .num { color: var(--pubg-gold); margin-right: 8px; }
    .phase .squad {
      color: var(--pubg-muted);
      font-size: 0.85em;
      margin-bottom: 10px;
    }
    .phase .squad b { color: var(--pubg-text); }
    .phase-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 10px 14px;
      margin-bottom: 12px;
    }
    .phase-stats span {
      display: flex;
      flex-direction: column;
      color: var(--pubg-muted);
      font-size: 0.7em;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.2;
    }
    .phase-stats span b {
      color: var(--pubg-text);
      font-variant-numeric: tabular-nums;
      font-size: 1.7em;
      letter-spacing: 0;
      text-transform: none;
      margin-bottom: 2px;
      line-height: 1.05;
    }

    .matches-list {
      display: flex; flex-direction: column;
      gap: 4px;
      font-size: 0.78em;
      font-variant-numeric: tabular-nums;
    }
    /* Match-Row: Spaltenbreiten so dass alles match-übergreifend bündig ist.
       Stats ist Sub-Grid mit fixen Spaltenbreiten — Werte untereinander
       zwischen Zeilen sichtbar. */
    .matches-list .m {
      display: grid;
      grid-template-columns: 240px 60px 1fr 70px 90px 90px;
      gap: 10px;
      padding: 6px 8px;
      border-radius: 3px;
      align-items: center;
      cursor: pointer;
      transition: background 0.15s;
    }
    .matches-list .m:hover { background: rgba(94, 42, 121, 0.18); }
    .matches-list .m.expanded { background: rgba(94, 42, 121, 0.25); }
    .matches-list .header-row {
      display: grid;
      grid-template-columns: 240px 60px 1fr 70px 90px 90px;
      gap: 10px;
      padding: 2px 8px 4px;
      font-size: 0.85em;
      color: var(--pubg-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px dashed rgba(255,255,255,0.1);
      margin-bottom: 4px;
    }
    /* Place-Spalte: # untereinander ausrichten — gold-Marker bei Win */
    .matches-list .m .place {
      font-variant-numeric: tabular-nums;
      position: relative;
      padding-left: 22px;
    }
    .matches-list .m.win .place::before {
      content: "★";
      color: var(--pubg-gold);
      font-weight: 700;
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
    }
    /* Stats-Spalten: rechtsbündig, fixe Breite, tabular-nums  */
    .matches-list .stat {
      text-align: right;
      font-size: 0.9em;
      color: var(--pubg-muted);
      font-variant-numeric: tabular-nums;
    }
    .matches-list .stat b {
      color: var(--pubg-text);
    }
    .squad-detail {
      padding: 8px 14px 12px 28px;
      margin-bottom: 4px;
      background: rgba(94, 42, 121, 0.10);
      border-radius: 0 0 4px 4px;
      font-size: 0.95em;
      display: none;
    }
    .squad-detail.show { display: block; animation: pubg-fade-in 0.25s; }
    .squad-detail .detail-row {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .squad-detail .detail-row > .squad-table-wrap { flex: 1; min-width: 0; }
    /* Event-Detail-Panel (PAYDAY/Heist) — ersetzt die Mini-Map in Events */
    .event-detail {
      width: 260px;
      flex: none;
      background: rgba(13,6,26,0.6);
      border: 1px solid rgba(216,180,255,0.35);
      border-radius: 6px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .event-detail-empty {
      color: var(--pubg-muted);
      font-size: 0.8em;
      text-align: center;
      padding: 14px;
      font-style: italic;
    }
    .event-detail-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5px;
    }
    .event-stat {
      padding: 5px 7px;
      background: rgba(216,180,255,0.10);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      gap: 1px;
      text-align: center;
    }
    .event-stat .v {
      color: #e0c8ff;
      font-size: 1.1em;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .event-stat .l {
      color: var(--pubg-muted);
      font-size: 0.66em;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .event-detail-loot {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .squad-detail table {
      width: 100%;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
    }
    .squad-detail th, .squad-detail td {
      padding: 4px 8px;
      text-align: right;
    }
    .squad-detail th:first-child, .squad-detail td:first-child {
      text-align: left;
    }
    .squad-detail th {
      color: var(--pubg-muted);
      font-weight: 400;
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .squad-detail .self {
      color: var(--pubg-gold);
      font-weight: 700;
    }
    .squad-detail tr.win td { color: var(--pubg-gold); }
    /* Match-Detail v2 — Two-Canvas 300x300 + Scrub-Bar + Cards-Col */
    .md-host {
      flex: none;
      width: 100%;
    }
    .md-grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 14px;
      align-items: start;
    }
    .md-mapcol { display: flex; flex-direction: column; gap: 6px; }
    .md-mapwrap {
      position: relative;
      width: 300px; height: 300px;
      margin: 0;
      background: #0d061a;
      border: 1px solid var(--pubg-border);
      border-radius: 6px;
      overflow: hidden;
      user-select: none;
    }
    .md-mapwrap canvas {
      position: absolute; inset: 0;
      width: 300px; height: 300px; display: block;
    }
    .md-mapwrap canvas.md-overlay { pointer-events: none; }
    .md-mapwrap .md-zoombtns {
      position: absolute; top: 6px; right: 6px;
      display: flex; flex-direction: column; gap: 3px;
      z-index: 5;
    }
    .md-zoombtns button {
      width: 22px; height: 22px;
      background: rgba(13,6,26,0.85);
      border: 1px solid var(--pubg-border);
      color: var(--pubg-gold);
      font-size: 13px; line-height: 18px; text-align: center;
      border-radius: 3px; cursor: pointer; padding: 0;
    }
    .md-zoombtns button:hover { border-color: var(--pubg-gold); }
    .md-mapwrap .md-hover-label {
      position: absolute;
      background: rgba(13,6,26,0.92);
      color: var(--pubg-gold);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.78em;
      pointer-events: none;
      white-space: nowrap;
      z-index: 6;
      display: none;
    }
    .md-mapwrap .md-hover-label.show { display: block; }
    /* Scrub-Bar */
    .md-scrub {
      display: flex; gap: 6px; align-items: center;
      padding: 4px 6px;
      background: rgba(13,6,26,0.55);
      border: 1px solid var(--pubg-border);
      border-radius: 4px;
      font-size: 0.8em;
      color: var(--pubg-muted);
    }
    .md-scrub button {
      background: rgba(242,183,5,0.12);
      border: 1px solid rgba(242,183,5,0.4);
      color: var(--pubg-gold);
      padding: 2px 8px;
      border-radius: 3px;
      font-family: inherit; cursor: pointer; font-size: 0.95em;
    }
    .md-scrub button:hover { background: rgba(242,183,5,0.22); }
    .md-scrub input[type=range] {
      flex: 1; cursor: pointer;
      accent-color: var(--pubg-gold);
    }
    .md-scrub .md-time {
      font-variant-numeric: tabular-nums;
      min-width: 90px; text-align: right;
      color: var(--pubg-text);
    }
    /* Cards-Col */
    .md-cardcol { display: flex; flex-direction: column; gap: 8px; }
    .md-allebar {
      display: flex; align-items: center; gap: 8px;
    }
    .md-allebtn {
      background: rgba(242,183,5,0.16);
      border: 1px solid var(--pubg-gold);
      color: var(--pubg-gold);
      padding: 5px 14px;
      border-radius: 4px;
      font-family: inherit; font-weight: 700;
      font-size: 0.9em; cursor: pointer;
    }
    .md-allebtn:hover { background: var(--pubg-gold); color: #1a0d2a; }
    .md-allebtn.solo-active { background: var(--pubg-gold); color: #1a0d2a; }
    .md-cards { display: flex; flex-direction: column; gap: 6px; }
    .md-card {
      background: rgba(94,42,121,0.18);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 5px;
      padding: 8px 10px;
      font-size: 0.9em;
      line-height: 1.45;
      color: var(--pubg-text);
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .md-card:hover { background: rgba(255,255,255,0.04); }
    .md-card.active {
      background: rgba(242,183,5,0.08);
      border-color: var(--pubg-gold);
    }
    .md-card .md-head {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 4px;
    }
    .md-card .md-dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.4);
      flex-shrink: 0;
    }
    .md-card .md-name { font-weight: 700; }
    .md-card.md-self .md-name { color: var(--pubg-gold); }
    .md-card .md-badge {
      margin-left: auto; padding: 1px 6px;
      background: rgba(0,0,0,0.3);
      font-size: 0.82em; border-radius: 3px;
      color: var(--pubg-muted);
    }
    .md-card .md-badge.alive { color: var(--pubg-gold); }
    .md-card .md-badge.died  { color: #e57b7b; }
    .md-card .md-life { padding-left: 4px; font-size: 0.93em; color: var(--pubg-muted); }
    .md-card .md-life b { color: var(--pubg-text); }
    .md-card .md-life .md-died { color: #e57b7b; }
    .md-card .md-empty { font-style: italic; opacity: 0.6; }
    .md-warning {
      background: rgba(229,123,123,0.12);
      border: 1px solid rgba(229,123,123,0.4);
      color: #e57b7b;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 0.82em;
      line-height: 1.45;
    }
    .matches-list .time-range { color: var(--pubg-muted); }
    .matches-list .time-range b { color: var(--pubg-text); font-weight: 400; }
    .matches-list .m:hover { background: rgba(255,255,255,0.04); }
    .matches-list .m.is-event {
      opacity: 0.6;
      background: rgba(50, 50, 60, 0.18);
    }
    .matches-list .m.is-event .stat b,
    .matches-list .m.is-event .map { color: var(--pubg-muted); }
    /* Event-Badge MUSS nach .m .place stehen (Specificity-Tie, last
       wins). Sonst zieht die globale .place { color:gold } und der
       EVENT-Text ist gold-auf-lila → unlesbar. */
    .matches-list .m.win {
      background: rgba(242,183,5,0.15);
      border-left: 2px solid var(--pubg-gold);
    }
    .matches-list .m .num {
      color: var(--pubg-muted);
      font-size: 0.78em;
      opacity: 0.55;
      font-variant-numeric: tabular-nums;
    }
    .matches-list .m .time { color: var(--pubg-muted); }
    .matches-list .m .place { color: var(--pubg-gold); font-weight: 700; }
    /* Event-Badge ueberschreibt die gold-Farbe (nach .m .place damit
       Specificity-Tie hier last-wins gewinnt). */
    .matches-list .m .place.event-badge {
      color: #1a0d2a;
      background: #d8b4ff;
      padding: 0 5px;
      border-radius: 3px;
      font-weight: 700;
      font-size: 0.78em;
      letter-spacing: 0.08em;
      text-align: center;
      padding-left: 5px;
    }
    .matches-list .m .map { color: var(--pubg-text); }
    .matches-list .m .stats { color: var(--pubg-muted); text-align: right; }
    .matches-list .m .stats b { color: var(--pubg-text); }
    .hot-drop-badge {
      display: inline-block;
      margin-left: 6px;
      font-size: 0.9em;
      line-height: 1;
      vertical-align: middle;
    }
    .hot-drop-badge:empty { display: none; }
    .hot-drop-badge.hot {
      filter: none;
    }
    .hot-drop-badge.died {
      filter: grayscale(1);
      opacity: 0.55;
    }
    .hot-drop-badge.hot[title],
    .hot-drop-badge.died[title] {
      cursor: help;
    }

    /* Trend / Streaks / Achievements im Report */
    .extras-h {
      margin: 24px 0 8px;
      color: var(--pubg-muted);
      font-size: 0.8em;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .trend-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }
    .trend-cell {
      padding: 10px 12px;
      border-radius: 6px;
      background: rgba(94, 42, 121, 0.18);
      border: 1px solid var(--pubg-border);
    }
    .trend-label {
      color: var(--pubg-muted);
      font-size: 0.75em;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .trend-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-top: 4px;
    }
    .trend-val {
      font-size: 1.4em;
      font-weight: 700;
      color: var(--pubg-text);
      font-variant-numeric: tabular-nums;
    }
    .trend-delta {
      font-weight: 700;
      font-size: 0.95em;
      font-variant-numeric: tabular-nums;
    }
    .delta-pos { color: #7be57b; }
    .delta-neg { color: #e57b7b; }
    .delta-zero { color: var(--pubg-muted); }
    .streaks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }
    .streak-cell {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 6px;
      background: rgba(94, 42, 121, 0.18);
      border: 1px solid var(--pubg-border);
    }
    .streak-cell.cold { opacity: 0.55; }
    .streak-icon { font-size: 1.5em; }
    .streak-num {
      font-size: 1.6em;
      font-weight: 700;
      color: var(--pubg-gold);
      font-variant-numeric: tabular-nums;
    }
    .streak-label {
      color: var(--pubg-muted);
      font-size: 0.85em;
      margin-left: auto;
      text-align: right;
    }
    .ach-details {
      margin-top: 8px;
    }
    .ach-summary {
      cursor: pointer;
      list-style: none;
      user-select: none;
    }
    .ach-summary::-webkit-details-marker { display: none; }
    .ach-summary::before {
      content: "▸ ";
      display: inline-block;
      transition: transform 120ms ease;
    }
    .ach-details[open] > .ach-summary::before {
      transform: rotate(90deg);
    }
    .ach-count {
      color: var(--pubg-muted);
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      margin-left: 6px;
    }
    .ach-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 8px;
    }
    .ach-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 10px;
      border-radius: 3px;
      background: rgba(255,255,255,0.04);
      font-size: 0.9em;
    }
    .ach-icon {
      font-size: 1.2em;
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: none;
    }
    .ach-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 4px;
    }
    .ach-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }
    .ach-canonical {
      color: var(--pubg-gold, #f2b705);
      font-size: 0.7em;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .ach-label { color: var(--pubg-text); font-weight: 700; }
    .ach-when { color: var(--pubg-muted); font-size: 0.85em; }

    /* PAYDAY / Event Stats */
    .payday-totals {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }
    .payday-cell {
      padding: 8px 10px;
      background: rgba(216,180,255, 0.12);
      border: 1px solid rgba(216,180,255, 0.35);
      border-radius: 5px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .payday-cell .pubg-stat-value { color: #e0c8ff; font-size: 1.4em; font-weight: 700; }
    .payday-cell .pubg-stat-label {
      color: var(--pubg-muted); font-size: 0.7em;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .payday-loot-total {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .loot-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      background: rgba(216,180,255, 0.15);
      border: 1px solid rgba(216,180,255, 0.4);
      border-radius: 12px;
      font-size: 0.82em;
    }
    .loot-badge b { color: #e0c8ff; }
    .payday-matches {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85em;
    }
    .payday-matches th {
      text-align: left;
      color: var(--pubg-muted);
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 0.78em;
      padding: 4px 6px;
      border-bottom: 1px solid var(--pubg-border);
    }
    .payday-matches td {
      padding: 5px 6px;
      border-bottom: 1px solid rgba(94,42,121,0.18);
    }
    .payday-matches .loot-cell {
      display: flex; flex-wrap: wrap; gap: 4px;
    }

    .highlights {
      margin-top: 22px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .highlights .col h3 {
      margin: 0 0 8px;
      color: var(--pubg-muted);
      font-size: 0.8em;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .highlight-item {
      padding: 6px 10px;
      margin-bottom: 4px;
      font-size: 0.85em;
      border-radius: 3px;
      background: rgba(255,255,255,0.04);
    }
    .empty {
      text-align: center;
      color: var(--pubg-muted);
      padding: 40px;
      font-style: italic;
    }
    .range-picker {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      padding: 10px 14px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--pubg-border);
      border-radius: 6px;
      flex-wrap: wrap;
    }
    .range-picker label {
      color: var(--pubg-muted);
      font-size: 0.78em;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .range-picker input[type=date],
    .range-picker input[type=time] {
      background: rgba(0,0,0,0.4);
      color: var(--pubg-text);
      border: 1px solid var(--pubg-border);
      padding: 4px 6px;
      border-radius: 3px;
      font-family: inherit;
      font-size: inherit;
      color-scheme: dark;
    }
    .range-picker .presets {
      display: flex; gap: 4px;
      margin-left: auto;
    }
    .range-picker .preset {
      padding: 4px 10px;
      background: rgba(94,42,121,0.18);
      border: 1px solid transparent;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.85em;
      color: var(--pubg-text);
      font-family: inherit;
    }
    .range-picker .preset:hover { background: rgba(94,42,121,0.4); }
    .range-picker button.apply {
      background: var(--pubg-gold);
      color: #1a0d2a;
      border: none;
      padding: 5px 14px;
      border-radius: 3px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .session-picker {
      margin-bottom: 18px;
      padding: 12px 14px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--pubg-border);
      border-radius: 6px;
    }
    .session-picker .controls {
      display: flex; gap: 10px; align-items: center;
      margin-bottom: 10px;

    }
    .session-picker .controls select {
      background: rgba(0,0,0,0.4);

    .session-picker .controls .month-tabs {

    }
    .session-picker .controls .month-tab {
      padding: 4px 10px;

      border: 1px solid transparent;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.78em;
      color: var(--pubg-text);
      font-family: inherit;
    }
    .session-picker .controls .month-tab:hover { background: rgba(94,42,121,0.4); }
    .session-picker .controls .month-tab.active {

    .session-picker .summary {

    }
    .session-picker .toggle-all {
      background: rgba(94,42,121,0.3);
      border: 1px solid var(--pubg-border);
      padding: 4px 10px;
      border-radius: 3px;

    .session-picker .month-header {
      color: var(--pubg-gold);
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin: 12px 0 6px;

      border-bottom: 1px solid var(--pubg-border);
    }
    .session-picker .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));

    .session-picker .item {
