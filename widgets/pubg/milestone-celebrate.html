<!DOCTYPE html>
<html>
<!--
  PUBG Career-Wins Milestone Celebration
  ──────────────────────────────────────────────────────────────────────
  Vollbild-Overlay fuer einen besonderen Wins-Meilenstein (z.B. 1000.
  Career-Win). Zeigt Titel + Konfetti + Career-Stats-Snapshot.

  Parameter:
    ?n=1000        Ziel-Zahl im Titel (default 1000)
    ?wait=15       Sekunden bis fade-out (default 15)
    ?mute=1        ohne Fanfare
    ?player=Name   anderer Spieler (default = self)

  Quelle Career-Stats: /api/pubg/career-lifetime (selbe API wie career-card).
-->
<head>
  <meta charset="utf-8">
  <title>Career Wins Milestone</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="_pubg.css">
  <link rel="stylesheet" href="../_theme.css">
  <style>
    /* Lokale Schrift — verhindert Layout-Sprung wenn Google-Fonts
       per swap die Fallback-Schrift gegen DM Sans austauscht
       (Zahl wird breiter → translate(-50%) re-zentriert → springt). */
    @font-face {
      font-family: 'DM Sans';
      src: url('/assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-display: block;
    }
:root {
      --mc-gold:    var(--theme-accent,   var(--mc-gold));
      --mc-primary: var(--theme-primary,  var(--mc-primary));
      --mc-bg:      var(--theme-bg,       var(--mc-bg));
      --mc-surface: var(--theme-surface,  var(--mc-surface));
    }
        html, body {
      width: 1920px; height: 1080px;
      margin: 0; overflow: hidden;
      background: transparent;
      font-family: var(--theme-font-body, "DM Sans", sans-serif);
      color: var(--pubg-text, #fff);
    }
    /* Alle Animationen pausieren bis JS Schrift+Daten geladen hat —
       sonst startet die Sequenz noch waehrend wir lifetime fetchen
       und die Riesenzahl springt beim Font-Swap nach. */
    html.preload * { animation-play-state: paused !important; }
    html.preload .stage { opacity: 0; }
    .stage {
      position: absolute; inset: 0;
      animation: fadeOut 1.2s ease-in forwards;
      animation-delay: var(--out-delay, 13.8s);
    }
    @keyframes fadeOut { from { opacity: 1 } to { opacity: 0 } }

    .bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at center,
          color-mix(in srgb,var(--mc-primary) 85%,transparent) 0%,
          color-mix(in srgb,var(--mc-bg) 92%,transparent) 45%,
          color-mix(in srgb,var(--mc-bg) 98%,transparent) 90%);
      animation: bgIn 0.6s ease-out forwards;
      opacity: 0;
    }
    @keyframes bgIn { to { opacity: 1 } }

    /* Goldener Rahmen-Beam oben/unten */
    .beam {
      position: absolute; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg,
        transparent, var(--pubg-gold) 30%, var(--pubg-gold) 70%, transparent);
      box-shadow: 0 0 24px color-mix(in srgb,var(--mc-gold) 70%,transparent);
      opacity: 0;
      animation: bgIn 0.5s ease-out 0.4s forwards;
    }
    .beam.top { top: 60px; }
    .beam.bot { bottom: 60px; }

    /* Crown */
    .crown {
      position: absolute; left: 50%; top: 200px;
      transform: translate(-50%, 40px) scale(0.4);
      font-size: 120px;
      opacity: 0;
      filter: drop-shadow(0 0 30px color-mix(in srgb,var(--mc-gold) 80%,transparent));
      animation: crownIn 0.7s cubic-bezier(0.22,1.6,0.36,1) 0.8s forwards,
                 crownBob 3.2s ease-in-out 1.6s infinite;
    }
    @keyframes crownIn {
      to { transform: translate(-50%, 0) scale(1); opacity: 1 }
    }
    @keyframes crownBob {
      0%,100% { transform: translate(-50%, 0) scale(1); }
      50%     { transform: translate(-50%, -8px) scale(1.04); }
    }

    /* Big number */
    .num {
      position: absolute; left: 50%; top: 350px;
      transform: translate(-50%, 80px) scale(0.5);
      font-size: 360px;
      font-weight: 900;
      letter-spacing: -8px;
      line-height: 1;
      color: var(--pubg-gold);
      -webkit-text-stroke: 4px color-mix(in srgb,var(--mc-primary) 40%,#000);
      text-shadow:
        0 0 40px color-mix(in srgb,var(--mc-gold) 70%,transparent),
        0 0 100px color-mix(in srgb,var(--mc-gold) 40%,transparent),
        8px 8px 0 var(--mc-surface);
      opacity: 0;
      background: linear-gradient(90deg, color-mix(in srgb,var(--mc-gold) 80%,#fff), #fff2a8, color-mix(in srgb,var(--mc-gold) 80%,#fff));
      background-size: 250% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: numIn 0.6s cubic-bezier(0.22,1.6,0.36,1) 1.4s forwards,
                 numShimmer 3s linear 2.0s infinite;
    }
    @keyframes numIn {
      to { transform: translate(-50%, 0) scale(1); opacity: 1 }
    }
    @keyframes numShimmer {
      0%   { background-position: 0% 50%; }
      100% { background-position: 250% 50%; }
    }

    /* Subtitle — volle Breite + text-align: center, sonst rutscht
       bei langen Strings wie 'CAREER CHICKEN DINNER #800' das #800
       auf eine zweite Zeile (mit left:50% ist nur die rechte
       Container-Haelfte als Layout-Breite verfuegbar). */
    .sub {
      position: absolute; left: 0; right: 0; top: 760px;
      transform: translateY(20px);
      text-align: center;
      white-space: nowrap;
      font-size: 60px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 0 14px rgba(255,255,255,0.4);
      opacity: 0;
      animation: subIn 0.5s ease-out 2.4s forwards;
    }
    @keyframes subIn {
      to { transform: translateY(0); opacity: 1 }
    }
    @keyframes statsIn {
      to { transform: translate(-50%, 0); opacity: 1 }
    }

    /* Stat-Grid */
    .stats {
      position: absolute; left: 50%; top: 860px;
      transform: translate(-50%, 20px);
      display: grid;
      grid-template-columns: repeat(4, auto);
      gap: 12px 60px;
      opacity: 0;
      animation: statsIn 0.6s ease-out 3.0s forwards;
    }
    .stats .cell {
      text-align: center;
      min-width: 200px;
    }
    .stats .v {
      font-size: 56px; font-weight: 900;
      color: var(--pubg-gold);
      font-variant-numeric: tabular-nums;
      line-height: 1;
      text-shadow: 0 0 10px color-mix(in srgb,var(--mc-gold) 50%,transparent);
    }
    .stats .l {
      display: block;
      font-size: 18px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 8px;
    }

    /* Konfetti — 80 Stueck pro Side. */
    .confetti {
      position: absolute; inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .c {
      position: absolute; top: -40px;
      width: 14px; height: 14px;
      transform-origin: center;
      animation: cFall linear forwards;
    }
    @keyframes cFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(1180px) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="bg"></div>
    <div class="beam top"></div>
    <div class="beam bot"></div>

    <div class="confetti" id="confetti"></div>

    <div class="crown"><span class="material-symbols-outlined" aria-hidden="true">workspace_premium</span></div>
    <div class="num" id="num">1000</div>
    <div class="sub" id="sub">Career Chicken Dinners</div>

    <div class="stats" id="stats"></div>
  </div>

  <audio id="fanfare" preload="auto" src="/assets/stingers/fanfare.mp3"></audio>

  <script src="_pubg.js"></script>
  <script>
    // ?n=<num> erlaubt manuelles Override. Ohne n: auto-detect aus
    // lifetime.wins (= letzte erreichte 100er-Marke). ?force=1
    // erzwingt die Sequenz auch wenn nichts NEUES gehittet wurde
    // (zum Testen). ?reset=1 loescht den localStorage-Marker —
    // naechster echte Milestone feiert dann wieder.
    const N_OVERRIDE = parseInt(PubgUI.qs("n", "") || "0", 10) || null;
    const WAIT       = parseInt(PubgUI.qs("wait", "15"), 10);
    const MUTE       = PubgUI.qs("mute", "0") === "1";
    const PLAYER     = PubgUI.qs("player", "");
    const FORCE      = PubgUI.qs("force", "0") === "1";
    const STORAGE_KEY = "pubg.milestone.lastCelebrated"
                      + (PLAYER ? ":" + PLAYER : "");
    if (PubgUI.qs("reset", "0") === "1") {
      try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    }

    // Alle Animationen pausiert lassen bis bootstrap() durch ist.
    document.documentElement.classList.add("preload");
    document.documentElement.style.setProperty("--out-delay",
      Math.max(3, WAIT - 1.2) + "s");

    function setNumber(N) {
      document.getElementById("num").textContent = PubgUI.fmtNum(N);
      const sub = (N % 1000 === 0) ? "Grand Career Chickens"
                : (N % 500  === 0) ? "Half-Grand Career Chickens"
                : `Career Chicken Dinner #${N}`;
      document.getElementById("sub").textContent = sub.toUpperCase();
    }
    // Robustes Audio-Play: wartet auf canplay (sonst kann play() vor
    // Buffer-Ready fehlschlagen), retried auf Click/Keydown wenn
    // Chromium autoplay blockt. Mimick'd das Pattern von stinger-ready.js.
    function playFanfare() {
      const a = document.getElementById("fanfare");
      const start = () => {
        const p = a.play();
        if (p && p.catch) p.catch((err) => {
          console.warn("[milestone] autoplay blocked — retry on next input", err);
          const retry = () => {
            document.removeEventListener("click", retry);
            document.removeEventListener("keydown", retry);
            try { a.play().catch(() => {}); } catch (e) {}
          };
          document.addEventListener("click", retry, { once: true });
          document.addEventListener("keydown", retry, { once: true });
        });
      };
      // canplay-Schwelle: readyState >= 3 (HAVE_FUTURE_DATA).
      if (a.readyState >= 3) {
        start();
      } else {
        const onReady = () => { a.removeEventListener("canplay", onReady); start(); };
        a.addEventListener("canplay", onReady);
        // Safety wenn canplay nie feuert
        setTimeout(start, 1500);
      }
    }

    function startStage() {
      document.documentElement.classList.remove("preload");
      // Fanfare 400ms verzoegert — synct mit Crown-Pop.
      if (!MUTE) setTimeout(playFanfare, 400);
    }

    // Konfetti generieren — Gold, Purple, Weiss in zufaelligen Bahnen.
    (function makeConfetti() {
      const host = document.getElementById("confetti");
      const colors = ["var(--mc-gold)", "#fff2a8", "color-mix(in srgb,var(--mc-primary) 70%,#fff)", "var(--mc-primary)", "#ffffff"];
      const COUNT = 110;
      for (let i = 0; i < COUNT; i++) {
        const el = document.createElement("div");
        el.className = "c";
        el.style.left = (Math.random() * 100).toFixed(2) + "%";
        el.style.background = colors[i % colors.length];
        // Rechteck oder Strip — Variation
        if (i % 3 === 0) { el.style.width = "6px"; el.style.height = "18px"; }
        if (i % 5 === 0) { el.style.borderRadius = "50%"; }
        // Dauer + Start-Delay zufaellig spreizen ueber die ersten 10s.
        const dur   = (3 + Math.random() * 4).toFixed(2);
        const delay = (Math.random() * 8).toFixed(2);
        el.style.animationDuration = dur + "s";
        el.style.animationDelay    = delay + "s";
        host.appendChild(el);
      }
    })();

    // Win-Triggered Celebration: pollt last-match. Bei NEUEM Win (place=1
    // mit anderem matchId als zuletzt gesehen) wird career-lifetime gefetcht
    // und geprueft ob ein 100er-Meilenstein gerade ueberschritten wurde.
    // Erst-Load: ANY current N wird stumm wegspeichert (= "Stand beim ersten
    // Start", noch kein neuer Win seit dem) → keine Feier. Sonst kaem der
    // Knaller jedes Mal beim OBS-Szenenwechsel.
    const LAST_MATCH_KEY = "pubg.milestone.lastSeenMatchId"
                         + (PLAYER ? ":" + PLAYER : "");

    function readLastCelebrated() {
      try { return parseInt(localStorage.getItem(STORAGE_KEY) || "0", 10) || 0; }
      catch (e) { return 0; }
    }
    function writeLastCelebrated(N) {
      try { localStorage.setItem(STORAGE_KEY, String(N)); } catch (e) {}
    }
    function readLastSeenMatch() {
      try { return localStorage.getItem(LAST_MATCH_KEY) || ""; }
      catch (e) { return ""; }
    }
    function writeLastSeenMatch(mid) {
      try { localStorage.setItem(LAST_MATCH_KEY, mid || ""); } catch (e) {}
    }

    async function fetchLifetime() {
      const params = new URLSearchParams({ mode: "all" });
      if (PLAYER) params.set("player", PLAYER);
      try {
        return await PubgUI.fetchJson(
          (window.__SERVE_BASE__||"/") + `api/pubg/career-lifetime?${params}`);
      } catch (e) { return null; }
    }

    async function celebrate(N, d) {
      setNumber(N);
      writeLastCelebrated(N);
      if (d && d.rounds_played) {
        const cells = [
          { v: PubgUI.fmtNum(d.rounds_played), l: "Matches"  },
          { v: PubgUI.fmtKD(d.kd_ratio),       l: "K/D"      },
          { v: PubgUI.fmtNum(d.kills),         l: "Kills"    },
          { v: PubgUI.fmtPct(d.win_rate),      l: "Win Rate" },
        ];
        document.getElementById("stats").innerHTML = cells.map(c =>
          `<div class="cell"><div class="v">${c.v}</div><span class="l">${c.l}</span></div>`
        ).join("");
      }
      try { await document.fonts.ready; } catch (e) {}
      startStage();
    }

    async function bootstrap() {
      // Force/Override: sofort feiern (Testpfad)
      if (FORCE || N_OVERRIDE) {
        const d = await fetchLifetime();
        let N = N_OVERRIDE;
        if (!N && d && d.wins != null) N = Math.floor(d.wins / 100) * 100;
        if (!N || N < 100) N = 1000;
        await celebrate(N, d);
        return;
      }

      // Erst-Load: aktuellen Stand stumm wegspeichern, NICHT feiern.
      // Stage bleibt versteckt.
      let lastCelebrated = readLastCelebrated();
      if (lastCelebrated === 0) {
        const d = await fetchLifetime();
        if (d && d.wins != null) {
          const N = Math.floor(d.wins / 100) * 100;
          if (N >= 100) writeLastCelebrated(N);
        }
        // Stage bleibt im preload — niemals zeigen ohne Trigger.
      }

      // Win-Trigger-Loop: pollt /api/pubg/last-match alle 30s. Wenn neue
      // matchId UND place=1 → fetch lifetime → bei Milestone-Hit feiern.
      let lastSeen = readLastSeenMatch();
      async function checkOnce() {
        let lm;
        try {
          lm = await PubgUI.fetchJson(
            (window.__SERVE_BASE__||"/") + "api/pubg/last-match");
        } catch (e) { return; }
        if (!lm || !lm.matchId) return;
        const isNewMatch = lm.matchId !== lastSeen;
        if (!isNewMatch) return;
        lastSeen = lm.matchId;
        writeLastSeenMatch(lastSeen);
        if (lm.place !== 1) return;  // kein Win → nichts zu feiern
        // Win! Pruefe ob ein neuer Milestone fiel.
        const d = await fetchLifetime();
        if (!d || d.wins == null) return;
        const N = Math.floor(d.wins / 100) * 100;
        const lastN = readLastCelebrated();
        if (N >= 100 && N > lastN) {
          await celebrate(N, d);
        }
      }
      // Sofortiger Check (falls man die Page nach einem Win lädt) + alle 30s
      checkOnce();
      setInterval(checkOnce, 30000);
    }
    bootstrap();
  </script>
</body>
</html>
