<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG Session Achievements</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <style>
    /* Anker: bottom-left. Liste wächst nach oben, neueste unten. */
    html, body { height: 100%; margin: 0; }
    body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      box-sizing: border-box;
    }
    .panel { padding: 14px 16px; }
    .list {
      display: flex;
      flex-direction: column-reverse;
    }
    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 4px;
      border-bottom: 1px solid var(--pubg-border);
      animation: pubg-fade-in 0.5s ease-out;
    }
    .item:last-child { border-bottom: none; }
    .item .icon {
      font-size: 1.6em;
      filter: drop-shadow(0 0 6px rgba(255, 175, 30, 0.4));
    }
    .item .text { flex: 1 1 auto; }
    .item .label {
      color: var(--pubg-text);
      font-weight: 700;
    }
    .item .when {
      color: var(--pubg-muted);
      font-size: 0.78em;
      margin-top: 2px;
    }
    .empty {
      color: var(--pubg-muted);
      font-style: italic;
      padding: 8px 4px;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="pubg-header" id="pubgHeader"></div>
  <div class="pubg-card panel pubg-fade-in">
    <div class="list" id="list"></div>
  </div>
  <script src="_pubg.js"></script>
  <script>
    PubgUI.buildFilter([
      { key: "limit", label: "Show items", type: "range",
        min: 1, max: 20, default: 5,
        tooltip: "Maximum number of achievements to display." },
    ]);
    PubgUI.renderHeader(document.getElementById("pubgHeader"), "Achievements", "session");

    const LIMIT = parseInt(PubgUI.qs("limit", 5), 10);

    function fmtTime(iso) {
      if (!iso) return "";
      try {
        return new Date(iso).toLocaleTimeString("de-DE",
          { hour: "2-digit", minute: "2-digit" });
      } catch (_) { return ""; }
    }

    function render(list) {
      const root = document.getElementById("list");
      if (!list || list.length === 0) {
        root.innerHTML = `<div class="empty">no achievements yet</div>`;
        return;
      }
      // Top-N=LIMIT, neueste zuerst (in der Liste unten via column-reverse)
      const items = list.slice(-LIMIT);
      root.innerHTML = items.map(a => `
        <div class="item">
          <span class="icon">${a.icon || ""}</span>
          <div class="text">
            <div class="label">${a.label || a.id}</div>
            <div class="when">${fmtTime(a.playedAt)}</div>
          </div>
        </div>
      `).join("");
    }

    PubgUI.hideIfStale();
    PubgUI.poll("/api/pubg/session-achievements", 30000, (d) => {
      PubgUI.hideIfStale();
      render(d);
    }, console.error);
  </script>
</body>
</html>
