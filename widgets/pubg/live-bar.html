<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG Live Bar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <link rel="stylesheet" href="../_theme.css">
  <link rel="stylesheet" href="../_theme.css">
  <style>
    html, body { margin: 0; padding: 0; }
    /* Anker: top-center. Bar ist nur so breit wie Inhalt — Source kann ruhig
       1920 sein, sichtbare Pixel = nur Content-Breite, zentriert. */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
    }
    body:not(.pubg-has-filter) { height: 40px; }
    .live-bar {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 6px 16px;
      height: 40px;
      font-size: 16px;
    }
    .live-bar .sep { color: var(--pubg-muted); }
    .live-bar .label { color: var(--pubg-muted); margin-right: 4px; font-size: 0.85em; }
    .live-bar .icon { margin-right: 4px; }
  </style>
</head>
<body>
  <div class="pubg-card pubg-flat live-bar pubg-fade-in" id="bar">
    <span class="pubg-stat-value" id="kills">—</span> <span class="label">Kills</span></span>
    <span class="sep">·</span>
    <span class="pubg-stat-value" id="dmg">—</span> <span class="label">DMG</span></span>
    <span class="sep">·</span>
    <span class="pubg-stat-value" id="wins">—</span> <span class="label">Wins</span></span>
    <span class="sep">·</span>
    <span class="pubg-stat-value" id="matches">—</span> <span class="label" id="matches-label">Matches</span>
  </div>
  <script src="_pubg.js"></script>
  <script>
    // Filter-Bar nur mit dem globalen 'Show always'-Toggle.
    PubgUI.buildFilter([]);
    const REFRESH_MS = parseInt(PubgUI.qs("refreshMs", 30000), 10);

    const fmt = (n) => {
      if (n == null) return "—";
      if (n >= 1000) return (n / 1000).toFixed(1) + "k";
      return String(Math.round(n));
    };

    function renderSession(s) {
      PubgUI.animateNumber(document.getElementById("kills"), s.kills || 0, {format: fmt});
      PubgUI.animateNumber(document.getElementById("dmg"), s.damage || 0, {format: fmt});
      PubgUI.animateNumber(document.getElementById("wins"), s.wins || 0, {format: fmt});
      PubgUI.animateNumber(document.getElementById("matches"), s.matches || 0, {format: fmt});
      document.getElementById("matches-label").textContent =
        (s.matches === 1) ? "Match" : "Matches";
    }

    PubgUI.hideIfStale();
    PubgUI.poll((window.__SERVE_BASE__||"/") + "api/pubg/session", REFRESH_MS, (s) => {
      PubgUI.hideIfStale();
      renderSession(s);
    }, console.error);
  </script>
</body>
</html>
