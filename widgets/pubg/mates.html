<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG Mates</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <style>
    /* Anker: bottom-left. Card sitzt am Boden des Sources, Inhalt
       wächst nach oben. Bei Overflow → JS-gesteuerter Auto-Scroll. */
    html, body { height: 100%; margin: 0; }
    body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      box-sizing: border-box;
    }
    #root {
      width: 100%;
      max-height: 100%;
      overflow: hidden;
    }
    .mate {
      padding: 10px 14px;
      margin-bottom: 8px;
    }
    .mate-name { font-weight: 700; font-size: 1.05em; }
    .mate-line {
      display: flex; justify-content: space-between;
      font-size: 0.85em; color: var(--pubg-muted);
      margin-top: 4px;
      color: var(--pubg-muted);
    }
    .mate-line b { color: var(--pubg-gold); font-variant-numeric: tabular-nums; }

    /* Stack: column-reverse → DOM-Reihenfolge bleibt, visuell wächst von unten */
    .stack { display: flex; flex-direction: column-reverse; }
    .stack .mate { margin-bottom: 0; margin-top: 8px; }

    /* Fold: Mates erscheinen einzeln nach unten, Stack wächst nach oben.
       column-reverse + Animation aus translateY(12px). */
    .fold {
      display: flex;
      flex-direction: column-reverse;
    }
    .fold .mate {
      opacity: 0;
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      margin-top: 0;
      overflow: hidden;
      transform: translateY(12px);
      transition:
        max-height 0.5s ease-out,
        padding 0.5s ease-out,
        margin 0.5s ease-out,
        opacity 0.4s 0.1s ease-out,
        transform 0.4s 0.1s ease-out;
    }
    .fold .mate.shown {
      opacity: 1;
      max-height: 220px;
      padding-top: 10px;
      padding-bottom: 10px;
      margin-top: 8px;
      transform: translateY(0);
    }

    .carousel { position: relative; min-height: 100px; }
    .carousel .mate { position: absolute; inset: 0; opacity: 0; transition: opacity 0.6s; padding: 12px; }
    .carousel .mate.active { opacity: 1; }
    .carousel .dots {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 6px;
    }
    .carousel .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--pubg-muted); opacity: 0.4; }
    .carousel .dot.active { background: var(--pubg-gold); opacity: 1; }

    .mosaic { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .mosaic .mate { border-left: 0; border-top: 3px solid var(--pubg-purple); }
  </style>
</head>
<body>
  <div class="pubg-header" id="pubgHeader"></div>
  <div id="root" class="pubg-card stack"></div>

  <script src="_pubg.js"></script>
  <script>
    const LAYOUT = PubgUI.qs("layout", "carousel");
    const RANGE = PubgUI.qs("range", "session");
    PubgUI.renderHeader(document.getElementById("pubgHeader"), "Mates", RANGE);
    // minMatches OPTIONAL — wenn nicht gesetzt, greift das globale Setting
    // (minMatchesForTopMates), das vom flyout-full-Slider gesetzt wird.
    const MIN_RAW = PubgUI.qs("minMatches");
    const MIN_PARAM = MIN_RAW != null ? `&minMatches=${MIN_RAW}` : "";

    PubgUI.buildFilter([
      { key: "layout", label: "Layout", type: "select", default: "carousel",
        options: [["carousel","Carousel"],["stack","Stack"],
                  ["fold","Fold"],["mosaic","Mosaic"]]},
      { key: "range", label: "Range", type: "select", default: "session",
        options: [["session","Session"],["week","7 days"]]},
      { key: "minMatches", label: "Min Matches", type: "range",
        min: 1, max: 30, default: 1 },
      { key: "minTotal", label: "Min Total", type: "range",
        min: 1, max: 50, default: 1 },
    ]);
    document.getElementById("root").className = "pubg-card " + LAYOUT;

    function mateBody(m) {
      return `
          <div class="mate-name">${m.name}</div>
          <div class="mate-line">
            <span><b>${m.sharedMatchesToday}</b> Matches in Range · K/D <b>${PubgUI.fmtKD(m.kdToday)}</b> · DMG <b>${PubgUI.fmtNum(Math.round(m.dmgToday||0))}</b></span>
          </div>`;
    }

    function mateHTML(m) {
      return `<div class="mate">${mateBody(m)}</div>`;
    }

    let carouselIdx = 0;
    let carouselTimer = null;
    let stopScroll = null;

    function render(list) {
      const root = document.getElementById("root");
      if (!list || !list.length) {
        root.innerHTML = `<div class="pubg-error">no mates yet</div>`;
        return;
      }
      if (LAYOUT === "carousel") {
        root.innerHTML = list.map((m, i) =>
          `<div class="mate ${i===0?'active':''}" data-i="${i}">${mateBody(m)}</div>`
        ).join("") + `<div class="dots">${list.map((_,i)=>`<div class="dot ${i===0?'active':''}"></div>`).join("")}</div>`;
        if (carouselTimer) clearInterval(carouselTimer);
        carouselIdx = 0;
        carouselTimer = setInterval(() => {
          carouselIdx = (carouselIdx + 1) % list.length;
          root.querySelectorAll(".mate").forEach((el, i) =>
            el.classList.toggle("active", i === carouselIdx));
          root.querySelectorAll(".dot").forEach((el, i) =>
            el.classList.toggle("active", i === carouselIdx));
        }, 6000);
      } else if (LAYOUT === "fold") {
        root.innerHTML = list.map(mateHTML).join("");
        root.querySelectorAll(".mate").forEach((el, i) =>
          setTimeout(() => el.classList.add("shown"), i * 600));
        // Nach dem Fold-Reveal Auto-Scroll starten falls Inhalt überläuft
        const totalDelay = list.length * 600 + 500;
        if (stopScroll) stopScroll();
        setTimeout(() => { stopScroll = PubgUI.autoscroll(root); }, totalDelay);
      } else {
        // stack / mosaic
        root.innerHTML = list.map(mateHTML).join("");
        if (stopScroll) stopScroll();
        stopScroll = PubgUI.autoscroll(root);
      }
    }

    PubgUI.poll(`/api/pubg/mates?range=${RANGE}${MIN_PARAM}`,
                30000, render, console.error);
  </script>
</body>
</html>
