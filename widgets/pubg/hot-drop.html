<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG Hot Drops</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <style>
    /* Anker: bottom-left. */
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      box-sizing: border-box;
    }
    /* OBS-Dock-Modus: dunkler Hintergrund + Card oben links statt
       Anker unten. Aktivierung via ?dock=1. */
    body.dock {
      background: #0d061a;
      justify-content: flex-start;
      padding: 10px;
    }
    body.dock .panel {
      width: 100%;
      max-width: 460px;
    }
    .panel { padding: 18px; }
    .top {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 14px;
    }
    .big {
      font-size: 2.6em;
      font-weight: 700;
      color: var(--pubg-gold);
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 14px rgba(242, 183, 5, 0.4);
    }
    .label { color: var(--pubg-muted); font-size: 0.85em; }
    .row {
      display: flex; justify-content: space-between;
      margin-top: 6px; font-size: 0.95em;
    }
    .row b { color: var(--pubg-text); font-variant-numeric: tabular-nums; }
    .streak {
      display: inline-flex; gap: 4px; align-items: center;
      color: var(--pubg-gold);
      font-weight: 700;
    }
    .streak.cold { opacity: 0.5; color: var(--pubg-muted); }
    .markers {
      display: flex; gap: 3px; margin-top: 12px;
    }
    .markers .m {
      width: 10px; height: 10px; border-radius: 2px;
      background: var(--pubg-muted);
      opacity: 0.45;
    }
    .markers .m.hot   { background: #ff7a1f; opacity: 1; }
    .markers .m.died  { background: #e57b7b; opacity: 0.7; }
    /* Solo tot, Team ueberlebt: eigener Farbton (lila, brand-purple),
       weil rot/orange-Mix bei 10x10px nicht unterscheidbar ist. */
    .markers .m.died.team-saved {
      background: #a974d4;
      opacity: 1;
    }
    .meta { color: var(--pubg-muted); font-size: 0.78em; margin-top: 8px; }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 10px;
      margin-top: 6px;
      font-size: 0.7em;
      color: var(--pubg-muted);
      letter-spacing: 0.04em;
    }
    .legend .item { display: inline-flex; align-items: center; gap: 4px; }
    .legend .swatch {
      width: 8px; height: 8px; border-radius: 2px;
      background: var(--pubg-muted); opacity: 0.45;
    }
    .legend .swatch.hot  { background: #ff7a1f; opacity: 1; }
    .legend .swatch.died { background: #e57b7b; opacity: 0.7; }
    .legend .swatch.team-saved {
      background: #a974d4;
      opacity: 1;
    }
    .legend .hint { opacity: 0.7; font-style: italic; }

    /* Floating Popover bei Hover */
    .popover {
      position: fixed;
      display: none;
      background: #0d061a;
      border: 1px solid var(--pubg-gold, #f2b705);
      border-radius: 5px;
      padding: 10px 12px;
      font-size: 0.78em;
      color: var(--pubg-text);
      line-height: 1.5;
      max-width: 320px;
      z-index: 9999;
      pointer-events: none;
      box-shadow: 0 4px 14px rgba(0,0,0,0.6);
      white-space: pre-line;
    }
    .popover .pov-title {
      color: var(--pubg-gold);
      font-weight: 700;
      margin-bottom: 4px;
      font-size: 1.05em;
    }
    .popover.show { display: block; }
  </style>
</head>
<body>
  <div class="pubg-header" id="pubgHeader"></div>
  <div class="pubg-card panel pubg-fade-in">
    <div class="top">
      <span class="big" id="rate">—</span>
      <span class="label">Hot-Drop Rate</span>
    </div>
    <div class="row">
      <span class="label">Solo Survival</span>
      <b id="soloSurv">—</b>
    </div>
    <div class="row">
      <span class="label">Team Survival</span>
      <b id="teamSurv">—</b>
    </div>
    <div class="row">
      <span class="label">Streak</span>
      <span class="streak" id="streak">—</span>
    </div>
    <div class="row">
      <span class="label">Ø Teams in fight</span>
      <b id="teams">—</b>
    </div>
    <div class="row">
      <span class="label">Ø Teams landed within 300m</span>
      <b id="teamsRadius">—</b>
    </div>
    <div class="markers" id="markers"></div>
    <div id="popover" class="popover"></div>
    <div class="meta" id="meta">—</div>
    <div class="legend">
      <span class="item"><span class="swatch hot"></span>You alive</span>
      <span class="item"><span class="swatch died team-saved"></span>You died · team alive</span>
      <span class="item"><span class="swatch died"></span>Died</span>
      <span class="item"><span class="swatch"></span>Cold</span>
    </div>
  </div>
  <script src="_pubg.js"></script>
  <script>
    const RANGE = PubgUI.qs("range", "session");
    const DOCK = PubgUI.qs("dock", "0") === "1";
    const POLL_MS = parseInt(PubgUI.qs("pollMs",
                              DOCK ? "8000" : "30000"), 10);
    if (DOCK) document.body.classList.add("dock");
    PubgUI.renderHeader(document.getElementById("pubgHeader"), "Hot Drops", RANGE);

    PubgUI.buildFilter([
      { key: "range", label: "Range", type: "select", default: "session",
        options: [["session","Session"],["week","7 days"],["all","Database"]],
        tooltip: "Which matches to include — Session, last 7 days, or the " +
                 "whole database." },
    ]);

    function render(d) {
      if (!d || d.matches === 0) {
        document.getElementById("rate").textContent = "—";
        document.getElementById("soloSurv").textContent = "—";
        document.getElementById("teamSurv").textContent = "—";
        document.getElementById("streak").textContent = "—";
        document.getElementById("markers").innerHTML = "";
        document.getElementById("meta").textContent = "no matches in range";
        return;
      }
      document.getElementById("rate").textContent = (d.rate || 0).toFixed(0) + "%";
      const fmt = (rate, num, denom) =>
        `${(rate||0).toFixed(0)}% (${num||0}/${denom||0})`;
      document.getElementById("soloSurv").textContent = fmt(d.soloSurvivalRate, d.soloSurvived, d.hotDrops);
      document.getElementById("teamSurv").textContent = fmt(d.teamSurvivalRate, d.teamSurvived, d.hotDrops);

      const streakEl = document.getElementById("streak");
      const s = d.streak || 0;
      if (s > 0) {
        streakEl.classList.remove("cold");
        streakEl.innerHTML = `🔥 ${s}`;
      } else {
        streakEl.classList.add("cold");
        streakEl.innerHTML = "—";
      }

      const teamsEl = document.getElementById("teams");
      if (d.avgTeamsInFight) {
        teamsEl.textContent = `${d.avgTeamsInFight.toFixed(1)} (max ${d.maxTeamsInFight||0})`;
      } else {
        teamsEl.textContent = "—";
      }
      const teamsRadiusEl = document.getElementById("teamsRadius");
      if (d.avgTeamsInRadius) {
        teamsRadiusEl.textContent = `${d.avgTeamsInRadius.toFixed(1)} (max ${d.maxTeamsInRadius||0})`;
      } else {
        teamsRadiusEl.textContent = "—";
      }

      // Markers chronologisch: links = aeltestes (#1), rechts = neuestes
      // (#N). Vier Faelle:
      //   cold (grau)            : kein Hot-Drop
      //   hot (orange)           : du ueberlebt (egal ob team)
      //   died+team-saved (split): du tot, team lebt -> diagonal rot/orange
      //   died (rot)             : du + team beide tot
      // perMatch kommt DESC (newest first); .reverse() macht ASC.
      // Backend liefert jetzt alle perMatch (kein 20er-Limit). Fuer
      // Sparkline begrenzen wir hier auf die letzten 20 Matches.
      const matches = (d.perMatch || []).slice(0, 20).reverse();
      const total = matches.length;
      const fmtDur = (s) => {
        if (s == null) return "?";
        const m = Math.floor(s / 60), x = Math.floor(s % 60);
        return `${m}:${String(x).padStart(2,"0")}`;
      };
      // perMatch-Daten an Marker per data-Index hängen, fuer Popover.
      window._hdMatches = matches;
      const html = matches.map((m, i) => {
        const num = i + 1;
        let cls = "", desc = "cold drop";
        if (!m.hotDrop) { /* cls leer, desc cold */ }
        else if (m.soloSurvived) { cls = "hot"; desc = "hot drop, you survived"; }
        else if (m.teamSurvived) { cls = "died team-saved"; desc = "hot drop, you died — team survived"; }
        else { cls = "died"; desc = "hot drop, died"; }
        return `<div class="m ${cls}" data-mi="${i}" data-num="${num}" data-desc="${desc}"></div>`;
      }).join("");
      document.getElementById("markers").innerHTML = html;

      document.getElementById("meta").textContent =
        `${d.hotDrops||0} hot drops in ${d.matches||0} matches`;
    }

    // Popover-Handler (event-delegation auf den markers-Container).
    // Nur bei Marker-Wechsel content neu setzen, sonst flickert
    // innerHTML-Reflow bei jedem mousemove (mouseover bubbelt).
    const pov = document.getElementById("popover");
    let povActive = null;
    function fmtDur2(s) {
      if (s == null) return "?";
      const m = Math.floor(s / 60), x = Math.floor(s % 60);
      return `${m}:${String(x).padStart(2,"0")}`;
    }
    function showPov(marker, e) {
      const idx = parseInt(marker.dataset.mi, 10);
      const num = marker.dataset.num;
      const desc = marker.dataset.desc;
      const m = (window._hdMatches || [])[idx];
      if (!m) return;
      // played_at IST der Match-Start. Match-End = played_at + duration.
      const startStr = PubgUI.fmtTime ? PubgUI.fmtTime(m.playedAt) : (m.playedAt||"");
      let endStr = startStr;
      if (m.playedAt && m.durationSec) {
        const endIso = new Date(new Date(m.playedAt).getTime()
                                  + m.durationSec * 1000).toISOString();
        endStr = PubgUI.fmtTime ? PubgUI.fmtTime(endIso) : endIso;
      }
      const mapStr = PubgUI.fmtMap ? PubgUI.fmtMap(m.mapName||"?") : (m.mapName||"?");
      const modeStr = m.gameMode || "?";
      const lines = [
        `${mapStr} · ${modeStr}`,
        `${startStr} → ${endStr}  (${fmtDur2(m.durationSec)})`,
        `Place: #${m.place ?? "?"} · K=${m.kills ?? 0} · DMG=${Math.round(m.damage||0)}`,
        m.landingOffsetSec != null
          ? `Landed: +${fmtDur2(m.landingOffsetSec)} into match` : null,
        m.firstFightAfterLandingSec != null
          ? `First fight: +${fmtDur2(m.firstFightAfterLandingSec)} after landing` : null,
        m.hotDrop
          ? `Teams nearby: ${m.teamsInRadius||0} · Fought: ${m.teamsInFight||0}` : null,
        m.timeSurvived != null ? `Survived: ${fmtDur2(m.timeSurvived)}` : null,
      ].filter(Boolean);
      pov.innerHTML = `<div class="pov-title">Match #${num} · ${desc}</div>${lines.join("\n")}`;
      pov.classList.add("show");
      positionPov(e);
    }
    function positionPov(e) {
      const x = e.clientX + 12;
      const y = e.clientY + 12;
      const rect = pov.getBoundingClientRect();
      const vw = window.innerWidth, vh = window.innerHeight;
      pov.style.left = (x + rect.width > vw ? vw - rect.width - 8 : x) + "px";
      pov.style.top  = (y + rect.height > vh ? vh - rect.height - 8 : y) + "px";
    }
    function hidePov() {
      pov.classList.remove("show");
      povActive = null;
    }
    document.getElementById("markers").addEventListener("mouseover", (e) => {
      const t = e.target.closest(".m[data-mi]");
      if (!t) return;
      if (t === povActive) return;
      povActive = t;
      showPov(t, e);
    });
    document.getElementById("markers").addEventListener("mousemove", (e) => {
      if (pov.classList.contains("show")) positionPov(e);
    });
    document.getElementById("markers").addEventListener("mouseleave", hidePov);

    if (RANGE === "session") PubgUI.hideIfStale();
    PubgUI.poll(`/api/pubg/hot-drop?range=${RANGE}`, POLL_MS, (d) => {
      if (RANGE === "session") PubgUI.hideIfStale();
      render(d);
    }, console.error);
  </script>
</body>
</html>
