<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG Top Mates</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <style>
    /* Card passt sich dem Browser-Source/Fenster an. OBS-Source-Größe
       (z.B. 480×420 oder 600×500) bestimmt die finale Card-Breite. */
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      padding: 8px;
    }
    .panel {
      width: 100%;
      min-width: 320px;
      padding: 14px 16px;
    }
    .panel h3 {
      margin: 0 0 12px;
      font-size: 0.9em;
      letter-spacing: 0.08em;
      color: var(--pubg-muted);
      text-transform: uppercase;
    }
    .row {
      padding: 9px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .row:last-child { border-bottom: 0; }
    .row-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 6px;
    }
    .row .rank {
      color: var(--pubg-gold);
      width: 18px;
      font-weight: 700;
      flex-shrink: 0;
      text-align: right;
    }
    .row .name { flex: 1; font-weight: 700; padding-left: 4px; }
    .row .primary {
      color: var(--pubg-gold);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      font-size: 0.95em;
    }
    .row-sub {
      margin-top: 3px;
      padding-left: 28px;
      color: var(--pubg-muted);
      font-size: 0.78em;
      letter-spacing: 0.02em;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .row-sub b {
      color: var(--pubg-text);
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <div class="pubg-card panel pubg-fade-in">
    <h3 id="title">Top Mates</h3>
    <div id="rows"></div>
  </div>
  <script src="_pubg.js"></script>
  <script>
    const SORT_BY = PubgUI.qs("sortBy", "mostPlayed");
    const LIMIT = parseInt(PubgUI.qs("limit", 5), 10);
    // MIN aus URL — wenn nicht gesetzt: undefined → Backend nimmt das Setting
    const MIN_RAW = PubgUI.qs("minMatches");
    const MIN = MIN_RAW != null ? parseInt(MIN_RAW, 10) : null;

    PubgUI.buildFilter([
      { key: "sortBy", label: "Sort", type: "select", default: "mostPlayed",
        options: [
          ["mostPlayed", "Most Played"],
          ["synergy", "Synergy"],
          ["chickensTogether", "Most CHICKEN"],
          ["kd", "K/D Meine"],
          ["mateKd", "K/D Mate"],
          ["winRate", "Win-Rate"],
          ["avgPlace", "Avg Place"],
        ]},
      { key: "minMatches", label: "Min", type: "range", min: 1, max: 50,
        default: 10 },
      { key: "limit", label: "Limit", type: "range", min: 1, max: 20, default: 5 },
    ]);

    const SORT_LABEL = {
      synergy: "Synergy",
      avgPlace: "Avg Place",
      kd: "Best K/D (Meine)",
      mateKd: "Best K/D (Mate)",
      winRate: "Win-Rate",
      mostPlayed: "Most Played",
      chickensTogether: "Most CHICKEN",
    };
    function setTitle(minVal) {
      const min = (minVal != null && minVal > 0) ? `mind. ${minVal} Matches` : "alle Matches";
      document.getElementById("title").innerHTML =
        "Top Mates · " + (SORT_LABEL[SORT_BY] || SORT_BY) +
        ` <span style="opacity:0.5;font-weight:400;letter-spacing:0;text-transform:none">(${min}, DB)</span>`;
    }
    setTitle(MIN);  // initial mit URL-Param-Wert (oder undefined)

    // Wenn kein URL-Param gesetzt: aktuellen Setting-Wert vom Backend ziehen
    if (MIN == null || isNaN(MIN)) {
      PubgUI.fetchJson("/api/pubg/settings").then(s => {
        const eff = parseInt(s.minMatchesForTopMates || "10", 10);
        setTitle(eff);
      }).catch(() => setTitle(10));
    }

    // Hot-Schwellen — pure Wert-Schwellen, Glücks-Stats sind erlaubt.
    // (Synergy hat eingebaute Stabilitäts-Dämpfung in der Formel.)
    const HOT = {
      synergy:           m => (m.synergyScore || 0) >= 3.0,
      winRate:           m => (m.winRate || 0) >= 20.0,
      kd:                m => (m.kd || 0) >= 2.5,
      mateKd:            m => (m.mateKd || 0) >= 2.5,
      chickensTogether:  m => (m.winsTogether || 0) >= 3,
      avgPlace:          m => (m.avgPlace || 99) <= 5.0,
      mostPlayed:        m => m.sharedMatches >= 50,
    };

    function hotWrap(text) {
      return `<span class="pubg-fire">🔥</span><span class="pubg-hot">${text}</span>`;
    }

    function primaryValue(m) {
      if (SORT_BY === "avgPlace") {
        const v = m.avgPlace || 0;
        const text = "Avg #" + v.toFixed(1);
        return HOT.avgPlace(m) ? hotWrap(text) : text;
      }
      if (SORT_BY === "kd") {
        const v = m.kd || 0;
        const text = "K/D " + v.toFixed(2);
        return HOT.kd(m) ? hotWrap(text) : text;
      }
      if (SORT_BY === "mateKd") {
        const v = m.mateKd || 0;
        const text = "K/D " + v.toFixed(2);
        return HOT.mateKd(m) ? hotWrap(text) : text;
      }
      if (SORT_BY === "winRate") {
        const v = m.winRate || 0;
        const text = v.toFixed(1) + "%";
        return HOT.winRate(m) ? hotWrap(text) : text;
      }
      if (SORT_BY === "mostPlayed") {
        const v = m.sharedMatches;
        const text = v + " Matches";
        return HOT.mostPlayed(m) ? hotWrap(text) : text;
      }
      if (SORT_BY === "chickensTogether") {
        const wins = m.winsTogether || 0;
        const rate = m.winRate || 0;
        const text = wins + " CHICKEN · " + rate.toFixed(1) + "%";
        return HOT.chickensTogether(m) ? hotWrap(text) : text;
      }
      if (SORT_BY === "synergy") {
        const v = m.synergyScore || 0;
        const text = "Score " + v.toFixed(2);
        return HOT.synergy(m) ? hotWrap(text) : text;
      }
      return "";
    }

    function detailLine(m) {
      const parts = [];
      // Match-Anzahl als Kontext überall, außer bei mostPlayed (da primary)
      if (SORT_BY !== "mostPlayed") {
        parts.push(`<span><b>${m.sharedMatches}</b> Matches</span>`);
      }
      // K/D — primary einzeln markieren
      if (SORT_BY === "kd") {
        parts.push(`<span>Mate K/D <b>${(m.mateKd || 0).toFixed(2)}</b></span>`);
      } else if (SORT_BY === "mateKd") {
        parts.push(`<span>Meine K/D <b>${(m.kd || 0).toFixed(2)}</b></span>`);
      } else {
        parts.push(`<span>K/D Meine <b>${(m.kd || 0).toFixed(2)}</b> / Mate <b>${(m.mateKd || 0).toFixed(2)}</b></span>`);
      }
      // CHICKEN — weglassen wenn schon primary
      if (m.winsTogether && SORT_BY !== "chickensTogether") {
        parts.push(`<span><b>${m.winsTogether}</b> CHICKEN</span>`);
      }
      // Win-Rate / Chicken-Rate — bei winRate ist's primary,
      // bei chickensTogether ist's bereits im primary "X CHICKEN · Y%"
      if (SORT_BY !== "winRate" && SORT_BY !== "chickensTogether"
          && (m.winRate || 0) > 0) {
        parts.push(`<span>Win <b>${(m.winRate||0).toFixed(0)}%</b></span>`);
      }
      // Avg Place — weglassen wenn schon primary
      if (SORT_BY !== "avgPlace" && (m.avgPlace || 0) > 0) {
        parts.push(`<span>Avg <b>#${(m.avgPlace||0).toFixed(1)}</b></span>`);
      }
      return parts.join("");
    }

    function render(list) {
      const rows = document.getElementById("rows");
      rows.innerHTML = list.map((m, i) => `
        <div class="row">
          <div class="row-top">
            <span class="rank">${i+1}</span>
            <span class="name">${m.name}</span>
            <span class="primary">${primaryValue(m)}</span>
          </div>
          <div class="row-sub">${detailLine(m)}</div>
        </div>`).join("") || `<div class="pubg-error">noch keine Daten</div>`;
    }

    const minPart = (MIN != null && !isNaN(MIN)) ? `&minMatches=${MIN}` : "";
    const url = `/api/pubg/top-mates?sortBy=${SORT_BY}&limit=${LIMIT}${minPart}`;
    PubgUI.poll(url, 5 * 60 * 1000, render, console.error);
  </script>
</body>
</html>
