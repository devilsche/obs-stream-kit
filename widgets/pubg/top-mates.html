<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG Top Mates</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <style>
    body { padding: 16px; }
    .panel { width: 360px; padding: 16px; }
    .panel h3 {
      margin: 0 0 12px;
      font-size: 0.9em;
      letter-spacing: 0.08em;
      color: var(--pubg-muted);
      text-transform: uppercase;
    }
    .row {
      padding: 9px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .row:last-child { border-bottom: 0; }
    .row-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 6px;
    }
    .row .rank {
      color: var(--pubg-gold);
      width: 18px;
      font-weight: 700;
      flex-shrink: 0;
      text-align: right;
    }
    .row .name { flex: 1; font-weight: 700; padding-left: 4px; }
    .row .primary {
      color: var(--pubg-gold);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      font-size: 0.95em;
    }
    .row-sub {
      margin-top: 3px;
      padding-left: 28px;
      color: var(--pubg-muted);
      font-size: 0.78em;
      letter-spacing: 0.02em;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .row-sub b {
      color: var(--pubg-text);
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <div class="pubg-card panel pubg-fade-in">
    <h3 id="title">Top Mates</h3>
    <div id="rows"></div>
  </div>
  <script src="_pubg.js"></script>
  <script>
    const SORT_BY = PubgUI.qs("sortBy", "mostPlayed");
    const LIMIT = parseInt(PubgUI.qs("limit", 5), 10);
    const MIN = parseInt(PubgUI.qs("minMatches", 10), 10);

    const SORT_LABEL = {
      synergy: "Synergy",
      avgPlace: "Avg Place",
      kd: "Best K/D (Meine)",
      mateKd: "Best K/D (Mate)",
      winRate: "Win-Rate",
      mostPlayed: "Most Played",
      chickensTogether: "Most 🍗",
    };
    document.getElementById("title").innerHTML =
      "Top Mates · " + (SORT_LABEL[SORT_BY] || SORT_BY) +
      ' <span style="opacity:0.5;font-weight:400;letter-spacing:0;text-transform:none">(alle Matches in DB)</span>';

    function primaryValue(m) {
      if (SORT_BY === "avgPlace")         return "Avg #" + (m.avgPlace || 0).toFixed(1);
      if (SORT_BY === "kd")               return "K/D " + (m.kd || 0).toFixed(2);
      if (SORT_BY === "mateKd")           return "K/D " + (m.mateKd || 0).toFixed(2);
      if (SORT_BY === "winRate")          return (m.winRate || 0).toFixed(1) + "%";
      if (SORT_BY === "mostPlayed")       return m.sharedMatches + "g";
      if (SORT_BY === "chickensTogether") {
        const rate = m.winRate || 0;
        return (m.winsTogether || 0) + " 🍗 · " + rate.toFixed(1) + "%";
      }
      if (SORT_BY === "synergy") {
        const s = m.synergyScore || 0;
        if (s >= 3) {
          return `<span class="pubg-fire">🔥</span><span class="pubg-hot">Score ${s.toFixed(2)}</span>`;
        }
        return "Score " + s.toFixed(2);
      }
      return "";
    }

    function detailLine(m) {
      const parts = [];
      // Match-Anzahl als Kontext überall, außer bei mostPlayed (da primary)
      if (SORT_BY !== "mostPlayed") {
        parts.push(`<span><b>${m.sharedMatches}</b> Matches</span>`);
      }
      // K/D — primary einzeln markieren
      if (SORT_BY === "kd") {
        parts.push(`<span>Mate K/D <b>${(m.mateKd || 0).toFixed(2)}</b></span>`);
      } else if (SORT_BY === "mateKd") {
        parts.push(`<span>Meine K/D <b>${(m.kd || 0).toFixed(2)}</b></span>`);
      } else {
        parts.push(`<span>K/D Meine <b>${(m.kd || 0).toFixed(2)}</b> / Mate <b>${(m.mateKd || 0).toFixed(2)}</b></span>`);
      }
      // 🍗 — weglassen wenn schon primary
      if (m.winsTogether && SORT_BY !== "chickensTogether") {
        parts.push(`<span><b>${m.winsTogether}</b> 🍗</span>`);
      }
      // Win-Rate / Chicken-Rate — bei winRate ist's primary,
      // bei chickensTogether ist's bereits im primary "X 🍗 · Y%"
      if (SORT_BY !== "winRate" && SORT_BY !== "chickensTogether"
          && (m.winRate || 0) > 0) {
        parts.push(`<span>Win <b>${(m.winRate||0).toFixed(0)}%</b></span>`);
      }
      // Avg Place — weglassen wenn schon primary
      if (SORT_BY !== "avgPlace" && (m.avgPlace || 0) > 0) {
        parts.push(`<span>Avg <b>#${(m.avgPlace||0).toFixed(1)}</b></span>`);
      }
      return parts.join("");
    }

    function render(list) {
      const rows = document.getElementById("rows");
      rows.innerHTML = list.map((m, i) => `
        <div class="row">
          <div class="row-top">
            <span class="rank">${i+1}</span>
            <span class="name">${m.name}</span>
            <span class="primary">${primaryValue(m)}</span>
          </div>
          <div class="row-sub">${detailLine(m)}</div>
        </div>`).join("") || `<div class="pubg-error">noch keine Daten</div>`;
    }

    const url = `/api/pubg/top-mates?sortBy=${SORT_BY}&limit=${LIMIT}&minMatches=${MIN}`;
    PubgUI.poll(url, 5 * 60 * 1000, render, console.error);
  </script>
</body>
</html>
