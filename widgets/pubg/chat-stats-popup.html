<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG Chat Stats</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <style>
    body { display: flex; align-items: center; justify-content: center;
           height: 100vh; padding: 0; }
    .popup {
      width: 480px;
      padding: 24px 28px;
      transform: translateY(40px);
      opacity: 0;
      transition: opacity 0.5s, transform 0.5s;
    }
    .popup.show { opacity: 1; transform: translateY(0); }
    .popup .ribbon {
      display: inline-block;
      padding: 3px 10px;
      background: var(--pubg-gold);
      color: #1a0d2a;
      font-weight: 700;
      font-size: 0.72em;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 3px;
      margin-bottom: 10px;
    }
    .popup .name {
      font-size: 1.6em; font-weight: 700;
      margin-bottom: 14px;
      display: flex; align-items: baseline; justify-content: space-between;
    }
    .popup .chickens {
      font-size: 0.85em;
      letter-spacing: 2px;
      color: var(--pubg-gold);
    }
    .popup .stats-line {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      align-items: baseline;
      font-size: 1em;
    }
    .popup .stats-line .item b {
      color: var(--pubg-gold);
      font-weight: 700;
      font-size: 1.4em;
      font-variant-numeric: tabular-nums;
      margin-right: 4px;
    }
    .popup .stats-line .item {
      color: var(--pubg-muted);
      font-size: 0.85em;
      letter-spacing: 0.02em;
    }
    .popup .kda-row {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 14px; margin-top: 14px;
      padding: 14px 16px;
      background: rgba(94, 42, 121, 0.18);
      border-radius: 6px;
    }
    .popup .kda-row .mate-block {
      display: flex; align-items: baseline; gap: 10px;
    }
    .popup .kda-row .mate-kd {
      font-size: 2.4em;
      font-weight: 700;
      color: var(--pubg-gold);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .popup .kda-row .mate-label {
      color: var(--pubg-muted);
      font-size: 0.78em;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .popup .kda-row .my-kd {
      color: var(--pubg-muted);
      font-size: 0.85em;
      font-variant-numeric: tabular-nums;
    }
    .popup .kda-row .my-kd b { color: var(--pubg-text); }
    .popup .career { font-size: 0.85em; color: var(--pubg-muted);
                     margin-top: 14px; padding-top: 14px;
                     border-top: 1px solid rgba(255,255,255,0.08); }
  </style>
</head>
<body>
  <div class="pubg-card popup" id="popup">
    <span class="ribbon">Mit mir gespielt</span>
    <div class="name">
      <span id="name">—</span>
      <span class="chickens" id="chickens"></span>
    </div>
    <div class="stats-line" id="statsLine">—</div>
    <div class="kda-row">
      <div class="mate-block">
        <span class="mate-kd" id="kd-mate">—</span>
        <span class="mate-label">K/D Mate</span>
      </div>
      <div class="my-kd"><span id="my-name">—</span> <b id="kd-my">—</b></div>
    </div>
    <div class="career" id="career">—</div>
  </div>

  <script src="_pubg.js"></script>
  <script>
    const PLAYER = PubgUI.qs("player", "");
    const DURATION = parseInt(PubgUI.qs("duration", 12), 10) * 1000;

    function reveal() {
      document.getElementById("popup").classList.add("show");
      if (DURATION > 0) {
        setTimeout(() => {
          document.getElementById("popup").classList.remove("show");
        }, DURATION);
      }
    }

    function chickenIcons(n) {
      if (!n) return "";
      const visible = Math.min(n, 5);
      const rest = n > 5 ? ` +${n-5}` : "";
      return "🍗".repeat(visible) + rest;
    }

    if (!PLAYER) {
      document.getElementById("name").textContent = "?player= fehlt";
      reveal();
    } else {
      PubgUI.fetchJson(`/api/pubg/co-player/${encodeURIComponent(PLAYER)}`)
        .then(d => {
          if (d.error) {
            document.getElementById("name").textContent = "Player nicht gefunden";
            return reveal();
          }
          const matchWord = (n) => n === 1 ? "Match" : "Matches";
          const winWord = (n) => n === 1 ? "Chicken" : "Chickens";

          if (d.isSelf) {
            document.querySelector(".popup .ribbon").textContent = "Career — du selbst";
            document.getElementById("name").textContent = d.name;
            const cl = d.careerLifetime || {};
            document.getElementById("statsLine").innerHTML = `
              <span class="item"><b>${PubgUI.fmtNum(cl.rounds_played)}</b>${matchWord(cl.rounds_played)}</span>
              <span class="item"><b>${PubgUI.fmtNum(cl.wins)}</b>🍗 Career</span>
              <span class="item"><b>${PubgUI.fmtPct(cl.win_rate)}</b>Win-Rate</span>`;
            document.getElementById("kd-mate").textContent = PubgUI.fmtKD(cl.kd_ratio);
            document.querySelector(".kda-row .mate-label").textContent = "Career K/D";
            document.querySelector(".my-kd").innerHTML =
              `Headshot: <b>${PubgUI.fmtPct(cl.headshot_rate)}</b>`;
            document.getElementById("chickens").innerHTML = "";
            document.getElementById("career").style.display = "none";
            return reveal();
          }
          document.getElementById("name").textContent = d.name || PLAYER;
          const sh = d.sharedHistory || {};
          const wins = sh.wins || 0;
          const matches = sh.matches || 0;
          document.getElementById("statsLine").innerHTML = `
            <span class="item"><b>${matches}</b>${matchWord(matches)}</span>
            <span class="item"><b>${wins}</b>🍗 ${winWord(wins)}</span>
            <span class="item">Avg <b>#${(sh.avgPlace || 0).toFixed(1)}</b></span>`;
          document.getElementById("chickens").innerHTML = chickenIcons(wins);

          document.getElementById("my-name").textContent = d.myName || "Meine";
          document.getElementById("kd-my").textContent = PubgUI.fmtKD(sh.kd);
          document.getElementById("kd-mate").textContent = PubgUI.fmtKD(sh.mateKd);

          const cl = d.careerLifetime;
          document.getElementById("career").textContent = cl
            ? `Career: ${PubgUI.fmtNum(cl.rounds_played)} Games · K/D ${PubgUI.fmtKD(cl.kd_ratio)} · ${cl.wins} Wins · ${PubgUI.fmtPct(cl.headshot_rate)} HS`
            : (sh.matches ? "Career: noch nicht geladen (<5 gemeinsame Matches?)" : "Noch nie zusammen gespielt");

          reveal();
        })
        .catch(e => { document.getElementById("name").textContent = "Fehler"; reveal(); });
    }
  </script>
</body>
</html>
