<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG Map Performance</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      padding: 12px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .panel { width: 100%; padding: 14px 18px; }
    h2 {
      margin: 0 0 4px;
      font-size: 0.95em;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--pubg-muted);
    }
    h2 b { color: var(--pubg-gold); }
    .sub {
      color: var(--pubg-muted);
      font-size: 0.78em;
      margin-bottom: 12px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85em;
      font-variant-numeric: tabular-nums;
    }
    th {
      text-align: right;
      padding: 5px 8px;
      color: var(--pubg-muted);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.85em;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    th:first-child { text-align: left; }
    td {
      padding: 6px 8px;
      text-align: right;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    td:first-child { text-align: left; color: var(--pubg-text); }
    tr.win td { color: var(--pubg-gold); }
    .empty { padding: 20px; color: var(--pubg-muted); text-align: center; font-style: italic; }
  </style>
</head>
<body>
  <div class="pubg-header" id="pubgHeader"></div>
  <div class="pubg-card panel pubg-fade-in">
    <div class="sub" id="meta"></div>
    <div id="content"><div class="empty">— wird geladen —</div></div>
  </div>
  <script src="_pubg.js"></script>
  <script>
    PubgUI.buildFilter([
      { key: "range", label: "Range", type: "select", default: "all",
        options: [["session","Session"],["week","7 days"],["all","Database"]],
        tooltip: "Which matches to include — Session, last 7 days, or the " +
                 "whole database." },
    ]);
    const RANGE = PubgUI.qs("range", "all");
    PubgUI.renderHeader(document.getElementById("pubgHeader"), "Map Performance", RANGE);

    function fmtSurv(secs) {
      const m = Math.floor((secs||0)/60);
      const s = Math.floor((secs||0)%60);
      return `${m}:${String(s).padStart(2,"0")}`;
    }

    // Sort-State persistent halten ueber Re-Polls hinweg
    let _sortKey = "matches";  // Default: nach Match-Anzahl sortiert
    let _sortDir = "desc";

    // Spalten-Definition: key (Datenfeld), label, format-Funktion
    const COLS = [
      ["map",            "Map",     r => PubgUI.fmtMap(r.map)],
      ["matches",        "Matches", r => r.matches],
      ["wins",           "Wins",    r => r.wins || "—"],
      ["kills",          "Kills",   r => PubgUI.hotIf(r.kills, 300, r.kills)],
      ["kd",             "K/D",     r => r.kd.toFixed(2)],
      ["winRate",        "Win%",    r => r.winRate.toFixed(0) + "%"],
      ["avgKills",       "Ø Kills", r => r.avgKills.toFixed(1)],
      ["avgDamage",      "Ø DMG",   r => Math.round(r.avgDamage)],
      ["avgPlace",       "Ø Place", r => "#" + r.avgPlace.toFixed(1)],
      ["avgSurvivedSec", "Ø Surv",  r => fmtSurv(r.avgSurvivedSec)],
      ["longestKill",    "Longest", r => PubgUI.hotIf(r.longestKill, 300, Math.round(r.longestKill) + "m")],
    ];

    let _rowsCache = [];

    function sortRows(rows) {
      const sorted = rows.slice();
      sorted.sort((a, b) => {
        const va = a[_sortKey], vb = b[_sortKey];
        let cmp = (typeof va === "number" && typeof vb === "number")
          ? va - vb
          : String(va).localeCompare(String(vb));
        return _sortDir === "asc" ? cmp : -cmp;
      });
      return sorted;
    }

    function render(rows) {
      const root = document.getElementById("content");
      if (rows && rows.length) _rowsCache = rows;
      if (!_rowsCache || !_rowsCache.length) {
        root.innerHTML = `<div class="empty">— keine Matches in diesem Range —</div>`;
        document.getElementById("meta").textContent = "";
        return;
      }
      const totalMatches = _rowsCache.reduce((s, r) => s + r.matches, 0);
      const totalWins = _rowsCache.reduce((s, r) => s + r.wins, 0);
      document.getElementById("meta").textContent =
        `${_rowsCache.length} Maps · ${totalMatches} Matches · ${totalWins} Wins`;

      const sorted = sortRows(_rowsCache);
      const arrow = (k) => k === _sortKey
        ? (_sortDir === "asc" ? " ▲" : " ▼")
        : "";
      const headerHtml = COLS.map(([k, lbl]) =>
        `<th data-sort="${k}" style="cursor:pointer; user-select:none">${lbl}${arrow(k)}</th>`
      ).join("");
      const rowsHtml = sorted.map(r =>
        `<tr class="${r.wins ? 'win' : ''}">
          ${COLS.map(([_, __, fn]) => `<td>${fn(r)}</td>`).join("")}
         </tr>`
      ).join("");

      root.innerHTML = `<table><thead><tr>${headerHtml}</tr></thead><tbody>${rowsHtml}</tbody></table>`;

      // Header-Click → Sortierung umschalten
      root.querySelectorAll("th[data-sort]").forEach(th => {
        th.addEventListener("click", () => {
          const key = th.dataset.sort;
          if (key === _sortKey) {
            _sortDir = _sortDir === "asc" ? "desc" : "asc";
          } else {
            _sortKey = key;
            _sortDir = (key === "map") ? "asc" : "desc";  // text asc, numbers desc
          }
          render();  // re-render mit Cache
        });
      });
    }

    function showError(e) {
      console.error(e);
      document.getElementById("content").innerHTML =
        `<div class="empty" style="color:#e57b7b">⚠ API error: ${e.message || e}<br>` +
        `<small style="opacity:0.7">Endpoint /api/pubg/map-performance erreichbar? ` +
        `Server ggf. neu starten falls gerade gepullt.</small></div>`;
    }
    PubgUI.poll(`/api/pubg/map-performance?range=${RANGE}`, 60000, render, showError);
  </script>
</body>
</html>
