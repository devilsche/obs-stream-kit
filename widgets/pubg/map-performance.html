<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG Map Performance</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      padding: 12px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .panel { width: 100%; padding: 14px 18px; }
    h2 {
      margin: 0 0 4px;
      font-size: 0.95em;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--pubg-muted);
    }
    h2 b { color: var(--pubg-gold); }
    .sub {
      color: var(--pubg-muted);
      font-size: 0.78em;
      margin-bottom: 12px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85em;
      font-variant-numeric: tabular-nums;
    }
    th {
      text-align: right;
      padding: 5px 8px;
      color: var(--pubg-muted);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.85em;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    th:first-child { text-align: left; }
    td {
      padding: 6px 8px;
      text-align: right;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    td:first-child { text-align: left; color: var(--pubg-text); }
    tr.win td { color: var(--pubg-gold); }
    .empty { padding: 20px; color: var(--pubg-muted); text-align: center; font-style: italic; }
  </style>
</head>
<body>
  <div class="pubg-header" id="pubgHeader"></div>
  <div class="pubg-card panel pubg-fade-in">
    <div class="sub" id="meta"></div>
    <div id="content"><div class="empty">— wird geladen —</div></div>
  </div>
  <script src="_pubg.js"></script>
  <script>
    PubgUI.buildFilter([
      { key: "range", label: "Range", type: "select", default: "all",
        options: [["session","Session"],["week","7 days"],["all","Database"]],
        tooltip: "Which matches to include — Session, last 7 days, or the " +
                 "whole database." },
    ]);
    const RANGE = PubgUI.qs("range", "all");
    PubgUI.renderHeader(document.getElementById("pubgHeader"), "Map Performance", RANGE);

    function fmtSurv(secs) {
      const m = Math.floor((secs||0)/60);
      const s = Math.floor((secs||0)%60);
      return `${m}:${String(s).padStart(2,"0")}`;
    }

    function render(rows) {
      const root = document.getElementById("content");
      if (!rows || !rows.length) {
        root.innerHTML = `<div class="empty">— keine Matches in diesem Range —</div>`;
        document.getElementById("meta").textContent = "";
        return;
      }
      const totalMatches = rows.reduce((s, r) => s + r.matches, 0);
      const totalWins = rows.reduce((s, r) => s + r.wins, 0);
      document.getElementById("meta").textContent =
        `${rows.length} Maps · ${totalMatches} Matches · ${totalWins} Wins`;

      root.innerHTML = `
        <table>
          <thead><tr>
            <th>Map</th>
            <th>Matches</th>
            <th>Wins</th>
            <th>Kills</th>
            <th>K/D</th>
            <th>Win%</th>
            <th>Ø Kills</th>
            <th>Ø DMG</th>
            <th>Ø Place</th>
            <th>Ø Surv</th>
            <th>Longest</th>
          </tr></thead>
          <tbody>
            ${rows.map(r => `<tr class="${r.wins ? 'win' : ''}">
              <td>${PubgUI.fmtMap(r.map)}</td>
              <td>${r.matches}</td>
              <td>${r.wins || '—'}</td>
              <td>${PubgUI.hotIf(r.kills, 300, r.kills)}</td>
              <td>${r.kd.toFixed(2)}</td>
              <td>${r.winRate.toFixed(0)}%</td>
              <td>${r.avgKills.toFixed(1)}</td>
              <td>${Math.round(r.avgDamage)}</td>
              <td>#${r.avgPlace.toFixed(1)}</td>
              <td>${fmtSurv(r.avgSurvivedSec)}</td>
              <td>${PubgUI.hotIf(r.longestKill, 300, Math.round(r.longestKill) + "m")}</td>
            </tr>`).join("")}
          </tbody>
        </table>`;
    }

    function showError(e) {
      console.error(e);
      document.getElementById("content").innerHTML =
        `<div class="empty" style="color:#e57b7b">⚠ API-Fehler: ${e.message || e}<br>` +
        `<small style="opacity:0.7">Endpoint /api/pubg/map-performance erreichbar? ` +
        `Server ggf. neu starten falls gerade gepullt.</small></div>`;
    }
    PubgUI.poll(`/api/pubg/map-performance?range=${RANGE}`, 60000, render, showError);
  </script>
</body>
</html>
