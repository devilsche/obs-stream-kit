<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG Flyout</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <style>
    body { padding: 20px; }
    .panel { width: 480px; padding: 20px 24px; }

    /* Compact-Modus für In-Game/BRB: weniger Padding, kompakte Stat-Werte */
    body.compact { padding: 10px; }
    body.compact .panel { width: 360px; padding: 12px 14px; }
    body.compact .head { margin-bottom: 8px; }
    body.compact .head h2 { font-size: 0.95em; }
    body.compact .section { padding: 8px 0; }
    body.compact .stat-grid { gap: 8px; }
    body.compact .stat-grid .pubg-stat-value { font-size: 1.15em; }
    body.compact .pubg-stat-label { font-size: 0.65em; }
    .head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 14px;
    }
    .head h2 { margin: 0; font-size: 1.05em; letter-spacing: 0.06em; }

    .section {
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 12px 0;
    }
    .section h3 {
      margin: 0 0 8px;
      font-size: 0.75em;
      color: var(--pubg-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .stat-grid .cell { display: flex; flex-direction: column; }
    .stat-grid .cell .pubg-stat-value { font-size: 1.4em; }

    .controls { display: flex; align-items: center; gap: 12px; padding-top: 10px; }
    .controls input[type=range] { flex: 1; }
    .ff-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .ff-label { display: flex; flex-direction: column; gap: 4px; }
    .ff-sub {
      color: var(--pubg-text);
      font-size: 1em;
      font-variant-numeric: tabular-nums;
    }
    .ff-sub b { color: var(--pubg-gold); font-weight: 700; }
    .ff-pct {
      font-size: 2.4em;
      font-weight: 700;
      color: var(--pubg-gold);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .controls select {
      background: rgba(0,0,0,0.3); color: var(--pubg-text);
      border: 1px solid var(--pubg-border); padding: 4px 6px; border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="pubg-card panel pubg-fade-in">
    <div class="head">
      <h2 id="cardTitle">PUBG SESSION</h2>
    </div>

    <div class="section">
      <div class="stat-grid">
        <div class="cell"><span class="pubg-stat-value" id="kills">—</span><span class="pubg-stat-label">Kills</span></div>
        <div class="cell"><span class="pubg-stat-value" id="dmg">—</span><span class="pubg-stat-label">Damage</span></div>
        <div class="cell"><span class="pubg-stat-value" id="wins">—</span><span class="pubg-stat-label">Wins</span></div>
        <div class="cell"><span class="pubg-stat-value" id="kd">—</span><span class="pubg-stat-label">K/D</span></div>
        <div class="cell"><span class="pubg-stat-value" id="kpm">—</span><span class="pubg-stat-label">K/M</span></div>
        <div class="cell"><span class="pubg-stat-value" id="hs">—</span><span class="pubg-stat-label">Headshot</span></div>
        <div class="cell"><span class="pubg-stat-value" id="best">—</span><span class="pubg-stat-label">Best Place</span></div>
        <div class="cell"><span class="pubg-stat-value" id="long">—</span><span class="pubg-stat-label">Longest</span></div>
        <div class="cell"><span class="pubg-stat-value" id="matches">—</span><span class="pubg-stat-label">Matches</span></div>
      </div>
    </div>

    <div class="section">
      <h3>Survival</h3>
      <div class="stat-grid">
        <div class="cell"><span class="pubg-stat-value" id="boosts">—</span><span class="pubg-stat-label">Boosts</span></div>
        <div class="cell"><span class="pubg-stat-value" id="heals">—</span><span class="pubg-stat-label">Heals</span></div>
        <div class="cell"><span class="pubg-stat-value" id="revives">—</span><span class="pubg-stat-label">Revives</span></div>
        <div class="cell"><span class="pubg-stat-value" id="walk">—</span><span class="pubg-stat-label">Walked</span></div>
        <div class="cell"><span class="pubg-stat-value" id="drive">—</span><span class="pubg-stat-label">Driven</span></div>
        <div class="cell"><span class="pubg-stat-value" id="weapons">—</span><span class="pubg-stat-label">Weapons</span></div>
      </div>
    </div>

    <div class="section">
      <div class="ff-row">
        <div class="ff-label">
          <h3 style="margin:0">First Fight Wins</h3>
          <div class="ff-sub" id="ffsub">—</div>
        </div>
        <div class="ff-pct" id="ff">—</div>
      </div>
    </div>

    <div class="section">
      <h3>Top Mates <span id="topMatesSubtitle" style="opacity:0.5;font-weight:400;letter-spacing:0;text-transform:none">— Session</span></h3>
      <div id="topmates"></div>
    </div>

  </div>

  <script src="_pubg.js"></script>
  <script>
    // URL-Parameter (alle in der Filter-Bar oben einstellbar):
    //   ?filter=0       — Filter-Bar verstecken (clean Stream-Look)
    //   ?range=         — session/day/week/all
    //   ?sortBy=        — Mate-Sort-Modus
    //   ?minMatches=    — Mate-Filter-Schwelle
    //   ?compact=1      — kompakter Modus
    //   ?hideMates=1    — Top-Mates-Section weg
    //   ?hideSurvival=1 — Survival-Section weg
    //   ?hideFF=1       — First-Fight-Section weg
    if (PubgUI.qs("compact") === "1") document.body.classList.add("compact");
    if (PubgUI.qs("hideMates") === "1") {
      document.querySelectorAll(".section").forEach(s => {
        if (s.querySelector("h3")?.textContent.includes("Top Mates")) s.style.display = "none";
      });
    }
    if (PubgUI.qs("hideSurvival") === "1") {
      document.querySelectorAll(".section").forEach(s => {
        if (s.querySelector("h3")?.textContent === "Survival") s.style.display = "none";
      });
    }
    if (PubgUI.qs("hideFF") === "1") {
      document.querySelectorAll(".section").forEach(s => {
        if (s.querySelector("h3")?.textContent.startsWith("First Fight")) s.style.display = "none";
      });
    }

    // Globaler Range-Filter: session/week/all
    const RANGE = PubgUI.qs("range", "session");
    const TITLES = {
      session: "PUBG · Session",
      week:    "PUBG · 7 days",
      all:     "PUBG · Database",
    };
    document.getElementById("cardTitle").textContent = TITLES[RANGE] || TITLES.session;

    PubgUI.buildFilter([
      { key: "range", label: "Range", type: "select", default: "session",
        options: [["session","Session"],["week","7 days"],["all","Database"]],
        tooltip: "Which matches to include — Session, last 7 days, or the " +
                 "whole database." },
      { key: "sortBy", label: "Mate sort", type: "select", default: "mostPlayed",
        options: [["synergy","Synergy"],["mostPlayed","Most Played"],
                  ["chickensTogether","Most CHICKEN"],["kd","Best K/D Yours"],
                  ["mateKd","Best K/D Mate"],["winRate","Win-Rate"],
                  ["avgPlace","Avg Place"]],
        tooltip: "How the Top Mates list is sorted. Synergy = composite " +
                 "KDA × win-rate (recommended)." },
      { key: "minMatches", label: "Min shared matches", type: "range",
        min: 1, max: 50, default: 10,
        tooltip: "Minimum number of shared matches with a mate to appear " +
                 "in the Top Mates list." },
      { key: "compact", label: "Compact", type: "select", default: "0",
        options: [["0","Normal"],["1","Compact"]],
        tooltip: "Compact mode: tighter stat display with less whitespace." },
    ]);

    // Filter-Bar oben ist Single Source of Truth — Werte aus URL-Param,
    // KEIN DB-Setting-Lesen (das war früher der Bug).
    const currentMin = parseInt(PubgUI.qs("minMatches", 10), 10);
    const currentSort = PubgUI.qs("sortBy", "mostPlayed");

    let MY_NAME = "Streamer";
    PubgUI.getMyName().then(n => { MY_NAME = n; });

    function renderSession(s) {
      const num = (n) => String(Math.round(n));
      const knum = (n) => n >= 1000 ? (n/1000).toFixed(1)+"k" : String(Math.round(n));
      const km = (n) => n.toFixed(1) + "km";

      PubgUI.animateNumber(document.getElementById("kills"), s.kills || 0, {format: num});
      PubgUI.animateNumber(document.getElementById("dmg"), s.damage || 0, {format: knum});
      PubgUI.animateNumber(document.getElementById("wins"), s.wins || 0, {format: num});
      document.getElementById("kd").textContent = PubgUI.fmtKD(s.kd);
      document.getElementById("kpm").textContent = PubgUI.fmtKD(s.kpm);
      document.getElementById("hs").textContent = PubgUI.fmtPct(s.headshotPct);
      document.getElementById("best").textContent = PubgUI.fmtPlace(s.bestPlace);
      document.getElementById("long").innerHTML =
        PubgUI.hotIf(s.longestKill, 300, Math.round(s.longestKill || 0) + "m");
      PubgUI.animateNumber(document.getElementById("matches"), s.matches || 0, {format: num});

      PubgUI.animateNumber(document.getElementById("boosts"), s.totalBoosts || 0, {format: num});
      PubgUI.animateNumber(document.getElementById("heals"), s.totalHeals || 0, {format: num});
      PubgUI.animateNumber(document.getElementById("revives"), s.totalRevives || 0, {format: num});
      PubgUI.animateNumber(document.getElementById("walk"), s.walkKm || 0, {format: km});
      PubgUI.animateNumber(document.getElementById("drive"), s.rideKm || 0, {format: km});
      PubgUI.animateNumber(document.getElementById("weapons"), s.totalWeaponsAcquired || 0, {format: num});
    }

    function renderFF(f) {
      document.getElementById("ff").textContent = (f.rate||0).toFixed(0) + "%";
      document.getElementById("ffsub").innerHTML =
        `<b>${f.survived||0}</b> / <b>${f.total||0}</b> überlebt`;
    }

    const HOT = {
      synergy:          m => (m.synergyScore || 0) >= 3.0,
      winRate:          m => (m.winRate || 0) >= 20.0,
      kd:               m => (m.kd || 0) >= 2.5,
      mateKd:           m => (m.mateKd || 0) >= 2.5,
      chickensTogether: m => (m.winsTogether || 0) >= 3,
      avgPlace:         m => (m.avgPlace || 99) <= 5.0,
      mostPlayed:       m => m.sharedMatches >= 50,
    };
    const hotWrap = t => `<span class="pubg-fire">🔥</span><span class="pubg-hot">${t}</span>`;

    function topMateValue(m) {
      if (currentSort === "synergy") {
        const t = "Score " + (m.synergyScore || 0).toFixed(2);
        return HOT.synergy(m) ? hotWrap(t) : t;
      }
      if (currentSort === "chickensTogether") {
        const wins = m.winsTogether || 0;
        const rate = m.winRate || 0;
        const t = wins + " CHICKEN · " + rate.toFixed(1) + "%";
        return HOT.chickensTogether(m) ? hotWrap(t) : t;
      }
      if (currentSort === "kd") {
        const t = "K/D " + (m.kd || 0).toFixed(2);
        return HOT.kd(m) ? hotWrap(t) : t;
      }
      if (currentSort === "mateKd") {
        const t = "K/D " + (m.mateKd || 0).toFixed(2);
        return HOT.mateKd(m) ? hotWrap(t) : t;
      }
      if (currentSort === "winRate") {
        const t = (m.winRate || 0).toFixed(1) + "%";
        return HOT.winRate(m) ? hotWrap(t) : t;
      }
      if (currentSort === "avgPlace") {
        const t = "Avg #" + (m.avgPlace || 0).toFixed(1);
        return HOT.avgPlace(m) ? hotWrap(t) : t;
      }
      const t = m.sharedMatches + " Matches";
      return HOT.mostPlayed(m) ? hotWrap(t) : t;
    }

    function topMateSub(m) {
      // kompakte 2. Zeile mit den anderen wichtigen Werten
      const bits = [];
      // Match-Anzahl als Kontext überall, außer bei mostPlayed (da primary)
      if (currentSort !== "mostPlayed") bits.push(`${m.sharedMatches} Matches`);
      if (m.winsTogether && currentSort !== "chickensTogether") bits.push(`${m.winsTogether} CHICKEN`);
      if (currentSort !== "kd" && currentSort !== "mateKd") {
        bits.push(`${MY_NAME} ${(m.kd || 0).toFixed(2)} / Mate ${(m.mateKd || 0).toFixed(2)}`);
      }
      if (currentSort !== "winRate" && currentSort !== "chickensTogether"
          && (m.winRate || 0) > 0) {
        bits.push(`Win ${(m.winRate||0).toFixed(0)}%`);
      }
      return bits.join(" · ");
    }

    function renderTopMates(list) {
      document.getElementById("topmates").innerHTML = list.length ? list.map((m,i) => `
        <div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
          <div class="pubg-row">
            <span style="color:var(--pubg-gold);width:18px;font-weight:700">${i+1}</span>
            <span style="flex:1;font-weight:700">${m.name}</span>
            <span style="color:var(--pubg-gold);font-weight:700;font-variant-numeric:tabular-nums">${topMateValue(m)}</span>
          </div>
          <div style="padding-left:24px;color:var(--pubg-muted);font-size:0.78em;margin-top:2px">${topMateSub(m)}</div>
        </div>`).join("") : '<span class="pubg-error">no data yet</span>';
    }

    const RANGE_LABEL = {
      session: "Session",
      week:    "7 days",
      all:     "Database",
    };

    function updateTopMatesSubtitle() {
      const m = currentMin === 1 ? "Match" : "Matches";
      document.getElementById("topMatesSubtitle").textContent =
        `— ${RANGE_LABEL[RANGE]}, min. ${currentMin} ${m}`;
    }

    function reload() {
      updateTopMatesSubtitle();
      PubgUI.fetchJson(`/api/pubg/session?range=${RANGE}`).then(renderSession).catch(()=>{});
      PubgUI.fetchJson(`/api/pubg/first-fight-rate?range=${RANGE}`).then(renderFF).catch(()=>{});
      const tmRange = RANGE === "all" ? "" : `range=${RANGE}&`;
      PubgUI.fetchJson(`/api/pubg/top-mates?${tmRange}sortBy=${currentSort}&limit=5&minMatches=${currentMin}`)
        .then(renderTopMates).catch(()=>{});
    }

    reload();
    setInterval(reload, 60000);
  </script>
</body>
</html>
