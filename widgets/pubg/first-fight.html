<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG First Fight</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <style>
    body { padding: 16px; }
    .card {
      width: 360px;
      padding: 16px 20px;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .top .label {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .top .header {
      font-size: 0.78em;
      color: var(--pubg-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
      line-height: 1.1;
    }
    .top .sub {
      color: var(--pubg-text);
      font-size: 1.05em;
      font-variant-numeric: tabular-nums;
    }
    .top .sub b {
      color: var(--pubg-gold);
      font-weight: 700;
    }
    .top .pct {
      font-size: 2.8em;
      font-weight: 700;
      color: var(--pubg-gold);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .spark {
      display: flex;
      gap: 3px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .spark span {
      width: 12px; height: 18px; border-radius: 2px;
      background: rgba(255,255,255,0.1);
    }
    .spark span.s { background: var(--pubg-gold); }
    .spark span.d { background: rgba(229, 123, 123, 0.6); }
  </style>
</head>
<body>
  <div class="pubg-card card pubg-fade-in">
    <div class="top">
      <div class="label">
        <div class="header">First Fight Wins</div>
        <div class="sub" id="sub">—</div>
        <div class="sub" id="teams" style="font-size:0.85em;color:var(--pubg-muted)"></div>
      </div>
      <div class="pct" id="pct">—</div>
    </div>
    <div class="spark" id="spark"></div>
  </div>
  <script src="_pubg.js"></script>
  <script>
    const RANGE = PubgUI.qs("range", "session");

    PubgUI.buildFilter([
      { key: "range", label: "Range", type: "select", default: "session",
        options: [["session","Session"],["day","Heute"],["week","Letzte 7 Tage"]]},
    ]);
    function render(d) {
      document.getElementById("pct").textContent = (d.rate||0).toFixed(0) + "%";
      document.getElementById("sub").innerHTML =
        `<b>${d.survived||0}</b> / <b>${d.total||0}</b> überlebt`;
      const teams = document.getElementById("teams");
      if (d.avgTeams) {
        teams.innerHTML = `Ø <b>${d.avgTeams.toFixed(1)}</b> Teams pro Fight · Max <b>${d.maxTeams||0}</b>`;
      } else {
        teams.textContent = "";
      }
      const spark = document.getElementById("spark");
      spark.innerHTML = (d.sparkline||[]).map(v =>
        `<span class="${v ? 's' : 'd'}"></span>`).join("");
    }
    PubgUI.poll(`/api/pubg/first-fight-rate?range=${RANGE}`, 5*60*1000, render, console.error);
  </script>
</body>
</html>
