<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG First Fight</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <style>
    /* Anker: bottom-left. Header über Card, beide am unteren Rand. */
    html, body { height: 100%; margin: 0; }
    body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      box-sizing: border-box;
    }
    /* OBS-Dock-Modus: dunkler Hintergrund + Card oben links statt
       Anker unten. Aktivierung via ?dock=1. */
    body.dock {
      background: #0d061a;
      justify-content: flex-start;
      padding: 10px;
    }
    body.dock .card {
      width: 100%;
      max-width: 460px;
    }
    .card {
      width: 360px;
      padding: 16px 20px;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .top .label {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .top .header {
      font-size: 0.78em;
      color: var(--pubg-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
      line-height: 1.1;
    }
    .top .sub {
      color: var(--pubg-text);
      font-size: 1.05em;
      font-variant-numeric: tabular-nums;
    }
    .top .sub b {
      color: var(--pubg-gold);
      font-weight: 700;
    }
    .top .pct {
      font-size: 2.8em;
      font-weight: 700;
      color: var(--pubg-gold);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .spark {
      display: flex;
      gap: 3px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .spark span {
      width: 12px; height: 18px; border-radius: 2px;
      background: var(--pubg-muted); opacity: 0.45;
    }
    /* Vier Faelle (gleich wie hot-drop): grau cold, orange Solo alive,
       lila Solo tot/Team alive, rot beide tot. */
    .spark span.s          { background: #ff7a1f; opacity: 1; }
    .spark span.team-saved { background: #a974d4; opacity: 1; }
    .spark span.d          { background: #e57b7b; opacity: 0.7; }
    .spark span.fled       { background: #f2b705; opacity: 0.55; }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 10px;
      margin-top: 6px;
      font-size: 0.7em;
      color: var(--pubg-muted);
      letter-spacing: 0.04em;
    }
    .legend .item { display: inline-flex; align-items: center; gap: 4px; }
    .legend .swatch {
      width: 8px; height: 8px; border-radius: 2px;
      background: var(--pubg-muted); opacity: 0.45;
    }
    .legend .swatch.s          { background: #ff7a1f; opacity: 1; }
    .legend .swatch.team-saved { background: #a974d4; opacity: 1; }
    .legend .swatch.d          { background: #e57b7b; opacity: 0.7; }
    .legend .swatch.fled       { background: #f2b705; opacity: 0.55; }
  </style>
</head>
<body>
  <div class="pubg-header" id="pubgHeader"></div>
  <div class="pubg-card card pubg-fade-in">
    <div class="top">
      <div class="label">
        <div class="sub" id="sub">—</div>
        <div class="sub" id="teams" style="font-size:0.85em;color:var(--pubg-muted)"></div>
      </div>
      <div class="pct" id="pct">—</div>
    </div>
    <div class="spark" id="spark"></div>
    <div class="legend">
      <span class="item"><span class="swatch s"></span>Survived</span>
      <span class="item"><span class="swatch d"></span>Died</span>
      <span class="item"><span class="swatch fled"></span>Disengage</span>
    </div>
  </div>
  <script src="_pubg.js"></script>
  <script>
    const RANGE = PubgUI.qs("range", "session");
    const EXCLUDE_HOT = PubgUI.qs("excludeHotDrop", "0") === "1";
    const DOCK = PubgUI.qs("dock", "0") === "1";
    const POLL_MS = parseInt(PubgUI.qs("pollMs",
                              DOCK ? "8000" : "300000"), 10);
    if (DOCK) document.body.classList.add("dock");
    const TITLE = EXCLUDE_HOT ? "Silent Drop Fights" : "First Fight Wins";
    PubgUI.renderHeader(document.getElementById("pubgHeader"), TITLE, RANGE);

    PubgUI.buildFilter([
      { key: "range", label: "Range", type: "select", default: "session",
        options: [["session","Session"],["week","7 days"],["all","Database"]],
        tooltip: "Which matches to include." },
      { key: "excludeHotDrop", label: "Exclude hot drops", type: "select",
        default: "0",
        options: [["0","No (all matches)"],["1","Yes (silent drops only)"]],
        tooltip: "When 'Yes', skips matches that qualified as hot-drop. " +
                 "Shows first-fight performance for non-hot-drop matches " +
                 "= 'silent drop, loot, then fight' scenarios." },
    ]);
    function render(d) {
      // Hauptzahl = Team-Survival-Rate (Squad ueberlebt). Sub-Line:
      // 'Won X of Y' simpel — User-Wunsch.
      const teamW = d.teamSurvived ?? d.survived ?? 0;
      const total = d.total || 0;
      document.getElementById("pct").textContent = (d.teamSurvivalRate ?? d.rate ?? 0).toFixed(0) + "%";
      const subParts = [`Won <b>${teamW}</b> of <b>${total}</b>`];
      if (d.fledTotal) {
        subParts.push(`<span style="opacity:0.6">(${d.fledTotal} disengage)</span>`);
      }
      if (d.excludedHotDrop) {
        subParts.push(`<span style="opacity:0.6">(${d.excludedHotDrop} hot drops excluded)</span>`);
      }
      document.getElementById("sub").innerHTML = subParts.join(" ");
      const teams = document.getElementById("teams");
      if (d.avgTeams) {
        teams.innerHTML = `Ø <b>${d.avgTeams.toFixed(1)}</b> teams per fight · max <b>${d.maxTeams||0}</b>`;
      } else {
        teams.textContent = "";
      }
      // Markers: 3 States Team-basiert (Solo-Sicht ist egal):
      //   fled (gelb)     - Cluster ohne Kill, Disengage
      //   survived (orange) - Squad ueberlebt (egal ob ich)
      //   died (rot)      - Squad ausgeloescht
      // perMatch ist ASC (oldest first). Match-Nummer = i + 1.
      const spark = document.getElementById("spark");
      if (d.perMatch && d.perMatch.length) {
        spark.innerHTML = d.perMatch.map((m, i) => {
          const num = i + 1;
          let cls, desc;
          if (!m.hadFight || m.engaged === false) {
            cls = "fled"; desc = "disengage";
          } else if (m.teamSurvived) {
            cls = "s"; desc = "survived";
          } else {
            cls = "d"; desc = "died";
          }
          return `<span class="${cls}" title="Match #${num} · ${desc}"></span>`;
        }).join("");
      } else {
        spark.innerHTML = (d.sparkline||[]).map((v, i) =>
          `<span class="${v ? 's' : 'd'}" title="Match #${i+1}"></span>`).join("");
      }
    }
    const ehParam = EXCLUDE_HOT ? "&excludeHotDrop=1" : "";
    PubgUI.poll(`/api/pubg/first-fight-rate?range=${RANGE}${ehParam}`,
                POLL_MS, render, console.error);
  </script>
</body>
</html>
