<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG Chicken Together</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <link rel="stylesheet" href="../_theme.css">
  <style>
    /* Anker: bottom-left. Header über Card. */
    html, body { min-height: 100%; margin: 0; padding: 0; }
    body {
      padding: 8px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      box-sizing: border-box;
      overflow-y: auto;  /* preview im normalen Browser-Tab scrollbar */
    }
    .panel {
      width: 100%;
      min-width: 360px;
      padding: 18px 20px;
    }
    .panel h3 {
      margin: 0 0 14px;
      font-size: 0.85em; color: var(--pubg-muted);
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .row {
      display: grid;
      grid-template-columns: 22px 1fr auto auto auto;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .row .rate {
      color: var(--pubg-gold);
      font-weight: 700;
      font-size: 0.9em;
      font-variant-numeric: tabular-nums;
    }
    .row:last-child { border-bottom: 0; }
    .row .rank {
      color: var(--pubg-gold);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .row .name {
      font-weight: 700;
      color: var(--pubg-gold);
      text-shadow: 0 0 12px rgba(242, 183, 5, 0.3);
    }
    .row .games {
      color: var(--pubg-muted); font-size: 0.85em;
      font-variant-numeric: tabular-nums;
    }
    .row .chickens {
      font-size: 1.2em;
      letter-spacing: 2px;
      min-width: 70px;
      text-align: right;
    }
    .summary {
      margin-top: 16px; padding-top: 14px;
      border-top: 1px solid var(--pubg-border);
      display: flex; justify-content: space-between;
      font-size: 0.9em;
    }
    .summary span { color: var(--pubg-muted); }
    .summary b { color: var(--pubg-gold); font-variant-numeric: tabular-nums; }
    .empty {
      color: var(--pubg-muted); font-size: 0.9em;
      text-align: center; padding: 20px 0;
    }
    .footnote {
      margin-top: 8px;
      font-size: 0.7em;
      color: var(--pubg-muted);
      opacity: 0.7;
      font-style: italic;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="pubg-header" id="pubgHeader"></div>
  <div class="pubg-card panel pubg-fade-in">
    <div id="rows"></div>
    <div class="summary" id="summary"></div>
    <div class="footnote">Wins counted from the day the backend was set up. Older wins are visible only if the matches were ingested (cold-start fills what the PUBG-API still exposes — typically all recent matches, no hard cap observed).</div>
  </div>
  <script src="_pubg.js"></script>
  <script>
    PubgUI.renderHeader(document.getElementById("pubgHeader"), "Chicken Together", "all");
    const MIN_WINS = parseInt(PubgUI.qs("minWins", 1), 10);
    const MIN_MATCHES = parseInt(PubgUI.qs("minMatches", 1), 10);
    // ?player=NAME filtert die Liste auf einen einzelnen Mate
    // (laut Spec-Konvention: ?player=<single nick>).
    const PLAYER_FILTER = (PubgUI.qs("player", "") || "").toLowerCase();

    PubgUI.buildFilter([
      { key: "player", label: "Filter mate", type: "text",
        placeholder: "exact nickname, leave empty for all",
        tooltip: "Show only the row for one specific mate. Empty = all." },
      { key: "minWins", label: "Min wins together", type: "range",
        min: 1, max: 10, default: 1,
        tooltip: "Minimum number of shared CHICKEN (place #1) with the " +
                 "mate to qualify for the list." },
      { key: "minMatches", label: "Min shared matches", type: "range",
        min: 1, max: 50, default: 1,
        tooltip: "Minimum number of shared matches overall for the mate " +
                 "to be counted." },
    ]);

    function chickens(n) {
      if (!n) return "";
      const display = n > 99 ? "99+" : String(n);
      return `<span style="color:var(--pubg-gold);font-weight:700">${display}</span> <span style="color:var(--pubg-muted);font-size:0.85em">${n === 1 ? "Win" : "Wins"}</span>`;
    }

    function render(list) {
      if (PLAYER_FILTER) {
        list = list.filter(m => (m.name || "").toLowerCase() === PLAYER_FILTER);
      }
      if (!list.length) {
        document.getElementById("rows").innerHTML =
          `<div class="empty">no shared wins yet<br><span style="font-size:0.8em;opacity:0.7">— or DB doesn't have enough matches yet</span></div>`;
        document.getElementById("summary").innerHTML = "";
        return;
      }
      const totalWins = list.reduce((s, m) => s + m.winsTogether, 0);

      document.getElementById("rows").innerHTML = list.map((m, i) => `
        <div class="row">
          <div class="rank">${i+1}</div>
          <div class="name">${m.name}</div>
          <div class="games">${m.sharedMatches} matches</div>
          <div class="rate">${(m.winRate||0).toFixed(1)}%</div>
          <div class="chickens">${chickens(m.winsTogether)}</div>
        </div>`).join("");

      document.getElementById("summary").innerHTML =
        `<span>Wins with mates</span><span><b>${totalWins}</b> chicken dinner${totalWins === 1 ? "" : "s"} with ${list.length} ${list.length === 1 ? "mate" : "mates"}</span>`;
    }

    PubgUI.poll((window.__SERVE_BASE__||"/") + `api/pubg/chickens-together?minWins=${MIN_WINS}&minMatches=${MIN_MATCHES}`,
                5*60*1000, render, console.error);
  </script>
</body>
</html>
