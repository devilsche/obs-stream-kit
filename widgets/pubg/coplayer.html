<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG Player Stats</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <style>
    /* Layout-Pattern B (Web-View Stats-Page), gleiche Werte wie lookup
       und session-report: body 20px (war 40 20), card 22 26 (war 20 24),
       h3 0.8em statt h2 0.85em, stat-value 1.4em (war default), grid
       responsive auto-fit (war fix 3 Spalten). */
    body {
      background: var(--pubg-page-bg);
      min-height: 100vh;
      padding: 20px;
      display: flex; justify-content: center;
    }
    .container { max-width: 720px; width: 100%; }
    .player-name {
      color: var(--pubg-gold);
      font-size: 1.6em;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .player-meta {
      color: var(--pubg-muted);
      font-size: 0.85em;
    }
    .section { margin-bottom: 18px; padding: 22px 26px; }
    .section:last-child { margin-bottom: 0; }
    .section h3 {
      margin: 0 0 12px;
      color: var(--pubg-muted);
      font-size: 0.8em;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 14px;
    }
    .grid .cell { display: flex; flex-direction: column; }
    .grid .cell .pubg-stat-value { font-size: 1.4em; }
    .matches { width: 100%; border-collapse: collapse; font-size: 0.9em; }
    .matches th, .matches td {
      padding: 6px 8px; text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .matches th { color: var(--pubg-muted); font-size: 0.75em;
                  text-transform: uppercase; letter-spacing: 0.08em; }
  </style>
</head>
<body>
  <div class="container">
    <div class="pubg-card section">
      <div class="player-name" id="playerName">—</div>
      <div class="player-meta" id="playerMeta"></div>
    </div>

    <div class="pubg-card section">
      <h3>Played With You</h3>
      <div class="grid">
        <div class="cell"><span class="pubg-stat-value" id="sm">—</span><span class="pubg-stat-label">Matches</span></div>
        <div class="cell"><span class="pubg-stat-value" id="skd">—</span><span class="pubg-stat-label">K/D</span></div>
        <div class="cell"><span class="pubg-stat-value" id="sdmg">—</span><span class="pubg-stat-label">Ø Damage</span></div>
        <div class="cell"><span class="pubg-stat-value" id="splace">—</span><span class="pubg-stat-label">Ø Place</span></div>
        <div class="cell"><span class="pubg-stat-value" id="swin">—</span><span class="pubg-stat-label">Win-Rate</span></div>
        <div class="cell"><span class="pubg-stat-value" id="swins">—</span><span class="pubg-stat-label">Wins</span></div>
      </div>
      <div class="vehicle-evict" id="evictRow" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--pubg-border);font-size:0.92em;color:var(--pubg-muted);line-height:1.7"></div>
    </div>

    <div class="pubg-card section" id="careerSection">
      <h3>Career Lifetime (PUBG-API)</h3>
      <div class="grid">
        <div class="cell"><span class="pubg-stat-value" id="cm">—</span><span class="pubg-stat-label">Matches</span></div>
        <div class="cell"><span class="pubg-stat-value" id="ckd">—</span><span class="pubg-stat-label">K/D</span></div>
        <div class="cell"><span class="pubg-stat-value" id="cwins">—</span><span class="pubg-stat-label">Wins</span></div>
        <div class="cell"><span class="pubg-stat-value" id="cwinpct">—</span><span class="pubg-stat-label">Win %</span></div>
        <div class="cell"><span class="pubg-stat-value" id="ctop10">—</span><span class="pubg-stat-label">Top10 %</span></div>
        <div class="cell"><span class="pubg-stat-value" id="chs">—</span><span class="pubg-stat-label">Headshot</span></div>
      </div>
    </div>

    <div class="pubg-card section">
      <h3>Last 5 Matches Together</h3>
      <table class="matches">
        <thead><tr><th>Map</th><th>Place</th><th>Kills</th><th>DMG</th><th>Date</th></tr></thead>
        <tbody id="last5"></tbody>
      </table>
    </div>
  </div>

  <script src="_pubg.js"></script>
  <script>
    const PLAYER = PubgUI.qs("player", "");

    if (!PLAYER) {
      document.querySelector(".container").innerHTML =
        '<div class="pubg-error" style="padding:20px">Missing parameter ?player=NAME</div>';
    } else {
      document.getElementById("playerName").textContent = PLAYER;
      PubgUI.fetchJson((window.__SERVE_BASE__||"/") + `api/pubg/co-player/${encodeURIComponent(PLAYER)}`)
        .then(d => {
          document.getElementById("playerName").textContent = d.name || PLAYER;
          const sh = d.sharedHistory || {};
          const sharedCount = sh.matches || 0;
          document.getElementById("playerMeta").textContent =
            sharedCount === 1
              ? "1 match together"
              : `${PubgUI.fmtNum(sharedCount)} matches together`;
          document.getElementById("sm").textContent = PubgUI.fmtNum(sh.matches);
          // Anzeigen wir die MATE-Werte (analog chat-stats-popup):
          // sh.kd / sh.avgDmg sind MEINE Werte in shared matches; im
          // Kontext 'Played With You' will man die des Mates sehen.
          document.getElementById("skd").textContent = PubgUI.fmtKD(sh.mateKd);
          document.getElementById("sdmg").textContent = PubgUI.fmtNum(Math.round(sh.mateAvgDmg||0));
          document.getElementById("splace").textContent = sh.avgPlace ? "#" + sh.avgPlace.toFixed(1) : "—";
          document.getElementById("swin").textContent = PubgUI.fmtPct(sh.winRate);
          document.getElementById("swins").textContent = PubgUI.fmtNum(sh.wins);

          // Vehicle-Eviction Zeilen — nur zeigen wenn relevant.
          const ed = sh.vehicleEvictionsDealt || 0;
          const et = sh.vehicleEvictionsTaken || 0;
          if (ed > 0 || et > 0) {
            const lines = [];
            if (ed > 0) lines.push(
              `🚗 shot <b style="color:var(--pubg-gold)">${ed}</b> ${ed === 1 ? "player" : "players"} out of a vehicle`);
            if (et > 0) lines.push(
              `💀 got shot out of a vehicle <b style="color:var(--pubg-gold)">${et}</b> ${et === 1 ? "time" : "times"}`);
            const er = document.getElementById("evictRow");
            er.innerHTML = lines.join("<br>");
            er.style.display = "block";
          }

          const cl = d.careerLifetime;
          if (cl) {
            document.getElementById("cm").textContent = PubgUI.fmtNum(cl.rounds_played);
            document.getElementById("ckd").textContent = PubgUI.fmtKD(cl.kd_ratio);
            document.getElementById("cwins").textContent = PubgUI.fmtNum(cl.wins);
            document.getElementById("cwinpct").textContent = PubgUI.fmtPct(cl.win_rate);
            document.getElementById("ctop10").textContent = PubgUI.fmtPct(cl.top10_rate);
            document.getElementById("chs").textContent = PubgUI.fmtPct(cl.headshot_rate);
          } else {
            document.getElementById("careerSection").style.display = "none";
          }

          document.getElementById("last5").innerHTML =
            (sh.last5Matches || []).map(m => `
              <tr>
                <td>${PubgUI.fmtMap(m.map)}</td>
                <td>#${m.place || "?"}</td>
                <td>${m.kills || 0}</td>
                <td>${PubgUI.fmtNum(Math.round(m.damage||0))}</td>
                <td>${PubgUI.fmtDate(m.playedAt)} ${PubgUI.fmtTime(m.playedAt)}</td>
              </tr>`).join("") || `<tr><td colspan="5">—</td></tr>`;
        })
        .catch(e => { document.querySelector(".container").innerHTML += `<div class="pubg-error">${e}</div>`; });
    }
  </script>
</body>
</html>
