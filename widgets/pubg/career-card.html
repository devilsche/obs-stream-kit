<!DOCTYPE html>
<!--
  PUBG Career Card
  ────────────────────────────────────────────────────────────────────
  Zeigt den Lifetime-Career eines konfigurierten Spielers (Default:
  Streamer-Account). Aus Theme-Bausteinen (t-*) komponiert — der Look
  (Farbe, Form, Typo, Deko, Highlight-Symbol) kommt komplett aus dem
  per Server injizierten Theme (data-theme aufs <html>).
  Lokale Vorschau: ?theme=<name>&demo=1[&dock=1] testet alle Themes ohne
  Server-Injektion und mit Beispieldaten.
-->
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG Career</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <!-- Theme-Fundament: Tokens + Alias (NACH _pubg.css) -->
  <link rel="stylesheet" href="../_theme.css">
  <!-- Bausteine (t-*): NACH _theme.css (nutzen die Tokens) -->
  <link rel="stylesheet" href="../_blocks.css">
  <style>
    body { padding: 20px; display: flex; align-items: center; }
    .t-card { width: 360px; }

    /* Milestone-Countdown — token-basiert. Bei <=3 Wins bis zum naechsten
       100er heller + Akzent-Glow + groesser. */
    .milestone {
      margin-top: 16px; padding-top: 14px;
      border-top: var(--theme-border-width) solid var(--theme-border);
      font-family: var(--theme-font-mono); font-size: 12px;
      color: var(--theme-text-dim); display: none;
    }
    .milestone.show { display: block; }
    .milestone .ms-row {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 12px; margin-bottom: 6px;
    }
    .milestone #msLabel { display: flex; align-items: center; gap: 5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .milestone .ms-target { color: var(--theme-text); white-space: nowrap; flex-shrink: 0; }
    .milestone .ms-target b { color: var(--theme-accent); font-variant-numeric: tabular-nums; }
    .milestone .bar {
      height: 4px; border-radius: 2px; overflow: hidden;
      background: color-mix(in srgb, var(--theme-text, #fff) 12%, transparent);
    }
    .milestone .bar > i {
      display: block; height: 100%; width: 0%;
      background: var(--theme-accent); transition: width 0.6s ease;
    }
    .milestone.close { color: var(--theme-text); animation: msPulse 2.2s ease-in-out infinite; }
    .milestone.close .ms-target b { text-shadow: 0 0 12px var(--theme-accent); font-size: 1.15em; }
    .milestone.close .bar > i { box-shadow: 0 0 10px var(--theme-accent); }
    @keyframes msPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.75; } }
    @media (prefers-reduced-motion: reduce) { .milestone.close { animation: none; } }
  </style>
</head>
<body>
  <div class="t-card pubg-fade-in">
    <div class="t-header"><span>Career</span> <span class="t-range" id="player">—</span></div>
    <div class="t-stat-grid t-stat-grid--compact">
      <div class="t-stat"><span class="t-value" id="kd">—</span><span class="t-label">K/D</span></div>
      <div class="t-stat"><span class="t-value" id="wins">—</span><span class="t-label">Wins</span></div>
      <div class="t-stat"><span class="t-value" id="matches">—</span><span class="t-label">Matches</span></div>
      <div class="t-stat"><span class="t-value" id="kills">—</span><span class="t-label">Kills</span></div>
      <div class="t-stat"><span class="t-value" id="winpct">—</span><span class="t-label">Win %</span></div>
      <div class="t-stat"><span class="t-value" id="top10">—</span><span class="t-label">Top10 %</span></div>
      <div class="t-stat"><span class="t-value" id="hs">—</span><span class="t-label">Headshot</span></div>
      <div class="t-stat"><span class="t-value" id="longest">—</span><span class="t-label">Longest</span></div>
    </div>
    <div class="milestone" id="milestone">
      <div class="ms-row">
        <span id="msLabel">Next milestone</span>
        <span class="ms-target"><b id="msRemain">—</b> to <b id="msTarget">—</b></span>
      </div>
      <div class="bar"><i id="msBar"></i></div>
    </div>
  </div>
  <script src="_pubg.js"></script>
  <script>
    const PLAYER = PubgUI.qs("player", "");
    const MODE = PubgUI.qs("mode", "all");
    const DEMO = PubgUI.qs("demo", "") === "1";
    document.getElementById("player").textContent = PLAYER || "Self";

    PubgUI.buildFilter([
      { key: "mode", label: "Mode", type: "select", default: "all",
        options: [["all","Alle Modi"],
                  ["squad-fpp","Squad FPP"],["squad-tpp","Squad TPP"],
                  ["duo-fpp","Duo FPP"],["duo-tpp","Duo TPP"],
                  ["solo-fpp","Solo FPP"],["solo-tpp","Solo TPP"]]},
      { key: "player", label: "Player", type: "text", placeholder: "empty = self" },
    ]);

    // Naechster Milestone: alle 100. Tier-Highlight bei 500er/1000er.
    function nextMilestone(wins) {
      const next = Math.floor(wins / 100) * 100 + 100;
      const prev = next - 100;
      const remain = next - wins;
      const pct = Math.max(0, Math.min(100, ((wins - prev) / 100) * 100));
      const isGrand = next % 1000 === 0;
      const isHalf  = !isGrand && next % 500 === 0;
      let label = "Next milestone";
      if (isGrand) label = '<span class="material-symbols-outlined icon-gold" aria-hidden="true">emoji_events</span> GRAND CHICKEN incoming';
      else if (isHalf) label = '<span class="material-symbols-outlined icon-gold" aria-hidden="true">emoji_events</span> Half-Grand incoming';
      return { next, remain, pct, isGrand, isHalf, label };
    }

    function render(d) {
      if (!d || !d.rounds_played) return;
      document.getElementById("matches").textContent = PubgUI.fmtNum(d.rounds_played);
      document.getElementById("wins").textContent = PubgUI.fmtNum(d.wins);
      document.getElementById("kd").textContent = PubgUI.fmtKD(d.kd_ratio);
      document.getElementById("hs").textContent = PubgUI.fmtPct(d.headshot_rate);
      document.getElementById("winpct").textContent = PubgUI.fmtPct(d.win_rate);
      document.getElementById("top10").textContent = PubgUI.fmtPct(d.top10_rate);
      document.getElementById("longest").innerHTML =
        PubgUI.hotIf(d.longest_kill, 300, Math.round(d.longest_kill || 0) + "m");
      document.getElementById("kills").textContent = PubgUI.fmtNum(d.kills);

      // Milestone-Countdown. Erst ab 50+ Wins anzeigen.
      const ms = document.getElementById("milestone");
      if (d.wins == null || d.wins < 50) {
        ms.classList.remove("show", "close");
        return;
      }
      const info = nextMilestone(d.wins);
      ms.classList.add("show");
      ms.classList.toggle("close", info.remain <= 3);
      // innerHTML: info.label kann ein Material-Symbol-Icon enthalten (fester Code-String, kein User-Input).
      document.getElementById("msLabel").innerHTML  = info.label;
      document.getElementById("msRemain").textContent = info.remain;
      document.getElementById("msTarget").textContent = "#" + info.next;
      document.getElementById("msBar").style.width    = info.pct.toFixed(1) + "%";
    }

    if (DEMO) {
      // Lokale Vorschau: Beispieldaten (Longest > 300 → Highlight sichtbar).
      render({ rounds_played: 17000, wins: 904, kd_ratio: 1.51, headshot_rate: 24.1,
               win_rate: 5.3, top10_rate: 39.2, longest_kill: 753, kills: 24700 });
    } else {
      const params = new URLSearchParams({ mode: MODE });
      if (PLAYER) params.set("player", PLAYER);
      PubgUI.poll((window.__SERVE_BASE__||"/") + `api/pubg/career-lifetime?${params}`, 24*60*60*1000, render, console.error);
    }
  </script>
</body>
</html>
