<!DOCTYPE html>
<!--
  PUBG Career Card
  ────────────────────────────────────────────────────────────────────
  Zeigt den Lifetime-Career eines konfigurierten Spielers (Default:
  Streamer-Account). Ergänzt sich inhaltlich mit lookup.html (das
  beliebige Spieler interaktiv per Suche zeigt).
  Ideale Einsatzorte: Starting Soon / BRB / Stream-Ending — wenn keine
  Live-Session läuft. Für Viewer-getriggerte Lookups beliebiger Spieler
  ist ein zukünftiges Twitch-Extension/Overlay-Plugin der bessere Weg.
-->
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG Career</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <style>
    body { padding: 20px; display: flex; align-items: center; }
    .card { width: 440px; padding: 20px 24px; }
    .header { font-size: 0.85em; letter-spacing: 0.1em;
              color: var(--pubg-muted); text-transform: uppercase; margin-bottom: 14px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 18px; }
    .grid div { display: flex; justify-content: space-between; }
    .grid .label { color: var(--pubg-muted); font-size: 0.85em; }

    /* Milestone-Countdown: dezent unter der Stats-Grid. Wird bei
       <=3 Wins bis zum naechsten 100er heller + Gold-Glow + groesser. */
    .milestone {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--pubg-border);
      font-size: 0.85em;
      color: var(--pubg-muted);
      display: none;
    }
    .milestone.show { display: block; }
    .milestone .ms-row {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 12px;
      margin-bottom: 6px;
    }
    .milestone #msLabel   { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .milestone .ms-target { color: var(--pubg-text); white-space: nowrap; flex-shrink: 0; }
    .milestone .ms-target b { color: var(--pubg-gold); font-variant-numeric: tabular-nums; }
    .milestone .bar {
      height: 4px; background: rgba(255,255,255,0.08);
      border-radius: 2px; overflow: hidden;
    }
    .milestone .bar > i {
      display: block; height: 100%;
      background: var(--pubg-gold); width: 0%;
      transition: width 0.6s ease;
    }
    .milestone.close {
      font-size: 1.05em;
      color: var(--pubg-text);
      animation: msPulse 2.2s ease-in-out infinite;
    }
    .milestone.close .ms-target { font-weight: 700; }
    .milestone.close .ms-target b {
      text-shadow: 0 0 12px rgba(242, 183, 5, 0.7);
      font-size: 1.15em;
    }
    .milestone.close .bar > i {
      box-shadow: 0 0 10px rgba(242, 183, 5, 0.7);
    }
    @keyframes msPulse {
      0%,100% { opacity: 1; }
      50%     { opacity: 0.75; }
    }
  </style>
</head>
<body>
  <div class="pubg-card card pubg-fade-in">
    <div class="header">Career · <span id="player">—</span></div>
    <div class="grid">
      <div><span class="label">Matches</span><span class="pubg-stat-value" id="matches">—</span></div>
      <div><span class="label">Wins</span><span class="pubg-stat-value" id="wins">—</span></div>
      <div><span class="label">K/D</span><span class="pubg-stat-value" id="kd">—</span></div>
      <div><span class="label">Headshot</span><span class="pubg-stat-value" id="hs">—</span></div>
      <div><span class="label">Win %</span><span class="pubg-stat-value" id="winpct">—</span></div>
      <div><span class="label">Top10 %</span><span class="pubg-stat-value" id="top10">—</span></div>
      <div><span class="label">Longest</span><span class="pubg-stat-value" id="longest">—</span></div>
      <div><span class="label">Kills</span><span class="pubg-stat-value" id="kills">—</span></div>
    </div>
    <div class="milestone" id="milestone">
      <div class="ms-row">
        <span class="label" id="msLabel">Next milestone</span>
        <span class="ms-target"><b id="msRemain">—</b> to <b id="msTarget">—</b></span>
      </div>
      <div class="bar"><i id="msBar"></i></div>
    </div>
  </div>
  <script src="_pubg.js"></script>
  <script>
    const PLAYER = PubgUI.qs("player", "");
    const MODE = PubgUI.qs("mode", "all");
    document.getElementById("player").textContent = PLAYER || "Self";

    PubgUI.buildFilter([
      { key: "mode", label: "Mode", type: "select", default: "all",
        options: [["all","Alle Modi"],
                  ["squad-fpp","Squad FPP"],["squad-tpp","Squad TPP"],
                  ["duo-fpp","Duo FPP"],["duo-tpp","Duo TPP"],
                  ["solo-fpp","Solo FPP"],["solo-tpp","Solo TPP"]]},
      { key: "player", label: "Player", type: "text", placeholder: "leer = self" },
    ]);

    // Naechster Milestone: alle 100. Tier-Highlight bei 500er/1000er.
    function nextMilestone(wins) {
      const next = Math.floor(wins / 100) * 100 + 100;
      const prev = next - 100;
      const remain = next - wins;
      const pct = Math.max(0, Math.min(100, ((wins - prev) / 100) * 100));
      const isGrand = next % 1000 === 0;
      const isHalf  = !isGrand && next % 500 === 0;
      let label = "Next milestone";
      if (isGrand) label = "👑 GRAND CHICKEN incoming";
      else if (isHalf) label = "🏆 Half-Grand incoming";
      return { next, remain, pct, isGrand, isHalf, label };
    }

    function render(d) {
      if (!d || !d.rounds_played) return;
      document.getElementById("matches").textContent = PubgUI.fmtNum(d.rounds_played);
      document.getElementById("wins").textContent = PubgUI.fmtNum(d.wins);
      document.getElementById("kd").textContent = PubgUI.fmtKD(d.kd_ratio);
      document.getElementById("hs").textContent = PubgUI.fmtPct(d.headshot_rate);
      document.getElementById("winpct").textContent = PubgUI.fmtPct(d.win_rate);
      document.getElementById("top10").textContent = PubgUI.fmtPct(d.top10_rate);
      document.getElementById("longest").innerHTML =
        PubgUI.hotIf(d.longest_kill, 300, Math.round(d.longest_kill || 0) + "m");
      document.getElementById("kills").textContent = PubgUI.fmtNum(d.kills);

      // Milestone-Countdown. Erst ab 50+ Wins anzeigen (vorher zaehlt
      // jeder Win mehr als ein Milestone-Hinweis).
      const ms = document.getElementById("milestone");
      if (d.wins == null || d.wins < 50) {
        ms.classList.remove("show", "close");
        return;
      }
      const info = nextMilestone(d.wins);
      ms.classList.add("show");
      ms.classList.toggle("close", info.remain <= 3);
      document.getElementById("msLabel").textContent  = info.label;
      document.getElementById("msRemain").textContent = info.remain;
      document.getElementById("msTarget").textContent = "#" + info.next;
      document.getElementById("msBar").style.width    = info.pct.toFixed(1) + "%";
    }

    const params = new URLSearchParams({ mode: MODE });
    if (PLAYER) params.set("player", PLAYER);
    PubgUI.poll((window.__SERVE_BASE__||"/") + `api/pubg/career-lifetime?${params}`, 24*60*60*1000, render, console.error);
  </script>
</body>
</html>
