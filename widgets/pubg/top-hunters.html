<!DOCTYPE html>
<!--
  PUBG Top Vehicle Hunters
  ─────────────────────────────────────────────────────────────────────
  Rangliste der Squad-Mitglieder nach Vehicle-Eviction-Stats:
   • dealt  = wieviele Gegner aus ihrem Fahrzeug eliminiert
   • taken  = wie oft selbst aus dem Fahrzeug geholt
   • ratio  = dealt / max(taken, 1)
  Default-Sort = dealt (toggle via ?sort=dealt|taken|ratio).
  Source: /api/pubg/vehicle-stats (compute_vehicle_stats).
-->
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG Top Vehicle Hunters</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <link rel="stylesheet" href="../_theme.css">
  <style>
    html, body { margin: 0; padding: 0; }
    body { padding: 8px; min-height: 100vh; box-sizing: border-box; }
    body.dock { background: #0d061a; padding: 10px; height: 100vh; overflow: hidden; }
    .panel { width: 100%; min-width: 320px; padding: 14px 16px; }
    .panel h3 {
      margin: 0 0 12px; font-size: 0.9em; letter-spacing: 0.08em;
      color: var(--pubg-muted); text-transform: uppercase;
    }
    table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
    th, td { padding: 6px 8px; text-align: right; }
    th { color: var(--pubg-gold); font-size: 0.78em; text-transform: uppercase;
         letter-spacing: 0.05em; border-bottom: 1px solid rgba(94,42,121,0.5); }
    th:first-child, td:first-child { text-align: left; }
    tr.self td { color: var(--pubg-gold); font-weight: 700; }
    td.rank { color: var(--pubg-muted); width: 28px; }
    td.name { color: var(--pubg-text); }
    td.matches { color: var(--pubg-muted); font-size: 0.85em; }
    td.dealt b, td.taken b { font-size: 1.15em; }
    td.dealt b { color: var(--pubg-gold); }
    td.taken b { color: #ff7a7a; }
    .empty { color: var(--pubg-muted); font-style: italic; text-align: center;
             padding: 20px 0; }
    .sub { color: var(--pubg-muted); font-size: 0.75em; }
  </style>
</head>
<body>
  <div class="pubg-header" id="pubgHeader"></div>
  <div class="pubg-card panel pubg-fade-in">
    <h3 id="panelTitle"><span class="material-symbols-outlined icon-gold" aria-hidden="true">directions_car</span> Top Vehicle Hunters</h3>
    <div id="content"><div class="empty">— loading —</div></div>
  </div>
  <script src="_pubg.js"></script>
  <script>
    const RANGE = PubgUI.qs("range", "session");
    const SORT  = (PubgUI.qs("sort", "dealt") || "dealt").toLowerCase();
    const LIMIT = parseInt(PubgUI.qs("limit", "10"), 10) || 10;
    const MIN_EVENTS = parseInt(PubgUI.qs("minEvents", "1"), 10) || 1;

    const SORT_TITLES = {
      dealt:  { icon: "directions_car",  text: "Top Vehicle Hunters" },
      taken:  { icon: "skull",           text: "Most-Hunted" },
      ratio:  { icon: "balance",         text: "Hunter/Hunted Ratio" },
    };
    const titleSpec = SORT_TITLES[SORT] || SORT_TITLES.dealt;
    document.getElementById("panelTitle").innerHTML =
      `<span class="material-symbols-outlined icon-gold" aria-hidden="true">${titleSpec.icon}</span> ${titleSpec.text}`;

    PubgUI.renderHeader(document.getElementById("pubgHeader"),
      titleSpec.text, RANGE);

    PubgUI.buildFilter([
      { key: "range", label: "Range", type: "select", default: "session",
        options: [["session", "Session"], ["week", "7 days"], ["all", "Database"]] },
      { key: "sort", label: "Sort by", type: "select", default: "dealt",
        options: [["dealt", "dealt"], ["taken", "taken"], ["ratio", "ratio"]],
        tooltip: "dealt = wer am meisten rausgeschossen hat. taken = wer am " +
                  "oeftesten geholt wurde. ratio = dealt/taken (hoeher = besser)." },
      { key: "limit", label: "Max rows", type: "range", default: 10,
        min: 3, max: 30, presets: [5, 10, 15, 20] },
      { key: "minEvents", label: "Min events", type: "range", default: 1,
        min: 1, max: 20, presets: [1, 2, 5] },
    ]);

    function rankRows(members) {
      const items = members.filter(m =>
        (m.evictionsDealt || 0) + (m.evictionsTaken || 0) >= MIN_EVENTS);
      items.forEach(m => {
        const d = m.evictionsDealt || 0;
        const t = m.evictionsTaken || 0;
        m._ratio = d / Math.max(t, 1);
      });
      items.sort((a, b) => {
        if (SORT === "taken") return (b.evictionsTaken || 0) - (a.evictionsTaken || 0);
        if (SORT === "ratio") return b._ratio - a._ratio;
        return (b.evictionsDealt || 0) - (a.evictionsDealt || 0);
      });
      return items.slice(0, LIMIT);
    }

    async function refresh() {
      try {
        const data = await PubgUI.fetchJson(
          (window.__SERVE_BASE__||"/") + `api/pubg/vehicle-stats?range=${RANGE}`);
        const rows = rankRows((data && data.members) || []);
        const cont = document.getElementById("content");
        if (!rows.length) {
          cont.innerHTML = `<div class="empty">Noch keine Vehicle-Action in dieser Range.</div>`;
          return;
        }
        cont.innerHTML = `
          <table>
            <thead><tr>
              <th>#</th><th>Player</th>
              <th title="Gegner aus dem Fahrzeug eliminiert">dealt</th>
              <th title="Selbst aus dem Fahrzeug geholt">taken</th>
              <th title="dealt / max(taken, 1)">ratio</th>
              <th title="Matches mit Squad-Member im Range">matches</th>
            </tr></thead>
            <tbody>
              ${rows.map((m, i) => `
                <tr class="${m.isSelf ? 'self' : ''}">
                  <td class="rank">${i + 1}.</td>
                  <td class="name">${m.isSelf ? "Du" : (m.name || "—")}</td>
                  <td class="dealt"><b>${m.evictionsDealt || 0}</b></td>
                  <td class="taken"><b>${m.evictionsTaken || 0}</b></td>
                  <td>${m._ratio.toFixed(1)}</td>
                  <td class="matches">${m.matches || 0}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
          <div class="sub" style="margin-top:8px">
            Quelle: Vehicle-Eviction-Events (Kill/Knock auf Spieler im Fahrzeug).
          </div>`;
      } catch (e) {
        document.getElementById("content").innerHTML =
          `<div class="empty"><span class="material-symbols-outlined icon-sm icon-danger" aria-hidden="true">error</span> ${e.message || e}</div>`;
      }
    }

    refresh();
    setInterval(refresh, 30000);
  </script>
</body>
</html>
