<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG News Ticker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <style>
    /* body height: 36px wenn ohne Filter — sonst auto, Filter-Bar zählt mit */
    html, body { margin: 0; padding: 0; }
    body { display: flex; align-items: center; min-height: 36px; }
    body:not(.pubg-has-filter) { height: 36px; }
    .ticker {
      width: 100%; height: 36px;
      display: flex; align-items: center;
      padding: 0 18px;
      font-size: 0.95em;
      overflow: hidden;
      position: relative;
    }
    .ticker .slot {
      position: absolute; left: 18px; right: 18px;
      transition: opacity 0.5s, transform 0.5s;
    }
    .ticker .slot.out { opacity: 0; transform: translateY(-12px); }
    .ticker .slot.in  { opacity: 0; transform: translateY(12px); }
    .ticker .slot.active { opacity: 1; transform: translateY(0); }
    .ticker .label {
      color: var(--pubg-gold);
      font-weight: 700;
      letter-spacing: 0.12em;
      margin-right: 12px;
    }
  </style>
</head>
<body>
  <div class="pubg-card ticker">
    <div class="slot active" id="slot"></div>
  </div>
  <script src="_pubg.js"></script>
  <script>
    const ROTATE_MS = parseInt(PubgUI.qs("rotateMs", 8000), 10);

    PubgUI.buildFilter([
      { key: "focus", label: "Focus", type: "select", default: "mix",
        options: [["mix","Session + Lifetime"],
                  ["session","Nur Session"],
                  ["lifetime","Nur Lifetime"]]},
      { key: "rotateMs", label: "Rotate ms", type: "range",
        min: 3000, max: 20000, default: 8000 },
    ]);
    let snippets = [];
    let idx = 0;

    // ?focus=session   → nur Session-Snippets (für In-Game-Stream)
    // ?focus=lifetime  → nur Lifetime-Snippets (für Stream-Ending/Idle)
    // ?focus=mix       → alle (Default)
    const FOCUS = PubgUI.qs("focus", "mix");

    async function refresh() {
      const out = [];

      // ── SESSION ──────────────────────────────────────────
      if (FOCUS !== "lifetime") {
        try {
          const s = await PubgUI.fetchJson("/api/pubg/session");
          if (s.matches) {
            out.push(`<span class="label">SESSION STATS</span> ${s.kills} Kills · ${PubgUI.fmtNum(Math.round(s.damage))} DMG · ${s.wins} Wins · K/M ${PubgUI.fmtKD(s.kpm)}`);
          }
        } catch (_) {}
        try {
          const md = await PubgUI.fetchJson("/api/pubg/map-distribution?range=session");
          if (md[0]) {
            out.push(`<span class="label">SESSION MOST PLAYED MAP</span> ${PubgUI.fmtMap(md[0].map)} (${md[0].count} Spiele)`);
          }
        } catch (_) {}
        try {
          // Score-basiert nach aktuellem Setting (Synergy / Most Chicken / etc.)
          const settings2 = await PubgUI.fetchJson("/api/pubg/settings").catch(() => ({}));
          const sortBy2 = settings2.topMatesSortBy || "mostPlayed";
          const tmS = await PubgUI.fetchJson(`/api/pubg/top-mates?range=session&limit=1&minMatches=1&sortBy=${sortBy2}`);
          if (tmS[0]) {
            const m = tmS[0];
            out.push(`<span class="label">SESSION TOP MATE</span> ${m.name} · ${m.sharedMatches} Matches · ${m.winsTogether||0} 🍗 · K/D Meine ${(m.kd||0).toFixed(2)} / Mate ${(m.mateKd||0).toFixed(2)}`);
          }
        } catch (_) {}
        try {
          const f = await PubgUI.fetchJson("/api/pubg/first-fight-rate?range=session");
          if (f.total) {
            out.push(`<span class="label">SESSION FIRST FIGHT WINS</span> ${(f.rate||0).toFixed(0)}% (${f.survived}/${f.total})`);
          }
        } catch (_) {}
      }

      // ── LIFETIME / DB-LIFETIME ────────────────────────────
      if (FOCUS !== "session") {
        try {
          const settings = await PubgUI.fetchJson("/api/pubg/settings").catch(() => ({}));
          const sortBy = settings.topMatesSortBy || "mostPlayed";
          const tm = await PubgUI.fetchJson("/api/pubg/top-mates?limit=1");
          if (tm[0]) {
            const m = tm[0];
            const LABELS = {
              mostPlayed:       "DB — MOST PLAYED",
              synergy:          "DB — BEST SYNERGY",
              chickensTogether: "DB — MOST 🍗",
              kd:               "DB — BEST K/D (MEINE)",
              mateKd:           "DB — BEST K/D (MATE)",
              winRate:          "DB — BEST WIN-RATE",
              avgPlace:         "DB — BEST AVG PLACE",
            };
            const label = LABELS[sortBy] || "DB — TOP MATE";
            out.push(`<span class="label">${label}</span> ${m.name} · ${m.sharedMatches} Matches · ${m.winsTogether||0} 🍗 · K/D Meine ${(m.kd||0).toFixed(2)} / Mate ${(m.mateKd||0).toFixed(2)}`);
          }
        } catch (_) {}
        try {
          const c = await PubgUI.fetchJson("/api/pubg/career-lifetime?mode=all");
          if (c.rounds_played) {
            out.push(`<span class="label">CAREER — ALL TIME</span> ${PubgUI.fmtNum(c.rounds_played)} Games · K/D ${PubgUI.fmtKD(c.kd_ratio)} · ${c.wins} Wins`);
          }
        } catch (_) {}
      }

      snippets = out;
    }

    function show(html) {
      const slot = document.getElementById("slot");
      slot.classList.remove("active");
      slot.classList.add("out");
      setTimeout(() => {
        slot.innerHTML = html;
        slot.classList.remove("out");
        slot.classList.add("in");
        requestAnimationFrame(() => {
          slot.classList.remove("in");
          slot.classList.add("active");
        });
      }, 500);
    }

    function tick() {
      if (snippets.length === 0) return;
      idx = (idx + 1) % snippets.length;
      show(snippets[idx]);
    }

    refresh().then(() => {
      if (snippets.length) {
        document.getElementById("slot").innerHTML = snippets[0];
        setInterval(tick, ROTATE_MS);
      }
    });
    setInterval(refresh, 60000);
  </script>
</body>
</html>
