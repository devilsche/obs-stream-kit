<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG News Ticker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <style>
    /* body height: 36px wenn ohne Filter — sonst auto, Filter-Bar zählt mit */
    html, body { margin: 0; padding: 0; }
    body { display: flex; align-items: center; min-height: 36px; }
    body:not(.pubg-has-filter) { height: 36px; }
    .ticker {
      width: 100%; height: 36px;
      display: flex; align-items: center;
      padding: 0 18px;
      font-size: 0.95em;
      overflow: hidden;
      position: relative;
    }
    .ticker .slot {
      position: absolute; left: 18px; right: 18px;
      transition: opacity 0.5s, transform 0.5s;
    }
    .ticker .slot.out { opacity: 0; transform: translateY(-12px); }
    .ticker .slot.in  { opacity: 0; transform: translateY(12px); }
    .ticker .slot.active { opacity: 1; transform: translateY(0); }
    .ticker .label {
      color: var(--pubg-gold);
      font-weight: 700;
      letter-spacing: 0.12em;
      margin-right: 12px;
    }
  </style>
</head>
<body>
  <div class="pubg-card ticker">
    <div class="slot active" id="slot"></div>
  </div>
  <script src="_pubg.js"></script>
  <script>
    const ROTATE_MS = parseInt(PubgUI.qs("rotateMs", 8000), 10);

    PubgUI.buildFilter([
      { key: "focus", label: "Focus", type: "select", default: "mix",
        options: [["mix","Session + Lifetime"],
                  ["session","Session only"],
                  ["lifetime","Lifetime only"]],
        tooltip: "Which snippets to show. Session-only suits gameplay " +
                 "scenes; Lifetime-only is for Starting Soon / BRB. Mix " +
                 "rotates both." },
      { key: "rotateMs", label: "Rotate ms", type: "range",
        min: 3000, max: 20000, default: 8000,
        tooltip: "How fast each snippet rotates (milliseconds)." },
    ]);
    let snippets = [];
    let idx = 0;
    let MY_NAME = "Streamer";
    PubgUI.getMyName().then(n => { MY_NAME = n; });

    // ?focus=session   → nur Session-Snippets (für In-Game-Stream)
    // ?focus=lifetime  → nur Lifetime-Snippets (für Stream-Ending/Idle)
    // ?focus=mix       → alle (Default)
    const FOCUS = PubgUI.qs("focus", "mix");

    async function refresh() {
      const out = [];

      // ── SESSION ──────────────────────────────────────────
      if (FOCUS !== "lifetime") {
        let session = null;
        try { session = await PubgUI.fetchJson("/api/pubg/session"); } catch (_) {}
        // Keine aktuelle Session → Ticker komplett ausblenden.
        // ?focus=lifetime und ?ignoreStale=1 sind davon ausgenommen.
        if ((!session || !session.matches) && !PubgUI.ignoreStale()) {
          document.body.classList.add("pubg-stale-hidden");
          snippets = [];
          return;
        }
        document.body.classList.remove("pubg-stale-hidden");
        if (session && session.matches) {
          out.push(`<span class="label">SESSION STATS</span> ${session.kills} Kills · ${PubgUI.fmtNum(Math.round(session.damage))} DMG · ${session.wins} Wins · K/D ${PubgUI.fmtKD(session.kd)} · K/M ${PubgUI.fmtKD(session.kpm)}`);
        }
        try {
          const md = await PubgUI.fetchJson("/api/pubg/map-distribution?range=session");
          if (md[0]) {
            out.push(`<span class="label">SESSION MOST PLAYED MAP</span> ${PubgUI.fmtMap(md[0].map)} (${md[0].count} Matches)`);
          }
        } catch (_) {}
        try {
          // Score-basiert nach aktuellem Setting (Synergy / Most Chicken / etc.)
          const settings2 = await PubgUI.fetchJson("/api/pubg/settings").catch(() => ({}));
          // Default Synergy statt mostPlayed — wer am meisten Matches hat,
          // ist nicht zwingend der "Top Mate". Synergy bewertet KD+Win-Rate.
          const sortBy2 = settings2.topMatesSortBy || "synergy";
          // minMatches=2 damit ein 1-Match-Glücks-Spike nicht oben steht
          const tmS = await PubgUI.fetchJson(`/api/pubg/top-mates?range=session&limit=1&minMatches=2&sortBy=${sortBy2}`);
          if (tmS[0]) {
            const m = tmS[0];
            const SESSION_LABELS = {
              mostPlayed:       "SESSION — MOST PLAYED",
              synergy:          "SESSION — BEST SYNERGY",
              chickensTogether: "SESSION — MOST CHICKEN",
              kd:               "SESSION — BEST K/D (YOURS)",
              mateKd:           "SESSION — BEST K/D (MATE)",
              winRate:          "SESSION — BEST WIN-RATE",
              avgPlace:         "SESSION — BEST AVG PLACE",
            };
            const sLabel = SESSION_LABELS[sortBy2] || "SESSION TOP MATE";
            out.push(`<span class="label">${sLabel}</span> ${m.name} · ${m.sharedMatches} matches · ${m.winsTogether||0} CHICKEN · ${MY_NAME} ${(m.kd||0).toFixed(2)} / Mate ${(m.mateKd||0).toFixed(2)}`);
          }
        } catch (_) {}
        try {
          const f = await PubgUI.fetchJson("/api/pubg/first-fight-rate?range=session");
          if (f.total) {
            out.push(`<span class="label">SESSION FIRST FIGHT WINS</span> ${(f.rate||0).toFixed(0)}% (${f.survived}/${f.total})`);
          }
        } catch (_) {}
      }

      // ── BEST/WORST MAP (Session) ───────────────────────────
      if (FOCUS !== "lifetime") {
        try {
          const bw = await PubgUI.fetchJson("/api/pubg/best-worst-map?range=session&minMatches=2");
          if (bw.best && bw.worst && bw.best.map !== bw.worst.map) {
            out.push(`<span class="label">SESSION BEST/WORST MAP</span> ${PubgUI.fmtMap(bw.best.map)} K/D <b>${bw.best.kd.toFixed(2)}</b> · ${PubgUI.fmtMap(bw.worst.map)} K/D <b>${bw.worst.kd.toFixed(2)}</b>`);
          }
        } catch (_) {}

        // ── Lobby-Difficulty (Session) ────────────────────
        try {
          const lk = await PubgUI.fetchJson("/api/pubg/lobby-avg-kd?range=session");
          if (lk.matches) {
            const sign = (lk.diff || 0) >= 0 ? "+" : "";
            out.push(`<span class="label">SESSION LOBBIES</span> Ø Lobby K/D <b>${(lk.avg||0).toFixed(2)}</b> · You <b>${(lk.myKd||0).toFixed(2)}</b> (${sign}${(lk.diff||0).toFixed(2)})`);
          }
        } catch (_) {}

        // ── Hot-Drop (Session) ────────────────────────────
        try {
          const hd = await PubgUI.fetchJson("/api/pubg/hot-drop?range=session");
          if (hd.matches) {
            const streak = hd.streak ? ` · Streak 🔥${hd.streak}` : "";
            out.push(`<span class="label">SESSION HOT DROPS</span> ${(hd.rate||0).toFixed(0)}% Rate · Solo-Surv <b>${(hd.soloSurvivalRate||0).toFixed(0)}%</b> · Team-Surv <b>${(hd.teamSurvivalRate||0).toFixed(0)}%</b>${streak}`);
          }
        } catch (_) {}

        // ── Trend vs. last Session ────────────────────────
        try {
          const t = await PubgUI.fetchJson("/api/pubg/trend-deltas");
          if (t && t.deltas && t.current) {
            const arr = (v) => v > 0.001 ? "↑" : (v < -0.001 ? "↓" : "·");
            const d = t.deltas;
            out.push(`<span class="label">TREND VS. LAST</span> K/D ${arr(d.kd)}${Math.abs(d.kd).toFixed(2)} · Wins ${arr(d.wins)}${Math.abs(d.wins)} · Avg-DMG ${arr(d.avgDmg)}${Math.round(Math.abs(d.avgDmg))}`);
          }
        } catch (_) {}

        // ── Top-3 Maps der Session ────────────────────────
        try {
          const md = await PubgUI.fetchJson("/api/pubg/map-distribution?range=session");
          if (md.length >= 2) {
            const top3 = md.slice(0, 3).map(x => `${PubgUI.fmtMap(x.map)} ×${x.count}`).join(" · ");
            out.push(`<span class="label">SESSION TOP MAPS</span> ${top3}`);
          }
        } catch (_) {}

        // ── Achievements der Session ──────────────────────
        try {
          const ach = await PubgUI.fetchJson("/api/pubg/session-achievements");
          if (ach && ach.length) {
            const recent = ach.slice(-3).map(a => `${a.icon ? a.icon + " " : ""}${a.label}`).join(" · ");
            out.push(`<span class="label">SESSION ACHIEVEMENTS</span> ${recent}`);
          }
        } catch (_) {}
      }

      // ── LIFETIME / DB-LIFETIME ────────────────────────────
      if (FOCUS !== "session") {
        try {
          const bw = await PubgUI.fetchJson("/api/pubg/best-worst-map?range=all&minMatches=5");
          if (bw.best && bw.worst && bw.best.map !== bw.worst.map) {
            out.push(`<span class="label">DB — BEST/WORST MAP</span> ${PubgUI.fmtMap(bw.best.map)} K/D <b>${bw.best.kd.toFixed(2)}</b> · ${PubgUI.fmtMap(bw.worst.map)} K/D <b>${bw.worst.kd.toFixed(2)}</b>`);
          }
        } catch (_) {}
        try {
          const settings = await PubgUI.fetchJson("/api/pubg/settings").catch(() => ({}));
          const sortBy = settings.topMatesSortBy || "synergy";
          // Default Synergy + minMatches=10 — Glücks-Spikes raus
          const tm = await PubgUI.fetchJson(`/api/pubg/top-mates?limit=1&sortBy=${sortBy}&minMatches=10`);
          if (tm[0]) {
            const m = tm[0];
            const LABELS = {
              mostPlayed:       "DB — MOST PLAYED",
              synergy:          "DB — BEST SYNERGY",
              chickensTogether: "DB — MOST CHICKEN",
              kd:               "DB — BEST K/D (YOURS)",
              mateKd:           "DB — BEST K/D (MATE)",
              winRate:          "DB — BEST WIN-RATE",
              avgPlace:         "DB — BEST AVG PLACE",
            };
            const label = LABELS[sortBy] || "DB — TOP MATE";
            out.push(`<span class="label">${label}</span> ${m.name} · ${m.sharedMatches} matches · ${m.winsTogether||0} CHICKEN · ${MY_NAME} ${(m.kd||0).toFixed(2)} / Mate ${(m.mateKd||0).toFixed(2)}`);
          }
        } catch (_) {}
        try {
          const c = await PubgUI.fetchJson("/api/pubg/career-lifetime?mode=all");
          if (c.rounds_played) {
            out.push(`<span class="label">CAREER — ALL TIME</span> ${PubgUI.fmtNum(c.rounds_played)} Games · K/D ${PubgUI.fmtKD(c.kd_ratio)} · ${c.wins} Wins`);
          }
        } catch (_) {}
      }

      snippets = out;
    }

    function show(html) {
      const slot = document.getElementById("slot");
      slot.classList.remove("active");
      slot.classList.add("out");
      setTimeout(() => {
        slot.innerHTML = html;
        slot.classList.remove("out");
        slot.classList.add("in");
        requestAnimationFrame(() => {
          slot.classList.remove("in");
          slot.classList.add("active");
        });
      }, 500);
    }

    function tick() {
      if (snippets.length === 0) return;
      idx = (idx + 1) % snippets.length;
      show(snippets[idx]);
    }

    // Lifetime-Mode bleibt sichtbar (Starting/BRB-Szenen) — kein Stale-Check.
    if (FOCUS !== "lifetime") PubgUI.hideIfStale();
    refresh().then(() => {
      if (snippets.length) {
        document.getElementById("slot").innerHTML = snippets[0];
        setInterval(tick, ROTATE_MS);
      }
    });
    setInterval(() => {
      if (FOCUS !== "lifetime") PubgUI.hideIfStale();
      refresh();
    }, 60000);
  </script>
</body>
</html>
