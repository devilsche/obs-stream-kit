<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PUBG PAYDAY Stats</title>
<link rel="stylesheet" href="_pubg.css">
  <link rel="stylesheet" href="../_theme.css">
<style>
  body {
    background: transparent;
    color: var(--pubg-text);
    font-family: "DM Sans", system-ui, sans-serif;
    margin: 0;
    padding: 14px;
  }
  .card {
    position: relative;
    background:
      linear-gradient(135deg, rgba(26,13,42,0.92) 0%, rgba(26,13,42,0.78) 60%, rgba(26,13,42,0.92) 100%),
      url("./backgounds/payday.jpg") center/cover;
    border: var(--theme-frame-width, 1px) solid rgba(216, 180, 255, 0.45);
    border-image: var(--theme-frame);
    border-radius: 8px;
    padding: 14px 16px;
    box-shadow: 0 0 20px rgba(216, 180, 255, 0.18);
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at top right, rgba(216,180,255,0.18), transparent 50%),
      radial-gradient(ellipse at bottom left, rgba(94,42,121,0.35), transparent 60%);
    pointer-events: none;
  }
  .card > * { position: relative; z-index: 1; }
  .head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .title {
    color: #e0c8ff;
    font-size: 1.15em;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .subtitle {
    color: var(--pubg-muted);
    font-size: 0.78em;
  }
  .match {
    border: 1px solid rgba(216, 180, 255, 0.35);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 10px;
    background: rgba(13, 6, 26, 0.72);
    backdrop-filter: blur(2px);
  }
  .match-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .match-head .when {
    color: var(--pubg-gold);
    font-weight: 700;
    font-size: 1.0em;
  }
  .match-head .mode {
    color: var(--pubg-muted);
    font-size: 0.78em;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 8px;
  }
  .stat {
    padding: 5px 8px;
    background: rgba(216, 180, 255, 0.10);
    border-radius: 4px;
    text-align: center;
  }
  .stat .v {
    color: #e0c8ff;
    font-size: 1.15em;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .stat .l {
    color: var(--pubg-muted);
    font-size: 0.66em;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .loot {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 6px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 8px;
    background: rgba(216, 180, 255, 0.14);
    border: 1px solid rgba(216, 180, 255, 0.4);
    border-radius: 11px;
    font-size: 0.78em;
  }
  .badge b { color: #e0c8ff; font-variant-numeric: tabular-nums; }
  .extras {
    display: flex;
    gap: 12px;
    color: var(--pubg-muted);
    font-size: 0.78em;
  }
  .extras b { color: var(--pubg-text); font-variant-numeric: tabular-nums; }
  .empty {
    color: var(--pubg-muted);
    font-size: 0.9em;
    text-align: center;
    padding: 20px;
  }
</style>
</head>
<body>
<div id="root" class="card"><div class="empty">— no event matches in range —</div></div>

<script src="./_pubg.js"></script>
<script>
const RANGE   = PubgUI.qs("range", "session");
const POLL_MS = parseInt(PubgUI.qs("pollMs", "15000"), 10);

PubgUI.buildFilter([
  { key: "range", label: "Range", type: "choice",
    choices: [["session","Session"],["day","Day"],["week","Week"],["all","All"]] },
  { key: "pollMs", label: "Poll-Intervall (ms)", type: "range",
    min: 5000, max: 60000, step: 5000 },
]);

function fmtItem(itemId, count, labelMap) {
  const lbl = labelMap[itemId];
  const emoji = lbl ? lbl[1] : "";
  const name = lbl ? lbl[0] : itemId.replace(/^Item_/, "").replace(/_HR_C$/, "");
  return `<span class="badge" title="${itemId}">${emoji} <b>${count}</b> ${name}</span>`;
}

function fmtMatchTime(iso) {
  if (!iso) return "?";
  try {
    const d = new Date(iso);
    return d.toLocaleString("de-DE", {
      day: "2-digit", month: "2-digit",
      hour: "2-digit", minute: "2-digit"
    });
  } catch (e) { return iso.slice(0, 16); }
}

function render(d) {
  const root = document.getElementById("root");
  if (!d || !d.matches || !d.matches.length) {
    root.innerHTML = `<div class="empty">— no event matches in range —</div>`;
    return;
  }
  const labels = d.labels || {};
  const matchesHtml = d.matches.map(m => {
    const lootHtml = Object.entries(m.loot || {})
      .sort((a,b) => b[1] - a[1])
      .map(([id, c]) => fmtItem(id, c, labels))
      .join("");
    return `
      <div class="match">
        <div class="match-head">
          <span class="when">${fmtMatchTime(m.playedAt)}</span>
          <span class="mode">${m.gameMode || "event"} · ${PubgUI.fmtMap(m.mapName)}</span>
        </div>
        <div class="stats-row">
          <div class="stat"><div class="v">${m.myKills}</div><div class="l">My Kills</div></div>
          <div class="stat"><div class="v">${Math.round(m.myDamage)}</div><div class="l">My DMG</div></div>
          <div class="stat"><div class="v">${m.squadKills}</div><div class="l">Squad K</div></div>
          <div class="stat"><div class="v">${Math.round(m.squadDamage)}</div><div class="l">Squad DMG</div></div>
        </div>
        ${lootHtml ? `<div class="loot">${lootHtml}</div>` : ""}
        <div class="extras">
          <span><span class="material-symbols-outlined icon-sm" aria-hidden="true">window</span> <b>${m.windows}</b> windows</span>
          <span><span class="material-symbols-outlined icon-sm" aria-hidden="true">door_front</span> <b>${m.doors}</b> doors</span>
          <span><span class="material-symbols-outlined icon-sm" aria-hidden="true">inventory_2</span> <b>${m.lootTotal}</b> total loot</span>
        </div>
      </div>`;
  }).join("");

  const t = d.totals || {};
  const n = d.matches.length;
  const avgK = n ? (t.myKills / n) : 0;
  const avgD = n ? (t.myDamage / n) : 0;
  const avgL = n ? (t.lootTotal / n) : 0;
  root.innerHTML = `
    <div class="head">
      <span class="title"><span class="material-symbols-outlined" aria-hidden="true">theater_comedy</span> Event / Heist Stats</span>
      <span class="subtitle">${n} match${n > 1 ? "es" : ""} · ${RANGE}
        &nbsp;·&nbsp; Ø <b style="color:#e0c8ff">${avgK.toFixed(1)}</b> K
        &nbsp;·&nbsp; Ø <b style="color:#e0c8ff">${Math.round(avgD)}</b> DMG
        &nbsp;·&nbsp; Ø <b style="color:#e0c8ff">${avgL.toFixed(1)}</b> Loot
      </span>
    </div>
    ${matchesHtml}
  `;
}

PubgUI.poll((window.__SERVE_BASE__||"/") + `api/pubg/payday-stats?range=${RANGE}`, POLL_MS, render, console.error);
</script>
</body>
</html>
