<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PUBG PAYDAY Stats</title>
<link rel="stylesheet" href="_pubg.css">
  <link rel="stylesheet" href="../_theme.css">
<style>
  body {
    background: transparent;
    color: var(--pubg-text);
    font-family: var(--theme-font-body, "DM Sans", system-ui, sans-serif);
    margin: 0;
    padding: 14px;
  }
  .card {
    position: relative;
    background:
      linear-gradient(135deg,
        color-mix(in srgb, var(--theme-surface, #1a0d2a) 92%, transparent) 0%,
        color-mix(in srgb, var(--theme-surface, #1a0d2a) 78%, transparent) 60%,
        color-mix(in srgb, var(--theme-surface, #1a0d2a) 92%, transparent) 100%),
      url("./backgounds/payday.jpg") center/cover;
    border: var(--theme-border-width, 1px) solid color-mix(in srgb, var(--theme-accent-2, #d8b4ff) 45%, transparent);
    border-radius: 8px;
    padding: 14px 16px;
    box-shadow: 0 0 20px color-mix(in srgb, var(--theme-accent-2, #d8b4ff) 18%, transparent);
    overflow: hidden;
  }
  /* Ornament-Rahmen als Overlay (konsolidiert). ::before ist hier mit dem
     radial-Glow belegt → Ornament auf ::after, z-index ueber dem Content
     (.card > * liegt auf z-index:1). */
  .card::after {
    content: ""; position: absolute; inset: 0;
    background-image: var(--theme-corner-tl, none), var(--theme-corner-tr, none),
                      var(--theme-corner-bl, none), var(--theme-corner-br, none);
    background-position: top left, top right, bottom left, bottom right;
    background-size: var(--theme-frame-corner, 28px);
    background-repeat: no-repeat;
    border-radius: inherit;
    pointer-events: none;
    z-index: 2;
  }
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at top right, color-mix(in srgb, var(--theme-accent-2, #d8b4ff) 18%, transparent), transparent 50%),
      radial-gradient(ellipse at bottom left, color-mix(in srgb, var(--theme-primary, #5e2a79) 35%, transparent), transparent 60%);
    pointer-events: none;
  }
  .card > * { position: relative; z-index: 1; }
  .head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .title {
    color: var(--theme-accent-2, #e0c8ff);
    font-size: 1.15em;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .subtitle {
    color: var(--pubg-muted);
    font-size: 0.78em;
  }
  .match {
    border: 1px solid color-mix(in srgb, var(--theme-accent-2, #d8b4ff) 35%, transparent);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 10px;
    background: color-mix(in srgb, var(--theme-bg, #0d061a) 72%, transparent);
    backdrop-filter: blur(2px);
  }
  .match-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .match-head .when {
    color: var(--pubg-gold);
    font-weight: 700;
    font-size: 1.0em;
  }
  .match-head .mode {
    color: var(--pubg-muted);
    font-size: 0.78em;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 8px;
  }
  .stat {
    padding: 5px 8px;
    background: color-mix(in srgb, var(--theme-accent-2, #d8b4ff) 10%, transparent);
    border-radius: 4px;
    text-align: center;
  }
  .stat .v {
    color: var(--theme-accent-2, #e0c8ff);
    font-size: 1.15em;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .stat .l {
    color: var(--pubg-muted);
    font-size: 0.66em;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .loot {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 6px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 8px;
    background: color-mix(in srgb, var(--theme-accent-2, #d8b4ff) 14%, transparent);
    border: 1px solid color-mix(in srgb, var(--theme-accent-2, #d8b4ff) 40%, transparent);
    border-radius: 11px;
    font-size: 0.78em;
  }
  .badge b { color: var(--theme-accent-2, #e0c8ff); font-variant-numeric: tabular-nums; }
  .extras {
    display: flex;
    gap: 12px;
    color: var(--pubg-muted);
    font-size: 0.78em;
  }
  .extras b { color: var(--pubg-text); font-variant-numeric: tabular-nums; }
  .empty {
    color: var(--pubg-muted);
    font-size: 0.9em;
    text-align: center;
    padding: 20px;
  }
</style>
</head>
<body>
<div id="root" class="card"><div class="empty">— no event matches in range —</div></div>

<script src="./_pubg.js"></script>
<script>
const RANGE   = PubgUI.qs("range", "session");
const POLL_MS = parseInt(PubgUI.qs("pollMs", "15000"), 10);

PubgUI.buildFilter([
  { key: "range", label: "Range", type: "choice",
    choices: [["session","Session"],["day","Day"],["week","Week"],["all","All"]] },
  { key: "pollMs", label: "Poll-Intervall (ms)", type: "range",
    min: 5000, max: 60000, step: 5000 },
]);

function fmtItem(itemId, count, labelMap) {
  const lbl = labelMap[itemId];
  const emoji = lbl ? lbl[1] : "";
  const name = lbl ? lbl[0] : itemId.replace(/^Item_/, "").replace(/_HR_C$/, "");
  return `<span class="badge" title="${itemId}">${emoji} <b>${count}</b> ${name}</span>`;
}

function fmtMatchTime(iso) {
  if (!iso) return "?";
  try {
    const d = new Date(iso);
    return d.toLocaleString("de-DE", {
      day: "2-digit", month: "2-digit",
      hour: "2-digit", minute: "2-digit"
    });
  } catch (e) { return iso.slice(0, 16); }
}

function render(d) {
  const root = document.getElementById("root");
  if (!d || !d.matches || !d.matches.length) {
    root.innerHTML = `<div class="empty">— no event matches in range —</div>`;
    return;
  }
  const labels = d.labels || {};
  const matchesHtml = d.matches.map(m => {
    const lootHtml = Object.entries(m.loot || {})
      .sort((a,b) => b[1] - a[1])
      .map(([id, c]) => fmtItem(id, c, labels))
      .join("");
    return `
      <div class="match">
        <div class="match-head">
          <span class="when">${fmtMatchTime(m.playedAt)}</span>
          <span class="mode">${m.gameMode || "event"} · ${PubgUI.fmtMap(m.mapName)}</span>
        </div>
        <div class="stats-row">
          <div class="stat"><div class="v">${m.myKills}</div><div class="l">My Kills</div></div>
          <div class="stat"><div class="v">${Math.round(m.myDamage)}</div><div class="l">My DMG</div></div>
          <div class="stat"><div class="v">${m.squadKills}</div><div class="l">Squad K</div></div>
          <div class="stat"><div class="v">${Math.round(m.squadDamage)}</div><div class="l">Squad DMG</div></div>
        </div>
        ${lootHtml ? `<div class="loot">${lootHtml}</div>` : ""}
        <div class="extras">
          <span><span class="material-symbols-outlined icon-sm" aria-hidden="true">window</span> <b>${m.windows}</b> windows</span>
          <span><span class="material-symbols-outlined icon-sm" aria-hidden="true">door_front</span> <b>${m.doors}</b> doors</span>
          <span><span class="material-symbols-outlined icon-sm" aria-hidden="true">inventory_2</span> <b>${m.lootTotal}</b> total loot</span>
        </div>
      </div>`;
  }).join("");

  const t = d.totals || {};
  const n = d.matches.length;
  const avgK = n ? (t.myKills / n) : 0;
  const avgD = n ? (t.myDamage / n) : 0;
  const avgL = n ? (t.lootTotal / n) : 0;
  root.innerHTML = `
    <div class="head">
      <span class="title"><span class="material-symbols-outlined" aria-hidden="true">theater_comedy</span> Event / Heist Stats</span>
      <span class="subtitle">${n} match${n > 1 ? "es" : ""} · ${RANGE}
        &nbsp;·&nbsp; Ø <b style="color:var(--theme-accent-2,#e0c8ff)">${avgK.toFixed(1)}</b> K
        &nbsp;·&nbsp; Ø <b style="color:var(--theme-accent-2,#e0c8ff)">${Math.round(avgD)}</b> DMG
        &nbsp;·&nbsp; Ø <b style="color:var(--theme-accent-2,#e0c8ff)">${avgL.toFixed(1)}</b> Loot
      </span>
    </div>
    ${matchesHtml}
  `;
}

PubgUI.poll((window.__SERVE_BASE__||"/") + `api/pubg/payday-stats?range=${RANGE}`, POLL_MS, render, console.error);
</script>
</body>
</html>
