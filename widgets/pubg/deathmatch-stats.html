<!DOCTYPE html>
<!--
  PUBG Deathmatch (TDM) Card
  ────────────────────────────────────────────────────────────────────
  Career-artige Stat-Karte fuer den Team-Deathmatch-Modus (game_mode 'tdm').
  Kills/Deaths kommen aus der Telemetrie, Damage aus den participant-Stats
  (siehe compute_deathmatch_stats). Look komplett aus dem Theme (t-* Bausteine).
  Lokale Vorschau: ?theme=<name>&demo=1[&dock=1] ohne Server-Injektion.
-->
<html>
<head>
  <meta charset="utf-8">
  <title>PUBG Deathmatch</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_pubg.css">
  <link rel="stylesheet" href="../_theme.css">
  <link rel="stylesheet" href="../_blocks.css">
  <style>
    body { padding: 20px; display: flex; align-items: center; }
    .t-card { width: 400px; }
    html[data-theme="swiss"] .t-card { width: 460px; }
    .empty { color: var(--theme-text-dim); font-style: italic; }
  </style>
</head>
<body>
  <div class="t-card pubg-fade-in">
    <div class="t-header"><span>Deathmatch</span> <span class="t-range" id="who">—</span></div>
    <div class="t-stat-grid t-stat-grid--cols3 t-stat-grid--compact" id="grid">
      <div class="t-stat"><span class="t-value" id="rounds">—</span><span class="t-label">Rounds</span></div>
      <div class="t-stat"><span class="t-value" id="kills">—</span><span class="t-label">Kills</span></div>
      <div class="t-stat"><span class="t-value" id="deaths">—</span><span class="t-label">Deaths</span></div>
      <div class="t-stat"><span class="t-value" id="kd">—</span><span class="t-label">K/D</span></div>
      <div class="t-stat"><span class="t-value" id="avgk">—</span><span class="t-label">Ø Kills/R</span></div>
      <div class="t-stat"><span class="t-value" id="avgdmg">—</span><span class="t-label">Ø Damage</span></div>
    </div>
  </div>
  <script src="_pubg.js"></script>
  <script>
    const RANGE = PubgUI.qs("range", "all");
    const DEMO  = PubgUI.qs("demo", "") === "1";

    PubgUI.buildFilter([
      { key: "range", label: "Range", type: "select", default: "all",
        options: [["session", "Session"], ["week", "7 days"], ["all", "Database"]] },
    ]);

    // Highlight-Schwellen [Stufe1, Stufe2, Stufe3] — gestuft, dezent.
    const HOT = { kills: [50, 150, 300], kd: [1.0, 1.5, 2.5], avgk: [8, 12, 18] };

    function render(data) {
      const players = (data && data.players) || [];
      const self = players.find(p => p.isSelf) || players[0];
      const $ = (id) => document.getElementById(id);
      if (!self) {
        $("who").textContent = "—";
        document.getElementById("grid").innerHTML =
          `<div class="empty">No deathmatch rounds in this range.</div>`;
        return;
      }
      const rounds = self.matches || 0;
      const avgK = self.kills / Math.max(rounds, 1);
      const avgD = self.damage / Math.max(rounds, 1);
      $("who").textContent = self.name;
      $("rounds").textContent = PubgUI.fmtNum(rounds);
      $("kills").innerHTML  = PubgUI.hot(self.kills, HOT.kills, PubgUI.fmtNum(self.kills));
      $("deaths").textContent = PubgUI.fmtNum(self.deaths);
      $("kd").innerHTML     = PubgUI.hot(self.kd, HOT.kd, PubgUI.fmtKD(self.kd));
      $("avgk").innerHTML   = PubgUI.hot(avgK, HOT.avgk, avgK.toFixed(1));
      $("avgdmg").textContent = Math.round(avgD).toLocaleString("en");
    }

    if (DEMO) {
      render({ players: [{ isSelf: true, name: "Das_Flip-Flop", kills: 105,
               deaths: 63, kd: 1.67, damage: 13369, matches: 6 }] });
    } else {
      PubgUI.poll((window.__SERVE_BASE__ || "/") + "api/pubg/deathmatch-stats?range=" +
        encodeURIComponent(RANGE), 60 * 1000, render, console.error);
    }
  </script>
</body>
</html>
