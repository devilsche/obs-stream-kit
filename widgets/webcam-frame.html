<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Webcam Frame</title>
  <link rel="stylesheet" href="_theme.css">
  <link rel="stylesheet" href="_blocks.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <script src="pubg/_pubg.js"></script>
  <style>
    :root {
      --frame-primary: #5e2a79;
      --frame-accent:  #f2b705;
      --frame-accent2: #c9a0dc;
      --frame-hot-icon: "local_fire_department";
    }
    html.use-theme {
      --frame-primary: var(--theme-primary,  #5e2a79);
      --frame-accent:  var(--theme-accent,   #f2b705);
      --frame-accent2: var(--theme-accent-2, #c9a0dc);
      --frame-hot-icon: var(--theme-hot-icon, "local_fire_department");
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: transparent; }
    .canvas { position: relative; background: transparent; }

    .cam-cutout {
      position: absolute;
      background: transparent;
      border: 2px solid var(--frame-primary);
      border-radius: 4px;
    }
    /* Ornament-Eckbeschläge (feste Größe, größenunabhängig) — nur Gothic-Themes. */
    .cam-cutout::after {
      content: ""; position: absolute; inset: -2px; pointer-events: none; z-index: 5;
      background-image: var(--theme-corner-tl, none), var(--theme-corner-tr, none),
                        var(--theme-corner-bl, none), var(--theme-corner-br, none);
      background-position: top left, top right, bottom left, bottom right;
      background-size: var(--theme-frame-corner, 28px);
      background-repeat: no-repeat;
      border-radius: inherit;
    }

    .lightning-layer { position: absolute; pointer-events: none; z-index: 2; }
    /* Gothic: der zackige Lightning-Layer (entry-Deko) raus → Ornament-Rahmen trägt. */
    html:is([data-theme="oldcamp"],[data-theme="barrier"],[data-theme="sect"]) .lightning-layer {
      display: none;
    }

    .arc { fill: none; stroke-width: 2; filter: url(#lightning-glow); }
    .arc-primary { stroke: var(--frame-accent2); }
    .arc-accent  { stroke: var(--frame-accent); }

    .arc-top    { animation: arcFlicker1 4s   ease-in-out infinite; }
    .arc-left   { animation: arcFlicker2 3.5s ease-in-out infinite; }
    .arc-bottom { animation: arcFlicker3 5s   ease-in-out infinite; }
    .arc-right  { animation: arcFlicker4 4.5s ease-in-out infinite; }

    @keyframes arcFlicker1 { 0%,100%{opacity:.8} 30%{opacity:.3} 60%{opacity:.9} 80%{opacity:.4} }
    @keyframes arcFlicker2 { 0%,100%{opacity:.7} 40%{opacity:.2} 70%{opacity:.85} }
    @keyframes arcFlicker3 { 0%,100%{opacity:.6} 25%{opacity:.9} 50%{opacity:.2} 75%{opacity:.7} }
    @keyframes arcFlicker4 { 0%,100%{opacity:.5} 20%{opacity:.85} 55%{opacity:.3} 80%{opacity:.7} }

    /* Hot-mark nodes positioned along the arc */
    .arc-hotmark {
      position: absolute;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 4;
    }
    /* Azure: Nadel gibt Gas — schneller als der normale 3s-Takt */
    .arc-hotmark .t-gauge .needle {
      animation-duration: 0.35s !important;
      animation-timing-function: ease-in-out !important;
      animation-direction: alternate !important;
    }

    /* Particle container */
    #particle-container {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      overflow: visible;
    }

    @keyframes hot-spark {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--sdx),var(--sdy)) scale(0); opacity: 0; }
    }
    @keyframes spark-spin {
      0%   { transform: translate(0,0) scale(1) rotate(0deg); opacity: 1; }
      100% { transform: translate(var(--sdx),var(--sdy)) scale(0) rotate(180deg); opacity: 0; }
    }

    .frame-particle {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--frame-accent);
      box-shadow: 0 0 5px var(--frame-accent);
      pointer-events: none;
      animation: hot-spark var(--dur, 0.7s) ease-out forwards;
    }
    .frame-particle.p2 {
      background: var(--frame-accent2);
      box-shadow: 0 0 5px var(--frame-accent2);
      animation-name: spark-spin;
    }
  </style>
</head>
<body>
  <div class="canvas" id="canvas">
    <div class="cam-cutout" id="camCutout"></div>

    <svg class="lightning-layer" id="lightningSvg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="lightning-glow">
          <feGaussianBlur stdDeviation="2.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
    </svg>

    <div id="icon-container" style="position:absolute;inset:0;pointer-events:none;z-index:4;overflow:visible"></div>
    <div id="particle-container"></div>
  </div>

  <script>
  (function() {
    'use strict';

    var params  = new URLSearchParams(window.location.search);
    document.documentElement.classList.add('use-theme');

    var camW    = parseInt(params.get('width'),  10) || 400;
    var camH    = parseInt(params.get('height'), 10) || 225;
    var padding = 50;
    var canvasW = camW + padding * 2;
    var canvasH = camH + padding * 2;

    var canvas  = document.getElementById('canvas');
    var cutout  = document.getElementById('camCutout');
    var svg     = document.getElementById('lightningSvg');
    var iconCon = document.getElementById('icon-container');

    document.body.style.width  = canvasW + 'px';
    document.body.style.height = canvasH + 'px';
    var meta = document.createElement('meta');
    meta.name = 'viewport';
    meta.content = 'width=' + canvasW + ',height=' + canvasH;
    document.head.appendChild(meta);

    canvas.style.width  = canvasW + 'px';
    canvas.style.height = canvasH + 'px';
    cutout.style.cssText = 'left:' + padding + 'px;top:' + padding + 'px;width:' + camW + 'px;height:' + camH + 'px;';

    svg.setAttribute('width',   canvasW);
    svg.setAttribute('height',  canvasH);
    svg.setAttribute('viewBox', '0 0 ' + canvasW + ' ' + canvasH);
    svg.style.cssText = 'left:0;top:0;width:' + canvasW + 'px;height:' + canvasH + 'px;';

    function zigzagPoints(x1, y1, x2, y2, segments) {
      var pts = [], dx = x2-x1, dy = y2-y1, len = Math.sqrt(dx*dx+dy*dy);
      var px = -dy/len, py = dx/len;
      for (var i = 0; i <= segments; i++) {
        var t = i/segments, bx = x1+dx*t, by = y1+dy*t;
        if (i === 0 || i === segments) { pts.push(bx.toFixed(1)+','+by.toFixed(1)); }
        else { var o=(Math.random()*2-1)*5; pts.push((bx+px*o).toFixed(1)+','+(by+py*o).toFixed(1)); }
      }
      return pts.join(' ');
    }

    var fx = padding, fy = padding, fw = camW, fh = camH, segs = 14;
    var svgNS = 'http://www.w3.org/2000/svg';

    var edges = [
      { cls: 'arc arc-primary arc-top',    x1:fx,    y1:fy,    x2:fx+fw, y2:fy    },
      { cls: 'arc arc-accent arc-bottom',  x1:fx,    y1:fy+fh, x2:fx+fw, y2:fy+fh },
      { cls: 'arc arc-primary arc-left',   x1:fx,    y1:fy,    x2:fx,    y2:fy+fh },
      { cls: 'arc arc-accent arc-right',   x1:fx+fw, y1:fy,    x2:fx+fw, y2:fy+fh },
    ];
    var polylines = [];
    edges.forEach(function(e) {
      var pl = document.createElementNS(svgNS, 'polyline');
      pl.setAttribute('class', e.cls);
      pl.setAttribute('points', zigzagPoints(e.x1, e.y1, e.x2, e.y2, segs));
      svg.appendChild(pl);
      polylines.push({ el: pl, nx: e.nx, ny: e.ny });
    });

    // Border segments with outward normals
    var borderSegs = [
      { x1:fx, y1:fy,    x2:fx+fw, y2:fy,    nx:0,  ny:-1 },
      { x1:fx, y1:fy+fh, x2:fx+fw, y2:fy+fh, nx:0,  ny:1  },
      { x1:fx, y1:fy,    x2:fx,    y2:fy+fh, nx:-1, ny:0  },
      { x1:fx+fw, y1:fy, x2:fx+fw, y2:fy+fh, nx:1,  ny:0  },
    ];

    function parsePoints(pl) {
      return pl.getAttribute('points').trim().split(/\s+/).map(function(s){
        var p=s.split(','); return {x:parseFloat(p[0]),y:parseFloat(p[1])};
      });
    }
    function randomPointOnPolyline(pl) {
      var pts=parsePoints(pl), i=Math.floor(Math.random()*(pts.length-1)), t=Math.random();
      return {x:pts[i].x+(pts[i+1].x-pts[i].x)*t, y:pts[i].y+(pts[i+1].y-pts[i].y)*t};
    }

    var useTheme = params.get('colors') === 'theme';

    var SPARK_COUNT = 6;
    var sparkEls = [];
    for (var i = 0; i < SPARK_COUNT; i++) {
      if (useTheme) {
        // Theme: PubgUI.makeHotMarkEl() — zentrale Komponente aus _pubg.js
        var hm = PubgUI.makeHotMarkEl({ extraClass: 'arc-hotmark' });
        iconCon.appendChild(hm.el);
        sparkEls.push(hm);
      } else {
        // Default: SVG circle on the arc
        var c = document.createElementNS(svgNS, 'circle');
        c.setAttribute('r', '3');
        c.setAttribute('cx', '0'); c.setAttribute('cy', '0');
        c.style.cssText = 'fill:var(--frame-accent);filter:url(#lightning-glow);opacity:0';
        svg.appendChild(c);
        sparkEls.push(c);
      }
    }

    function animateIcon(el, initialDelay) {
      // el is either an SVG circle element, or a {el, setPos} object from makeHotMarkEl
      var isHotMark = el && typeof el.setPos === 'function';
      var domEl = isHotMark ? el.el : el;
      var isSvg = !isHotMark && domEl.tagName && domEl.tagName.toLowerCase() === 'circle';

      function cycle() {
        var pl = polylines[Math.floor(Math.random()*polylines.length)].el;
        var pos = randomPointOnPolyline(pl);
        if (isSvg) {
          domEl.setAttribute('cx', pos.x.toFixed(1));
          domEl.setAttribute('cy', pos.y.toFixed(1));
          domEl.animate([{opacity:0},{opacity:1}],{duration:600,fill:'forwards'}).onfinish = function(){
            setTimeout(function(){
              domEl.animate([{opacity:1},{opacity:0}],{duration:600,fill:'forwards'}).onfinish = cycle;
            }, 700+Math.random()*800);
          };
        } else if (isHotMark) {
          el.setPos(pos.x, pos.y);
          domEl.animate([{opacity:0,transform:'translate(-50%,-50%) scale(0.4)'},{opacity:1,transform:'translate(-50%,-50%) scale(1)'}],
            {duration:500,fill:'forwards'}).onfinish = function(){
            setTimeout(function(){
              domEl.animate([{opacity:1},{opacity:0}],{duration:500,fill:'forwards'}).onfinish = cycle;
            }, 800+Math.random()*900);
          };
        } else {
          domEl.style.left = pos.x.toFixed(1)+'px';
          domEl.style.top  = pos.y.toFixed(1)+'px';
          domEl.animate([{opacity:0,transform:'translate(-50%,-50%) scale(0.5)'},{opacity:1,transform:'translate(-50%,-50%) scale(1)'}],
            {duration:600,fill:'forwards'}).onfinish = function(){
            setTimeout(function(){
              domEl.animate([{opacity:1},{opacity:0}],{duration:600,fill:'forwards'}).onfinish = cycle;
            }, 700+Math.random()*800);
          };
        }
      }
      setTimeout(cycle, initialDelay);
    }
    sparkEls.forEach(function(el, idx){ animateIcon(el, idx*500 + Math.random()*500); });

    // Hot-icon style spark particles along the border
    var pCon = document.getElementById('particle-container');
    function spawnParticle() {
      var seg = borderSegs[Math.floor(Math.random()*borderSegs.length)];
      var t = Math.random();
      var px = seg.x1 + (seg.x2-seg.x1)*t;
      var py = seg.y1 + (seg.y2-seg.y1)*t;
      var dist = 10 + Math.random()*18;
      var spread = (Math.random()-0.5)*14;
      var sdx = (seg.nx*dist + seg.ny*spread).toFixed(1)+'px';
      var sdy = (seg.ny*dist - seg.nx*spread).toFixed(1)+'px';
      var dur = (0.4+Math.random()*0.5).toFixed(2)+'s';
      var el = document.createElement('div');
      el.className = 'frame-particle'+(Math.random()>0.5?' p2':'');
      el.setAttribute('style','left:'+px.toFixed(1)+'px;top:'+py.toFixed(1)+'px;--sdx:'+sdx+';--sdy:'+sdy+';--dur:'+dur+';');
      pCon.appendChild(el);
      setTimeout(function(){ el.remove(); }, parseFloat(dur)*1000+50);
    }
    setInterval(spawnParticle, 70);
    for (var j=0; j<10; j++) setTimeout(spawnParticle, j*30);

  })();
  </script>
</body>
</html>
