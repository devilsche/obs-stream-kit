<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Webcam Frame</title>
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-display: swap;
    }

    :root {
      --color-purple: #5e2a79;
      --color-purple-light: #c9a0dc;
      --color-gold: #f2b705;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      background: transparent;
    }

    .canvas {
      position: relative;
      background: transparent;
    }

    .cam-cutout {
      position: absolute;
      background: rgba(0,0,0,0);
      border: 2px solid var(--color-purple);
      border-radius: 4px;
    }

    /* Lightning SVG layer — covers exactly the cam cutout area */
    .lightning-layer {
      position: absolute;
      pointer-events: none;
      z-index: 2;
    }

    .arc {
      fill: none;
      stroke-width: 2;
      filter: url(#lightning-glow);
    }
    .arc-purple { stroke: var(--color-purple-light); }
    .arc-gold   { stroke: var(--color-gold); }

    .arc-top    { animation: arcFlicker1 4s ease-in-out infinite; }
    .arc-left   { animation: arcFlicker2 3.5s ease-in-out infinite; }
    .arc-bottom { animation: arcFlicker3 5s ease-in-out infinite; }
    .arc-right  { animation: arcFlicker4 4.5s ease-in-out infinite; }

    @keyframes arcFlicker1 {
      0%, 100% { opacity: 0.8; }
      30%  { opacity: 0.3; }
      60%  { opacity: 0.9; }
      80%  { opacity: 0.4; }
    }
    @keyframes arcFlicker2 {
      0%, 100% { opacity: 0.7; }
      40%  { opacity: 0.2; }
      70%  { opacity: 0.85; }
    }
    @keyframes arcFlicker3 {
      0%, 100% { opacity: 0.6; }
      25%  { opacity: 0.9; }
      50%  { opacity: 0.2; }
      75%  { opacity: 0.7; }
    }
    @keyframes arcFlicker4 {
      0%, 100% { opacity: 0.5; }
      20%  { opacity: 0.85; }
      55%  { opacity: 0.3; }
      80%  { opacity: 0.7; }
    }

    /* Spark points styled via JS / Web Animations API */
    .spark-point {
      fill: #ffffff;
      filter: url(#lightning-glow);
    }

    /* Sparkle container */
    #sparkle-container {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="canvas" id="canvas">
    <div class="cam-cutout" id="camCutout"></div>

    <svg class="lightning-layer" id="lightningSvg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="lightning-glow">
          <feGaussianBlur stdDeviation="2.5" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <!-- Arcs and spark points are generated by JS -->
    </svg>

    <div id="sparkle-container"></div>
  </div>

  <script src="../js/sparkles.js"></script>
  <script>
  (function() {
    'use strict';

    /* ── URL parameters ───────────────────────────────────── */
    var params  = new URLSearchParams(window.location.search);
    var camW    = parseInt(params.get('width'),  10) || 400;
    var camH    = parseInt(params.get('height'), 10) || 225;
    var padding = 50; // 50px on each side → 100px total extra
    var canvasW = camW + padding * 2;
    var canvasH = camH + padding * 2;

    /* ── Size the canvas and elements ─────────────────────── */
    var canvas  = document.getElementById('canvas');
    var cutout  = document.getElementById('camCutout');
    var svg     = document.getElementById('lightningSvg');

    document.body.style.width  = canvasW + 'px';
    document.body.style.height = canvasH + 'px';

    // viewport meta for OBS
    var meta = document.createElement('meta');
    meta.name = 'viewport';
    meta.content = 'width=' + canvasW + ', height=' + canvasH;
    document.head.appendChild(meta);

    canvas.style.width  = canvasW + 'px';
    canvas.style.height = canvasH + 'px';

    cutout.style.left   = padding + 'px';
    cutout.style.top    = padding + 'px';
    cutout.style.width  = camW + 'px';
    cutout.style.height = camH + 'px';

    /* ── SVG setup — covers full canvas ───────────────────── */
    svg.setAttribute('width',   canvasW);
    svg.setAttribute('height',  canvasH);
    svg.setAttribute('viewBox', '0 0 ' + canvasW + ' ' + canvasH);
    svg.style.left   = '0';
    svg.style.top    = '0';
    svg.style.width  = canvasW + 'px';
    svg.style.height = canvasH + 'px';

    /* ── Generate zigzag polyline points along an edge ────── */
    function zigzagPoints(x1, y1, x2, y2, segments) {
      // Walk from (x1,y1) to (x2,y2) in `segments` steps,
      // adding small perpendicular jitter at each interior point.
      var pts = [];
      var dx = x2 - x1;
      var dy = y2 - y1;
      var len = Math.sqrt(dx * dx + dy * dy);
      // Perpendicular unit vector
      var px = -dy / len;
      var py =  dx / len;
      var jitter = 5; // max pixels of zigzag offset

      for (var i = 0; i <= segments; i++) {
        var t = i / segments;
        var bx = x1 + dx * t;
        var by = y1 + dy * t;
        if (i === 0 || i === segments) {
          // Keep endpoints exact
          pts.push(bx.toFixed(1) + ',' + by.toFixed(1));
        } else {
          var offset = (Math.random() * 2 - 1) * jitter;
          pts.push((bx + px * offset).toFixed(1) + ',' + (by + py * offset).toFixed(1));
        }
      }
      return pts.join(' ');
    }

    /* Frame edge coordinates (cam cutout position in SVG space) */
    var fx = padding;        // left edge x
    var fy = padding;        // top edge y
    var fw = camW;
    var fh = camH;
    var segs = 14; // number of zigzag segments per edge

    /* ── Create polylines ─────────────────────────────────── */
    var edges = [
      { cls: 'arc arc-purple arc-top',    x1: fx,      y1: fy,      x2: fx + fw, y2: fy       },
      { cls: 'arc arc-gold arc-bottom',   x1: fx,      y1: fy + fh, x2: fx + fw, y2: fy + fh  },
      { cls: 'arc arc-purple arc-left',   x1: fx,      y1: fy,      x2: fx,      y2: fy + fh  },
      { cls: 'arc arc-gold arc-right',    x1: fx + fw, y1: fy,      x2: fx + fw, y2: fy + fh  }
    ];

    var polylines = [];
    var svgNS = 'http://www.w3.org/2000/svg';

    edges.forEach(function(e) {
      var pl = document.createElementNS(svgNS, 'polyline');
      pl.setAttribute('class', e.cls);
      pl.setAttribute('points', zigzagPoints(e.x1, e.y1, e.x2, e.y2, segs));
      svg.appendChild(pl);
      polylines.push(pl);
    });

    /* ── Spark Points (6 circles) ─────────────────────────── */

    /**
     * Parse a polyline's points attribute into an array of {x, y} objects.
     */
    function parsePoints(polyline) {
      var raw = polyline.getAttribute('points').trim().split(/\s+/);
      return raw.map(function(s) {
        var parts = s.split(',');
        return { x: parseFloat(parts[0]), y: parseFloat(parts[1]) };
      });
    }

    /**
     * Pick a random position on a polyline by choosing a random segment
     * and interpolating between its two endpoints.
     */
    function randomPointOnPolyline(polyline) {
      var pts = parsePoints(polyline);
      // Pick a random segment index [0, pts.length - 2]
      var segIdx = Math.floor(Math.random() * (pts.length - 1));
      var t = Math.random();
      return {
        x: pts[segIdx].x + (pts[segIdx + 1].x - pts[segIdx].x) * t,
        y: pts[segIdx].y + (pts[segIdx + 1].y - pts[segIdx].y) * t
      };
    }

    var SPARK_COUNT = 6;
    var sparkCircles = [];

    for (var i = 0; i < SPARK_COUNT; i++) {
      var circle = document.createElementNS(svgNS, 'circle');
      circle.setAttribute('class', 'spark-point');
      circle.setAttribute('r', '2.5');
      circle.setAttribute('cx', '0');
      circle.setAttribute('cy', '0');
      circle.style.opacity = '0';
      svg.appendChild(circle);
      sparkCircles.push(circle);
    }

    /**
     * Animate a single spark circle:
     *   1. Position at a random point on a random polyline
     *   2. Fade in over 800ms
     *   3. Hold for 800-1500ms
     *   4. Fade out over 800ms
     *   5. Repeat
     */
    function animateSpark(circle, initialDelay) {
      function cycle() {
        // Pick a random polyline and position
        var pl = polylines[Math.floor(Math.random() * polylines.length)];
        var pos = randomPointOnPolyline(pl);
        circle.setAttribute('cx', pos.x.toFixed(1));
        circle.setAttribute('cy', pos.y.toFixed(1));

        // Fade in
        var fadeIn = circle.animate(
          [{ opacity: 0 }, { opacity: 1 }],
          { duration: 800, fill: 'forwards', easing: 'ease-in' }
        );

        fadeIn.onfinish = function() {
          // Hold
          var holdDuration = 800 + Math.random() * 700; // 800-1500ms
          setTimeout(function() {
            // Fade out
            var fadeOut = circle.animate(
              [{ opacity: 1 }, { opacity: 0 }],
              { duration: 800, fill: 'forwards', easing: 'ease-out' }
            );
            fadeOut.onfinish = function() {
              cycle();
            };
          }, holdDuration);
        };
      }

      // Stagger start times so sparks don't all begin at once
      setTimeout(cycle, initialDelay);
    }

    // Start each spark with a random initial delay (0-3s)
    sparkCircles.forEach(function(circle, idx) {
      animateSpark(circle, idx * 500 + Math.random() * 500);
    });

    /* ── Flying Sparkles (shared engine) ──────────────────── */
    new SparkleEngine(document.getElementById('sparkle-container'), {
      count: 14,
      speed: 0.5,
      maxOpacity: 1.0,
      colors: { gold: 0.35, purple: 0.35, white: 0.30 },
      sizeWeights: { big: 0.15, normal: 0.35, small: 0.35, tiny: 0.15 }
    }).start();

  })();
  </script>
</body>
</html>
