<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Steam Combined Popup</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../pubg/_pubg.css">
  <style>
    /* Kombiniertes Steam-Popup. Zeigt abwechselnd:
         - Now-Playing       (poll alle 10 min, slide-in 8s)
         - Achievement       (poll alle 5s, slide-in 8s, hat Priority)
       Beide nicht gleichzeitig — Queue + Interrupt:
         Wenn Achievement reinkommt während Now-Playing animiert
         ist, wird Now-Playing weggeschoben und Achievement gezeigt.
    */
    html, body { height: 100%; margin: 0; padding: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      box-sizing: border-box;
      padding: 20px;
    }
    .popup {
      width: 480px;
      padding: 16px 20px;
      display: flex;
      gap: 14px;
      align-items: center;
      transform: translateY(40px);
      opacity: 0;
      transition: opacity 0.45s, transform 0.45s;
    }
    .popup.show { opacity: 1; transform: translateY(0); }

    .icon {
      width: 64px; height: 64px;
      border-radius: 8px;
      background: rgba(0,0,0,0.3);
      object-fit: cover;
      flex-shrink: 0;
    }
    .info { flex: 1; min-width: 0; }
    .ribbon {
      display: inline-block;
      padding: 2px 8px;
      background: var(--pubg-gold);
      color: #1a0d2a;
      font-weight: 700;
      font-size: 0.7em;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 3px;
      margin-bottom: 4px;
    }
    .title {
      color: var(--pubg-gold);
      font-size: 1.15em;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .desc {
      color: var(--pubg-text);
      font-size: 0.85em;
      line-height: 1.3;
      margin-top: 2px;
    }
    .meta {
      color: var(--pubg-muted);
      font-size: 0.78em;
      margin-top: 4px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 12px;
    }
    .meta b { color: var(--pubg-text); font-variant-numeric: tabular-nums; }
    .ach-bar {
      margin-top: 6px;
      width: 100%; height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    .ach-bar .fill {
      height: 100%;
      background: var(--pubg-gold);
      transition: width 0.4s;
    }
    /* Achievement-Variante: Icon glüht gold */
    .popup[data-type="achievement"] .icon {
      border: 1px solid var(--pubg-gold);
      box-shadow: 0 0 12px rgba(242, 183, 5, 0.35);
    }
    /* Now-Playing-Variante: Icon ohne Glow, aber mit Border */
    .popup[data-type="now-playing"] .icon {
      border: 1px solid var(--pubg-border);
    }
    /* Rarity-Tiers: rare (<=10%), mythic (<=5%), legendary (<=1%) */
    .popup.rare[data-type="achievement"] .icon {
      border-color: #fff8d0;
      animation: rareGlow 1.8s ease-in-out infinite;
    }
    .popup.mythic[data-type="achievement"] .icon {
      border-color: #e0c8ff;
      animation: mythicGlow 1.6s ease-in-out infinite;
    }
    .popup.legendary[data-type="achievement"] .icon {
      border-color: #ffdf80;
      animation: legendaryGlow 1.2s ease-in-out infinite;
    }
    @keyframes rareGlow {
      0%, 100% { box-shadow: 0 0 18px rgba(242,183,5,0.65), 0 0 36px rgba(242,183,5,0.35); }
      50%      { box-shadow: 0 0 32px rgba(242,183,5,0.95), 0 0 60px rgba(242,183,5,0.55); }
    }
    @keyframes mythicGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(160,100,235,0.7), 0 0 48px rgba(160,220,255,0.4); }
      50%      { box-shadow: 0 0 38px rgba(200,150,255,0.95), 0 0 72px rgba(160,220,255,0.6); }
    }
    @keyframes legendaryGlow {
      0%, 100% { box-shadow: 0 0 28px rgba(255,80,40,0.85), 0 0 60px rgba(255,200,40,0.55); }
      50%      { box-shadow: 0 0 44px rgba(255,120,60,1.0), 0 0 90px rgba(255,220,80,0.75); }
    }
    .popup.rare .meta .rare-tag b      { color: var(--pubg-gold); }
    .popup.mythic .meta .rare-tag b    { color: #d8b4ff; }
    .popup.legendary .meta .rare-tag b { color: #ffc828; }
  </style>
</head>
<body>
  <div class="pubg-card popup" id="popup" data-type="">
    <img class="icon" id="icon" alt="">
    <div class="info">
      <span class="ribbon" id="ribbon">—</span>
      <div class="title" id="title">—</div>
      <div class="desc" id="desc"></div>
      <div class="meta" id="meta"></div>
      <div class="ach-bar" id="achBar" style="display:none">
        <div class="fill" id="achFill" style="width:0%"></div>
      </div>
    </div>
  </div>
  <audio id="soundCommon"    src="sounds/lvlup.wav" preload="auto"></audio>
  <audio id="soundRare"      src="sounds/biglvlup.wav" preload="auto"></audio>
  <audio id="soundMythic"    src="sounds/mystique.mp3" preload="auto"></audio>
  <audio id="soundLegendary" src="sounds/legendary.mp3" preload="auto"></audio>

  <script src="../pubg/_pubg.js"></script>
  <script>
    // ── URL-Params (Override-Optionen) ────────────────────────────────
    const NOW_PLAYING_INTERVAL_MS  = parseInt(PubgUI.qs("nowPollMs",  String(10 * 60 * 1000)), 10);   // 10 min
    const ACHIEVEMENT_INTERVAL_MS  = parseInt(PubgUI.qs("achPollMs",  "5000"),  10);                 // 5 s
    const SHOW_DURATION_MS         = parseInt(PubgUI.qs("durationMs", "8000"),  10);
    const GAP_MS                   = parseInt(PubgUI.qs("gapMs",      "1500"),  10);
    const RARE_PCT                 = parseFloat(PubgUI.qs("rarePct",   "10"));
    const SOUND_ON                 = PubgUI.qs("sound", "1") !== "0";
    const VOLUME                   = Math.max(0, Math.min(1,
                                       (parseFloat(PubgUI.qs("volume", "50")) || 0) / 100));

    // Rarity-Tiers: <=1% legendary, <=5% mythic, <=10% rare, sonst common
    function getRarityTier(pct) {
      if (!Number.isFinite(pct)) return "common";
      if (pct <=  1) return "legendary";
      if (pct <=  5) return "mythic";
      if (pct <= 10) return "rare";
      return "common";
    }
    function playSound(tier) {
      if (!SOUND_ON) return;
      const idMap = { legendary: "soundLegendary", mythic: "soundMythic",
                      rare: "soundRare", common: "soundCommon" };
      const fallback = { legendary: "soundMythic", mythic: "soundRare",
                          rare: "soundCommon" };
      let el = document.getElementById(idMap[tier] || "soundCommon");
      if (el && el.error) {
        el = document.getElementById(fallback[tier]) || el;
      }
      if (!el) return;
      try {
        el.volume = VOLUME;
        el.currentTime = 0;
        const p = el.play();
        if (p && p.catch) p.catch(() => {
          const fb = fallback[tier] ? document.getElementById(fallback[tier]) : null;
          if (fb) { try { fb.volume = VOLUME; fb.currentTime = 0; fb.play().catch(()=>{}); } catch(e){} }
        });
      } catch (e) { /* silent */ }
    }

    PubgUI.buildFilter([
      { key: "nowPollMs", label: "Now-playing poll (ms)", type: "range",
        min: 30000, max: 1800000, default: 600000,
        tooltip: "How often to poll the now-playing endpoint. Default " +
                 "10 min — Steam summary rarely changes faster." },
      { key: "achPollMs", label: "Achievement poll (ms)", type: "range",
        min: 2000, max: 30000, default: 5000,
        tooltip: "How often to poll for new achievement unlocks." },
      { key: "durationMs", label: "Show duration (ms)", type: "range",
        min: 3000, max: 15000, default: 8000,
        tooltip: "How long each popup stays visible." },
      { key: "gapMs", label: "Gap (ms)", type: "range",
        min: 0, max: 5000, default: 1500,
        tooltip: "Pause between consecutive popups." },
      { key: "rarePct", label: "Rare ≤ (%)", type: "range",
        min: 1, max: 25, default: 10,
        tooltip: "Threshold for 'rare unlock' glow. Achievements that " +
                 "fewer than N% of players have get the highlight." },
      { key: "sound", label: "Sound", type: "select",
        default: "1",
        options: [["1","On"], ["0","Off"]],
        tooltip: "Play lvlup.wav on achievement unlock " +
                 "(biglvlup.wav on rare)." },
      { key: "volume", label: "Volume", type: "range",
        min: 0, max: 100, default: 50,
        tooltip: "Achievement-Sound-Lautstaerke (0-100%)." },
    ]);

    const popup  = document.getElementById("popup");
    const ribbon = document.getElementById("ribbon");
    const titleEl= document.getElementById("title");
    const descEl = document.getElementById("desc");
    const metaEl = document.getElementById("meta");
    const iconEl = document.getElementById("icon");
    const barEl  = document.getElementById("achBar");
    const fillEl = document.getElementById("achFill");

    /** Queue-Item:
     *    { type: 'now-playing' | 'achievement', data: object,
     *      priority: number (höher = wichtiger) }
     */
    const queue = [];
    let current = null;
    let hideTimer = null;
    let gapTimer = null;

    function fmtHours(min) {
      if (!min || min < 0) return null;
      if (min < 60) return min + " min";
      const h = Math.floor(min / 60);
      if (h < 100) return h + "h " + (min % 60) + "m";
      return h + " h";
    }

    // Render-Logik je Type ──────────────────────────────────────────────
    function renderNowPlaying(d) {
      popup.dataset.type = "now-playing";
      popup.classList.remove("rare");
      ribbon.textContent = "Now Playing";
      iconEl.src = d.avatar || "";
      iconEl.style.display = d.avatar ? "" : "none";
      titleEl.textContent = d.personaName || "—";
      descEl.textContent = d.gameName ? `is now playing ${d.gameName}` : "is online";
      const parts = [];
      const total = fmtHours(d.playtimeTotalMin);
      if (total) parts.push(`<span><b>${total}</b> total</span>`);
      const recent = fmtHours(d.playtime2WeeksMin);
      if (recent) parts.push(`<span><b>${recent}</b> last 2w</span>`);
      if (d.achievementsTotal && d.achievementsTotal > 0) {
        const got = d.achievementsUnlocked || 0;
        parts.push(`<span><b>${got}</b>/<b>${d.achievementsTotal}</b> achievements</span>`);
      }
      metaEl.innerHTML = parts.join("");
      // Progress-Bar
      if (d.achievementsTotal && d.achievementsTotal > 0) {
        barEl.style.display = "";
        fillEl.style.width = ((d.achievementsUnlocked || 0) / d.achievementsTotal * 100).toFixed(1) + "%";
      } else {
        barEl.style.display = "none";
      }
    }

    function renderAchievement(u) {
      popup.dataset.type = "achievement";
      const isPubg = u.source === "pubg";
      // Rarity-Tiers: Steam globalPct, PUBG sessionPct
      const tierPct = isPubg ? Number(u.sessionPct) : Number(u.globalPct);
      const tier = getRarityTier(tierPct);
      const isRare = tier !== "common";
      popup.classList.remove("rare", "mythic", "legendary");
      if (tier !== "common") popup.classList.add(tier);
      const tierLabel = {legendary:"Legendary", mythic:"Mythic", rare:"Rare", common:""}[tier];
      const suffix = isPubg
        ? (tier === "common" ? "Session Milestone Unlocked" : "Session Milestone")
        : (tier === "common" ? "Achievement Unlocked" : "Achievement Unlocked");
      ribbon.textContent = tierLabel ? `${tierLabel} ${suffix}` : suffix;
      playSound(tier);
      // Icon: URL oder Emoji (Source-Agnostic, gleicher Pfad wie
      // achievement-popup.html)
      const isUrl = u.iconUrl && (
        u.iconUrl.startsWith("http://") ||
        u.iconUrl.startsWith("https://") ||
        u.iconUrl.startsWith("/"));
      if (u.iconUrl && isUrl) {
        iconEl.src = u.iconUrl;
        iconEl.style.display = "";
      } else if (u.iconUrl) {
        // Emoji-Fallback: zeige als Text statt Bild
        iconEl.style.display = "none";
        // Hier koennte man ein zweites Element zeigen — fuer popup.html
        // ist das Layout aber tighter, daher fuer Emoji einfach
        // gar nichts darstellen.
      } else {
        iconEl.style.display = "none";
      }
      titleEl.textContent = u.displayName || u.apiName || "Achievement";
      descEl.textContent = u.description || "";
      const parts = [];
      if (u.gameName) {
        parts.push(
          `<span style="text-transform:uppercase;letter-spacing:0.06em">${u.gameName}</span>`);
      }
      // Stat-Line unified: 'X% of [players|your sessions] got this'
      let statLine = null;
      if (isPubg) {
        const sp = Number(u.sessionPct);
        if (Number.isFinite(sp)) {
          statLine = `<b>${sp.toFixed(0)}%</b> of your sessions got this`;
        }
      } else {
        const gp = Number(u.globalPct);
        if (Number.isFinite(gp)) {
          statLine = `<b>${gp.toFixed(1)}%</b> of players got this`;
        }
      }
      if (statLine) {
        parts.push(`<span class="rare-tag">${statLine}</span>`);
      }
      const agoText = fmtAgo(u.unlockedAt);
      if (agoText) {
        parts.push(`<span class="ago-tag">${agoText}</span>`);
      }
      metaEl.innerHTML = parts.join("");
      barEl.style.display = "none";
    }

    // Relative Zeit — Ladder s / Min. / Std. / Tage / Monate / Jahre.
    function fmtAgo(unlockedAt) {
      if (!unlockedAt) return "";
      const nowS = Date.now() / 1000;
      const delta = Math.max(0, nowS - unlockedAt);
      if (delta < 60)    return `vor ${Math.round(delta)}s`;
      if (delta < 3600)  return `vor ${Math.round(delta / 60)} Min.`;
      if (delta < 86400) return `vor ${Math.round(delta / 3600)} Std.`;
      const days = Math.round(delta / 86400);
      if (days < 30)  return days === 1   ? "vor 1 Tag"   : `vor ${days} Tagen`;
      const months = Math.round(days / 30.44);
      if (months < 12) return months === 1 ? "vor 1 Monat" : `vor ${months} Monaten`;
      const years = Math.round(days / 365.25);
      return years === 1 ? "vor 1 Jahr" : `vor ${years} Jahren`;
    }

    // Show / Hide / Queue-Processing ────────────────────────────────────
    function clearTimers() {
      if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
      if (gapTimer)  { clearTimeout(gapTimer);  gapTimer  = null; }
    }

    function show(item) {
      clearTimers();
      current = item;
      if (item.type === "now-playing") renderNowPlaying(item.data);
      else                              renderAchievement(item.data);
      // Doppelter requestAnimationFrame, damit transition triggert
      requestAnimationFrame(() => requestAnimationFrame(() =>
        popup.classList.add("show")));
      hideTimer = setTimeout(hide, SHOW_DURATION_MS);
    }

    function hide(thenProcess = true) {
      clearTimers();
      popup.classList.remove("show");
      gapTimer = setTimeout(() => {
        current = null;
        if (thenProcess) processQueue();
      }, GAP_MS);
    }

    function processQueue() {
      if (current) return;
      // Sort by priority desc — Achievement (1) vor Now-Playing (0)
      queue.sort((a, b) => (b.priority || 0) - (a.priority || 0));
      const next = queue.shift();
      if (next) show(next);
    }

    function enqueue(item) {
      // Dedup Now-Playing: nur 1 in Queue
      if (item.type === "now-playing") {
        const existing = queue.findIndex(q => q.type === "now-playing");
        if (existing !== -1) queue.splice(existing, 1);
      }
      queue.push(item);
      // Interrupt: Achievement während Now-Playing animiert
      if (current && current.type === "now-playing"
          && item.type === "achievement") {
        hide(/*thenProcess*/ true);
        return;
      }
      processQueue();
    }

    // Pollers ───────────────────────────────────────────────────────────
    async function pollNowPlaying() {
      try {
        const d = await PubgUI.fetchJson((window.__SERVE_BASE__||"/") + "api/steam/now-playing");
        if (d && d.active) {
          enqueue({ type: "now-playing", data: d, priority: 0 });
        }
      } catch (e) { /* silent */ }
    }

    // Server-side displayed_at-Flag in steam_achievements_seen ist die
    // Wahrheit. Kein LocalStorage-Cache mehr (hat Replay blockiert).
    // Innerhalb einer Server-Antwort wird trotzdem dedupiert.
    async function pollAchievements() {
      const justQueued = new Set();
      try {
        const r = await PubgUI.fetchJson(
          (window.__SERVE_BASE__||"/") + "api/steam/recent-unlocks?markDisplayed=1");
        for (const u of (r && r.unlocks) || []) {
          if (justQueued.has(u.apiName)) continue;
          enqueue({ type: "achievement", data: u, priority: 1 });
          justQueued.add(u.apiName);
        }
      } catch (e) { /* silent */ }
      try {
        const r = await PubgUI.fetchJson(
          (window.__SERVE_BASE__||"/") + "api/pubg/recent-achievements?markDisplayed=1");
        for (const u of (r && r.unlocks) || []) {
          if (justQueued.has(u.apiName)) continue;
          enqueue({ type: "achievement", data: u, priority: 1 });
          justQueued.add(u.apiName);
        }
      } catch (e) { /* silent */ }
    }

    // Initial + intervalle
    pollNowPlaying();
    pollAchievements();
    setInterval(pollNowPlaying,    NOW_PLAYING_INTERVAL_MS);
    setInterval(pollAchievements,  ACHIEVEMENT_INTERVAL_MS);
  </script>
</body>
</html>
