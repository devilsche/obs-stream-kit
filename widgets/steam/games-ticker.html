<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Steam Games Ticker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../pubg/_pubg.css">
  <link rel="stylesheet" href="../_theme.css">
  <style>
    /* Rotierender Ticker durch Library/Coop/Multiplayer-Games.
       Klassischer cross-fade pro Game. Source-Breite bestimmt
       die Card-Breite. */
    html, body { height: 100%; margin: 0; }
    body {
      padding: 12px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      box-sizing: border-box;
    }
    .panel {
      width: 100%;
      padding: 14px 18px;
      min-height: 92px;
      position: relative;
    }
    /* Header steht ueber der Card — gleiches Pattern wie PUBG-
       Widgets (map-performance.html, session-summary.html, etc.).
       Standard sichtbar; per ?header=0 abschaltbar. */
    .pubg-header { display: block !important; }
    body.no-header .pubg-header { display: none !important; }
    /* Loading-State: Card + Header unsichtbar bis das erste Game-Bild
       vollstaendig geladen ist — verhindert das 'leere Karte erst,
       dann ploetzlich Inhalt'-Flackern. */
    body.loading .pubg-header,
    body.loading .pubg-card { visibility: hidden; }
    .slot {
      display: flex;
      gap: 14px;
      align-items: center;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.45s ease-out, transform 0.45s ease-out;
    }
    .slot.show { opacity: 1; transform: translateY(0); }
    .cover {
      width: 110px; height: 52px;
      border-radius: 4px;
      background: color-mix(in srgb, var(--theme-bg, #000) 30%, transparent);
      border: 1px solid var(--pubg-border);
      object-fit: cover;
      flex-shrink: 0;
    }
    .meta { flex: 1; min-width: 0; }
    .name {
      color: var(--pubg-text);
      font-weight: 700;
      font-size: 1em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sub {
      color: var(--pubg-muted);
      font-size: 0.78em;
      margin-top: 2px;
      letter-spacing: 0.04em;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .sub b { color: var(--pubg-gold); font-variant-numeric: tabular-nums; }
    .badge {
      display: inline-block;
      font-size: 0.7em;
      letter-spacing: 0.06em;
      padding: 1px 6px;
      border-radius: 3px;
      background: color-mix(in srgb, var(--theme-primary, #5e2a79) 40%, transparent);
      color: var(--pubg-text);
      border: 1px solid var(--pubg-border);
      text-transform: uppercase;
    }
    .badge.coop { background: var(--pubg-gold); color: var(--theme-on-primary, #1a0d2a); border-color: var(--pubg-gold); }
    .empty {
      color: var(--pubg-muted);
      font-style: italic;
      text-align: center;
      padding: 14px;
    }
  </style>
</head>
<body class="loading">
  <div class="pubg-header" id="pubgHeader"></div>
  <div class="pubg-card panel pubg-fade-in">
    <div class="slot" id="slot">
      <img class="cover" id="cover" alt="">
      <div class="meta">
        <div class="name" id="name">—</div>
        <div class="sub" id="sub"></div>
      </div>
    </div>
  </div>

  <script src="../pubg/_pubg.js"></script>
  <script>
    // URL-Params — 'kind' ersetzt 'filter' (vermeidet Collision mit
    // PubgUI's '?filter=0' zum Verstecken der Bar). Alt-Param 'filter'
    // wird als Fallback noch akzeptiert.
    const KIND       = PubgUI.qs("kind") || PubgUI.qs("filter", "all");
    const SORT       = PubgUI.qs("sort",     "playtime"); // playtime|recent|name|random
    const LIMIT      = parseInt(PubgUI.qs("limit",    "30"),   10);
    const MIN_PT     = parseInt(PubgUI.qs("minPlaytime", "0"), 10);
    const PLAYED_SINCE_DAYS = parseInt(PubgUI.qs("playedSinceDays", "0"), 10);
    const ROTATE_MS  = parseInt(PubgUI.qs("rotateMs", "8000"), 10);
    const CYCLE_PAUSE_MS = parseInt(PubgUI.qs("cyclePauseMs", "0"), 10);
    const REFRESH_MS = parseInt(PubgUI.qs("refreshMs", String(10 * 60 * 1000)), 10); // 10min
    const HEADER_OFF = PubgUI.qs("header", "1") === "0";
    const HEADING_OVERRIDE = PubgUI.qs("headerTitle", "");

    if (HEADER_OFF) document.body.classList.add("no-header");

    // Header-Text spiegelt KIND + SORT — am Stream sieht man was
    // gerade rotiert. Override via ?headerTitle=…
    const KIND_LABEL = KIND === "coop"        ? "Co-op games"
                     : KIND === "multiplayer" ? "Multiplayer games"
                                              : "Library";
    const SORT_LABEL = SORT === "recent" ? "Recently played"
                     : SORT === "name"   ? "A → Z"
                     : SORT === "random" ? "Wanna play?"
                                         : "Total playtime";
    document.getElementById("pubgHeader").innerHTML = HEADING_OVERRIDE
      ? HEADING_OVERRIDE.replace(/</g, "&lt;")
      : `<b>${KIND_LABEL}</b> · ${SORT_LABEL}`;

    PubgUI.buildFilter([
      { key: "kind", label: "Category", type: "select", default: "all",
        options: [["all","All"], ["coop","Co-op"], ["multiplayer","Multiplayer"]],
        tooltip: "Limit to a category. 'coop' uses Steam categories " +
                 "9/36/38, 'multiplayer' adds 1/27." },
      { key: "sort", label: "Sort", type: "select", default: "playtime",
        options: [["playtime","Total playtime"],
                  ["recent","Recently played (14d)"],
                  ["random","Random (wanna-play)"],
                  ["name","Name A→Z"]],
        tooltip: "'recent' filters to games played in the last 14 days. " +
                 "'random' shuffles the pool — combine with " +
                 "playedSinceDays for a 'wanna play?' pick." },
      { key: "playedSinceDays", label: "Played since (days)", type: "range",
        min: 0, max: 1825, default: 0,
        tooltip: "Only include games touched in the last N days. " +
                 "0 = no time filter. Uses Steam's rtime_last_played " +
                 "(includes library-browse triggers, so generous)." },
      { key: "rotateMs", label: "Rotate ms", type: "range",
        min: 3000, max: 20000, default: 8000,
        tooltip: "How fast each game cycles." },
      { key: "cyclePauseMs", label: "Cycle pause ms", type: "range",
        min: 0, max: 60000, default: 0,
        tooltip: "Extra pause AFTER the last game before the list " +
                 "starts over from the top. 0 = no pause." },
      { key: "minPlaytime", label: "Min playtime (min)", type: "range",
        min: 0, max: 1000, default: 0,
        tooltip: "Show only games with at least N minutes total." },
      { key: "limit", label: "Pool size", type: "range",
        min: 1, max: 200, default: 30,
        tooltip: "How many games go into the ticker pool." },
    ]);

    function fmtHours(min) {
      if (!min || min <= 0) return null;
      if (min < 60) return min + " min";
      const h = Math.floor(min / 60);
      if (h < 100) return h + "h";
      return Math.floor(h / 10) * 10 + "+ h";
    }

    let games = [];
    let idx = 0;
    let timer = null;

    // Preload-Helper: probiert URLs der Reihe nach (Image-onload) und
    // resolved mit der ersten die geladen werden konnte, oder null.
    function preloadImage(sources) {
      return new Promise((resolve) => {
        if (!sources.length) { resolve(null); return; }
        let i = 0;
        const tryNext = () => {
          if (i >= sources.length) { resolve(null); return; }
          const img = new Image();
          img.onload  = () => resolve(sources[i]);
          img.onerror = () => { i++; tryNext(); };
          img.src = sources[i];
        };
        tryNext();
      });
    }

    async function renderOne(g) {
      const slot = document.getElementById("slot");
      slot.classList.remove("show");
      // Fallback-Chain durchprobiert (preload waehlt die erste die laedt):
      //  1. lokaler Cache (header.jpg falls Layer-3 schon synced hat)
      //  2. Steam-CDN header.jpg — funktioniert fuer JEDES Game
      //  3. Library-Vertikal-Variante
      //  4. Storefront / logo / icon
      const cdn = `https://cdn.cloudflare.steamstatic.com/steam/apps/${g.appId}`;
      const sources = [
        g.headerImageCached,
        `${cdn}/header.jpg`,
        `${cdn}/library_600x900.jpg`,
        g.headerImage,
        g.imgLogoCached, g.imgLogoUrl,
        g.imgIconCached, g.imgIconUrl,
      ].filter(Boolean);

      // Bild im Hintergrund laden waehrend der Out-Fade laeuft —
      // wir warten auf beides, dann ist das Bild garantiert da bevor
      // der Slot wieder reinfadet (kein Flicker mehr).
      const [winner] = await Promise.all([
        preloadImage(sources),
        new Promise(r => setTimeout(r, 450)),
      ]);

      const cover = document.getElementById("cover");
      if (winner) {
        cover.src = winner;
        cover.style.display = "";
      } else {
        cover.style.display = "none";
      }
      document.getElementById("name").textContent = g.name || ("App #" + g.appId);
      const parts = [];
      const total = fmtHours(g.playtimeTotalMin);
      if (total) parts.push(`<span><b>${total}</b> total</span>`);
      const recent = fmtHours(g.playtime2WeeksMin);
      if (recent) parts.push(`<span><b>${recent}</b> last 2w</span>`);
      if (g.isCoop) parts.push(`<span class="badge coop">Co-op</span>`);
      else if (g.isMultiplayer) parts.push(`<span class="badge">Multiplayer</span>`);
      document.getElementById("sub").innerHTML = parts.join("");
      document.body.classList.remove("loading");
      requestAnimationFrame(() => requestAnimationFrame(() =>
        slot.classList.add("show")));
    }

    function step() {
      if (!games.length) {
        document.body.classList.remove("loading");
        document.getElementById("name").textContent = "";
        document.getElementById("sub").innerHTML =
          `<span class="empty">no ${KIND === "all" ? "" : KIND + " "}games cached yet — Poller fetches Storefront data ~5/min</span>`;
        return;
      }
      const g = games[idx % games.length];
      idx++;
      renderOne(g);
    }

    function scheduleNext() {
      // Wenn wir gerade durch eine komplette Liste durch sind (idx
      // landet auf einem N-Vielfachen), zusaetzliche Pause vor dem
      // naechsten Durchlauf — sonst regulaerer Rotate-Takt.
      const justFinishedCycle = games.length > 0
                              && idx > 0
                              && idx % games.length === 0;
      const delay = ROTATE_MS + (justFinishedCycle ? CYCLE_PAUSE_MS : 0);
      timer = setTimeout(() => { step(); scheduleNext(); }, delay);
    }

    function prewarmImages(list) {
      // Fire-and-forget: alle Game-Header parallel im Hintergrund
      // laden. Der Browser bringt sie in den HTTP-Cache; spaeter
      // braucht preloadImage() nur noch resolve() ohne Netzwerk.
      list.forEach((g) => {
        const url = `https://cdn.cloudflare.steamstatic.com/steam/apps/${g.appId}/header.jpg`;
        new Image().src = url;
      });
    }

    async function refresh() {
      try {
        const u = (window.__SERVE_BASE__||"/") + `api/steam/owned-games?kind=${encodeURIComponent(KIND)}` +
                  `&sort=${encodeURIComponent(SORT)}` +
                  `&minPlaytime=${MIN_PT}` +
                  `&playedSinceDays=${PLAYED_SINCE_DAYS}` +
                  `&limit=${LIMIT}`;
        const data = await PubgUI.fetchJson(u);
        games = (data && data.games) || [];
        prewarmImages(games);
      } catch (e) {
        games = [];
      }
    }

    async function bootstrap() {
      await refresh();
      step();
      scheduleNext();
      setInterval(refresh, REFRESH_MS);
    }
    bootstrap();
  </script>
</body>
</html>
