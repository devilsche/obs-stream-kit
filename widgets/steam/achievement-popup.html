<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Steam Achievement Popup</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../pubg/_pubg.css">
  <link rel="stylesheet" href="../_theme.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <style>
    /* Pop-up zentriert, slide-up Animation. Pollt /api/steam/recent-unlocks
       alle 5s. Bei neuen Unlocks: queue, anzeigen 8s pro Achievement, dann
       als 'displayed' markieren. */
    html, body { height: 100%; margin: 0; padding: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      box-sizing: border-box;
      padding: 20px;
    }
    .popup {
      width: 480px;
      padding: 16px 20px;
      display: flex;
      gap: 14px;
      align-items: center;
      transform: translateY(40px);
      opacity: 0;
      transition: opacity 0.5s, transform 0.5s;
    }
    .popup.show { opacity: 1; transform: translateY(0); }
    .icon {
      width: 64px; height: 64px;
      border-radius: 8px;
      background: color-mix(in srgb, var(--pubg-bg, #0a0510) 60%, transparent);
      border: 1px solid var(--pubg-gold);
      object-fit: contain;
      flex-shrink: 0;
      box-shadow: 0 0 12px color-mix(in srgb, var(--pubg-gold) 35%, transparent);
    }
    /* PUBG-Milestones: rund, kein Border, sanft atmender Glow */
    .icon.pubg-milestone {
      border-radius: 50%;
      border: none;
      animation: milestoneGlow 2s ease-in-out infinite;
    }
    @keyframes milestoneGlow {
      0%   { filter: brightness(1.0) drop-shadow(0 0 6px var(--theme-accent, var(--pubg-gold))); }
      12%  { filter: brightness(1.1) drop-shadow(0 0 10px var(--theme-accent, var(--pubg-gold))); }
      25%  { filter: brightness(1.25) drop-shadow(0 0 16px var(--theme-accent, var(--pubg-gold))); }
      37%  { filter: brightness(1.4) drop-shadow(0 0 22px var(--theme-accent, var(--pubg-gold))); }
      50%  { filter: brightness(1.5) drop-shadow(0 0 28px var(--theme-accent, var(--pubg-gold))); }
      63%  { filter: brightness(1.4) drop-shadow(0 0 22px var(--theme-accent, var(--pubg-gold))); }
      75%  { filter: brightness(1.25) drop-shadow(0 0 16px var(--theme-accent, var(--pubg-gold))); }
      87%  { filter: brightness(1.1) drop-shadow(0 0 10px var(--theme-accent, var(--pubg-gold))); }
      100% { filter: brightness(1.0) drop-shadow(0 0 6px var(--theme-accent, var(--pubg-gold))); }
    }
    /* Emoji-Variante fuer PUBG-Milestones (Icon ist ein Emoji-Char,
       kein URL). Selbe Box, Emoji zentriert. */
    .icon-emoji {
      width: 64px; height: 64px;
      border-radius: 8px;
      background: color-mix(in srgb, var(--pubg-primary, #5e2a79) 40%, transparent);
      border: 1px solid var(--pubg-gold);
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(242, 183, 5, 0.35);
      display: flex; align-items: center; justify-content: center;
      font-size: 38px;
      line-height: 1;
    }
    .icon-emoji[hidden] { display: none; }
    .info { flex: 1; min-width: 0; }
    .ribbon {
      display: inline-block;
      padding: 2px 8px;
      background: var(--pubg-gold);
      color: var(--pubg-bg, #1a0d2a);
      font-weight: 700;
      font-size: 0.7em;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 3px;
      margin-bottom: 4px;
    }
    .title {
      color: var(--pubg-gold);
      font-size: 1.15em;
      font-weight: 700;
      margin-bottom: 2px;
      line-height: 1.2;
    }
    .desc {
      color: var(--pubg-text);
      font-size: 0.85em;
      line-height: 1.3;
    }
    .game {
      color: var(--pubg-muted);
      font-size: 0.75em;
      margin-top: 4px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .pct {
      color: var(--pubg-muted);
      font-size: 0.78em;
      margin-top: 3px;
      letter-spacing: 0.04em;
    }
    .pct b { color: var(--pubg-text); font-variant-numeric: tabular-nums; }
    .ago {
      color: var(--pubg-muted);
      font-size: 0.78em;
      margin-top: 2px;
      font-variant-numeric: tabular-nums;
    }
    /* ── Ribbon icon prefix ───────────────────────────────────── */
    .ribbon-icon {
      font-family: "Material Symbols Outlined";
      font-size: 0.9em;
      vertical-align: middle;
      margin-right: 4px;
      font-style: normal;
      line-height: 1;
    }

    /* ── Rarity tiers — all using theme tokens ────────────────── */
    /* Rare (≤10%) — accent glow */
    .popup.rare .icon {
      border-color: var(--theme-accent, #f2b705);
      animation: rareGlow 1.8s ease-in-out infinite;
    }
    .popup.rare .pct b { color: var(--theme-accent, #f2b705); }
    .popup.rare .ribbon {
      background: var(--theme-accent, #f2b705);
      color: var(--theme-bg, #0a0510);
    }

    /* Mythic (≤5%) — accent-2 glow */
    .popup.mythic .icon {
      border-color: var(--theme-accent-2, #c9a0dc);
      animation: mythicGlow 1.6s ease-in-out infinite;
    }
    .popup.mythic .pct b { color: var(--theme-accent-2, #c9a0dc); }
    .popup.mythic .ribbon {
      background: linear-gradient(90deg,
        var(--theme-primary, #5e2a79),
        var(--theme-accent-2, #c9a0dc));
      color: #fff;
    }

    /* Legendary (≤1%) — primary + accent animated */
    .popup.legendary .icon {
      border-color: var(--theme-accent, #f2b705);
      animation: legendaryGlow 1.2s ease-in-out infinite;
    }
    .popup.legendary .pct b {
      background: linear-gradient(90deg,
        var(--theme-accent, #f2b705),
        var(--theme-accent-2, #c9a0dc),
        var(--theme-accent, #f2b705));
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: legendaryText 2s linear infinite;
    }
    .popup.legendary .ribbon {
      background: linear-gradient(90deg,
        var(--theme-primary, #5e2a79),
        var(--theme-accent, #f2b705),
        var(--theme-accent-2, #c9a0dc),
        var(--theme-primary, #5e2a79));
      background-size: 300% auto;
      color: #fff;
      animation: legendaryRibbon 3s linear infinite;
    }

    @keyframes rareGlow {
      0%,100% { box-shadow: 0 0 16px color-mix(in srgb, var(--theme-accent) 60%, transparent),
                            0 0 32px color-mix(in srgb, var(--theme-accent) 30%, transparent); }
      50%     { box-shadow: 0 0 28px color-mix(in srgb, var(--theme-accent) 90%, transparent),
                            0 0 56px color-mix(in srgb, var(--theme-accent) 50%, transparent); }
    }
    @keyframes mythicGlow {
      0%,100% { box-shadow: 0 0 20px color-mix(in srgb, var(--theme-accent-2) 65%, transparent),
                            0 0 44px color-mix(in srgb, var(--theme-primary) 40%, transparent); }
      50%     { box-shadow: 0 0 36px color-mix(in srgb, var(--theme-accent-2) 95%, transparent),
                            0 0 68px color-mix(in srgb, var(--theme-primary) 60%, transparent); }
    }
    @keyframes legendaryGlow {
      0%,100% { box-shadow: 0 0 24px color-mix(in srgb, var(--theme-accent) 80%, transparent),
                            0 0 52px color-mix(in srgb, var(--theme-primary) 50%, transparent),
                            inset 0 0 16px color-mix(in srgb, var(--theme-accent-2) 30%, transparent); }
      50%     { box-shadow: 0 0 42px color-mix(in srgb, var(--theme-accent) 100%, transparent),
                            0 0 84px color-mix(in srgb, var(--theme-primary) 70%, transparent),
                            inset 0 0 24px color-mix(in srgb, var(--theme-accent-2) 50%, transparent); }
    }
    @keyframes legendaryRibbon {
      0% { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }
    @keyframes legendaryText {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
  </style>
</head>
<body>
  <div class="pubg-card popup" id="popup">
    <img class="icon" id="icon" alt="">
    <div class="icon-emoji" id="iconEmoji" hidden></div>
    <div class="info">
      <span class="ribbon" id="ribbon">Achievement Unlocked</span>
      <div class="title" id="title">—</div>
      <div class="desc" id="desc"></div>
      <div class="pct" id="pct"></div>
      <div class="ago" id="ago"></div>
      <div class="game" id="game"></div>
    </div>
  </div>
  <script src="../pubg/_pubg.js"></script>
  <script>
    // ?duration=8 (Sekunden Anzeige pro Unlock), ?gap=1.5 (Sek Pause zwischen)
    const DURATION_S = parseFloat(PubgUI.qs("duration", "8"));
    const GAP_S      = parseFloat(PubgUI.qs("gap", "1.5"));
    const POLL_MS    = parseInt(PubgUI.qs("pollMs", "5000"), 10);

    const RARE_PCT = parseFloat(PubgUI.qs("rarePct", "10"));
    const SOUND_ON = PubgUI.qs("sound", "1") !== "0";
    // Slider liefert 0..100, intern brauchen wir 0..1.
    const VOLUME   = Math.max(0, Math.min(1,
                       (parseFloat(PubgUI.qs("volume", "50")) || 0) / 100));

    PubgUI.buildFilter([
      { key: "duration", label: "Show duration (s)", type: "range",
        min: 3, max: 15, default: 8,
        tooltip: "How long each achievement popup stays on screen." },
      { key: "gap", label: "Gap (s)", type: "range",
        min: 0, max: 5, default: 1.5,
        tooltip: "Pause between consecutive achievement popups." },
      { key: "pollMs", label: "Poll (ms)", type: "range",
        min: 2000, max: 30000, default: 5000,
        tooltip: "How often to poll for new unlocks." },
      { key: "rarePct", label: "Rare ≤ (%)", type: "range",
        min: 1, max: 25, default: 10,
        tooltip: "Threshold for the 'rare unlock' glow effect. " +
                 "Achievements that fewer than N% of players have " +
                 "get the highlight animation." },
      { key: "sound", label: "Sound", type: "select",
        default: "1",
        options: [["1","On"], ["0","Off"]],
        tooltip: "Play lvlup.wav on unlock (biglvlup.wav on rare)." },
      { key: "volume", label: "Volume", type: "range",
        min: 0, max: 100, default: 50,
        tooltip: "Achievement-Sound-Lautstaerke (0-100%)." },
    ]);

    // Rarity-Tiers (% basiert):
    //   <=  1% -> legendary
    //   <=  5% -> mythic
    //   <= 10% -> rare
    //   sonst   -> common
    function getRarityTier(pct) {
      if (!Number.isFinite(pct)) return "common";
      if (pct <=  1) return "legendary";
      if (pct <=  5) return "mythic";
      if (pct <= 10) return "rare";
      return "common";
    }
    // Web Audio API — umgeht OBS-Chromium-Autoplay-Block komplett.
    // <audio>.play() schlägt ohne User-Interaction fehl; AudioContext nicht.
    const _actx = new (window.AudioContext || window.webkitAudioContext)();
    const _bufs = {};
    const SOUND_FILES = {
      legendary: "sounds/legendary.mp3",
      mythic:    "sounds/mystique.mp3",
      rare:      "sounds/biglvlup.wav",
      common:    "sounds/lvlup.wav",
    };
    const SOUND_FALLBACK = { legendary: "mythic", mythic: "rare", rare: "common" };
    (async () => {
      for (const [key, url] of Object.entries(SOUND_FILES)) {
        try {
          const resp = await fetch(url);
          if (!resp.ok) continue;
          const arr  = await resp.arrayBuffer();
          _bufs[key] = await _actx.decodeAudioData(arr);
        } catch (_) {}
      }
    })();
    function playSound(tier) {
      if (!SOUND_ON) return;
      const _play = (key) => {
        const buf = _bufs[key];
        if (!buf) {
          if (SOUND_FALLBACK[key]) _play(SOUND_FALLBACK[key]);
          return;
        }
        if (_actx.state === "suspended") _actx.resume();
        const src  = _actx.createBufferSource();
        const gain = _actx.createGain();
        src.buffer = buf;
        gain.gain.value = VOLUME;
        src.connect(gain);
        gain.connect(_actx.destination);
        src.start(0);
      };
      _play(tier in _bufs || SOUND_FALLBACK[tier] ? tier : "common");
    }

    const popup = document.getElementById("popup");
    const queue = [];
    let busy = false;

    // Relative Zeitangabe — Ladder: s / Min. / Std. / Tage / Monate /
    // Jahre. Wird unter der pct gerendert damit klar ist wenn ein
    // Milestone verzoegert popt (PUBG-API laggt 5-10min) bzw. wie
    // lange das Achievement her ist (z.B. bei einem Replay-Klick).
    function fmtAgo(unlockedAt) {
      if (!unlockedAt) return "";
      const nowS = Date.now() / 1000;
      const delta = Math.max(0, nowS - unlockedAt);
      if (delta < 60)    return `vor ${Math.round(delta)}s`;
      if (delta < 3600)  return `vor ${Math.round(delta / 60)} Min.`;
      if (delta < 86400) return `vor ${Math.round(delta / 3600)} Std.`;
      const days = Math.round(delta / 86400);
      if (days < 30)  return days === 1   ? "vor 1 Tag"   : `vor ${days} Tagen`;
      const months = Math.round(days / 30.44);
      if (months < 12) return months === 1 ? "vor 1 Monat" : `vor ${months} Monaten`;
      const years = Math.round(days / 365.25);
      return years === 1 ? "vor 1 Jahr" : `vor ${years} Jahren`;
    }

    function showOne(u) {
      busy = true;
      document.getElementById("title").textContent = u.displayName || u.apiName;
      document.getElementById("desc").textContent = u.description || "";
      document.getElementById("game").textContent = u.gameName || ("App #" + u.appId);
      const iconEl = document.getElementById("icon");
      const emojiEl = document.getElementById("iconEmoji");
      const isUrl = u.iconUrl && (
        u.iconUrl.startsWith("http://") ||
        u.iconUrl.startsWith("https://") ||
        u.iconUrl.startsWith("/"));
      const isPubgMilestone = u.source === "pubg" || u.appId === -2;
      iconEl.classList.toggle("pubg-milestone", isPubgMilestone);
      if (u.iconUrl && isUrl) {
        iconEl.src = u.iconUrl;
        iconEl.style.display = "";
        emojiEl.hidden = true;
      } else {
        iconEl.style.display = "none";
        emojiEl.hidden = true;
      }
      // Stat-Line — gleiches Pattern fuer Steam + PUBG:
      //   Steam: "12.3% of players got this"
      //   PUBG : "20% of your sessions got this"
      // Rare-Indicator als separater Badge (siehe ribbon + .rare-Klasse),
      // nicht doppelt im Text.
      const pctEl = document.getElementById("pct");
      const ribbonEl = document.getElementById("ribbon");
      const isPubg = u.source === "pubg";
      // Rarity-Tiers konsistent: PCT aus dem jeweils relevanten Feld
      // (Steam: globalPct, PUBG: sessionPct). getRarityTier() macht den
      // Drei-Stufen-Cut (rare=10/mythic=5/legendary=1).
      const tierPct = isPubg ? Number(u.sessionPct) : Number(u.globalPct);
      const tier = getRarityTier(tierPct);  // common|rare|mythic|legendary
      const isRare = tier !== "common";
      popup.classList.remove("rare", "mythic", "legendary");
      if (tier !== "common") popup.classList.add(tier);
      let statLine = null;
      if (isPubg) {
        const sp = Number(u.sessionPct);
        if (Number.isFinite(sp)) {
          statLine = `<b>${sp.toFixed(0)}%</b> of your sessions got this`;
        }
      } else {
        const gp = Number(u.globalPct);
        if (Number.isFinite(gp)) {
          statLine = `<b>${gp.toFixed(1)}%</b> of players got this`;
        }
      }
      if (statLine) {
        pctEl.innerHTML = statLine;
        pctEl.style.display = "";
      } else {
        pctEl.style.display = "none";
      }
      const agoEl = document.getElementById("ago");
      const agoText = fmtAgo(u.unlockedAt);
      if (agoText) {
        agoEl.textContent = agoText;
        agoEl.style.display = "";
      } else {
        agoEl.style.display = "none";
      }
      // Ribbon-Text: Tier-spezifisch + Source-spezifisch.
      const tierMeta = {
        legendary: { label: "Legendary", icon: "local_fire_department" },
        mythic:    { label: "Mythic",    icon: "auto_awesome" },
        rare:      { label: "Rare",      icon: "star" },
        common:    { label: "",          icon: "emoji_events" },
      }[tier] || { label: "", icon: "emoji_events" };
      const suffix = u.source === "pubg"
        ? (tier === "common" ? "Session Milestone" : "Session Milestone")
        : "Achievement Unlocked";
      const iconHtml = `<span class="ribbon-icon" aria-hidden="true">${tierMeta.icon}</span>`;
      ribbonEl.innerHTML = iconHtml + (tierMeta.label ? `${tierMeta.label} ${suffix}` : suffix);
      playSound(tier);
      popup.classList.add("show");
      setTimeout(() => {
        popup.classList.remove("show");
        setTimeout(() => {
          busy = false;
          processQueue();
        }, GAP_S * 1000);
      }, DURATION_S * 1000);
    }

    function processQueue() {
      if (busy) return;
      const u = queue.shift();
      if (u) showOne(u);
    }

    async function pollUnlocks() {
      const justQueued = new Set();
      let added = 0;
      // Steam-Achievements pollen
      try {
        const data = await PubgUI.fetchJson(
          (window.__SERVE_BASE__||"/") + "api/steam/recent-unlocks?markDisplayed=1");
        for (const u of (data && data.unlocks) || []) {
          if (justQueued.has(u.apiName)) continue;
          queue.push(u);
          justQueued.add(u.apiName);
          added++;
        }
      } catch (e) { /* steam evtl. disabled */ }
      // PUBG-Session-Milestones pollen (gleiches Schema)
      try {
        const data = await PubgUI.fetchJson(
          (window.__SERVE_BASE__||"/") + "api/pubg/recent-achievements?markDisplayed=1");
        for (const u of (data && data.unlocks) || []) {
          if (justQueued.has(u.apiName)) continue;
          queue.push(u);
          justQueued.add(u.apiName);
          added++;
        }
      } catch (e) { /* pubg evtl. disabled */ }
      if (added) processQueue();
    }
    pollUnlocks();
    setInterval(pollUnlocks, POLL_MS);
  </script>
</body>
</html>
