<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Steam Achievement Popup</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/widgets/pubg/_pubg.css">
  <style>
    /* Pop-up zentriert, slide-up Animation. Pollt /api/steam/recent-unlocks
       alle 5s. Bei neuen Unlocks: queue, anzeigen 8s pro Achievement, dann
       als 'displayed' markieren. */
    html, body { height: 100%; margin: 0; padding: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      box-sizing: border-box;
      padding: 20px;
    }
    .popup {
      width: 480px;
      padding: 16px 20px;
      display: flex;
      gap: 14px;
      align-items: center;
      transform: translateY(40px);
      opacity: 0;
      transition: opacity 0.5s, transform 0.5s;
    }
    .popup.show { opacity: 1; transform: translateY(0); }
    .icon {
      width: 64px; height: 64px;
      border-radius: 8px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--pubg-gold);
      object-fit: contain;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(242, 183, 5, 0.35);
    }
    .info { flex: 1; min-width: 0; }
    .ribbon {
      display: inline-block;
      padding: 2px 8px;
      background: var(--pubg-gold);
      color: #1a0d2a;
      font-weight: 700;
      font-size: 0.7em;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 3px;
      margin-bottom: 4px;
    }
    .title {
      color: var(--pubg-gold);
      font-size: 1.15em;
      font-weight: 700;
      margin-bottom: 2px;
      line-height: 1.2;
    }
    .desc {
      color: var(--pubg-text);
      font-size: 0.85em;
      line-height: 1.3;
    }
    .game {
      color: var(--pubg-muted);
      font-size: 0.75em;
      margin-top: 4px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .pct {
      color: var(--pubg-muted);
      font-size: 0.78em;
      margin-top: 3px;
      letter-spacing: 0.04em;
    }
    .pct b { color: var(--pubg-text); font-variant-numeric: tabular-nums; }
    /* Rare-Unlock: <5% aller Spieler — Glow + Ribbon-Text aendert sich */
    .popup.rare .icon {
      box-shadow: 0 0 24px rgba(242, 183, 5, 0.85),
                  0 0 48px rgba(242, 183, 5, 0.45);
      border-color: #fff8d0;
      animation: rareGlow 1.8s ease-in-out infinite;
    }
    .popup.rare .pct b { color: var(--pubg-gold); }
    @keyframes rareGlow {
      0%, 100% { box-shadow: 0 0 18px rgba(242,183,5,0.65), 0 0 36px rgba(242,183,5,0.35); }
      50%      { box-shadow: 0 0 32px rgba(242,183,5,0.95), 0 0 60px rgba(242,183,5,0.55); }
    }
  </style>
</head>
<body>
  <div class="pubg-card popup" id="popup">
    <img class="icon" id="icon" alt="">
    <div class="info">
      <span class="ribbon" id="ribbon">Achievement Unlocked</span>
      <div class="title" id="title">—</div>
      <div class="desc" id="desc"></div>
      <div class="pct" id="pct"></div>
      <div class="game" id="game"></div>
    </div>
  </div>
  <script src="/widgets/pubg/_pubg.js"></script>
  <script>
    // ?duration=8 (Sekunden Anzeige pro Unlock), ?gap=1.5 (Sek Pause zwischen)
    const DURATION_S = parseFloat(PubgUI.qs("duration", "8"));
    const GAP_S      = parseFloat(PubgUI.qs("gap", "1.5"));
    const POLL_MS    = parseInt(PubgUI.qs("pollMs", "5000"), 10);

    const RARE_PCT = parseFloat(PubgUI.qs("rarePct", "5"));

    PubgUI.buildFilter([
      { key: "duration", label: "Show duration (s)", type: "range",
        min: 3, max: 15, default: 8,
        tooltip: "How long each achievement popup stays on screen." },
      { key: "gap", label: "Gap (s)", type: "range",
        min: 0, max: 5, default: 1.5,
        tooltip: "Pause between consecutive achievement popups." },
      { key: "pollMs", label: "Poll (ms)", type: "range",
        min: 2000, max: 30000, default: 5000,
        tooltip: "How often to poll for new unlocks." },
      { key: "rarePct", label: "Rare ≤ (%)", type: "range",
        min: 1, max: 25, default: 5,
        tooltip: "Threshold for the 'rare unlock' glow effect. " +
                 "Achievements that fewer than N% of players have " +
                 "get the highlight animation." },
    ]);

    const popup = document.getElementById("popup");
    const queue = [];
    let busy = false;

    function showOne(u) {
      busy = true;
      document.getElementById("title").textContent = u.displayName || u.apiName;
      document.getElementById("desc").textContent = u.description || "";
      document.getElementById("game").textContent = u.gameName || ("App #" + u.appId);
      const iconEl = document.getElementById("icon");
      if (u.iconUrl) {
        iconEl.src = u.iconUrl;
        iconEl.style.display = "";
      } else {
        iconEl.style.display = "none";
      }
      // Global-Unlock-%
      const pctEl = document.getElementById("pct");
      const ribbonEl = document.getElementById("ribbon");
      const pct = Number(u.globalPct);
      const hasPct = Number.isFinite(pct);
      const isRare = hasPct && pct <= RARE_PCT;
      popup.classList.toggle("rare", isRare);
      if (hasPct) {
        pctEl.innerHTML = isRare
          ? `<b>${pct.toFixed(1)}%</b> have this — RARE`
          : `<b>${pct.toFixed(1)}%</b> of players have this`;
        pctEl.style.display = "";
      } else {
        pctEl.style.display = "none";
      }
      ribbonEl.textContent = isRare
        ? "Rare Achievement Unlocked"
        : "Achievement Unlocked";
      popup.classList.add("show");
      setTimeout(() => {
        popup.classList.remove("show");
        setTimeout(() => {
          busy = false;
          processQueue();
        }, GAP_S * 1000);
      }, DURATION_S * 1000);
    }

    function processQueue() {
      if (busy) return;
      const u = queue.shift();
      if (u) showOne(u);
    }

    // Defensive Doppel-Anzeige-Schutz pro Widget-Instanz (eigener
    // LocalStorage-Key — kein Konflikt mit combined popup.html).
    const SHOWN_KEY = "steam_shown_achievement_popup";
    function getShown() {
      try { return new Set(JSON.parse(localStorage.getItem(SHOWN_KEY) || "[]")); }
      catch { return new Set(); }
    }
    function persistShown(s) {
      const tail = [...s].slice(-500);
      try { localStorage.setItem(SHOWN_KEY, JSON.stringify(tail)); }
      catch { /* quota */ }
    }

    async function pollUnlocks() {
      try {
        const data = await PubgUI.fetchJson(
          "/api/steam/recent-unlocks?markDisplayed=1");
        const unlocks = (data && data.unlocks) || [];
        if (!unlocks.length) return;
        const shown = getShown();
        let added = 0;
        for (const u of unlocks) {
          if (shown.has(u.apiName)) continue;
          queue.push(u);
          shown.add(u.apiName);
          added++;
        }
        if (added) {
          persistShown(shown);
          processQueue();
        }
      } catch (e) {
        // Stille — backend evtl. disabled
      }
    }
    pollUnlocks();
    setInterval(pollUnlocks, POLL_MS);
  </script>
</body>
</html>
