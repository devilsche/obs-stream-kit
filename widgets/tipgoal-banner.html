<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=600, height=180" />
  <title>Tip Goal Banner</title>
  <link rel="stylesheet" href="_theme.css">
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-display: block;
    }

    /* Default: Entry purple/gold */
    :root {
      --banner-primary:  #5e2a79;
      --banner-accent:   #f2b705;
      --banner-accent2:  #ffe074;
      --banner-bg:       linear-gradient(135deg, rgba(26,13,46,0.95) 0%, rgba(13,13,26,0.97) 100%);
      --banner-dock-bg:  linear-gradient(180deg, #1a0d2a 0%, #0a0510 100%);
    }
    html.use-theme {
      --banner-primary:  var(--theme-primary,  #5e2a79);
      --banner-accent:   var(--theme-accent,   #f2b705);
      --banner-accent2:  var(--theme-accent-2, #ffe074);
      --banner-bg:       linear-gradient(135deg,
                           color-mix(in srgb, var(--theme-primary) 90%, #000) 0%,
                           color-mix(in srgb, var(--theme-bg, #08040f) 97%, transparent) 100%);
      --banner-dock-bg:  linear-gradient(180deg,
                           color-mix(in srgb, var(--theme-primary) 30%, #000) 0%,
                           var(--theme-bg, #08040f) 100%);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 600px;
      height: 180px;
      overflow: hidden;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }
    body.dock { background: var(--banner-dock-bg) !important; }

    @keyframes bannerGlow {
      0%,100% { box-shadow:
        0 0 14px color-mix(in srgb, var(--banner-accent) 35%, transparent),
        0 0 32px color-mix(in srgb, var(--banner-accent) 20%, transparent),
        0 0 0 1px color-mix(in srgb, var(--banner-accent) 30%, transparent) inset; }
      50%     { box-shadow:
        0 0 22px color-mix(in srgb, var(--banner-accent) 70%, transparent),
        0 0 55px color-mix(in srgb, var(--banner-accent) 40%, transparent),
        0 0 0 1px color-mix(in srgb, var(--banner-accent) 50%, transparent) inset; }
    }
    @keyframes fillGradient {
      0%   { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }
    @keyframes shineSweep {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }

    .banner {
      position: absolute;
      top: 50%; left: calc(50% - 240px);
      width: 480px; height: 80px;
      transform: translateY(-50%);
      background: var(--banner-bg);
      border: 1.5px solid color-mix(in srgb, var(--banner-accent) 50%, transparent);
      border-radius: 10px;
      padding: 10px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: bannerGlow 3.5s ease-in-out infinite;
      overflow: hidden;
    }

    .banner-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }

    .title {
      font-size: 14px;
      font-weight: 900;
      color: var(--banner-accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      text-shadow:
        0 0 10px color-mix(in srgb, var(--banner-accent) 70%, transparent),
        2px 2px 0 rgba(0,0,0,0.6);
    }

    .count {
      font-size: 16px;
      font-weight: 900;
      color: #fff;
      white-space: nowrap;
      flex-shrink: 0;
      text-shadow:
        0 0 10px color-mix(in srgb, var(--banner-accent) 80%, transparent),
        1px 1px 0 rgba(0,0,0,0.6);
    }
    .count .current { color: var(--banner-accent); }
    .count .sep     { color: rgba(255,255,255,0.5); margin: 0 4px; font-size: 14px; }
    .count .goal    { color: #fff; }
    .count .currency { margin-left: 4px; }

    .progress-track {
      position: relative;
      height: 14px;
      background: color-mix(in srgb, var(--banner-primary) 35%, transparent);
      border: 1px solid color-mix(in srgb, var(--banner-accent) 25%, transparent);
      border-radius: 7px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg,
        var(--banner-primary) 0%,
        color-mix(in srgb, var(--banner-primary) 60%, var(--banner-accent)) 30%,
        var(--banner-accent) 70%,
        var(--banner-accent2) 100%);
      background-size: 200% 100%;
      border-radius: 7px;
      box-shadow:
        0 0 10px color-mix(in srgb, var(--banner-accent) 70%, transparent),
        inset 0 0 6px rgba(255,255,255,0.2);
      transition: width 1.2s cubic-bezier(0.4,0,0.2,1) 400ms;
      animation: fillGradient 4s linear infinite;
      position: relative;
      overflow: hidden;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%);
      transform: translateX(-100%);
      animation: shineSweep 3s ease-in-out 1.2s infinite;
    }

    .progress-percent {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      font-size: 10px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 1px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="banner-header">
      <div class="title" id="title">Tip Goal</div>
      <div class="count">
        <span class="current" id="current">0</span>
        <span class="sep">/</span>
        <span class="goal" id="goal">100</span>
        <span class="currency" id="currency">€</span>
      </div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="fill"></div>
      <div class="progress-percent" id="percent">0%</div>
    </div>
  </div>

  <div id="sparkle-wrap" style="position:absolute;top:0;left:0;width:600px;height:180px;overflow:visible;pointer-events:none;"></div>
  <script src="../js/sparkles.js"></script>
  <script>
    (function () {
      var params   = new URLSearchParams(window.location.search);
      if (params.get('dock') === '1') document.body.classList.add('dock');
      document.documentElement.classList.add('use-theme');

      var title    = params.get('title')    || 'Tip Goal';
      var current  = parseFloat((params.get('current') || '0').replace(',', '.'))   || 0;
      var goal     = parseFloat((params.get('goal')    || '100').replace(',', '.')) || 100;
      var currency = params.get('currency') || '€';

      function fmt(n) {
        return n.toLocaleString('de-DE', {
          minimumFractionDigits: (n % 1 === 0) ? 0 : 2,
          maximumFractionDigits: 2
        });
      }

      var percentage = Math.min(100, Math.round((current / goal) * 100));
      document.getElementById('title').textContent   = title;
      document.getElementById('current').textContent = fmt(current);
      document.getElementById('goal').textContent    = fmt(goal);
      document.getElementById('currency').textContent = currency;
      document.getElementById('fill').style.width    = percentage + '%';
      document.getElementById('percent').textContent = percentage + '%';

      new SparkleEngine(document.getElementById('sparkle-wrap'), {
        count: 4, speed: 0.2, maxOpacity: 0.75,
        colors: { gold: 0.7, purple: 0.2, white: 0.1 },
        sizeWeights: { big: 0, normal: 0.2, small: 0.5, tiny: 0.3 }
      }).start();
    })();
  </script>
</body>
</html>
