<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=500, height=100" />
  <title>Latest Sub</title>
  <style>
    :root {
      --c-gold: var(--theme-accent, #f2b705);
      --c-primary: var(--theme-primary, #5e2a79);
      --c-accent2: var(--theme-accent-2, #c9a0dc);
      --c-bg: var(--theme-bg, #0a0510);
      --c-surface: var(--theme-surface, #1f1430);
      --c-text:     var(--theme-text,     #ffffff);
      --c-muted: var(--theme-text-dim, #8a7d99);
    }

    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 500px;
      height: 100px;
      overflow: hidden;
      background: transparent;
      font-family: var(--theme-font-body, 'DM Sans', sans-serif);
    }

    @keyframes widgetGlow {
      0%, 100% { box-shadow: 0 0 8px color-mix(in srgb,var(--c-primary) 20%,transparent), 0 0 20px color-mix(in srgb,var(--c-primary) 10%,transparent); }
      50% { box-shadow: 0 0 15px color-mix(in srgb,var(--c-primary) 50%,transparent), 0 0 35px color-mix(in srgb,var(--c-primary) 20%,transparent); }
    }

    .widget-box {
      position: absolute;
      top: 50%;
      left: 10px;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: color-mix(in srgb,var(--c-bg) 95%,transparent);
      border: 1px solid color-mix(in srgb,var(--c-primary) 30%,transparent);
      border-left: 3px solid var(--c-primary);
      border-radius: 0 8px 8px 0;
      padding: 12px 24px;
      min-width: 320px;
      max-width: 400px;
      box-shadow: 0 0 20px color-mix(in srgb,var(--c-primary) 15%,transparent);
      animation: widgetGlow 3s ease-in-out infinite;
    }

    .widget-content {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .widget-label {
      font-size: 10px;
      color: var(--c-accent2);
      letter-spacing: 2px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .widget-name {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      white-space: nowrap;
    }

    .widget-tier {
      display: inline-block;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 4px 12px;
      border-radius: 12px;
      flex-shrink: 0;
    }

    .widget-tier--1 {
      background: color-mix(in srgb,var(--c-primary) 50%,transparent);
      border: 1px solid var(--c-accent2);
      color: #ffffff;
    }
    .widget-tier--2 {
      background: color-mix(in srgb,var(--c-primary) 60%,transparent);
      border: 1px solid var(--c-accent2);
      color: color-mix(in srgb,var(--c-accent2) 80%,#fff);
    }
    .widget-tier--3 {
      background: linear-gradient(135deg, color-mix(in srgb,var(--c-gold) 30%,transparent), color-mix(in srgb,var(--c-primary) 40%,transparent));
      border: 1px solid var(--c-gold);
      color: var(--c-gold);
    }
  </style>
  <link rel="stylesheet" href="_theme.css">
</head>
<body>

  <div class="widget-box">
    <div class="widget-content">
      <div class="widget-label">Latest Sub</div>
      <div class="widget-name" id="subName"></div>
    </div>
    <span class="widget-tier" id="tierBadge"></span>
  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var name = params.get('name') || 'NightOwl';
    var tier = params.get('tier') || '1';

    document.getElementById('subName').textContent = name;

    var rawTier = tier.trim().toLowerCase().replace('tier', '').trim();
    if (rawTier === '1000') rawTier = '1';
    if (rawTier === '2000') rawTier = '2';
    if (rawTier === '3000') rawTier = '3';
    var tierNum = rawTier === 'prime' ? 'prime' : rawTier;

    var badge = document.getElementById('tierBadge');
    var tierNames = { '1': 'T1', '2': 'T2', '3': 'T3', 'prime': 'Prime' };
    badge.textContent = tierNames[tierNum] || 'T' + tierNum;
    badge.className = 'widget-tier widget-tier--' + (tierNum === 'prime' ? '1' : tierNum);
  </script>

  <div id="sparkle-wrap" style="position:absolute;top:0;left:0;width:500px;height:100px;overflow:visible;pointer-events:none;"></div>
  <script src="../js/sparkles.js"></script>
  <script>
    new SparkleEngine(document.getElementById('sparkle-wrap'), {
      count: 3,
      speed: 0.15,
      maxOpacity: 0.75,
      sizeWeights: { big: 0, normal: 0.1, small: 0.5, tiny: 0.4 },
      fixedColor: 'purple'
    }).start();
  </script>

</body>
</html>
