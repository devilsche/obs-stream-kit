<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=500, height=100" />
  <title>Latest Sub</title>
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 500px;
      height: 100px;
      overflow: hidden;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }

    @keyframes widgetGlow {
      0%, 100% { box-shadow: 0 0 8px rgba(94,42,121,0.2), 0 0 20px rgba(94,42,121,0.1); }
      50% { box-shadow: 0 0 15px rgba(94,42,121,0.5), 0 0 35px rgba(94,42,121,0.2); }
    }

    .widget-box {
      position: absolute;
      top: 50%;
      left: 10px;
      right: 10px;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(13, 13, 26, 0.95);
      border: 1px solid rgba(94, 42, 121, 0.3);
      border-left: 3px solid #5e2a79;
      border-radius: 0 8px 8px 0;
      padding: 12px 24px;
      box-shadow: 0 0 20px rgba(94, 42, 121, 0.15);
      animation: widgetGlow 3s ease-in-out infinite;
    }

    .widget-content {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .widget-label {
      font-size: 10px;
      color: #c9a0dc;
      letter-spacing: 2px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .widget-name {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      white-space: nowrap;
    }

    .widget-tier {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .widget-tier--1 {
      background: rgba(94, 42, 121, 0.5);
      border: 1px solid #c9a0dc;
      color: #ffffff;
    }
    .widget-tier--2 {
      background: rgba(94, 42, 121, 0.6);
      border: 1px solid #d4b0e8;
      color: #e8d0f5;
    }
    .widget-tier--3 {
      background: linear-gradient(135deg, rgba(242, 183, 5, 0.3), rgba(94, 42, 121, 0.4));
      border: 1px solid #f2b705;
      color: #f2b705;
    }
  </style>
</head>
<body>

  <div class="widget-box">
    <div class="widget-content">
      <div class="widget-label">Latest Sub</div>
      <div class="widget-name"><span id="subName"></span><span class="widget-tier" id="tierBadge"></span></div>
    </div>
  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var name = params.get('name') || 'NightOwl';
    var tier = params.get('tier') || '1';

    document.getElementById('subName').textContent = name;

    var rawTier = tier.trim().toLowerCase().replace('tier', '').trim();
    if (rawTier === '1000') rawTier = '1';
    if (rawTier === '2000') rawTier = '2';
    if (rawTier === '3000') rawTier = '3';
    var tierNum = rawTier === 'prime' ? 'prime' : rawTier;

    var badge = document.getElementById('tierBadge');
    var tierNames = { '1': 'T1', '2': 'T2', '3': 'T3', 'prime': 'Prime' };
    badge.textContent = tierNames[tierNum] || 'T' + tierNum;
    badge.className = 'widget-tier widget-tier--' + (tierNum === 'prime' ? '1' : tierNum);
  </script>

  <div id="sparkle-wrap" style="position:absolute;top:0;left:0;width:500px;height:100px;overflow:visible;pointer-events:none;"></div>
  <script src="../js/sparkles.js"></script>
  <script>
    new SparkleEngine(document.getElementById('sparkle-wrap'), {
      count: 3,
      speed: 0.15,
      maxOpacity: 0.75,
      sizeWeights: { big: 0, normal: 0.1, small: 0.5, tiny: 0.4 },
      fixedColor: 'purple'
    }).start();
  </script>

</body>
</html>
