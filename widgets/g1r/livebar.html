<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1040, height=36" />
  <title>G1R Livebar</title>
  <!-- Theme-Fundament: Tokens (_theme.css) VOR den Bausteinen (_blocks.css). -->
  <link rel="stylesheet" href="../_theme.css" />
  <link rel="stylesheet" href="../_blocks.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script type="application/json" id="params">
[ {"key":"port","label":"Proxy-Port","type":"text","group":"Verbindung","default":"9210"},
  {"key":"scope","label":"Scope","type":"select","group":"Anzeige","default":"session",
   "options":[["session","Session"],["all","All"]]},
  {"key":"lang","label":"Sprache","type":"select","group":"Anzeige","default":"en",
   "options":[["en","English"],["de","Deutsch"]]} ]
</script>
<script src="../_params.js"></script>
  <style>
    /* Nur Widget-spezifisches Layout. Rahmen/Fläche/Ornament kommen aus .t-card. */
    :root { --c-good: #4be39a; --c-bad: #e3564b; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1040px; height: 36px; overflow: hidden; background: transparent;
                 font-family: var(--theme-font-body, "DM Sans", system-ui, sans-serif); }

    /* .t-card liefert Fläche/Border/Ornament; .t-bar Flex/Padding; .t-card--accent Akzentkante. */
    #bar { height: 36px; width: 1040px; }

    .it { display: inline-flex; align-items: baseline; gap: 6px; padding: 0 13px; }
    .v { color: var(--theme-text, #e8e0f0); font-weight: 700; font-size: 1.05rem; font-variant-numeric: tabular-nums; }
    .v.good { color: var(--c-good); }
    .v.bad { color: var(--c-bad); }
    .k { color: var(--theme-text-dim, #8a7d99); font-size: .68rem; text-transform: uppercase; letter-spacing: .08em; }
    /* .t-sep Farbe kommt aus .t-bar .t-sep in _blocks.css */
    .clock { color: var(--theme-accent, #f2b705); font-weight: 700; font-variant-numeric: tabular-nums;
             display: inline-flex; align-items: center; gap: 5px; padding-left: 13px; margin-left: auto; }
    .ico { font-family: "Material Symbols Rounded"; font-size: 1em; vertical-align: -2px; }
    .offline .v, .offline .clock { color: var(--theme-text-dim, #8a7d99); font-weight: 400; }
    /* Stale (Spiel kurz weg): letzte Werte bleiben stehen, nur gedimmt. */
    .stale { opacity: .5; transition: opacity .4s ease; }
  </style>
</head>
<body>
  <div class="t-card t-bar t-card--accent" id="bar">
    <span class="it"><span class="v" id="level">—</span><span class="k">Level</span></span>
    <span class="t-sep">·</span>
    <span class="it"><span class="v" id="steps">—</span><span class="k">Steps</span></span>
    <span class="t-sep">·</span>
    <span class="it"><span class="v bad" id="dmgOut">—</span><span class="k">DMG out</span></span>
    <span class="t-sep">·</span>
    <span class="it"><span class="v" id="dmgTaken">—</span><span class="k">taken</span></span>
    <span class="t-sep">·</span>
    <span class="it"><span class="v" id="manaUsed">—</span><span class="k">Mana&nbsp;used</span></span>
    <span class="t-sep">·</span>
    <span class="it"><span class="v good" id="hpRegen">—</span><span class="k">HP regen</span></span>
    <span class="t-sep">·</span>
    <span class="it"><span class="v good" id="manaRegen">—</span><span class="k">Mana regen</span></span>
    <span class="clock" id="clock"></span>
  </div>

  <script>
    // Lokaler Proxy auf dem Spiel-PC. Parameter über JSON-Insel + _params.js.
    var P = Params.values(Params.readParams());
    var PORT = P.port, SCOPE = (P.scope || 'session').toLowerCase(), LANG = P.lang || 'en';
    var BASE  = 'http://localhost:' + PORT;

    var bar = document.getElementById('bar');
    var levelEl = document.getElementById('level');
    var stepsEl = document.getElementById('steps');
    var dmgOutEl = document.getElementById('dmgOut');
    var dmgTakenEl = document.getElementById('dmgTaken');
    var manaUsedEl = document.getElementById('manaUsed');
    var hpRegenEl = document.getElementById('hpRegen');
    var manaRegenEl = document.getElementById('manaRegen');
    var clockEl = document.getElementById('clock');

    function num(v) { return (v === undefined || v === null) ? '–' : Math.round(v).toLocaleString('en-US'); }
    function signed(v) { return (v === undefined || v === null) ? '–' : '+' + Math.round(v).toLocaleString('en-US'); }

    function setOffline() {
      bar.classList.add('offline');
      [levelEl, stepsEl, dmgOutEl, dmgTakenEl, manaUsedEl, hpRegenEl, manaRegenEl].forEach(function (el) { el.textContent = '—'; });
      clockEl.textContent = '';
    }

    function render(d) {
      bar.classList.remove('offline');
      var stats = d.stats || {};
      // scope: 'session' = Werte dieser Session, 'all' = persistente Gesamtwerte (d.totals).
      var src = (SCOPE === 'all') ? (d.totals || {}) : (d.session || {});
      var dmgOut = (SCOPE === 'all') ? src.damageDealt : d.session_damageDealt;
      levelEl.textContent = num(stats.level);
      stepsEl.textContent = num(src.steps);
      dmgOutEl.textContent = num(dmgOut !== undefined && dmgOut !== null ? dmgOut : 0);
      dmgTakenEl.textContent = num(src.damageTaken);
      manaUsedEl.textContent = num(src.manaSpent);
      hpRegenEl.textContent = signed(src.healthRegen);
      manaRegenEl.textContent = signed(src.manaRegen);
      if (d.clock && typeof d.clock.hour === 'number') {
        clockEl.innerHTML = '<span class="ico">schedule</span>' +
          ('0' + d.clock.hour).slice(-2) + ':' + ('0' + (d.clock.minute || 0)).slice(-2);
      } else {
        clockEl.textContent = '';
      }
    }

    // Subscription statt Polling: EventSource abonniert /events, der Proxy pusht
    // bei jeder Änderung. EventSource reconnectet bei Verbindungsabbruch selbst.
    var everOk = false;
    function goStale() {
      // Nach erstem Render: letzte Werte STEHEN lassen, nur dimmen (Spiel kurz
      // im Hintergrund/pausiert → Daten kommen wieder). Vor dem 1. Render: leer.
      if (everOk) bar.classList.add('stale');
      else setOffline();
    }
    var es = new EventSource(BASE + '/events?lang=' + LANG);
    es.onmessage = function (e) {
      var d; try { d = JSON.parse(e.data); } catch (_) { return; }
      if (d && d.ok) { everOk = true; bar.classList.remove('stale'); render(d); }
      else goStale();
    };
    es.onerror = goStale;
  </script>
</body>
</html>
