<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=760, height=40" />
  <title>G1R News-Ticker</title>
  <!-- Theme-Fundament: Tokens (_theme.css) VOR den Bausteinen (_blocks.css). -->
  <link rel="stylesheet" href="../_theme.css" />
  <link rel="stylesheet" href="../_blocks.css" />
  <script type="application/json" id="params">
[ {"key":"port","label":"Proxy-Port","type":"text","group":"Verbindung","default":"9210"},
  {"key":"lang","label":"Sprache","type":"select","group":"Anzeige","default":"en",
   "options":[["en","English"],["de","Deutsch"]]} ]
</script>
  <script src="../_params.js"></script>
  <style>
    /* Nur Widget-spezifisches Layout. Rahmen/Fläche/Ornament kommen aus .t-card. */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 760px; height: 40px; overflow: hidden; background: transparent;
                 font-family: var(--theme-font-body, "DM Sans", system-ui, sans-serif); }

    .t-card.ticker { padding: 0 14px; height: 40px; width: 760px; display: flex; align-items: center;
                     gap: 12px; overflow: hidden; }
    .tag { background: var(--theme-primary, #5e2a79); color: var(--theme-text, #fff); font-size: .62rem;
           font-weight: 700; text-transform: uppercase; letter-spacing: .1em; padding: 3px 8px;
           border-radius: 4px; flex: none; }

    .run { color: var(--theme-text, #e8e0f0); font-size: .92rem; white-space: nowrap; padding-right: 48px; }
    .run b { color: var(--theme-accent, #f2b705); font-variant-numeric: tabular-nums; }
    .run .dot { color: var(--theme-text-dim, #8a7d99); margin: 0 10px; }
    .run .offline { color: var(--theme-text-dim, #8a7d99); }

    /* Stale (Spiel kurz weg): letzter Text bleibt stehen, nur gedimmt. */
    .stale { opacity: .5; transition: opacity .4s ease; }
  </style>
</head>
<body>
  <div class="t-card t-card--accent ticker">
    <span class="tag">G1 Live</span>
    <div class="t-ticker">
      <div class="t-ticker-track" id="track">
        <span class="run" id="run"><span class="offline">— waiting for G1R —</span></span>
        <span class="run" id="runCopy" aria-hidden="true"><span class="offline">— waiting for G1R —</span></span>
      </div>
    </div>
  </div>

  <script>
    // Lokaler Proxy auf dem Spiel-PC. Port + Sprache via JSON-Insel + _params.js.
    var P = Params.values(Params.readParams());
    var PORT = P.port, LANG = P.lang || 'en';
    var BASE = 'http://localhost:' + PORT;

    var runEl = document.getElementById('run');
    var runCopyEl = document.getElementById('runCopy');

    function num(v) { return (v === undefined || v === null) ? '–' : Math.round(v).toLocaleString('en-US'); }
    function pair(v, vMax) {
      if (v === undefined || v === null) return '–';
      return num(v) + (vMax !== undefined && vMax !== null ? '/' + num(vMax) : '');
    }
    function b(v) { return '<b>' + v + '</b>'; }
    // "Söldnerklinge (73)" — Schaden anhängen, wenn bekannt.
    function gear(name, dmg) {
      if (!name) return '—';
      return name + (dmg !== undefined && dmg !== null ? ' (' + num(dmg) + ')' : '');
    }

    function setOffline() {
      var html = '<span class="offline">— waiting for G1R —</span>';
      runEl.innerHTML = html;
      runCopyEl.innerHTML = html;
    }

    function render(d) {
      var stats = d.stats || {};
      var sess = d.session || {};
      var groups = [];

      groups.push(
        'STR ' + b(num(stats.strength)) +
        ' · DEX ' + b(num(stats.dexterity)) +
        ' · HP ' + b(pair(stats.hp, stats.hpMax)) +
        ' · Mana ' + b(pair(stats.mana, stats.manaMax))
      );

      var distM = (sess.distanceM !== undefined && sess.distanceM !== null) ? sess.distanceM
                : (d.distanceM !== undefined && d.distanceM !== null) ? d.distanceM : null;
      var km = (distM === null) ? '–' : (distM / 1000).toFixed(1);
      var dmgDealt = (d.session_damageDealt !== undefined && d.session_damageDealt !== null) ? d.session_damageDealt : 0;
      groups.push(
        'Session: ' + b(km + ' km') + ' walked' +
        ' · ' + b(num(dmgDealt)) + ' DMG dealt' +
        ' · ' + b(num(sess.damageTaken)) + ' taken'
      );

      // Stärkste Waffe getrennt nach Melee / Ranged / Magic.
      groups.push(
        'Melee: ' + b(gear(d.strongestMeleeDisplay, d.strongestMeleeDmg)) +
        ' · Ranged: ' + b(gear(d.strongestRangedDisplay, d.strongestRangedDmg)) +
        ' · Spell: ' + b(d.strongestSpellDisplay || '—')
      );

      var html = groups.join('<span class="dot">◆</span>');
      runEl.innerHTML = html;
      runCopyEl.innerHTML = html;
    }

    // Subscription statt Polling: EventSource abonniert /events, reconnectet selbst.
    var card = document.querySelector('.ticker');
    var everOk = false;
    function goStale() {
      // Nach erstem Render: letzten Text stehen lassen, nur dimmen. Vorher: leer.
      if (everOk) card.classList.add('stale');
      else setOffline();
    }
    var es = new EventSource(BASE + '/events?lang=' + LANG);
    es.onmessage = function (e) {
      var d; try { d = JSON.parse(e.data); } catch (_) { return; }
      if (d && d.ok) { everOk = true; card.classList.remove('stale'); render(d); }
      else goStale();
    };
    es.onerror = goStale;
  </script>
</body>
</html>
