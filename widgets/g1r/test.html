<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=420, height=540" />
  <title>G1R Live (Test)</title>
  <link rel="stylesheet" href="../_theme.css" />
  <style>
    :root {
      --c-accent:  var(--theme-accent,   #f2b705);
      --c-primary: var(--theme-primary,  #5e2a79);
      --c-bg:      var(--theme-bg,       #0a0510);
      --c-surface: var(--theme-surface,  #1f1430);
      --c-text:    var(--theme-text,     #e8e0f0);
      --c-muted:   var(--theme-text-dim, #8a7d99);
      --c-border:  var(--theme-border,   rgba(94,42,121,.6));
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 420px; height: 540px; overflow: hidden; background: transparent;
                 font-family: var(--theme-font-body, "DM Sans", system-ui, sans-serif); }
    .card {
      position: absolute; inset: 8px;
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      border-left: 3px solid var(--c-accent);
      border-radius: var(--theme-radius, 8px);
      padding: 14px 18px; color: var(--c-text);
      display: flex; flex-direction: column; gap: 12px;
    }
    .head { display: flex; align-items: baseline; justify-content: space-between; }
    .title { font-family: var(--theme-font-display, serif); font-size: 1.1rem; color: var(--c-accent);
             letter-spacing: .06em; text-transform: uppercase; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #777; flex: none; }
    .dot.live { background: #4be39a; box-shadow: 0 0 8px #4be39a; }
    .label { font-size: .7rem; color: var(--c-muted); text-transform: uppercase; letter-spacing: .1em; }
    .guild { font-family: var(--theme-font-display, serif); font-size: 1.35rem; color: var(--c-accent); }
    .pos { display: flex; gap: 14px; font-family: var(--theme-font-mono, monospace); font-size: 1.1rem; }
    .pos b { color: var(--c-accent); font-variant-numeric: tabular-nums; }
    .pos .axis { color: var(--c-muted); margin-right: 4px; }
    .items { flex: 1; overflow: hidden; }
    .items ul { list-style: none; display: flex; flex-direction: column; gap: 2px; max-height: 200px; overflow: hidden; }
    .items li { display: flex; justify-content: space-between; font-size: .9rem;
                border-bottom: 1px solid var(--c-border); padding: 2px 0; }
    .items li .n { color: var(--c-text); }
    .items li .c { color: var(--c-accent); font-variant-numeric: tabular-nums; }
    .statgrid { display: flex; flex-wrap: wrap; gap: 4px 14px; font-size: .9rem; }
    .statgrid .s { color: var(--c-muted); }
    .statgrid .s b { color: var(--c-accent); font-variant-numeric: tabular-nums; margin-left: 3px; }
    .offline { color: var(--c-muted); font-size: .9rem; }
    .clock { margin-left: auto; margin-right: 10px; font-family: var(--theme-font-mono, monospace);
             font-size: 1rem; color: var(--c-accent); font-variant-numeric: tabular-nums; }
    .ticker { list-style: none; display: flex; flex-direction: column; gap: 2px; max-height: 88px; overflow: hidden; }
    .ticker li { font-size: .85rem; color: var(--c-text); border-left: 2px solid var(--c-accent); padding-left: 6px; }
    .ticker li .c { color: var(--c-accent); font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <div class="card">
    <div class="head">
      <span class="title">Gothic 1 — Live</span>
      <span class="clock" id="clock"></span>
      <span class="dot" id="dot" title="Verbindung"></span>
    </div>

    <div>
      <div class="label">Gilde</div>
      <div class="guild" id="guild"><span class="offline">—</span></div>
    </div>

    <div>
      <div class="label">Waffen (dabei)</div>
      <div class="guild" id="weapon"><span class="offline">—</span></div>
    </div>

    <div>
      <div class="label">Schlag</div>
      <div class="guild" id="attack"><span class="offline">—</span></div>
    </div>

    <div>
      <div class="label">Zauber / Runen (dabei)</div>
      <div class="guild" id="spell"><span class="offline">—</span></div>
    </div>

    <div>
      <div class="label">Position (cm)</div>
      <div class="pos" id="pos"><span class="offline">— warte auf G1R —</span></div>
    </div>

    <div>
      <div class="label">Strecke (diese Session)</div>
      <div class="pos" id="dist"><span class="offline">—</span></div>
    </div>

    <div>
      <div class="label">Diese Session</div>
      <div class="statgrid" id="session"><span class="offline">—</span></div>
    </div>

    <div>
      <div class="label">Stats</div>
      <div class="statgrid" id="stats"><span class="offline">—</span></div>
    </div>

    <div class="items">
      <div class="label">Inventar (<span id="itemCount">0</span>)</div>
      <ul id="items"></ul>
    </div>
  </div>

  <script>
    // Lokaler Proxy auf dem Spiel-PC. Port via ?port= überschreibbar.
    var PORT = new URLSearchParams(location.search).get('port') || '9210';
    var URL  = 'http://localhost:' + PORT + '/state';
    var INTERVAL = 400;

    var dot = document.getElementById('dot');
    var guildEl = document.getElementById('guild');
    var spellEl = document.getElementById('spell');
    var weaponEl = document.getElementById('weapon');
    var attackEl = document.getElementById('attack');
    var sessionEl = document.getElementById('session');
    var clockEl = document.getElementById('clock');
    var posEl = document.getElementById('pos');
    var distEl = document.getElementById('dist');
    var statsEl = document.getElementById('stats');
    var itemsEl = document.getElementById('items');
    var itemCountEl = document.getElementById('itemCount');

    function setOffline(msg) {
      dot.classList.remove('live');
      posEl.innerHTML = '<span class="offline">' + (msg || '— warte auf G1R —') + '</span>';
      guildEl.innerHTML = '<span class="offline">—</span>';
      spellEl.innerHTML = '<span class="offline">—</span>';
      weaponEl.innerHTML = '<span class="offline">—</span>';
      attackEl.innerHTML = '<span class="offline">—</span>';
      sessionEl.innerHTML = '<span class="offline">—</span>';
      clockEl.textContent = '';
      distEl.innerHTML = '<span class="offline">—</span>';
      statsEl.innerHTML = '<span class="offline">—</span>';
      itemsEl.innerHTML = '';
      itemCountEl.textContent = '0';
    }

    function renderStats(s) {
      if (!s) { statsEl.innerHTML = '<span class="offline">—</span>'; return; }
      var out = [];
      function add(label, val) {
        if (val !== undefined && val !== null) out.push('<span class="s">' + label + '<b>' + Math.round(val) + '</b></span>');
      }
      function pair(label, v, vMax) {
        if (v === undefined) return;
        out.push('<span class="s">' + label + '<b>' + Math.round(v) + (vMax !== undefined ? '/' + Math.round(vMax) : '') + '</b></span>');
      }
      add('Level', s.level); add('XP', s.xp); add('Lernpkt', s.learnPts);
      add('STR', s.strength); add('GES', s.dexterity);
      pair('HP', s.hp, s.hpMax); pair('Mana', s.mana, s.manaMax); add('Kreis', s.magicCircle);
      add('Feuer', s.resFire); add('Eis', s.resIce); add('Schnitt', s.resEdge);
      add('Stich', s.resPoint); add('Wucht', s.resBlunt); add('Energie', s.resEnergy); add('Wind', s.resWind);
      statsEl.innerHTML = out.length ? out.join('') : '<span class="offline">keine Stats</span>';
    }

    function renderSession(s) {
      if (!s) { sessionEl.innerHTML = '<span class="offline">—</span>'; return; }
      var out = [];
      function add(label, val) {
        out.push('<span class="s">' + label + '<b>' + Math.round(val || 0) + '</b></span>');
      }
      add('Schaden', s.damageTaken); add('HP regen.', s.healthRegen);
      add('Mana verbr.', s.manaSpent); add('Mana regen.', s.manaRegen);
      add('XP', s.xpGained); add('Schritte', s.steps);
      sessionEl.innerHTML = out.join('');
    }

    function render(d) {
      dot.classList.add('live');
      guildEl.textContent = d.guild || 'Keine Gilde';
      // Zauber/Runen crashfrei aus dem Inventar (ItAr_ = Runen + Schriftrollen).
      var spells = (d.items || []).filter(function (it) { return /^ItAr_/.test(it.name || ''); });
      spellEl.textContent = spells.length
        ? spells.map(function (it) { return it.display || it.name; }).join(', ')
        : 'keine dabei';
      // Waffen crashfrei aus dem Inventar filtern (ItMw_=Nahkampf, ItRw_=Fernkampf).
      // Der direkte Engine-Weg (GetEquipedWeaponDefinition) crasht, die Items sind sicher.
      var weapons = (d.items || []).filter(function (it) { return /^It[MR]w_/.test(it.name || ''); });
      weaponEl.textContent = weapons.length
        ? weapons.map(function (it) { return it.display || it.name; }).join(', ')
        : 'keine Waffe dabei';
      attackEl.textContent = d.attackDisplay || d.attack || '—';
      if (d.pos) {
        posEl.innerHTML =
          '<span><span class="axis">X</span><b>' + Math.round(d.pos.x) + '</b></span>' +
          '<span><span class="axis">Y</span><b>' + Math.round(d.pos.y) + '</b></span>' +
          '<span><span class="axis">Z</span><b>' + Math.round(d.pos.z) + '</b></span>';
      } else {
        posEl.innerHTML = '<span class="offline">keine Position</span>';
      }
      if (d.distanceM !== undefined) {
        distEl.innerHTML =
          '<span><b>' + d.distanceM.toFixed(1) + '</b> m</span>' +
          '<span><span class="axis">~</span><b>' + (d.steps || 0) + '</b> Schritte</span>';
      }
      renderStats(d.stats);
      renderSession(d.session);
      if (d.clock && typeof d.clock.hour === 'number') {
        clockEl.textContent = ('0' + d.clock.hour).slice(-2) + ':' + ('0' + (d.clock.minute || 0)).slice(-2);
      } else {
        clockEl.textContent = '';
      }
      var items = d.items || [];
      itemCountEl.textContent = items.length;
      itemsEl.innerHTML = items.slice(0, 12).map(function (it) {
        return '<li><span class="n">' + (it.display || it.name) + '</span><span class="c">×' + it.count + '</span></li>';
      }).join('');
    }

    function poll() {
      fetch(URL, { credentials: 'omit' })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          if (d && d.ok) render(d);
          else setOffline(d && d.reason === 'stale' ? '— Spiel pausiert —' : '— warte auf G1R —');
        })
        .catch(function () { setOffline('— lokaler Proxy nicht erreichbar —'); });
    }

    poll();
    setInterval(poll, INTERVAL);
  </script>
</body>
</html>
