<!DOCTYPE html>
<!--
  TS3 "Wer spricht jetzt"-Widget
  ──────────────────────────────────────────────────────────────────────
  Pollt /api/teamspeak/state alle 500ms. Pro Member ein vertikaler
  Eintrag mit Avatar + Name. Spricht = volle Opacity + Gold-Ring,
  Schweigen = gedimmt (~35%). Hysterese 400ms macht das Backend.

  URL-Params:
    pollMs        Default 500
    width         Default 280px (Container-Breite)
    avatar        Default 36 (px)
    accent        Default #f2b705 (Talking-Ring-Farbe)
    transparent   '1' = kein Card-BG/Border/Schatten + keine Row-BGs
                  (nur Avatar + Name + Ring beim Sprechen) — fuer OBS
                  Browser-Source ueber Gameplay-Overlay.
    hideOffline   '1' (Default) = bei TS-Disconnect Card komplett
                  verstecken. '0' = zarte "no connection"-Anzeige zeigen.
-->
<html>
<head>
  <meta charset="utf-8">
  <title>TS3 — Wer spricht jetzt</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --width: 280px;
      --av-size: 36px;
      --accent: #f2b705;
      --bg-card: rgba(13, 6, 26, 0.78);
      --bg-row: rgba(255, 255, 255, 0.04);
      --bg-row-talking: rgba(242, 183, 5, 0.10);
      --text: #e8e0f0;
      --muted: #8a7d99;
      --border: rgba(216, 180, 255, 0.25);
    }
    html, body {
      margin: 0; padding: 0;
      background: transparent;
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px;
    }
    .ts-card {
      width: var(--width);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.5);
      padding: 12px 14px 10px;
      box-sizing: border-box;
      backdrop-filter: blur(6px);
    }
    .ts-header {
      display: flex; align-items: center; gap: 6px;
      color: var(--muted);
      font-size: 0.78em;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 6px;
    }
    .ts-header .ch-name { color: var(--text); text-transform: none;
                          letter-spacing: 0; font-size: 1.05em;
                          font-weight: 700; }
    .ts-status {
      margin-left: auto;
      font-size: 0.9em;
      color: var(--muted);
    }
    .ts-status.ok::before { content: "● "; color: #48c878; }
    .ts-status.warn::before { content: "● "; color: #e57b7b; }

    .ts-no-conn {
      font-size: 0.85em;
      color: #e57b7b;
      text-align: center;
      padding: 6px 4px;
      animation: tsFade 0.5s ease;
    }
    @keyframes tsFade { from { opacity: 0; } to { opacity: 1; } }

    .ts-list {
      display: flex; flex-direction: column;
      gap: 3px;
    }
    .ts-row {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 8px;
      border-radius: 5px;
      background: var(--bg-row);
      opacity: 0.35;
      filter: saturate(0.6);
      transition: opacity 0.12s ease, filter 0.12s ease,
                  background 0.12s ease, box-shadow 0.12s ease;
    }
    .ts-row.talking {
      opacity: 1;
      filter: saturate(1) brightness(1);
      background: var(--bg-row-talking);
      box-shadow: 0 0 0 1px rgba(242,183,5,0.35) inset,
                  0 0 8px rgba(242,183,5,0.15);
    }
    .ts-avatar {
      position: relative;
      width: var(--av-size); height: var(--av-size);
      flex-shrink: 0;
    }
    .ts-avatar .avbg {
      position: absolute; inset: 5px;
      border-radius: 50%;
      overflow: hidden;
      background: #2a1d3f;
    }
    .ts-avatar img.av { width: 100%; height: 100%; object-fit: cover;
                         display: block; }
    .ts-avatar .initials {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: var(--text);
      font-size: 0.95em;
    }
    /* Steam-Frame: leicht groesser, ueber dem Avatar gelegt. Frame
       hat transparenten Innenraum. */
    .ts-avatar .frame {
      position: absolute; left: -15%; top: -15%;
      width: 130%; height: 130%;
      pointer-events: none;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.12s ease;
    }
    /* Frame-Variante: Avatar ist eckig (Frames sind fuer eckige
       Container designed), Frame wird beim Sprechen sichtbar.
       Standard-Gold-Ring NUR wenn kein Frame da ist. */
    .ts-row.framed .ts-avatar .avbg { border-radius: 8%; }
    .ts-row.talking.framed .ts-avatar .frame { opacity: 1; }
    .ts-row.talking:not(.framed) .ts-avatar .avbg {
      box-shadow: 0 0 0 2px var(--accent);
    }
    .ts-name { flex: 1; min-width: 0;
                 overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
                 font-weight: 600; }
    .ts-row.self .ts-name { color: var(--accent); }

    .ts-empty {
      font-style: italic; color: var(--muted); font-size: 0.85em;
      padding: 6px; text-align: center;
    }

    /* Transparent-Modus: Card-Chrome komplett weg, Rows ohne BG, nur
       Avatar/Name + Talking-Ring + Outline-Text-Shadow damit der Name
       auf hellem Gameplay-BG lesbar bleibt. */
    body.transparent .ts-card {
      background: transparent;
      border: 0;
      box-shadow: none;
      backdrop-filter: none;
      padding: 6px 4px;
    }
    body.transparent .ts-header {
      border-bottom: 0;
      padding-bottom: 4px;
      margin-bottom: 4px;
    }
    body.transparent .ch-name,
    body.transparent .ts-name {
      text-shadow:
        0 0 3px rgba(0,0,0,0.95),
        0 0 6px rgba(0,0,0,0.7),
        0 1px 2px rgba(0,0,0,0.9);
    }
    body.transparent .ts-row {
      background: transparent;
    }
    body.transparent .ts-row.talking {
      background: transparent;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <div class="ts-card" id="card">
    <div class="ts-header">
      <span class="ch-name" id="chName">— TeamSpeak —</span>
      <span class="ts-status" id="status">…</span>
    </div>
    <div id="banner"></div>
    <div class="ts-list" id="list"></div>
  </div>

  <script>
    // ── URL-Params ────────────────────────────────────────────────────
    const qs = new URLSearchParams(location.search);
    const POLL_MS  = parseInt(qs.get("pollMs") || "200", 10);
    const WIDTH    = qs.get("width") || "280";
    const AV_SIZE  = qs.get("avatar") || "36";
    const ACCENT   = qs.get("accent") || "#f2b705";
    document.documentElement.style.setProperty("--width", WIDTH + "px");
    document.documentElement.style.setProperty("--av-size", AV_SIZE + "px");
    document.documentElement.style.setProperty("--accent", ACCENT);
    if (qs.get("transparent") === "1") {
      document.body.classList.add("transparent");
    }
    const HIDE_OFFLINE = qs.get("hideOffline") !== "0";  // Default an

    const elList   = document.getElementById("list");
    const elCh     = document.getElementById("chName");
    const elStat   = document.getElementById("status");
    const elBan    = document.getElementById("banner");

    // ── Banner-Logik ──────────────────────────────────────────────────
    // "No connection" zart 30s nach Connect oder Tag-Wechsel-Retry.
    let lastConnected = null;     // letzter Wert
    let lastDayStart = null;      // YYYY-MM-DD beim ersten Tick heute
    let bannerHideAt = 0;         // wann blendet die Meldung wieder aus
    function initialDay() {
      return new Date().toISOString().slice(0, 10);
    }
    lastDayStart = initialDay();

    function setBanner(text) {
      if (text) {
        elBan.innerHTML = `<div class="ts-no-conn">${text}</div>`;
        bannerHideAt = Date.now() + 30000;
      } else {
        elBan.innerHTML = "";
        bannerHideAt = 0;
      }
    }

    function initials(name) {
      if (!name) return "?";
      const parts = name.replace(/[^a-zA-Z0-9_ ]/g, " ").trim().split(/\s+/);
      if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
      return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
    }

    let firstDisconnectAt = null;  // ts wann disconnect erkannt
    function render(data) {
      const card = document.getElementById("card");
      const isConn = !!data.connected;
      // Bei Disconnect: 30s "no connection"-Banner zeigen, dann
      // komplett verstecken. Reconnect → sofort sichtbar.
      if (HIDE_OFFLINE && !isConn) {
        if (firstDisconnectAt === null) firstDisconnectAt = Date.now();
        const ageMs = Date.now() - firstDisconnectAt;
        if (ageMs < 30000) {
          card.style.display = "";
          elCh.textContent = "— TeamSpeak —";
          elStat.className = "ts-status warn";
          elStat.textContent = "off";
          elList.innerHTML = "";
          setBanner("TS3 nicht verbunden");
        } else {
          card.style.display = "none";
        }
        lastConnected = isConn;
        return;
      }
      firstDisconnectAt = null;
      card.style.display = "";
      const today = initialDay();
      if (today !== lastDayStart) {
        // Tag-Wechsel — kurz "wir versuchen wieder Verbindung"
        setBanner("Neuer Tag — verbinde mit TS3…");
        lastDayStart = today;
      }

      const wasConnected = lastConnected;
      if (wasConnected === false && isConn) {
        // Reconnect-Event
        setBanner("TS3 wieder verbunden");
      }
      if (wasConnected === true && !isConn) {
        // Disconnect
        setBanner("TS3 getrennt — versuche neu zu verbinden…");
      }
      if (wasConnected === null) {
        // Erster Tick — nur banner wenn nicht-connected
        if (!isConn) setBanner("Verbinde mit TS3…");
      }
      lastConnected = isConn;

      // Banner-Timeout
      if (bannerHideAt && Date.now() > bannerHideAt) {
        setBanner("");
      }

      // Header
      elCh.textContent = data.channelName || "— kein Channel —";
      if (isConn) {
        elStat.className = "ts-status ok";
        elStat.textContent = data.members ? `${data.members.filter(m => m.showInWidget !== false).length}` : "0";
      } else {
        elStat.className = "ts-status warn";
        elStat.textContent = "off";
      }

      const members = (data.members || [])
        .filter(m => m.showInWidget !== false)
        .slice()
        .sort((a, b) => {
          if (a.isSelf && !b.isSelf) return -1;
          if (b.isSelf && !a.isSelf) return 1;
          // KEIN talking-sort — sonst rebuilden wir das DOM nur weil
          // jemand zu reden anfaengt. Nur alpha + self oben.
          return (a.displayName || a.tsName || "").localeCompare(
                 b.displayName || b.tsName || "");
        });
      if (!members.length) {
        if (elList.dataset.empty !== "1") {
          elList.innerHTML = `<div class="ts-empty">— allein im Channel —</div>`;
          elList.dataset.empty = "1";
        }
        return;
      }
      // Wenn wir aus dem Empty-State kommen: alles wegputzen damit
      // .ts-empty + neue Rows nicht parallel im DOM stehen.
      if (elList.dataset.empty === "1") {
        elList.innerHTML = "";
        elList.dataset.empty = "0";
      }
      // Alle non-row Kinder (zur Sicherheit) raus
      Array.from(elList.children).forEach(c => {
        if (!c.classList.contains("ts-row")) c.remove();
      });

      // Diff: per UID das existierende DOM-Element wiederverwenden.
      // Nur wenn Member-Set wechselt oder Icon-URL sich aendert wird
      // wirklich gerendert. Sonst toggeln wir nur die .talking-Klasse.
      const existing = new Map();
      elList.querySelectorAll(".ts-row").forEach(el => {
        existing.set(el.dataset.uid, el);
      });
      const seen = new Set();
      let prev = null;
      for (const m of members) {
        // clid (TS3 client-id, immer gesetzt) ist stabiler Key.
        // tsUid kann initial leer sein bis clientlist -uid Antwort da ist.
        const uid = m.clid || m.tsUid || "";
        seen.add(uid);
        const name = m.displayName || m.tsName || "?";
        const iconSrc = m.isTalking
          ? (m.speakingIcon || m.avatarUrl)
          : (m.silentIcon || m.avatarUrl);
        let row = existing.get(uid);
        if (!row) {
          row = document.createElement("div");
          row.className = "ts-row";
          row.dataset.uid = uid;
          row.innerHTML =
            `<div class="ts-avatar">
               <div class="avbg"></div>
               <img class="frame" alt="">
             </div>
             <div class="ts-name"></div>`;
        }
        // Klassen toggeln (kein DOM-Rebuild noetig)
        row.classList.toggle("talking", !!m.isTalking);
        row.classList.toggle("self", !!m.isSelf);
        row.classList.toggle("framed", !!m.avatarFrameUrl);
        // Name nur setzen wenn aendert
        const nameEl = row.querySelector(".ts-name");
        if (nameEl.textContent !== name) nameEl.textContent = name;
        // Avatar-BG (Bild oder Initialen) nur ersetzen wenn src wechselt
        const avBg = row.querySelector(".ts-avatar .avbg");
        const wantSrc = iconSrc || "";
        if (avBg.dataset.src !== wantSrc) {
          avBg.dataset.src = wantSrc;
          if (wantSrc) {
            avBg.innerHTML = `<img class="av" src="${wantSrc}" alt="">`;
          } else {
            avBg.innerHTML = `<div class="initials">${initials(name)}</div>`;
          }
        }
        // Steam-Frame overlay
        const frameEl = row.querySelector(".ts-avatar .frame");
        const frameSrc = m.avatarFrameUrl || "";
        if (frameEl.dataset.src !== frameSrc) {
          frameEl.dataset.src = frameSrc;
          if (frameSrc) {
            frameEl.src = frameSrc;
          } else {
            // Kein Frame: leeren statt 'src=""' (das triggert sonst
            // Browser-Fetch der aktuellen Page als Bild).
            frameEl.removeAttribute("src");
          }
        }
        // In DOM einsortieren (nach prev, oder als erstes).
        // Wichtig: wenn row noch nicht im DOM (z.B. neu erstellte Row
        // als erster Member), MUSS insertBefore laufen — sonst bleibt
        // sie unsichtbar.
        const inDom = row.parentNode === elList;
        const wantBefore = prev ? prev.nextSibling : elList.firstChild;
        if (!inDom || (row !== wantBefore && row.previousSibling !== prev)) {
          elList.insertBefore(row, wantBefore);
        }
        prev = row;
      }
      // Entfernte Members ausblenden
      existing.forEach((el, uid) => {
        if (!seen.has(uid)) el.remove();
      });
    }

    // SSE — Server pusht Snapshot bei jedem State-Change. Fallback
    // auf Polling falls EventSource nicht verfuegbar.
    let _es = null;
    function startSSE() {
      try {
        _es = new EventSource("/api/teamspeak/stream");
        _es.onmessage = (ev) => {
          try { render(JSON.parse(ev.data)); } catch (e) {}
        };
        _es.onerror = () => {
          // EventSource verbindet sich von selbst wieder. Bei laengerem
          // Ausfall pessimistisch rendern.
          render({ connected: false, members: [] });
        };
      } catch (e) {
        console.warn("SSE fehlt, fallback polling");
        async function tick() {
          try {
            const r = await fetch((window.__SERVE_BASE__||"/") + "api/teamspeak/state", { cache: "no-store" });
            render(await r.json());
          } catch (_e) {
            render({ connected: false, members: [] });
          }
        }
        tick();
        setInterval(tick, POLL_MS);
      }
    }
    startSSE();
  </script>
</body>
</html>
