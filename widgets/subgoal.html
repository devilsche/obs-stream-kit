<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Sub Goal</title>
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }

    .widget-box {
      position: absolute;
      top: 50%;
      left: 20px;
      transform: translateY(-50%) translateX(-120%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: rgba(13, 13, 26, 0.95);
      border: 1px solid rgba(94, 42, 121, 0.3);
      border-left: 3px solid #5e2a79;
      border-radius: 0 8px 8px 0;
      padding: 12px 24px;
      min-width: 300px;
      box-shadow: 0 0 20px rgba(94, 42, 121, 0.15);
    }

    .widget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .widget-label {
      font-size: 10px;
      color: #c9a0dc;
      letter-spacing: 2px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .widget-count {
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      white-space: nowrap;
    }

    .progress-track {
      height: 6px;
      background: rgba(94, 42, 121, 0.3);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #5e2a79, #f2b705);
      border-radius: 3px;
      box-shadow: 0 0 8px rgba(242, 183, 5, 0.5);
      transition: width 1s ease 400ms;
    }
  </style>
</head>
<body>

  <div class="widget-box">
    <div class="widget-header">
      <div class="widget-label">Sub Goal</div>
      <div class="widget-count"></div>
    </div>
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const current = parseInt(params.get('current') || '23', 10);
    const goal = parseInt(params.get('goal') || '50', 10);
    const percentage = Math.min(100, Math.round((current / goal) * 100));

    document.querySelector('.widget-count').textContent = `${current} / ${goal}`;

    function playEntrance() {
      const box = document.querySelector('.widget-box');
      const anim = box.animate([
        { transform: 'translateY(-50%) translateX(-120%)' },
        { transform: 'translateY(-50%) translateX(0)' }
      ], { duration: 300, easing: 'ease-out', fill: 'forwards' });

      anim.finished.then(() => {
        document.querySelector('.progress-fill').style.width = `${percentage}%`;
      });
    }

    if (document.visibilityState === 'visible') {
      playEntrance();
    } else {
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') playEntrance();
      });
    }
  </script>

</body>
</html>
