<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=500, height=120" />
  <title>Sub Goal</title>
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 500px;
      height: 120px;
      overflow: hidden;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }

    @keyframes widgetGlow {
      0%, 100% { box-shadow: 0 0 8px rgba(94,42,121,0.2), 0 0 20px rgba(94,42,121,0.1); }
      50% { box-shadow: 0 0 15px rgba(94,42,121,0.5), 0 0 35px rgba(94,42,121,0.2); }
    }

    .widget-box {
      position: absolute;
      top: 50%;
      left: 10px;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: rgba(13, 13, 26, 0.95);
      border: 1px solid rgba(94, 42, 121, 0.3);
      border-left: 3px solid #5e2a79;
      border-radius: 0 8px 8px 0;
      padding: 12px 24px;
      min-width: 320px;
      max-width: 400px;
      box-shadow: 0 0 20px rgba(94, 42, 121, 0.15);
      animation: widgetGlow 3s ease-in-out infinite;
    }

    .widget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .widget-label {
      font-size: 10px;
      color: #c9a0dc;
      letter-spacing: 2px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .widget-count {
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      white-space: nowrap;
    }

    .progress-track {
      height: 6px;
      background: rgba(94, 42, 121, 0.3);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #5e2a79, #f2b705);
      border-radius: 3px;
      box-shadow: 0 0 8px rgba(242, 183, 5, 0.5);
      transition: width 1s ease 400ms;
    }
  </style>
</head>
<body>

  <div class="widget-box">
    <div class="widget-header">
      <div class="widget-label">Sub Goal</div>
      <div class="widget-count"></div>
    </div>
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const current = parseInt(params.get('current') || '23', 10);
    const goal = parseInt(params.get('goal') || '50', 10);
    const percentage = Math.min(100, Math.round((current / goal) * 100));

    document.querySelector('.widget-count').textContent = `${current} / ${goal}`;
    document.querySelector('.progress-fill').style.width = `${percentage}%`;
  </script>

  <div id="sparkle-wrap" style="position:absolute;top:0;left:0;width:500px;height:120px;overflow:visible;pointer-events:none;"></div>
  <script src="../js/sparkles.js"></script>
  <script>
    new SparkleEngine(document.getElementById('sparkle-wrap'), {
      count: 3,
      speed: 0.15,
      maxOpacity: 0.75,
      sizeWeights: { big: 0, normal: 0.1, small: 0.5, tiny: 0.4 },
      fixedColor: 'purple'
    }).start();
  </script>

</body>
</html>
