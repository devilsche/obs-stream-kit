<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Welcome</title>
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }

    .content {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .widget-box {
      position: relative;
      transform: translateY(100px);
      background: linear-gradient(135deg,
        rgba(18, 10, 32, 0.92) 0%,
        rgba(38, 20, 56, 0.92) 100%
      );
      border: 1px solid rgba(155, 85, 192, 0.35);
      border-radius: 12px;
      padding: 18px 44px 20px;
      text-align: center;
      max-width: 560px;
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.55),
        0 0 18px rgba(94, 42, 121, 0.3);
    }

    .kicker {
      font-size: 16px;
      font-weight: 700;
      color: #f2b705;
      letter-spacing: 6px;
      text-transform: uppercase;
      text-shadow:
        0 0 10px rgba(242, 183, 5, 0.8),
        0 0 20px rgba(242, 183, 5, 0.4);
      margin-bottom: 6px;
    }

    .name {
      font-size: 44px;
      font-weight: 900;
      color: #ffffff;
      line-height: 1;
      max-width: 520px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .divider {
      width: 120px;
      height: 2px;
      margin: 8px auto 0;
      background: linear-gradient(90deg, transparent, #f2b705, transparent);
    }

    .badge {
      position: absolute;
      top: -10px;
      right: -10px;
      z-index: 3;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #ffffff;
      padding: 4px 10px;
      border: 1px solid #c9a0dc;
      border-radius: 4px;
      background: #5e2a79;
      transform: rotate(-8deg);
      text-shadow: 0 0 6px rgba(155, 85, 192, 0.8);
      box-shadow: 0 0 12px rgba(94, 42, 121, 0.6);
      text-transform: uppercase;
    }

    @keyframes burstParticle {
      0%   { transform: translate(-50%, -50%) translate(0, 0) scale(0) rotate(0deg); opacity: 0; }
      10%  { transform: translate(-50%, -50%) translate(calc(var(--tx) * 0.35), calc(var(--ty) * 0.35)) scale(1.2) rotate(calc(var(--rot) * 0.35)); opacity: 1; }
      60%  { transform: translate(-50%, -50%) translate(calc(var(--tx) * 0.75), calc(var(--ty) * 0.75 + 40px)) scale(1) rotate(calc(var(--rot) * 0.75)); opacity: 1; }
      100% { transform: translate(-50%, -50%) translate(var(--tx), calc(var(--ty) + 120px)) scale(0.9) rotate(var(--rot)); opacity: 0; }
    }

    .burst-particle {
      position: absolute;
      top: calc(50% + 100px);
      left: 50%;
      animation: burstParticle 1.8s cubic-bezier(0.2, 0.9, 0.25, 1) forwards;
    }
    .burst-particle.circle { border-radius: 50%; }
    .burst-particle.rect   { border-radius: 2px; }
  </style>
</head>
<body>

  <div id="sparkle-container" style="position:absolute;inset:0;z-index:4;overflow:hidden;pointer-events:none;"></div>

  <div id="burst-container" style="position:absolute;inset:0;z-index:1;overflow:hidden;pointer-events:none;"></div>

  <div class="content">
    <div class="widget-box">
      <div class="badge">First Time</div>
      <div class="kicker">&#10022; Willkommen &#10022;</div>
      <div class="name" id="name">NewViewer42</div>
      <div class="divider"></div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';
      var params = new URLSearchParams(window.location.search);
      var name = params.get('name') || 'NewViewer42';
      document.getElementById('name').textContent = name;
    })();
  </script>

  <script src="../js/sparkles.js"></script>
  <script>
    (function () {
      'use strict';
      new SparkleEngine(document.getElementById('sparkle-container'), {
        count: 48,
        speed: 0.5,
        maxOpacity: 1.0,
        colors: { gold: 0.4, purple: 0.4, white: 0.2 },
        sizeWeights: { big: 0.3, normal: 0.4, small: 0.2, tiny: 0.1 }
      }).start();

      /* ── Konfetti-Kanone (einmaliger Boom-Burst beim Laden) ─── */
      var BURST_COUNT = 70;
      var CANVAS_W = 1920;
      var CANVAS_H = 1080;
      var EDGE_MARGIN = 40;
      var BURST_COLORS = [
        '#f2b705', '#ffd84d', '#ffb800',       // Gold-Varianten
        '#5e2a79', '#c9a0dc', '#9b55c0',       // Lila-Varianten
        '#ff6b9d', '#ffa5c4',                   // Pink-Varianten
        '#4ea9ff', '#a8e4ff',                   // Blau-Highlight
        '#ffffff', '#ffffff'
      ];

      var burstContainer = document.getElementById('burst-container');
      var centerX = CANVAS_W / 2;
      var centerY = CANVAS_H / 2 + 100;  // Entsprechend der Widget-Box-Verschiebung
      var maxDistX = centerX - EDGE_MARGIN;
      var maxDistY = (CANVAS_H - centerY) - EDGE_MARGIN;

      for (var i = 0; i < BURST_COUNT; i++) {
        var angle = Math.random() * Math.PI * 2;
        // Starker, breiter Ausbruch mit variabler Reichweite
        var desired = 300 + Math.random() * 350;
        var cosA = Math.abs(Math.cos(angle));
        var sinA = Math.abs(Math.sin(angle));
        var capX = cosA > 0.001 ? maxDistX / cosA : Infinity;
        var capY = sinA > 0.001 ? maxDistY / sinA : Infinity;
        var dist = Math.min(desired, capX, capY);
        var tx = Math.cos(angle) * dist;
        var ty = Math.sin(angle) * dist;

        // Mix aus groesseren Formen (Konfetti-Stil)
        var shape = Math.random() < 0.5 ? 'rect' : 'circle';
        var w, h;
        if (shape === 'rect') {
          w = 10 + Math.random() * 10;
          h = 18 + Math.random() * 14;
        } else {
          var s = 14 + Math.random() * 12;
          w = h = s;
        }

        var color = BURST_COLORS[Math.floor(Math.random() * BURST_COLORS.length)];
        var delay = Math.random() * 0.18;
        var rot = (Math.random() * 1080 - 540) + 'deg';  // viel Rotation

        var el = document.createElement('div');
        el.className = 'burst-particle ' + shape;
        el.style.cssText =
          'width:' + w + 'px;' +
          'height:' + h + 'px;' +
          'background:' + color + ';' +
          'box-shadow:0 0 ' + Math.max(w, h) + 'px ' + color + ';' +
          '--tx:' + tx.toFixed(1) + 'px;' +
          '--ty:' + ty.toFixed(1) + 'px;' +
          '--rot:' + rot + ';' +
          'animation-delay:' + delay.toFixed(2) + 's;';
        burstContainer.appendChild(el);
      }
    })();
  </script>

</body>
</html>
