<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=400, height=152" />
  <title>Animiertes Logo</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-container {
      position: relative;
      width: 400px;
      height: 152px;
      animation: logoGlow 2.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    /* Glow wird per JS als dynamisches @keyframes injiziert */

    .stripes {
      position: absolute;
      inset: 0;
      background-repeat: no-repeat;
      background-position: center center;
      background-size: contain;
      clip-path: polygon(0 100%, 0 0, 0 0, 0 100%);
    }

    /* Text bleibt IMMER sichtbar */
    .text {
      position: absolute;
      inset: 0;
      background-repeat: no-repeat;
      background-position: center center;
      background-size: contain;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <div class="sparkle-container" style="position:absolute;inset:0;z-index:3;pointer-events:none;"></div>
    <div class="stripes"></div>
    <div class="text"></div>
  </div>

  <script src="../js/sparkles.js"></script>
  <script>
    /*
      URL-Parameter:
        ?width=400          — Logo-Breite in px (default: 400)
        ?pause=10           — Pause zwischen Loops in Sekunden (default: 10)
        ?speed=200          — ms pro Streifen-Step (default: 200)
        ?lines=dateiname    — Streifen-Bild in assets/ (default: logo_lines_blue.png)
        ?text=dateiname     — Text-Bild in assets/ (default: logo_text_luckor_hd.png)
        ?glow=purple|gold   — Glow-Farbe (default: purple↔gold Wechsel)
    */
    (function() {
      const params = new URLSearchParams(window.location.search);
      const STEP_MS = parseInt(params.get('speed'), 10) || 200;
      const PAUSE_S = parseFloat(params.get('pause')) || 10;

      // --- Bild-Parameter ---
      const linesFile = params.get('lines') || 'logo_lines_blue.png';
      const textFile = params.get('text') || 'logo_text_luckor_hd.png';

      const stripes = document.querySelector('.stripes');
      const text = document.querySelector('.text');

      stripes.style.backgroundImage = "url('../assets/" + linesFile + "')";
      text.style.backgroundImage = "url('../assets/" + textFile + "')";

      // --- Glow-Farbe ---
      var GLOW_PRESETS = {
        purple: {
          from: 'drop-shadow(0 0 8px rgba(94,42,121,0.8)) drop-shadow(0 0 20px rgba(94,42,121,0.4))',
          to:   'drop-shadow(0 0 12px rgba(94,42,121,0.9)) drop-shadow(0 0 30px rgba(94,42,121,0.5))'
        },
        gold: {
          from: 'drop-shadow(0 0 8px rgba(242,183,5,0.8)) drop-shadow(0 0 20px rgba(242,183,5,0.4))',
          to:   'drop-shadow(0 0 12px rgba(242,183,5,0.9)) drop-shadow(0 0 30px rgba(242,183,5,0.5))'
        }
      };

      // Hex-Farbe → rgba strings für Glow
      function hexToGlow(hex) {
        hex = hex.replace('#', '');
        var r = parseInt(hex.substring(0, 2), 16);
        var g = parseInt(hex.substring(2, 4), 16);
        var b = parseInt(hex.substring(4, 6), 16);
        return {
          from: 'drop-shadow(0 0 8px rgba(' + r + ',' + g + ',' + b + ',0.8)) drop-shadow(0 0 20px rgba(' + r + ',' + g + ',' + b + ',0.4))',
          to:   'drop-shadow(0 0 12px rgba(' + r + ',' + g + ',' + b + ',0.9)) drop-shadow(0 0 30px rgba(' + r + ',' + g + ',' + b + ',0.5))'
        };
      }

      var glowParam = params.get('glow');
      var glowFrom, glowTo;
      if (glowParam === 'purple') {
        glowFrom = GLOW_PRESETS.purple.from;
        glowTo = GLOW_PRESETS.purple.to;
      } else if (glowParam === 'gold') {
        glowFrom = GLOW_PRESETS.gold.from;
        glowTo = GLOW_PRESETS.gold.to;
      } else if (glowParam && glowParam.match(/^#?[0-9a-fA-F]{6}$/)) {
        // Custom Hex-Farbe: ?glow=#ff0000 oder ?glow=ff0000
        var custom = hexToGlow(glowParam);
        glowFrom = custom.from;
        glowTo = custom.to;
      } else {
        // Default: lila↔gold Wechsel
        glowFrom = GLOW_PRESETS.purple.from;
        glowTo = GLOW_PRESETS.gold.to;
      }

      // Dynamisches @keyframes injizieren
      var style = document.createElement('style');
      style.textContent =
        '@keyframes logoGlow {' +
        '  0%, 100% { filter: ' + glowFrom + '; }' +
        '  50% { filter: ' + glowTo + '; }' +
        '}';
      document.head.appendChild(style);

      // --- Auto-Skalierung ---
      // Logo skaliert sich automatisch auf die Browser-Source-Größe
      function autoScale() {
        var winW = window.innerWidth;
        var winH = window.innerHeight;
        var baseW = 400;
        var baseH = 152;
        var scale = Math.min(winW / baseW, winH / baseH);
        var c = document.querySelector('.logo-container');
        c.style.transform = 'scale(' + scale + ')';
        c.style.transformOrigin = 'center center';
      }
      autoScale();
      window.addEventListener('resize', autoScale);

      // --- Sparkle Engine ---
      const sparkleContainer = document.querySelector('.sparkle-container');
      new SparkleEngine(sparkleContainer, {
        count: 6,
        speed: 0.25,
        maxOpacity: 0.85,
        sizeWeights: { big: 0, normal: 0.2, small: 0.5, tiny: 0.3 }
      }).start();

      // --- Exakte Streifen-Polygone (aus Pixeldaten gemessen) ---
      // [tl, bl, tr, br] → polygon(bl% 100%, tl% 0, tr% 0, br% 100%)
      const STRIPES = [
        [  0,  0, 31, 10],
        [ 31, 10, 41, 20],
        [ 41, 20, 51, 30],
        [ 51, 30, 61, 40],
        [ 61, 40, 71, 50],
        [ 71, 50, 81, 60],
        [ 81, 60, 91, 70],
        [ 91, 70,101, 80],
      ];

      // Reveal: kumulativ aufbauen — rechte Kante wandert nach rechts
      const revealEdges = [[0, 0]];
      for (var i = 0; i < STRIPES.length; i++) {
        revealEdges.push([STRIPES[i][2], STRIPES[i][3]]);
      }
      revealEdges[revealEdges.length - 1] = [100, 100];

      // Hide: kumulativ abbauen — linke Kante wandert nach rechts
      const hideEdges = [[0, 0]];
      for (var i = 0; i < STRIPES.length; i++) {
        hideEdges.push([STRIPES[i][0], STRIPES[i][1]]);
      }
      hideEdges[hideEdges.length - 1] = [100, 100];

      function setReveal(step) {
        const [tr, br] = revealEdges[step];
        stripes.style.clipPath =
          `polygon(0 100%, 0 0, ${tr}% 0, ${br}% 100%)`;
      }

      function setHide(step) {
        const [tl, bl] = hideEdges[step];
        stripes.style.clipPath =
          `polygon(${bl}% 100%, ${tl}% 0, 100% 0, 100% 100%)`;
      }

      // Zeigt exakt einen einzelnen Streifen
      function showSingleStripe(index) {
        const [tl, bl, tr, br] = STRIPES[index];
        stripes.style.clipPath =
          `polygon(${bl}% 100%, ${tl}% 0, ${tr}% 0, ${br}% 100%)`;
      }

      function hideAll() {
        stripes.style.clipPath = 'polygon(0 100%, 0 0, 0 0, 0 100%)';
      }

      // --- Helpers ---
      function delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
      }

      async function animateReveal() {
        for (let i = 0; i < revealEdges.length; i++) {
          setReveal(i);
          await delay(STEP_MS);
        }
      }

      async function animateHide() {
        for (let i = 0; i < hideEdges.length; i++) {
          setHide(i);
          await delay(STEP_MS);
        }
      }

      async function knightRider(sweeps) {
        const KR_MS = 84;
        const n = STRIPES.length;
        for (let s = 0; s < sweeps; s++) {
          for (let i = 0; i < n; i++) {
            showSingleStripe(i);
            await delay(KR_MS);
          }
          for (let i = n - 2; i >= 0; i--) {
            showSingleStripe(i);
            await delay(KR_MS);
          }
        }
      }

      function wobbleText() {
        return new Promise(resolve => {
          text.animate([
            { transform: 'scale(1)' },
            { transform: 'scale(1.08)' },
            { transform: 'scale(0.97)' },
            { transform: 'scale(1.04)' },
            { transform: 'scale(0.99)' },
            { transform: 'scale(1)' }
          ], {
            duration: 500,
            easing: 'ease-in-out'
          }).onfinish = resolve;
        });
      }

      async function runLoop() {
        while (true) {
          // Phase 1: Streifen aufbauen
          await animateReveal();

          // Phase 2: Text wobble
          await wobbleText();

          // Phase 3: ALLE DA — 1.5s halten
          await delay(1500);

          // Phase 4: Einzeln WEG — links→rechts
          await animateHide();

          // Phase 5: Knight Rider — 3 sweeps
          await knightRider(3);
          hideAll();

          // Phase 6: Einzeln HIN — links→rechts
          await animateReveal();

          // Phase 7: Kurze Pause 2s
          await delay(2000);

          // Phase 8: Wieder abbauen für Loop-Reset
          await animateHide();

          // Phase 9: Pause vor nächstem Loop
          await delay(PAUSE_S * 1000);
        }
      }

      runLoop();
    })();
  </script>
</body>
</html>
