<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=400, height=152" />
  <title>Animiertes Logo</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      height: 152px;
      overflow: hidden;
      background: transparent;
    }

    .logo-container {
      position: relative;
      width: 400px;
      height: 152px;
    }

    /* Streifen-Bild, per clip-path schrittweise aufgedeckt */
    .stripes {
      position: absolute;
      inset: 0;
      background: url('../assets/Chrome_Streifen.png') no-repeat center center;
      background-size: contain;
      /* Blau → Purple umfärben via hue-rotate + saturate */
      filter: hue-rotate(270deg) saturate(1.3) brightness(0.9);
      /* Startet komplett unsichtbar */
      clip-path: polygon(0 0, 0 0, 0 100%, 0 100%);
      animation: revealStripes 1.4s steps(1, end) forwards;
    }

    /*
      7 Streifen, diagonal. Das Bild ist ca. 4200x1600.
      Die Streifen laufen diagonal von links-unten nach rechts-oben.
      Wir decken von links nach rechts auf, jeweils ~14% Breite pro Streifen.
      Jeder Step zeigt einen Streifen mehr (diagonal geschnitten).

      Timing: 0.2s pro Streifen = 1.4s total
    */
    @keyframes revealStripes {
      0%    { clip-path: polygon(0 0, 0 0, 0 100%, 0 100%); }
      /* Streifen 1 */
      7.14% { clip-path: polygon(
        0 0,
        18% 0,
        8% 100%,
        0 100%
      ); }
      /* Streifen 2 */
      14.28% { clip-path: polygon(
        0 0,
        30% 0,
        20% 100%,
        0 100%
      ); }
      /* Streifen 3 */
      21.42% { clip-path: polygon(
        0 0,
        42% 0,
        32% 100%,
        0 100%
      ); }
      /* Streifen 4 */
      28.56% { clip-path: polygon(
        0 0,
        55% 0,
        45% 100%,
        0 100%
      ); }
      /* Streifen 5 */
      35.7% { clip-path: polygon(
        0 0,
        68% 0,
        58% 100%,
        0 100%
      ); }
      /* Streifen 6 */
      42.84% { clip-path: polygon(
        0 0,
        80% 0,
        70% 100%,
        0 100%
      ); }
      /* Streifen 7 — alle da */
      50% { clip-path: polygon(
        0 0,
        100% 0,
        100% 100%,
        0 100%
      ); }
      /* Bleibt sichtbar */
      100% { clip-path: polygon(
        0 0,
        100% 0,
        100% 100%,
        0 100%
      ); }
    }

    /* Text faded erst ein wenn alle Streifen da sind */
    .text {
      position: absolute;
      inset: 0;
      background: url('../assets/Chrome_Text.png') no-repeat center center;
      background-size: contain;
      z-index: 2;
      opacity: 0;
      animation: textFadeIn 0.6s ease-out 0.8s forwards;
    }

    @keyframes textFadeIn {
      0%   { opacity: 0; transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <div class="stripes"></div>
    <div class="text"></div>
  </div>

  <script>
    /* URL-Parameter:
       ?width=400   — Logo-Breite in px (default: 400)
       ?delay=0     — Verzögerung vor Start in Sekunden (default: 0)
       ?speed=1.4   — Dauer der Streifen-Animation in Sekunden (default: 1.4)
    */
    (function() {
      const params = new URLSearchParams(window.location.search);

      const width = parseInt(params.get('width'), 10);
      if (width && width !== 400) {
        const ratio = 152 / 400;
        const height = Math.round(width * ratio);
        document.body.style.width = width + 'px';
        document.body.style.height = height + 'px';
        document.querySelector('.logo-container').style.width = width + 'px';
        document.querySelector('.logo-container').style.height = height + 'px';
      }

      const delay = parseFloat(params.get('delay')) || 0;
      if (delay > 0) {
        const stripes = document.querySelector('.stripes');
        const text = document.querySelector('.text');
        stripes.style.animationDelay = delay + 's';
        text.style.animationDelay = (delay + 0.8) + 's';
      }

      const speed = parseFloat(params.get('speed'));
      if (speed) {
        const stripes = document.querySelector('.stripes');
        stripes.style.animationDuration = speed + 's';
        const textDelay = parseFloat(stripes.style.animationDelay || '0') + speed * 0.57;
        document.querySelector('.text').style.animationDelay = textDelay + 's';
      }
    })();
  </script>
</body>
</html>
