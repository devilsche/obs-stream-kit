<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=400, height=152" />
  <title>Animiertes Logo</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      height: 152px;
      overflow: hidden;
      background: transparent;
    }

    .logo-container {
      position: relative;
      width: 400px;
      height: 152px;
    }

    .stripes {
      position: absolute;
      inset: 0;
      background: url('../assets/Chrome_Streifen.png') no-repeat center center;
      background-size: contain;
      filter: hue-rotate(320deg) saturate(1.8) brightness(0.8);
      clip-path: polygon(0 100%, 0 0, 0 0, 0 100%);
    }

    /* Text bleibt IMMER sichtbar */
    .text {
      position: absolute;
      inset: 0;
      background: url('../assets/Chrome_Text.png') no-repeat center center;
      background-size: contain;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <div class="stripes"></div>
    <div class="text"></div>
  </div>

  <script>
    /*
      Logo-Animation Loop:
      1. Streifen bauen sich diagonal auf (passend zum Streifen-Winkel)
      2. Komplett sichtbar (2s Pause)
      3. Streifen lösen sich diagonal auf
      4. 10s Pause (Text bleibt immer sichtbar!)
      5. → Loop

      URL-Parameter:
        ?width=400   — Logo-Breite in px (default: 400)
        ?pause=10    — Pause zwischen Loops in Sekunden (default: 10)
        ?speed=200   — ms pro Streifen-Step (default: 200)
    */
    (function() {
      const params = new URLSearchParams(window.location.search);
      const STEP_MS = parseInt(params.get('speed'), 10) || 200;
      const PAUSE_S = parseFloat(params.get('pause')) || 10;

      const width = parseInt(params.get('width'), 10);
      if (width && width !== 400) {
        const ratio = 152 / 400;
        const height = Math.round(width * ratio);
        document.body.style.width = width + 'px';
        document.body.style.height = height + 'px';
        const c = document.querySelector('.logo-container');
        c.style.width = width + 'px';
        c.style.height = height + 'px';
      }

      const stripes = document.querySelector('.stripes');

      /*
        Die Streifen sind diagonal (~65°).
        clip-path schneidet mit diagonaler Kante, passend zum Winkel.

        Aufbau: Rechte Kante ist diagonal (oben weiter rechts als unten).
        polygon(links-unten, links-oben, rechts-oben, rechts-unten)
        → polygon(0 100%, 0 0, topRight 0, bottomRight 100%)

        Abbau: Linke Kante ist diagonal (oben weiter rechts als unten).
        → polygon(bottomLeft 100%, topLeft 0, 100% 0, 100% 100%)
      */

      // Aufbau: von links nach rechts, diagonale rechte Kante
      // Streifen sind steil (~75°), Offset Top→Bottom ca. 18%
      // Jeder Step: [topRight%, bottomRight%]
      const revealEdges = [
        [0,   0  ],  // unsichtbar
        [22,  4  ],  // Streifen 1
        [34,  16 ],  // + Streifen 2
        [47,  29 ],  // + Streifen 3
        [59,  41 ],  // + Streifen 4
        [72,  54 ],  // + Streifen 5
        [84,  66 ],  // + Streifen 6
        [100, 100],  // alle da
      ];

      // Abbau: von links verschwindend, diagonale linke Kante
      // Jeder Step: [topLeft%, bottomLeft%]
      const hideEdges = [
        [0,   0  ],  // alle da
        [22,  4  ],  // Streifen 1 weg
        [34,  16 ],  // + Streifen 2 weg
        [47,  29 ],  // + Streifen 3 weg
        [59,  41 ],  // + Streifen 4 weg
        [72,  54 ],  // + Streifen 5 weg
        [84,  66 ],  // + Streifen 6 weg
        [100, 100],  // alles weg
      ];

      function setReveal(step) {
        const [tr, br] = revealEdges[step];
        stripes.style.clipPath =
          `polygon(0 100%, 0 0, ${tr}% 0, ${br}% 100%)`;
      }

      function setHide(step) {
        const [tl, bl] = hideEdges[step];
        stripes.style.clipPath =
          `polygon(${bl}% 100%, ${tl}% 0, 100% 0, 100% 100%)`;
      }

      function animateReveal(onDone) {
        let i = 0;
        function next() {
          if (i >= revealEdges.length) { onDone(); return; }
          setReveal(i);
          i++;
          setTimeout(next, STEP_MS);
        }
        next();
      }

      function animateHide(onDone) {
        let i = 0;
        function next() {
          if (i >= hideEdges.length) { onDone(); return; }
          setHide(i);
          i++;
          setTimeout(next, STEP_MS);
        }
        next();
      }

      function runLoop() {
        // Phase 1: Streifen diagonal aufbauen
        animateReveal(() => {
          // Phase 2: Komplett sichtbar, 2s Pause
          setTimeout(() => {
            // Phase 3: Streifen diagonal abbauen
            animateHide(() => {
              // Phase 4: Pause, dann Loop
              setTimeout(runLoop, PAUSE_S * 1000);
            });
          }, 2000);
        });
      }

      runLoop();
    })();
  </script>
</body>
</html>
