<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Welcome</title>
  <style>
    :root {
      --c-gold: var(--theme-accent, #f2b705);
      --c-primary: var(--theme-primary, #5e2a79);
      --c-accent2: var(--theme-accent-2, #c9a0dc);
      --c-bg: var(--theme-bg, #0a0510);
      --c-surface: var(--theme-surface, #1f1430);
      --c-text:     var(--theme-text,     #ffffff);
      --c-muted:    var(--theme-text-dim, #888888);
    }

    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: var(--theme-font-body, 'DM Sans', sans-serif);
    }

    .content {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .widget-box {
      position: relative;
      background: linear-gradient(135deg,
        color-mix(in srgb, var(--c-bg) 92%, transparent) 0%,
        color-mix(in srgb, var(--c-surface) 92%, transparent) 100%
      );
      border: 1px solid color-mix(in srgb,var(--c-primary) 35%,transparent);
      border-radius: 12px;
      padding: 18px 44px 20px;
      text-align: center;
      max-width: 560px;
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.55),
        0 0 18px color-mix(in srgb,var(--c-primary) 30%,transparent);
    }

    .kicker {
      font-size: 16px;
      font-weight: 700;
      color: var(--c-gold);
      letter-spacing: 6px;
      text-transform: uppercase;
      text-shadow:
        0 0 10px color-mix(in srgb,var(--c-gold) 80%,transparent),
        0 0 20px color-mix(in srgb,var(--c-gold) 40%,transparent);
      margin-bottom: 6px;
    }

    .name {
      font-size: 44px;
      font-weight: 900;
      color: var(--c-text);
      line-height: 1;
      max-width: 520px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .divider {
      width: 120px;
      height: 2px;
      margin: 8px auto 0;
      background: linear-gradient(90deg, transparent, var(--c-gold), transparent);
    }

    .badge {
      position: absolute;
      top: -10px;
      right: -10px;
      z-index: 3;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--c-text);
      padding: 4px 10px;
      border: 1px solid var(--c-accent2);
      border-radius: 4px;
      background: var(--c-primary);
      transform: rotate(-8deg);
      text-shadow: 0 0 6px color-mix(in srgb,var(--c-primary) 80%,transparent);
      box-shadow: 0 0 12px color-mix(in srgb,var(--c-primary) 60%,transparent);
      text-transform: uppercase;
    }

    @keyframes burstParticle {
      0%   { transform: translate(-50%, -50%) translate(0, 0) scale(0) rotate(0deg); opacity: 0; }
      10%  { transform: translate(-50%, -50%) translate(calc(var(--tx) * 0.35), calc(var(--ty) * 0.35)) scale(1.2) rotate(calc(var(--rot) * 0.35)); opacity: 1; }
      60%  { transform: translate(-50%, -50%) translate(calc(var(--tx) * 0.75), calc(var(--ty) * 0.75 + 40px)) scale(1) rotate(calc(var(--rot) * 0.75)); opacity: 1; }
      100% { transform: translate(-50%, -50%) translate(var(--tx), calc(var(--ty) + 120px)) scale(0.9) rotate(var(--rot)); opacity: 0; }
    }

    .burst-particle {
      position: absolute;
      top: 50%;
      left: 50%;
      animation: burstParticle 1.8s cubic-bezier(0.2, 0.9, 0.25, 1) forwards;
    }
    .burst-particle.circle { border-radius: 50%; }
    .burst-particle.rect   { border-radius: 2px; }

    .fx-layer { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .fx-layer.sparkle { z-index: 4; }
    .fx-layer.burst   { z-index: 1; }
  </style>
  <link rel="stylesheet" href="../widgets/_theme.css">
  <link rel="stylesheet" href="../widgets/_blocks.css">
</head>
<body>

  <div id="sparkle-container" class="fx-layer sparkle"></div>

  <div id="burst-container" class="fx-layer burst"></div>

  <div class="content t-flyin">
    <div class="widget-box">
      <div class="badge">First Time</div>
      <div class="kicker">&#10022; Welcome &#10022;</div>
      <div class="name" id="name">NewViewer42</div>
      <div class="divider"></div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';
      var params = new URLSearchParams(window.location.search);
      var name = params.get('name') || 'NewViewer42';
      document.getElementById('name').textContent = name;
    })();
  </script>

  <script src="../js/sparkles.js"></script>
  <script>
    (function () {
      'use strict';
      new SparkleEngine(document.getElementById('sparkle-container'), {
        count: 48,
        speed: 0.5,
        maxOpacity: 1.0,
        colors: { gold: 0.4, purple: 0.4, white: 0.2 },
        sizeWeights: { big: 0.3, normal: 0.4, small: 0.2, tiny: 0.1 }
      }).start();

      /* ── Konfetti-Kanone (einmaliger Boom-Burst beim Laden) ─── */
      var BURST_COUNT = 70;
      var CANVAS_W = 1920;
      var CANVAS_H = 1080;
      var EDGE_MARGIN = 40;
      var BURST_COLORS = [
        'var(--c-gold)', '#ffd84d', '#ffb800',       // Gold-Varianten
        'var(--c-primary)', 'var(--c-accent2)', 'color-mix(in srgb,var(--c-primary) 70%,#fff)',       // Lila-Varianten
        '#ff6b9d', '#ffa5c4',                   // Pink-Varianten
        '#4ea9ff', '#a8e4ff',                   // Blau-Highlight
        '#ffffff', '#ffffff'
      ];

      var burstContainer = document.getElementById('burst-container');
      var centerX = CANVAS_W / 2;
      var centerY = CANVAS_H / 2;
      var maxDistX = centerX - EDGE_MARGIN;
      var maxDistY = (CANVAS_H - centerY) - EDGE_MARGIN;

      for (var i = 0; i < BURST_COUNT; i++) {
        var angle = Math.random() * Math.PI * 2;
        // Starker, breiter Ausbruch mit variabler Reichweite
        var desired = 300 + Math.random() * 350;
        var cosA = Math.abs(Math.cos(angle));
        var sinA = Math.abs(Math.sin(angle));
        var capX = cosA > 0.001 ? maxDistX / cosA : Infinity;
        var capY = sinA > 0.001 ? maxDistY / sinA : Infinity;
        var dist = Math.min(desired, capX, capY);
        var tx = Math.cos(angle) * dist;
        var ty = Math.sin(angle) * dist;

        // Mix aus groesseren Formen (Konfetti-Stil)
        var shape = Math.random() < 0.5 ? 'rect' : 'circle';
        var w, h;
        if (shape === 'rect') {
          w = 10 + Math.random() * 10;
          h = 18 + Math.random() * 14;
        } else {
          var s = 14 + Math.random() * 12;
          w = h = s;
        }

        var color = BURST_COLORS[Math.floor(Math.random() * BURST_COLORS.length)];
        var delay = Math.random() * 0.18;
        var rot = (Math.random() * 1080 - 540) + 'deg';  // viel Rotation

        var el = document.createElement('div');
        el.className = 'burst-particle ' + shape;
        el.style.cssText =
          'width:' + w + 'px;' +
          'height:' + h + 'px;' +
          'background:' + color + ';' +
          'box-shadow:0 0 ' + Math.max(w, h) + 'px ' + color + ';' +
          '--tx:' + tx.toFixed(1) + 'px;' +
          '--ty:' + ty.toFixed(1) + 'px;' +
          '--rot:' + rot + ';' +
          'animation-delay:' + delay.toFixed(2) + 's;';
        burstContainer.appendChild(el);
      }
    })();
  </script>

</body>
</html>
