<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Bits Alert</title>
  <!-- Theme-Fundament: Tokens (--theme-*) + Alias. data-theme kommt server-
       injiziert aufs <html> (sonst Entry-Default). -->
  <link rel="stylesheet" href="../widgets/_theme.css">
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Alias auf die Theme-Tokens — Fallback = bisheriger Entry-Look. */
    :root {
      --color-gold:        var(--theme-accent, #f2b705);
      --color-bg-dark:     color-mix(in srgb, var(--theme-primary, #0d0d1a) 85%, #000);
      --color-bg-purple:   var(--theme-surface, #1a0d2e);
      --color-purple-glow: var(--theme-primary, #5e2a79);
      --color-text:        var(--theme-text, #ffffff);
      --color-text-muted:  var(--theme-text-dim, #cccccc);
    }

    /* ─── Side accent lines (leave corners free) ─────────────────── */
    .side-line {
      position: absolute;
      background: var(--color-bg-purple);
    }
    .side-t, .side-b {
      height: 2px;
      left:  max(20px, var(--theme-radius, 0px));
      right: max(20px, var(--theme-radius, 0px));
    }
    .side-l, .side-r {
      width: 2px;
      top:    max(20px, var(--theme-radius, 0px));
      bottom: max(20px, var(--theme-radius, 0px));
    }
    .side-t { top: -2px; }
    .side-b { bottom: -2px; }
    .side-l { left: -2px; }
    .side-r { right: -2px; }

    /* ─── Content ────────────────────────────────────────────────── */

    .event-type {
      font-size: 13px;
      color: var(--color-gold);
      font-family: var(--theme-font-display, 'DM Sans', sans-serif);
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 12px color-mix(in srgb, var(--color-gold) 70%, transparent);
      margin-bottom: 12px;
    }

    .username {
      font-size: 36px;
      font-weight: 900;
      font-family: var(--theme-font-display, 'DM Sans', sans-serif);
      color: var(--color-purple-light);
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeIn 0.4s ease 0.3s forwards;
    }

    .divider {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--color-gold), transparent);
      margin: 0 auto 16px;
    }

    .alert-message {
      font-size: 16px;
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="alert-box pulsing">
      <!-- corner accents -->
      <span class="side-line side-t"></span>
      <span class="side-line side-b"></span>
      <span class="side-line side-l"></span>
      <span class="side-line side-r"></span>

      <div class="event-type"></div>
      <div class="username"></div>
      <div class="divider"></div>
      <div class="alert-message"></div>
    </div>
  </div>

  <script>
    const params   = new URLSearchParams(window.location.search);
    const username = params.get('username') || 'Viewer';
    const amount   = params.get('amount')   || '100';
    const message  = params.get('message')  || amount + ' Bits! Mega!';

    document.querySelector('.event-type').textContent    = 'Bits \u2014 ' + amount;
    document.querySelector('.username').textContent      = username;
    document.querySelector('.alert-message').textContent = message;
  </script>

</body>
</html>
