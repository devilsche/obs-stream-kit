<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Follow Alert</title>
  <!-- Theme-Fundament: Tokens (--theme-*) + Alias. data-theme kommt server-
       injiziert aufs <html> (sonst Entry-Default). -->
  <link rel="stylesheet" href="../widgets/_theme.css">
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Alias auf die Theme-Tokens — Fallback = bisheriger Entry-Look. */
    :root {
      --color-gold:        var(--theme-accent, #f2b705);
      --color-bg-dark:     var(--theme-bg, #0d0d1a);
      --color-bg-purple:   var(--theme-surface, #1a0d2e);
      --color-purple-glow: var(--theme-primary, #5e2a79);
      --color-text:        var(--theme-text, #ffffff);
      --color-text-muted:  var(--theme-text-dim, #cccccc);
    }

    /* ─── Keyframes ─────────────────────────────────────────────── */

    @keyframes bounceIn {
      0%   { transform: scale(0);    opacity: 0; }
      60%  { transform: scale(1.05); opacity: 1; }
      80%  { transform: scale(0.95); }
      100% { transform: scale(1);    opacity: 1; }
    }

    @keyframes bounceOut {
      0%   { transform: scale(1); opacity: 1; }
      100% { transform: scale(0); opacity: 0; }
    }

    @keyframes glowPulse {
      0%, 100% {
        box-shadow:
          0 0 40px color-mix(in srgb, var(--color-gold) 20%, transparent),
          0 0 80px color-mix(in srgb, var(--color-purple-glow) 15%, transparent);
      }
      50% {
        box-shadow:
          0 0 60px color-mix(in srgb, var(--color-gold) 45%, transparent),
          0 0 120px color-mix(in srgb, var(--color-purple-glow) 35%, transparent);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ─── Base ───────────────────────────────────────────────────── */

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: var(--theme-font-body, 'DM Sans', sans-serif);
    }

    /* ─── Wrapper ────────────────────────────────────────────────── */

    .wrapper {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── Alert Box ──────────────────────────────────────────────── */

    .alert-box {
      position: relative;
      background: linear-gradient(135deg,
        color-mix(in srgb, var(--color-bg-dark) 95%, transparent),
        color-mix(in srgb, var(--color-bg-purple) 95%, transparent));
      border: 2px solid var(--color-gold);
      border-radius: var(--theme-radius, 14px);
      padding: 32px 48px;
      max-width: 50%;
      text-align: center;

      animation:
        bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both,
        bounceOut 0.4s ease-in 4s both;
    }

    .alert-box.pulsing {
      animation:
        bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both,
        glowPulse 2s ease-in-out 0.6s infinite,
        bounceOut 0.4s ease-in 4s both;
    }

    /* ─── Inner radial glow (::before) ──────────────────────────── */

    .alert-box::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--theme-radius, 12px);
      background: radial-gradient(ellipse at center, color-mix(in srgb, var(--color-gold) 8%, transparent) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ─── Gold corner accents ────────────────────────────────────── */

    .alert-box::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--theme-radius, 14px);
      pointer-events: none;
    }

    .corner {
      position: absolute;
      background: var(--color-gold);
    }

    /* top-left */
    .corner-tl-h { top: -2px;  left: -2px;  width: 20px; height: 2px; }
    .corner-tl-v { top: -2px;  left: -2px;  width: 2px;  height: 20px; }

    /* top-right */
    .corner-tr-h { top: -2px;  right: -2px; width: 20px; height: 2px; }
    .corner-tr-v { top: -2px;  right: -2px; width: 2px;  height: 20px; }

    /* bottom-left */
    .corner-bl-h { bottom: -2px; left: -2px;  width: 20px; height: 2px; }
    .corner-bl-v { bottom: -2px; left: -2px;  width: 2px;  height: 20px; }

    /* bottom-right */
    .corner-br-h { bottom: -2px; right: -2px; width: 20px; height: 2px; }
    .corner-br-v { bottom: -2px; right: -2px; width: 2px;  height: 20px; }

    /* ─── Content ────────────────────────────────────────────────── */

    .event-type {
      font-size: 13px;
      color: var(--color-gold);
      font-family: var(--theme-font-display, 'DM Sans', sans-serif);
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 12px color-mix(in srgb, var(--color-gold) 70%, transparent);
      margin-bottom: 12px;
    }

    .username {
      font-size: 36px;
      font-weight: 900;
      font-family: var(--theme-font-display, 'DM Sans', sans-serif);
      color: var(--color-text);
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeIn 0.4s ease 0.3s forwards;
    }

    .divider {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--color-gold), transparent);
      margin: 0 auto 16px;
    }

    .alert-message {
      font-size: 16px;
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="alert-box pulsing">
      <!-- corner accents -->
            <span class="side-line side-t"></span>
      <span class="side-line side-b"></span>
      <span class="side-line side-l"></span>
      <span class="side-line side-r"></span>

      <div class="event-type">New Follower</div>
      <div class="username"></div>
      <div class="divider"></div>
      <div class="alert-message"></div>
    </div>
  </div>

  <script>
    const params   = new URLSearchParams(window.location.search);
    const username = params.get('username') || 'Viewer';
    const message  = params.get('message')  || 'Welcome to the stream!';

    document.querySelector('.username').textContent      = username;
    document.querySelector('.alert-message').textContent = message;
  </script>

</body>
</html>
