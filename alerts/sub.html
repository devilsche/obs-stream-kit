<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Sub Alert</title>
  <!-- Theme-Fundament: Tokens (--theme-*) + Alias. data-theme kommt server-
       injiziert aufs <html> (sonst Entry-Default). -->
  <link rel="stylesheet" href="../widgets/_theme.css">
  <link rel="stylesheet" href="../widgets/_blocks.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Alias auf die Theme-Tokens — Fallback = bisheriger Entry-Look. */
    :root {
      --color-accent:      var(--theme-accent-2, #c9a0dc);
      --color-gold:        var(--theme-accent, #f2b705);
      --color-bg-dark:     var(--theme-bg, #0d0d1a);
      --color-bg-purple:   var(--theme-surface, #1a0d2e);
      --color-purple-glow: var(--theme-primary, #5e2a79);
      --color-text:        var(--theme-text, #ffffff);
      --color-text-muted:  var(--theme-text-dim, #cccccc);
    }

    /* ─── Side accent lines (leave corners free) ─────────────────── */
    .side-line {
      position: absolute;
      background: var(--color-bg-purple);
    }
    .side-t, .side-b {
      height: 2px;
      left:  max(20px, var(--theme-radius, 0px));
      right: max(20px, var(--theme-radius, 0px));
    }
    .side-l, .side-r {
      width: 2px;
      top:    max(20px, var(--theme-radius, 0px));
      bottom: max(20px, var(--theme-radius, 0px));
    }
    .side-t { top: -2px; }
    .side-b { bottom: -2px; }
    .side-l { left: -2px; }
    .side-r { right: -2px; }

    /* ─── Content ────────────────────────────────────────────────── */

    .event-type {
      font-size: 13px;
      color: var(--color-accent);
      font-family: var(--theme-font-display, 'DM Sans', sans-serif);
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 12px color-mix(in srgb, var(--color-accent) 70%, transparent);
      margin-bottom: 12px;
    }

    .tier-badge {
      display: inline-block;
      font-size: 18px;
      font-weight: 900;
      font-family: var(--theme-font-display, 'DM Sans', sans-serif);
      letter-spacing: 3px;
      padding: 8px 24px;
      border-radius: var(--theme-radius, 24px);
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .tier-badge--1 {
      background: color-mix(in srgb, var(--color-purple-glow) 60%, transparent);
      border: 2px solid var(--color-accent);
      color: var(--color-accent);
      text-shadow: 0 0 10px color-mix(in srgb, var(--color-accent) 80%, transparent);
    }
    .tier-badge--2 {
      background: color-mix(in srgb, var(--color-purple-glow) 70%, transparent);
      border: 2px solid color-mix(in srgb, var(--color-accent) 70%, white);
      color: var(--color-accent);
      text-shadow: 0 0 12px color-mix(in srgb, var(--color-accent) 90%, transparent);
    }
    .tier-badge--3 {
      background: linear-gradient(135deg,
        color-mix(in srgb, var(--color-gold) 30%, transparent),
        color-mix(in srgb, var(--color-purple-glow) 40%, transparent));
      border: 2px solid var(--color-gold);
      color: var(--color-gold);
      text-shadow: 0 0 14px color-mix(in srgb, var(--color-gold) 80%, transparent);
    }

    .username {
      font-size: 36px;
      font-weight: 900;
      font-family: var(--theme-font-display, 'DM Sans', sans-serif);
      color: var(--color-accent);
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeIn 0.4s ease 0.3s forwards;
    }
    .username .pubg-hot { color: var(--color-accent) !important; }

    .divider {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--color-accent), transparent);
      margin: 0 auto 16px;
    }

    .alert-message {
      font-size: 16px;
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="alert-box pulsing">
      <!-- corner accents -->
      <span class="side-line side-t"></span>
      <span class="side-line side-b"></span>
      <span class="side-line side-l"></span>
      <span class="side-line side-r"></span>

      <div class="event-type">New Sub</div>
      <div class="tier-badge" id="tierBadge"></div>
      <div class="username"></div>
      <div class="divider"></div>
      <div class="alert-message"></div>
    </div>
  </div>

  <script>
    var params   = new URLSearchParams(window.location.search);
    var username = params.get('username') || 'Viewer';
    var message  = params.get('message')  || 'Thanks for the sub!';
    var tier     = params.get('tier') || '1';

    document.querySelector('.alert-message').textContent = message;

    // Tier normalisieren: "1000"→"1", " 3"→"3", "Tier 2"→"2", "Prime"→"prime"
    var rawTier = tier.trim().toLowerCase().replace('tier', '').trim();
    if (rawTier === '1000') rawTier = '1';
    if (rawTier === '2000') rawTier = '2';
    if (rawTier === '3000') rawTier = '3';
    var tierNum = rawTier === 'prime' ? 'prime' : rawTier;

    var badge = document.getElementById('tierBadge');
    var tierNames = { '1': 'Tier 1', '2': 'Tier 2', '3': 'Tier 3', 'prime': 'Prime' };
    badge.textContent = tierNames[tierNum] || 'Tier ' + tierNum;
    badge.className = 'tier-badge tier-badge--' + (tierNum === 'prime' ? '1' : tierNum);

    // Username: Tier 1/Prime = plain, Tier 2 = t-hot--2, Tier 3 = t-hot--3
    var hotLevel = (tierNum === '3') ? 3 : (tierNum === '2') ? 2 : 0;
    var nameEl = document.querySelector('.username');
    if (hotLevel > 0) {
      var mark = '<span class="t-hot-mark t-hot-mark--after" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></span>';
      nameEl.innerHTML = '<span class="t-hot t-hot--' + hotLevel + '"><span class="pubg-hot">' + username + '</span>' + mark + '</span>';
    } else {
      nameEl.textContent = username;
    }
  </script>

</body>
</html>
