<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Raid Alert</title>
  <link rel="stylesheet" href="../widgets/_theme.css">
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Alias auf die Theme-Tokens — Fallback = bisheriger Entry-Look. */
    :root {
      --color-bg-purple: var(--theme-surface, #1a0d2e);
      --alert-out: 6s;
      --color-gold:          var(--theme-accent, #f2b705);
      --color-purple-glow:   var(--theme-primary, #5e2a79);
      --color-bg-dark:       var(--theme-bg, #0d0d1a);
      --color-text:          var(--theme-text, #ffffff);
      --color-purple:        var(--theme-primary, #5e2a79);
      --color-purple-bright: color-mix(in srgb, var(--theme-primary, #5e2a79) 80%, #fff);
    }

    .hiding { animation: contentOut 0.6s ease-in forwards !important; }

    /* ─── Keyframes ─────────────────────────────────────────────── */

    @keyframes flashFade {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes bgFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes bgFadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    @keyframes contentIn {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.85); }
      to   { opacity: 1; transform: translate(-50%, -50%) scale(1);    }
    }

    @keyframes contentOut {
      from { opacity: 1; transform: translate(-50%, -50%) scale(1);    }
      to   { opacity: 0; transform: translate(-50%, -50%) scale(0.9);  }
    }

    @keyframes particleExplode {
      0%   { transform: translate(-50%, -50%) translate(0, 0) scale(0); opacity: 1; }
      60%  { opacity: 1; }
      100% { transform: translate(-50%, -50%) translate(var(--tx), var(--ty)) scale(1); opacity: 0; }
    }

    @keyframes lineFade {
      0%   { opacity: 0; transform: translate(-50%, -50%) rotate(var(--rot)) scaleX(0); }
      20%  { opacity: 0.8; transform: translate(-50%, -50%) rotate(var(--rot)) scaleX(1); }
      70%  { opacity: 0.5; }
      100% { opacity: 0; transform: translate(-50%, -50%) rotate(var(--rot)) scaleX(1); }
    }

    /* ─── Base ───────────────────────────────────────────────────── */

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: var(--theme-font-body, 'DM Sans', sans-serif);
    }

    /* ─── Flash overlay ──────────────────────────────────────────── */

    .flash {
      position: absolute;
      inset: 0;
      background: color-mix(in srgb, var(--color-gold) 30%, transparent);
      z-index: 10;
      animation: flashFade 0.2s ease-out 0s forwards;
    }

    /* ─── Background ─────────────────────────────────────────────── */

    .bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center,
        color-mix(in srgb, var(--color-purple-glow) 60%, transparent) 0%,
        color-mix(in srgb, var(--color-bg-dark) 95%, transparent) 60%
      );
      z-index: 1;
      opacity: 0;
      animation:
        bgFadeIn 0.4s ease-out 0.2s forwards,
        bgFadeOut 1s ease-in 4s forwards;
    }

    /* ─── Explosion lines ────────────────────────────────────────── */

    .line {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg,
        transparent 0%,
        color-mix(in srgb, var(--color-gold) 60%, transparent) 40%,
        color-mix(in srgb, var(--color-gold) 90%, transparent) 50%,
        color-mix(in srgb, var(--color-gold) 60%, transparent) 60%,
        transparent 100%
      );
      transform-origin: center center;
      z-index: 3;
      opacity: 0;
      animation: lineFade 1.2s ease-out 0.3s forwards;
    }

    .line-1 { --rot: 15deg; }
    .line-2 { --rot: -20deg; }
    .line-3 { --rot: 60deg; }

    /* ─── Particles ──────────────────────────────────────────────── */

    .particle {
      position: absolute;
      top: 50%;
      left: 50%;
      border-radius: var(--theme-radius, 50%);
      z-index: 4;
      animation: particleExplode var(--dur, 1.2s) ease-out var(--delay, 0.3s) forwards;
    }


    /* ─── Side accent lines (leave corners free) ─────────────────── */
    .side-line {
      position: absolute;
      background: var(--color-bg-purple);
    }
    .side-t, .side-b {
      height: 2px;
      left:  max(20px, var(--theme-radius, 0px));
      right: max(20px, var(--theme-radius, 0px));
    }
    .side-l, .side-r {
      width: 2px;
      top:    max(20px, var(--theme-radius, 0px));
      bottom: max(20px, var(--theme-radius, 0px));
    }
    .side-t { top: -2px; }
    .side-b { bottom: -2px; }
    .side-l { left: -2px; }
    .side-r { right: -2px; }

    /* ─── Content ────────────────────────────────────────────────── */

    .content {
      overflow: visible;
      border: 2px solid var(--color-gold);
      border-radius: var(--theme-radius, 0px);
      padding: 32px 48px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 5;
      opacity: 0;
      white-space: nowrap;
      animation:
        contentIn  0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
    }

    .event-type {
      font-size: 18px;
      color: var(--color-gold);
      font-family: var(--theme-font-display, 'DM Sans', sans-serif);
      letter-spacing: 6px;
      text-transform: uppercase;
      text-shadow:
        0 0 12px color-mix(in srgb, var(--color-gold) 90%, transparent),
        0 0 30px color-mix(in srgb, var(--color-gold) 50%, transparent);
      margin-bottom: 18px;
    }

    .username {
      font-size: 56px;
      font-weight: 900;
      font-family: var(--theme-font-display, 'DM Sans', sans-serif);
      color: var(--color-text);
      text-shadow:
        0 0 20px color-mix(in srgb, var(--color-text) 60%, transparent),
        0 0 50px color-mix(in srgb, var(--color-purple-glow) 80%, transparent),
        0 0 80px color-mix(in srgb, var(--color-purple-glow) 40%, transparent);
      margin-bottom: 20px;
    }

    .divider {
      width: 150px;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--color-gold), transparent);
      margin: 0 auto 20px;
    }

    .viewers {
      font-size: 22px;
      color: var(--color-gold);
      font-family: var(--theme-font-display, 'DM Sans', sans-serif);
      text-shadow: 0 0 10px color-mix(in srgb, var(--color-gold) 60%, transparent);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- Flash overlay -->
  <div class="flash"></div>

  <!-- Background -->
  <div class="bg"></div>

  <!-- Explosion lines -->
  <div class="line line-1"></div>
  <div class="line line-2"></div>
  <div class="line line-3"></div>

  <!-- Particles (generated by JS) -->
  <div id="particles"></div>

  <!-- Content -->
  <div class="content">
      <span class="side-line side-t"></span>
      <span class="side-line side-b"></span>
      <span class="side-line side-l"></span>
      <span class="side-line side-r"></span>

    <div class="event-type">Incoming Raid</div>
    <div class="username" id="username"></div>
    <div class="divider"></div>
    <div class="viewers" id="viewers"></div>
  </div>

  <script>
    /* ─── URL params ─────────────────────────────────────────────── */
    const params   = new URLSearchParams(window.location.search);
    var _dur = parseInt(params.get("duration") || "6", 10);
    setTimeout(function(){ var el=document.querySelector(".content"); if(el) el.classList.add("hiding"); }, _dur*1000);
    const username = params.get('username') || 'Raider';
    const viewers  = params.get('viewers')  || '0';

    document.getElementById('username').textContent = username;
    document.getElementById('viewers').textContent  = '+' + viewers + ' Viewer';

    /* ─── Particles ──────────────────────────────────────────────── */
    const container = document.getElementById('particles');
    const COUNT = 25;

    // ~70% gold, ~30% purple for raid — follows the active theme tokens
    const css        = getComputedStyle(document.documentElement);
    const gold       = css.getPropertyValue('--color-gold').trim()          || '#f2b705';
    const purple     = css.getPropertyValue('--color-purple-glow').trim()   || '#5e2a79';
    const purpleSoft = css.getPropertyValue('--color-purple').trim()        || purple;
    const purpleHi   = css.getPropertyValue('--color-purple-bright').trim() || purple;
    const colors = [
      gold, gold, gold, gold, gold,
      gold, gold, gold, gold, gold,
      gold, gold, gold, gold, gold,
      gold, gold, gold,
      purple, purple, purple, purple, purple,
      purpleSoft, purpleHi,
    ];

    for (let i = 0; i < COUNT; i++) {
      const el = document.createElement('div');
      el.className = 'particle';

      const size   = 12 + Math.random() * 4;           // 12–16px
      const angle  = Math.random() * 2 * Math.PI;
      const dist   = 300 + Math.random() * 500;         // explode outward
      const tx     = Math.cos(angle) * dist;
      const ty     = Math.sin(angle) * dist;
      const dur    = 0.9 + Math.random() * 0.6;         // 0.9–1.5s
      const delay  = 0.3 + Math.random() * 0.15;        // 0.3–0.45s
      const color  = colors[i % colors.length];

      el.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        background: ${color};
        box-shadow: 0 0 ${size}px ${color};
        --tx: ${tx}px;
        --ty: ${ty}px;
        --dur: ${dur}s;
        --delay: ${delay}s;
      `;
      container.appendChild(el);
    }
  </script>

</body>
</html>
