<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Donation Alert</title>
  <!-- Theme-Fundament: Tokens (--theme-*) + Alias. data-theme kommt server-
       injiziert aufs <html> (sonst Entry-Default). -->
  <link rel="stylesheet" href="../widgets/_theme.css">
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Alias auf die Theme-Tokens — Fallback = bisheriger Entry-Look. */
    :root {
      --color-gold:        var(--theme-accent, #f2b705);
      --color-gold-light:  var(--theme-accent, #ffd54f);
      --color-bg-dark:     color-mix(in srgb, var(--theme-primary, #0d0d1a) 85%, #000);
      --color-bg-purple:   var(--theme-surface, #1a0d2e);
      --color-purple:      var(--theme-primary, #5e2a79);
      --color-purple-light:var(--theme-accent-2, #c9a0dc);
      --color-text:        var(--theme-text, #ffffff);
      --color-text-muted:  var(--theme-text-dim, #cccccc);
    }

    /* ─── Keyframes ─────────────────────────────────────────────── */

    @keyframes bounceIn {
      0%   { transform: scale(0);    opacity: 0; }
      50%  { transform: scale(1.08); opacity: 1; }
      70%  { transform: scale(0.94); }
      85%  { transform: scale(1.02); }
      100% { transform: scale(1);    opacity: 1; }
    }

    @keyframes bounceOut {
      0%   { transform: scale(1); opacity: 1; }
      100% { transform: scale(0); opacity: 0; }
    }

    @keyframes glowPulse {
      0%, 100% {
        box-shadow:
          0 0 50px color-mix(in srgb, var(--color-gold) 25%, transparent),
          0 0 100px color-mix(in srgb, var(--color-purple) 15%, transparent);
      }
      50% {
        box-shadow:
          0 0 80px color-mix(in srgb, var(--color-gold) 50%, transparent),
          0 0 150px color-mix(in srgb, var(--color-purple) 35%, transparent);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes amountPop {
      0%   { transform: scale(0); opacity: 0; }
      60%  { transform: scale(1.15); opacity: 1; }
      80%  { transform: scale(0.92); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    /* ─── Base ───────────────────────────────────────────────────── */

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: var(--theme-font-body, 'DM Sans', sans-serif);
    }

    /* ─── Wrapper ────────────────────────────────────────────────── */

    .wrapper {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── Alert Box ──────────────────────────────────────────────── */

    .alert-box {
      position: relative;
      background: linear-gradient(135deg,
        color-mix(in srgb, var(--color-bg-dark) 95%, transparent),
        color-mix(in srgb, var(--color-bg-purple) 95%, transparent));
      border: 2px solid color-mix(in srgb, var(--color-gold) 70%, transparent);
      border-radius: var(--theme-radius, 16px);
      padding: 44px 64px;
      max-width: 60%;
      min-width: 500px;
      text-align: center;

      animation:
        bounceIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both,
        glowPulse 2s ease-in-out 0.7s infinite,
        bounceOut 0.4s ease-in 6s both;
    }

    /* ─── Inner radial glow ─────────────────────────────────────── */

    .alert-box::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--theme-radius, 14px);
      background: radial-gradient(ellipse at center, color-mix(in srgb, var(--color-gold) 10%, transparent) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ─── Gold corner accents ────────────────────────────────────── */

    .corner {
      position: absolute;
      background: var(--color-gold);
    }

    .corner-tl-h { top: -2px;    left: -2px;   width: 28px; height: 2px; }
    .corner-tl-v { top: -2px;    left: -2px;   width: 2px;  height: 28px; }
    .corner-tr-h { top: -2px;    right: -2px;  width: 28px; height: 2px; }
    .corner-tr-v { top: -2px;    right: -2px;  width: 2px;  height: 28px; }
    .corner-bl-h { bottom: -2px; left: -2px;   width: 28px; height: 2px; }
    .corner-bl-v { bottom: -2px; left: -2px;   width: 2px;  height: 28px; }
    .corner-br-h { bottom: -2px; right: -2px;  width: 28px; height: 2px; }
    .corner-br-v { bottom: -2px; right: -2px;  width: 2px;  height: 28px; }

    /* ─── Content ────────────────────────────────────────────────── */

    .event-type {
      font-size: 14px;
      color: var(--color-gold);
      font-family: var(--theme-font-display, 'DM Sans', sans-serif);
      letter-spacing: 5px;
      text-transform: uppercase;
      text-shadow: 0 0 14px color-mix(in srgb, var(--color-gold) 70%, transparent);
      margin-bottom: 16px;
    }

    .amount {
      font-size: 56px;
      font-weight: 900;
      font-family: var(--theme-font-display, 'DM Sans', sans-serif);
      color: var(--color-gold);
      margin-bottom: 8px;
      opacity: 0;
      animation: amountPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
      background: linear-gradient(90deg, var(--color-gold) 40%, var(--color-gold-light) 50%, var(--color-gold) 60%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: amountPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards,
                 shimmer 3s linear 1s infinite;
      text-shadow: none;
      filter: drop-shadow(0 0 20px color-mix(in srgb, var(--color-gold) 50%, transparent));
    }

    .username {
      font-size: 28px;
      font-weight: 700;
      font-family: var(--theme-font-display, 'DM Sans', sans-serif);
      color: var(--color-purple-light);
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeIn 0.4s ease 0.5s forwards;
    }

    .divider {
      width: 100px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--color-gold), transparent);
      margin: 0 auto 18px;
      opacity: 0;
      animation: fadeIn 0.3s ease 0.7s forwards;
    }

    .alert-message {
      font-size: 18px;
      color: var(--color-text-muted);
      line-height: 1.5;
      opacity: 0;
      animation: fadeIn 0.4s ease 0.8s forwards;
      max-width: 450px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="alert-box">
      <span class="corner corner-tl-h"></span>
      <span class="corner corner-tl-v"></span>
      <span class="corner corner-tr-h"></span>
      <span class="corner corner-tr-v"></span>
      <span class="corner corner-bl-h"></span>
      <span class="corner corner-bl-v"></span>
      <span class="corner corner-br-h"></span>
      <span class="corner corner-br-v"></span>

      <div class="event-type">Donation</div>
      <div class="amount"></div>
      <div class="username"></div>
      <div class="divider"></div>
      <div class="alert-message"></div>
    </div>
  </div>

  <script>
    var params   = new URLSearchParams(window.location.search);
    var username = params.get('username') || '';
    var realname = params.get('name')     || '';
    var amount   = params.get('amount')   || '1,00 €';
    var message  = params.get('message')  || '';

    // Show "von USERNAME · Realname" or just whichever is set
    var displayLine = username && realname
      ? 'von ' + username + ' · ' + realname
      : 'von ' + (username || realname || 'Anonymous');

    document.querySelector('.amount').textContent = amount;
    document.querySelector('.username').textContent = displayLine;
    document.querySelector('.alert-message').textContent = message || 'Thanks for the support!';
  </script>

</body>
</html>
