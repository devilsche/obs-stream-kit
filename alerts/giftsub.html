<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Gift Sub Alert</title>
  <!-- Theme-Fundament: Tokens (--theme-*) + Alias. data-theme kommt server-
       injiziert aufs <html> (sonst Entry-Default). -->
  <link rel="stylesheet" href="../widgets/_theme.css">
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Alias auf die Theme-Tokens — Fallback = bisheriger Entry-Look. */
    :root {
      --color-gold:         var(--theme-accent, #f2b705);
      --color-purple:       var(--theme-primary, #5e2a79);
      --color-bg-dark:      var(--theme-bg, #0d0d1a);
      --color-text:         var(--theme-text, #ffffff);

      /* Lila-/Purple-Akzente auf Theme-Tokens gemappt (Original-Entry-Werte
         als Fallback hinter den Tokens). */
      --color-accent-2:     var(--theme-accent-2);
      --color-purple-dark:  color-mix(in srgb, var(--theme-primary, #5e2a79) 75%, #000);
      --color-purple-mid:   color-mix(in srgb, var(--theme-primary, #5e2a79) 85%, #fff);
      --color-purple-light: var(--theme-accent-2, #d4b0e8);
      --color-purple-pale:  var(--theme-text, #f0e0f8);
    }

    /* ─── Keyframes ─────────────────────────────────────────────── */

    @keyframes flashFade {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes bgFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes bgFadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    @keyframes contentIn {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.85); }
      to   { opacity: 1; transform: translate(-50%, -50%) scale(1);    }
    }

    @keyframes contentOut {
      from { opacity: 1; transform: translate(-50%, -50%) scale(1);    }
      to   { opacity: 0; transform: translate(-50%, -50%) scale(0.9);  }
    }

    @keyframes particleExplode {
      0%   { transform: translate(-50%, -50%) translate(0, 0) scale(0); opacity: 1; }
      60%  { opacity: 1; }
      100% { transform: translate(-50%, -50%) translate(var(--tx), var(--ty)) scale(1); opacity: 0; }
    }

    @keyframes lineFade {
      0%   { opacity: 0; transform: translate(-50%, -50%) rotate(var(--rot)) scaleX(0); }
      20%  { opacity: 0.8; transform: translate(-50%, -50%) rotate(var(--rot)) scaleX(1); }
      70%  { opacity: 0.5; }
      100% { opacity: 0; transform: translate(-50%, -50%) rotate(var(--rot)) scaleX(1); }
    }

    /* ─── Base ───────────────────────────────────────────────────── */

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: var(--theme-font-body, 'DM Sans', sans-serif);
    }

    /* ─── Flash overlay ──────────────────────────────────────────── */

    .flash {
      position: absolute;
      inset: 0;
      background: color-mix(in srgb, var(--color-purple) 30%, transparent);
      z-index: 10;
      animation: flashFade 0.2s ease-out 0s forwards;
    }

    /* ─── Background ─────────────────────────────────────────────── */

    .bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center,
        color-mix(in srgb, var(--color-purple) 70%, transparent) 0%,
        color-mix(in srgb, var(--color-bg-dark) 95%, transparent) 60%
      );
      z-index: 1;
      opacity: 0;
      animation:
        bgFadeIn 0.4s ease-out 0.2s forwards,
        bgFadeOut 1s ease-in 4s forwards;
    }

    /* ─── Explosion lines ────────────────────────────────────────── */

    .line {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg,
        transparent 0%,
        color-mix(in srgb, var(--color-purple) 60%, transparent) 40%,
        color-mix(in srgb, var(--color-purple-mid) 90%, transparent) 50%,
        color-mix(in srgb, var(--color-purple) 60%, transparent) 60%,
        transparent 100%
      );
      transform-origin: center center;
      z-index: 3;
      opacity: 0;
      animation: lineFade 1.2s ease-out 0.3s forwards;
    }

    .line-1 { --rot: 15deg; }
    .line-2 { --rot: -20deg; }
    .line-3 { --rot: 60deg; }

    /* ─── Particles ──────────────────────────────────────────────── */

    .particle {
      position: absolute;
      top: 50%;
      left: 50%;
      border-radius: 50%;
      z-index: 4;
      animation: particleExplode var(--dur, 1.2s) ease-out var(--delay, 0.3s) forwards;
    }

    /* ─── Content ────────────────────────────────────────────────── */

    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 5;
      opacity: 0;
      white-space: nowrap;
      animation:
        contentIn  0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards,
        contentOut 1s ease-in 4s forwards;
    }

    .event-type {
      font-size: 18px;
      color: var(--color-text);
      font-family: var(--theme-font-display, 'DM Sans', sans-serif);
      letter-spacing: 6px;
      text-transform: uppercase;
      text-shadow:
        0 0 14px color-mix(in srgb, var(--color-purple-light) 100%, transparent),
        0 0 32px color-mix(in srgb, var(--color-purple-mid) 85%, transparent),
        2px 2px 0 rgba(0, 0, 0, 0.6);
      margin-bottom: 14px;
    }

    .tier-badge {
      display: inline-block;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 3px;
      padding: 8px 24px;
      border-radius: 24px;
      margin-bottom: 18px;
      text-transform: uppercase;
    }
    .tier-badge--1 {
      background: color-mix(in srgb, var(--color-purple) 60%, transparent);
      border: 2px solid var(--color-accent-2);
      color: var(--color-text);
      text-shadow: 0 0 10px color-mix(in srgb, var(--color-accent-2) 80%, transparent);
    }
    .tier-badge--2 {
      background: color-mix(in srgb, var(--color-purple) 70%, transparent);
      border: 2px solid var(--color-purple-light);
      color: var(--color-purple-pale);
      text-shadow: 0 0 12px color-mix(in srgb, var(--color-accent-2) 90%, transparent);
    }
    .tier-badge--3 {
      background: linear-gradient(135deg,
        color-mix(in srgb, var(--color-gold) 30%, transparent),
        color-mix(in srgb, var(--color-purple) 40%, transparent));
      border: 2px solid var(--color-gold);
      color: var(--color-gold);
      text-shadow: 0 0 14px color-mix(in srgb, var(--color-gold) 80%, transparent);
    }

    .username {
      font-size: 56px;
      font-weight: 900;
      font-family: var(--theme-font-display, 'DM Sans', sans-serif);
      color: var(--color-text);
      text-shadow:
        0 0 20px rgba(255, 255, 255, 0.6),
        0 0 50px color-mix(in srgb, var(--color-purple) 90%, transparent),
        0 0 80px color-mix(in srgb, var(--color-purple-mid) 50%, transparent);
      margin-bottom: 20px;
    }

    .divider {
      width: 150px;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--color-purple-light), transparent);
      margin: 0 auto 20px;
    }

    .amount {
      font-size: 24px;
      font-weight: 700;
      font-family: var(--theme-font-display, 'DM Sans', sans-serif);
      color: var(--color-text);
      text-shadow:
        0 0 12px color-mix(in srgb, var(--color-purple-light) 100%, transparent),
        0 0 28px color-mix(in srgb, var(--color-purple-mid) 85%, transparent),
        2px 2px 0 rgba(0, 0, 0, 0.5);
      letter-spacing: 2px;
    }

    .total {
      font-size: 16px;
      font-weight: 400;
      color: color-mix(in srgb, var(--color-purple-light) 90%, transparent);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 10px;
      text-shadow:
        0 0 10px color-mix(in srgb, var(--color-purple-mid) 80%, transparent),
        1px 1px 0 rgba(0, 0, 0, 0.6);
    }
    body[data-size="large"] .total {
      font-size: 20px;
      color: color-mix(in srgb, var(--color-gold) 95%, transparent);
      text-shadow:
        0 0 12px color-mix(in srgb, var(--color-gold) 90%, transparent),
        2px 2px 0 rgba(0, 0, 0, 0.6);
    }

    /* ── Size-Varianten je nach Gift-Sub-Menge ── */
    /* Medium (5-14 Gifts): Event-Type + Username groesser */
    body[data-size="medium"] .event-type {
      font-size: 24px;
      letter-spacing: 10px;
    }
    body[data-size="medium"] .username { font-size: 68px; }
    body[data-size="medium"] .amount   { font-size: 30px; }

    /* Large / Sub-Bomb (15+ Gifts): alles groesser + goldener Touch */
    body[data-size="large"] .event-type {
      font-size: 32px;
      letter-spacing: 14px;
      color: var(--color-gold);
      text-shadow:
        0 0 16px color-mix(in srgb, var(--color-gold) 100%, #fff 25%),
        0 0 36px color-mix(in srgb, var(--color-gold) 90%, transparent),
        3px 3px 0 rgba(0, 0, 0, 0.7);
    }
    body[data-size="large"] .username {
      font-size: 84px;
      text-shadow:
        0 0 24px rgba(255, 255, 255, 0.8),
        0 0 60px color-mix(in srgb, var(--color-gold) 70%, transparent),
        0 0 100px color-mix(in srgb, var(--color-purple-mid) 70%, transparent);
    }
    body[data-size="large"] .amount {
      font-size: 38px;
      font-weight: 900;
      color: var(--color-gold);
      text-shadow:
        0 0 14px color-mix(in srgb, var(--color-gold) 100%, #fff 25%),
        0 0 32px color-mix(in srgb, var(--color-gold) 85%, transparent),
        3px 3px 0 rgba(0, 0, 0, 0.7);
    }
    body[data-size="large"] .divider {
      background: linear-gradient(90deg, transparent, var(--color-gold), transparent);
      width: 220px;
    }
  </style>
</head>
<body>

  <!-- Flash overlay -->
  <div class="flash"></div>

  <!-- Background -->
  <div class="bg"></div>

  <!-- Explosion lines -->
  <div class="line line-1"></div>
  <div class="line line-2"></div>
  <div class="line line-3"></div>

  <!-- Particles (generated by JS) -->
  <div id="particles"></div>

  <!-- Content -->
  <div class="content">
    <div class="event-type">Gift Subs</div>
    <div class="tier-badge" id="tierBadge"></div>
    <div class="username" id="username"></div>
    <div class="divider"></div>
    <div class="amount" id="amount"></div>
    <div class="total" id="total"></div>
  </div>

  <script>
    /* ─── URL params ─────────────────────────────────────────────── */
    const params   = new URLSearchParams(window.location.search);
    const username = params.get('username') || 'Gifter';
    const amount   = params.get('amount')   || '1';
    const tier     = params.get('tier')     || '1';
    const total    = params.get('total')    || '';

    const amountNum = Math.max(1, parseInt(amount, 10) || 1);

    // Size-Klassifizierung: small (1-4), medium (5-14), large (15+ = Sub-Bomb)
    var size = 'small';
    if (amountNum >= 15) size = 'large';
    else if (amountNum >= 5) size = 'medium';
    document.body.dataset.size = size;

    // Event-Type-Text (nur Label, keine Zahl doppelt)
    var eventTypeEl = document.querySelector('.event-type');
    if (size === 'large') {
      eventTypeEl.textContent = 'SUB BOMB!';
    } else if (size === 'medium') {
      eventTypeEl.textContent = 'Multi Gift!';
    } else {
      eventTypeEl.textContent = amountNum === 1 ? 'Gift Sub' : 'Gift Subs';
    }

    // Amount-Text (hier steht die Zahl)
    var amountText;
    if (amountNum === 1) {
      amountText = 'verschenkt einen Sub!';
    } else if (size === 'large') {
      amountText = amountNum + ' Subs verschenkt! 🎉';
    } else {
      amountText = amountNum + ' Subs verschenkt!';
    }
    document.getElementById('username').textContent = username;
    document.getElementById('amount').textContent   = amountText;

    // Total (kumulativ gesamt gifted) — nur anzeigen wenn sinnvoll gesetzt
    var totalNum = parseInt(total, 10) || 0;
    var totalEl = document.getElementById('total');
    if (totalNum > 0) {
      totalEl.textContent = 'Insgesamt ' + totalNum + ' Subs verschenkt';
    } else {
      totalEl.style.display = 'none';
    }

    // Tier normalisieren: "1000"→"1", " 3"→"3", "Tier 2"→"2", "Prime"→"prime"
    var rawTier = tier.trim().toLowerCase().replace('tier', '').trim();
    if (rawTier === '1000') rawTier = '1';
    if (rawTier === '2000') rawTier = '2';
    if (rawTier === '3000') rawTier = '3';
    var tierNum = rawTier === 'prime' ? 'prime' : rawTier;

    var badge = document.getElementById('tierBadge');
    var tierNames = { '1': 'Tier 1', '2': 'Tier 2', '3': 'Tier 3', 'prime': 'Prime' };
    badge.textContent = tierNames[tierNum] || 'Tier ' + tierNum;
    badge.className = 'tier-badge tier-badge--' + (tierNum === 'prime' ? '1' : tierNum);

    /* ─── Particles ──────────────────────────────────────────────── */
    const container = document.getElementById('particles');
    // Partikel-Menge skaliert mit Gift-Sub-Menge
    const COUNT = size === 'large' ? 70 : size === 'medium' ? 45 : 25;

    // Partikel-Farben aus den :root-Aliassen lesen (die selbst auf die
    // Theme-Tokens zeigen, mit Entry-Werten als Fallback dahinter).
    const _cs = getComputedStyle(document.documentElement);
    const _tok = (name) => _cs.getPropertyValue(name).trim();
    const C_PURPLE      = _tok('--color-purple');
    const C_PURPLE_DARK = _tok('--color-purple-dark');
    const C_PURPLE_MID  = _tok('--color-purple-mid');
    const C_ACCENT_2    = _tok('--color-accent-2');
    const C_GOLD        = _tok('--color-gold');

    // ~70% purple, ~30% gold for giftsub (purple theme — inverted ratio)
    const colors = [
      C_PURPLE, C_PURPLE, C_PURPLE, C_PURPLE, C_PURPLE,
      C_PURPLE, C_PURPLE, C_PURPLE, C_PURPLE, C_PURPLE,
      C_PURPLE_DARK, C_PURPLE_DARK, C_PURPLE_DARK, C_PURPLE_MID, C_PURPLE_MID,
      C_ACCENT_2, C_ACCENT_2,
      C_GOLD, C_GOLD, C_GOLD, C_GOLD, C_GOLD,
      C_GOLD, C_GOLD, C_GOLD,
    ];

    for (let i = 0; i < COUNT; i++) {
      const el = document.createElement('div');
      el.className = 'particle';

      const size   = 12 + Math.random() * 4;           // 12–16px
      const angle  = Math.random() * 2 * Math.PI;
      const dist   = 300 + Math.random() * 500;         // explode outward
      const tx     = Math.cos(angle) * dist;
      const ty     = Math.sin(angle) * dist;
      const dur    = 0.9 + Math.random() * 0.6;         // 0.9–1.5s
      const delay  = 0.3 + Math.random() * 0.15;        // 0.3–0.45s
      const color  = colors[i % colors.length];

      el.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        background: ${color};
        box-shadow: 0 0 ${size}px ${color};
        --tx: ${tx}px;
        --ty: ${ty}px;
        --dur: ${dur}s;
        --delay: ${delay}s;
      `;
      container.appendChild(el);
    }
  </script>

</body>
</html>
