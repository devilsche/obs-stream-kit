  <script>
    (function () {
      var DATA = JSON.parse(document.getElementById('catalog').textContent);
      var main = document.getElementById('main');
      var nav = document.getElementById('catnav');
      var resultCount = document.getElementById('resultCount');
      var TOTAL = 0;

      function slug(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g, '-'); }

      Object.keys(DATA).forEach(function (catName) {
        var groups = DATA[catName];
        var catTotal = 0;
        Object.keys(groups).forEach(function (g) { catTotal += groups[g].length; });
        TOTAL += catTotal;

        var navLi = document.createElement('li');
        var navA = document.createElement('a');
        navA.href = '#sec-' + slug(catName);
        navA.innerHTML = catName + ' <b>' + catTotal + '</b>';
        navLi.appendChild(navA); nav.appendChild(navLi);

        var sec = document.createElement('section');
        sec.className = 'cat-section'; sec.id = 'sec-' + slug(catName);
        sec.setAttribute('aria-labelledby', 'h-' + slug(catName));
        var h2 = document.createElement('h2');
        h2.className = 'cat-h'; h2.id = 'h-' + slug(catName); h2.textContent = catName;
        sec.appendChild(h2);

        var grid = document.createElement('div'); grid.className = 'group-grid';
        Object.keys(groups).forEach(function (groupName) {
          var items = groups[groupName];
          var card = document.createElement('article');
          card.className = 't-card group';
          var head = document.createElement('div'); head.className = 'group-head';
          var h3 = document.createElement('h3'); h3.className = 't-section-label'; h3.textContent = groupName;
          var badge = document.createElement('span'); badge.className = 'count-badge';
          badge.textContent = items.length;
          head.appendChild(h3); head.appendChild(badge); card.appendChild(head);

          var ul = document.createElement('ul'); ul.className = 't-chips';
          items.forEach(function (it) {
            var li = document.createElement('li');
            var chip = document.createElement('span');
            chip.className = 't-chip'; chip.textContent = it.label;
            chip.title = it.id;
            li.dataset.search = (it.label + ' ' + it.id).toLowerCase();
            li.appendChild(chip); ul.appendChild(li);
          });
          card.appendChild(ul); grid.appendChild(card);
        });
        sec.appendChild(grid); main.appendChild(sec);
      });

      document.getElementById('totalCount').textContent = TOTAL;

      var q = document.getElementById('q');
      function applyFilter() {
        var term = q.value.trim().toLowerCase();
        var shown = 0;
        document.querySelectorAll('.cat-section').forEach(function (sec) {
          var secVisible = 0;
          sec.querySelectorAll('.group').forEach(function (card) {
            var groupVisible = 0;
            card.querySelectorAll('li').forEach(function (li) {
              var match = !term || li.dataset.search.indexOf(term) !== -1;
              li.classList.toggle('is-hidden', !match);
              if (match) groupVisible++;
            });
            card.classList.toggle('is-hidden', groupVisible === 0);
            secVisible += groupVisible;
          });
          sec.classList.toggle('is-hidden', secVisible === 0);
          shown += secVisible;
        });
        resultCount.textContent = shown === TOTAL
          ? TOTAL + ' Eintraege'
          : shown + ' von ' + TOTAL;
      }
      q.addEventListener('input', applyFilter);
      applyFilter();
    })();

  </script>
