<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>PUBG Match Replay</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/widgets-static/_theme.css">
  <link rel="stylesheet" href="/widgets-static/pubg/_pubg.css">
  <style>
    html, body { margin: 0; height: 100%; background: var(--theme-bg); color: var(--theme-text);
                 font-family: var(--theme-font-body,"DM Sans",sans-serif); }
    .app { display: grid; grid-template-columns: 300px 1fr;
           grid-template-rows: 1fr auto; height: 100vh; }
    .sidebar { grid-row: 1 / 3; overflow-y: auto; padding: 12px;
               border-right: 1px solid var(--theme-border); }
    .stage { position: relative; overflow: hidden; }
    canvas#map { display: block; width: 100%; height: 100%; }
    .controls { grid-column: 2; display: flex; align-items: center;
                gap: 12px; padding: 10px 16px;
                border-top: 1px solid var(--theme-border); }
    .match-picker { margin-bottom: 14px; }
    .match-picker label { display: block; font-size: 0.8em;
                          color: var(--theme-text-dim); margin-bottom: 4px; }
    select, button { font-family: inherit; background: var(--theme-surface);
                     color: var(--theme-text); border: 1px solid var(--theme-primary);
                     border-radius: var(--theme-radius); padding: 6px 10px; min-height: 24px; }
    button:focus-visible, select:focus-visible, [tabindex]:focus-visible {
      outline: 3px solid var(--theme-accent); outline-offset: 2px; }
    .team { margin-bottom: 6px; border-radius: var(--theme-radius); overflow: hidden; }
    .team-head { display: flex; align-items: center; gap: 8px;
                 padding: 6px 8px; cursor: pointer; min-height: 24px; }
    .team-swatch { width: 14px; height: 14px; border-radius: 3px; flex: none; }
    .team.focused { outline: 2px solid var(--theme-accent); }
    .team-players { padding: 0 8px 6px 30px; font-size: 0.85em; color: var(--theme-text-dim); }
    .team-players .player {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 8px; padding: 1px 0;
    }
    .team-players .player .pname { overflow: hidden; text-overflow: ellipsis;
                                    white-space: nowrap; }
    .team-players .player .pkills {
      color: var(--theme-accent); font-variant-numeric: tabular-nums; font-weight: 700;
      flex-shrink: 0;
    }
    .team-players .player .pkills small { color: var(--theme-text-faint); font-weight: 400;
                                            margin-left: 2px; font-size: 0.85em; }
    .team-players .player.dead .pname,
    .team-players .player.dead .pkills,
    .team-players .player.dead .pkills small {
      color: var(--theme-text-faint); text-decoration: line-through;
      text-decoration-color: color-mix(in srgb,var(--theme-text) 25%,transparent);
    }
    .team-players .player.dead .pkills { color: var(--theme-text-faint); }
    .team.bot-team { opacity: 0.55; }
    .team.bot-team strong { color: var(--theme-text-dim); font-weight: 400; }
    .toggles { margin-top: 16px; display: flex; flex-direction: column; gap: 6px; }
    .toggles label { display: flex; align-items: center; gap: 8px; }
    .timeline { flex: 1; }
    .clock { font-variant-numeric: tabular-nums; min-width: 110px; }
    .tooltip { position: absolute; pointer-events: none;
               background: color-mix(in srgb,var(--theme-bg) 90%,transparent);
               border: 1px solid var(--theme-primary); border-radius: var(--theme-radius);
               padding: 6px 9px; font-size: 0.82em; max-width: 240px; display: none; z-index: 10; }
    .loading { position: absolute; inset: 0; display: none;
               align-items: center; justify-content: center; flex-direction: column;
               gap: 14px; background: color-mix(in srgb,var(--theme-bg) 80%,transparent);
               z-index: 20; color: var(--theme-accent); font-weight: 700; }
    .loading.show { display: flex; }
    .loading .spinner { width: 48px; height: 48px; border-radius: 50%;
               border: 5px solid var(--theme-primary); border-top-color: var(--theme-accent);
               animation: rs-spin 0.8s linear infinite; }
    @keyframes rs-spin { to { transform: rotate(360deg); } }
    .match-count-dim { color: var(--theme-text-faint); }
    @media (prefers-reduced-motion: reduce) {
      .loading .spinner { animation: none; }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar" aria-label="Teams und Steuerung">
      <div class="match-picker">
        <label for="matchSelect">Match auswählen <span id="matchCount" class="match-count-dim"></span></label>
        <input id="matchFilter" type="search" placeholder="Filter: Datum, Map, Platz…"
               aria-label="Match-Liste filtern"
               style="width:100%;box-sizing:border-box;margin-bottom:4px">
        <select id="matchSelect" aria-label="Match auswählen" size="1"></select>
      </div>
      <div id="teamList" aria-label="Teamliste"></div>
      <fieldset class="toggles">
        <legend>Anzeige</legend>
        <label><input type="checkbox" id="tglKills" checked> Kills</label>
        <label><input type="checkbox" id="tglKnocks" checked> Knocks</label>
        <label><input type="checkbox" id="tglStreaks" checked> Bullet Streaks</label>
        <label><input type="checkbox" id="tglZones" checked> Bluezone</label>
        <label><input type="checkbox" id="tglNames" checked> Namen</label>
        <label><input type="checkbox" id="tglGrid"> Raster 8×8 (Kalibrierung)</label>
      </fieldset>
    </aside>
    <section class="stage" aria-label="Karte">
      <canvas id="map"></canvas>
      <div class="tooltip" id="tooltip" role="status"></div>
      <div class="loading" id="loading" role="status" aria-live="polite">
        <div class="spinner" aria-hidden="true"></div>
        <span id="loadingText">Replay wird geladen…</span>
      </div>
    </section>
    <div class="controls">
      <button id="playPause" aria-label="Abspielen/Pause">▶</button>
      <input class="timeline" id="scrubber" type="range" min="0" max="1000"
             value="0" aria-label="Zeitleiste">
      <span class="clock" id="clock">0:00 / 0:00</span>
      <label class="sr-only" for="speedSelect">Geschwindigkeit</label>
      <select id="speedSelect" aria-label="Geschwindigkeit">
        <option value="1" selected>1×</option>
        <option value="2">2×</option>
        <option value="4">4×</option>
        <option value="8">8×</option>
        <option value="16">16×</option>
      </select>
    </div>
  </main>
  <script src="/widgets-static/pubg/_pubg.js"></script>
  <script src="/widgets-static/pubg/_pubg_pois.js"></script>
  <script src="/tools-static/match-replay.js"></script>
</body>
</html>
