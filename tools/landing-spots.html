<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>PUBG Landing Spots</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/widgets-static/_theme.css">
  <link rel="stylesheet" href="/widgets-static/pubg/_pubg.css">
  <style>
    html, body { margin: 0; width: 1920px; height: 1080px;
                 background: var(--theme-bg); color: var(--theme-text);
                 font-family: var(--theme-font-body,"DM Sans",sans-serif); overflow: hidden; }
    .app { display: grid; grid-template-rows: auto 1fr;
           width: 1920px; height: 1080px; }
    .header { display: flex; align-items: center; gap: 16px;
              padding: 12px 18px; border-bottom: 1px solid var(--theme-border); }
    .header label { font-size: 0.8em; color: var(--theme-text-dim); margin-right: 4px; }
    select, input[type="text"], input:not([type]) {
      font-family: inherit; background: var(--theme-surface); color: var(--theme-text);
      border: 1px solid var(--theme-primary); border-radius: var(--theme-radius);
      padding: 6px 10px; min-height: 24px; }
    .pwrap { position: relative; }
    .ac-list { position: absolute; top: 100%; left: 0; right: 0;
               background: var(--theme-surface); border: 1px solid var(--theme-primary); z-index: 20;
               max-height: 220px; overflow-y: auto; display: none; }
    .ac-list [role="option"] { padding: 6px 10px; cursor: pointer; min-height: 24px; }
    .ac-list [role="option"]:hover,
    .ac-list [role="option"][aria-selected="true"] { background: var(--theme-primary); color: var(--theme-on-primary); }
    .body { display: grid; grid-template-columns: 1fr 480px; min-height: 0; }
    .mapwrap { position: relative; }
    canvas { display: block; width: 100%; height: 100%; }
    .players-bar { position: absolute; bottom: 10px; left: 10px;
                   display: flex; gap: 8px; }
    .pchip { display: flex; align-items: center; gap: 6px; padding: 4px 10px;
             border-radius: 14px; background: color-mix(in srgb,var(--theme-surface) 80%,transparent); cursor: pointer;
             border: 1px solid transparent; min-height: 24px; }
    .pchip.active { border-color: var(--theme-accent); }
    .pchip .dot { width: 12px; height: 12px; border-radius: 50%; }
    .poi-list { overflow-y: auto; padding: 12px 16px;
                border-left: 1px solid var(--theme-border); }
    .poi { margin-bottom: 12px; }
    .poi-head { display: flex; justify-content: space-between; font-weight: 700; }
    .bar { height: 6px; background: var(--theme-primary); border-radius: var(--theme-radius); margin: 4px 0; }
    .poi-player { display: flex; justify-content: space-between;
                  font-size: 0.85em; color: var(--theme-text-dim); padding-left: 12px; }
    .route-label { font-size: 0.8em; color: var(--theme-text-dim); white-space: nowrap; }
    .bot-mark { color: var(--theme-text-faint); font-size: 0.85em; font-weight: 400; }
    button:focus-visible, select:focus-visible,
    input:focus-visible, [tabindex]:focus-visible {
      outline: 3px solid var(--theme-accent); outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important;
                                transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <span>
        <label for="mapSelect">Karte</label>
        <select id="mapSelect" aria-label="Karte wählen"></select>
      </span>
      <span class="pwrap">
        <label for="p0">P1</label>
        <input id="p0" type="text" autocomplete="off"
               aria-label="Spieler 1" aria-autocomplete="list"
               aria-controls="ac0" aria-expanded="false">
        <div class="ac-list" id="ac0" role="listbox"
             aria-label="Vorschläge Spieler 1"></div>
      </span>
      <span class="pwrap">
        <label for="p1">P2</label>
        <input id="p1" type="text" autocomplete="off"
               aria-label="Spieler 2" aria-autocomplete="list"
               aria-controls="ac1" aria-expanded="false">
        <div class="ac-list" id="ac1" role="listbox"
             aria-label="Vorschläge Spieler 2"></div>
      </span>
      <span class="pwrap">
        <label for="p2">P3</label>
        <input id="p2" type="text" autocomplete="off"
               aria-label="Spieler 3" aria-autocomplete="list"
               aria-controls="ac2" aria-expanded="false">
        <div class="ac-list" id="ac2" role="listbox"
             aria-label="Vorschläge Spieler 3"></div>
      </span>
      <span class="pwrap">
        <label for="p3">P4</label>
        <input id="p3" type="text" autocomplete="off"
               aria-label="Spieler 4" aria-autocomplete="list"
               aria-controls="ac3" aria-expanded="false">
        <div class="ac-list" id="ac3" role="listbox"
             aria-label="Vorschläge Spieler 4"></div>
      </span>
      <label class="route-label">
        <input type="checkbox" id="routeFilter">
        Flugrouten-Filter (≤1,5&thinsp;km)
      </label>
      <span id="matchCount" aria-live="polite" aria-atomic="true"></span>
    </header>
    <div class="body">
      <div class="mapwrap">
        <canvas id="heat" role="img" aria-label="Landungs-Heatmap"></canvas>
        <div class="players-bar" id="playersBar"
             aria-label="Spieler-Scatter umschalten"></div>
      </div>
      <section class="poi-list" id="poiList" aria-label="POI-Liste"></section>
    </div>
  </main>
  <script src="/widgets-static/pubg/_pubg.js"></script>
  <script src="/tools-static/landing-spots.js"></script>
</body>
</html>
