<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Starting Soon – LuCKoR_HD</title>
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color-purple:       #5e2a79;
      --color-purple-light: #c9a0dc;
      --color-gold:         #f2b705;
      --color-bg-dark:      #0d0d1a;
      --color-bg-purple:    #1a0d2e;
      --color-text:         #ffffff;
      --color-text-muted:   #888888;
    }

    /* ─── Keyframes ─────────────────────────────────────────────── */

    @keyframes fadeInGlow {
      0% {
        opacity: 0;
        text-shadow:
          0 0  0px rgba(94, 42, 121, 0),
          0 0  0px rgba(201, 160, 220, 0);
        letter-spacing: 8px;
      }
      60% {
        opacity: 1;
      }
      100% {
        opacity: 1;
        text-shadow:
          0 0 20px rgba(94, 42, 121, 0.9),
          0 0 50px rgba(201, 160, 220, 0.5),
          0 0 90px rgba(94, 42, 121, 0.3);
        letter-spacing: 12px;
      }
    }

    @keyframes fadeInUp {
      0%   { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%   { opacity: 0.7; }
      50%  { opacity: 1; }
      100% { opacity: 0.7; }
    }

    @keyframes float1 {
      0%   { transform: translateY(0px)   translateX(0px); }
      25%  { transform: translateY(-28px) translateX(12px); }
      50%  { transform: translateY(-14px) translateX(25px); }
      75%  { transform: translateY(-36px) translateX(8px); }
      100% { transform: translateY(0px)   translateX(0px); }
    }
    @keyframes float2 {
      0%   { transform: translateY(0px)   translateX(0px); }
      30%  { transform: translateY(-20px) translateX(-15px); }
      60%  { transform: translateY(-40px) translateX(5px); }
      100% { transform: translateY(0px)   translateX(0px); }
    }
    @keyframes float3 {
      0%   { transform: translateY(0px)   translateX(0px); }
      40%  { transform: translateY(-32px) translateX(18px); }
      70%  { transform: translateY(-18px) translateX(-10px); }
      100% { transform: translateY(0px)   translateX(0px); }
    }
    @keyframes float4 {
      0%   { transform: translateY(0px)   translateX(0px); }
      20%  { transform: translateY(-22px) translateX(-20px); }
      55%  { transform: translateY(-45px) translateX(12px); }
      80%  { transform: translateY(-30px) translateX(-5px); }
      100% { transform: translateY(0px)   translateX(0px); }
    }
    @keyframes float5 {
      0%   { transform: translateY(0px)   translateX(0px); }
      35%  { transform: translateY(-38px) translateX(22px); }
      65%  { transform: translateY(-20px) translateX(-8px); }
      100% { transform: translateY(0px)   translateX(0px); }
    }

    /* ─── Layout ─────────────────────────────────────────────────── */

    body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #0d0d1a 0%, #1a0d2e 50%, #0d0d1a 100%);
      color: var(--color-text);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── Geometric accent lines ─────────────────────────────────── */

    .accent-line {
      position: absolute;
      height: 1px;
      width: 100%;
      pointer-events: none;
    }
    .accent-line--top {
      top: 180px;
      background: linear-gradient(90deg, transparent 0%, var(--color-purple) 30%, var(--color-gold) 50%, var(--color-purple) 70%, transparent 100%);
      opacity: 0.35;
    }
    .accent-line--mid {
      top: 50%;
      transform: translateY(-50%) scaleX(0.6);
      background: linear-gradient(90deg, transparent 0%, var(--color-purple-light) 40%, var(--color-purple-light) 60%, transparent 100%);
      opacity: 0.3;
    }
    .accent-line--bottom-inner {
      bottom: 220px;
      background: linear-gradient(90deg, transparent 0%, var(--color-gold) 35%, var(--color-purple) 65%, transparent 100%);
      opacity: 0.4;
    }

    /* ─── Bottom accent bar ──────────────────────────────────────── */

    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg,
        transparent 5%,
        var(--color-purple) 30%,
        var(--color-gold) 50%,
        var(--color-purple) 70%,
        transparent 95%
      );
    }

    /* ─── Particles ──────────────────────────────────────────────── */

    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    /* Purple particles */
    .particle--p1 {
      width: 8px; height: 8px;
      background: var(--color-purple);
      box-shadow: 0 0 10px 3px rgba(94, 42, 121, 0.7);
      top: 12%; left: 8%;
      animation: float1 18s ease-in-out infinite;
    }
    .particle--p2 {
      width: 6px; height: 6px;
      background: var(--color-purple);
      box-shadow: 0 0 8px 2px rgba(94, 42, 121, 0.6);
      top: 68%; left: 14%;
      animation: float3 22s ease-in-out infinite;
      animation-delay: -4s;
    }
    .particle--p3 {
      width: 10px; height: 10px;
      background: var(--color-purple);
      box-shadow: 0 0 14px 4px rgba(94, 42, 121, 0.65);
      top: 35%; left: 78%;
      animation: float2 26s ease-in-out infinite;
      animation-delay: -8s;
    }
    .particle--p4 {
      width: 7px; height: 7px;
      background: var(--color-purple);
      box-shadow: 0 0 10px 3px rgba(94, 42, 121, 0.6);
      top: 82%; left: 55%;
      animation: float4 20s ease-in-out infinite;
      animation-delay: -12s;
    }
    .particle--p5 {
      width: 5px; height: 5px;
      background: var(--color-purple);
      box-shadow: 0 0 7px 2px rgba(94, 42, 121, 0.55);
      top: 22%; left: 88%;
      animation: float5 17s ease-in-out infinite;
      animation-delay: -3s;
    }

    /* Gold particles */
    .particle--g1 {
      width: 6px; height: 6px;
      background: var(--color-gold);
      box-shadow: 0 0 10px 3px rgba(242, 183, 5, 0.75);
      top: 55%; left: 6%;
      animation: float2 24s ease-in-out infinite;
      animation-delay: -6s;
    }
    .particle--g2 {
      width: 8px; height: 8px;
      background: var(--color-gold);
      box-shadow: 0 0 12px 3px rgba(242, 183, 5, 0.7);
      top: 18%; left: 48%;
      animation: float4 30s ease-in-out infinite;
      animation-delay: -15s;
    }
    .particle--g3 {
      width: 5px; height: 5px;
      background: var(--color-gold);
      box-shadow: 0 0 7px 2px rgba(242, 183, 5, 0.65);
      top: 75%; left: 85%;
      animation: float1 19s ease-in-out infinite;
      animation-delay: -9s;
    }
    .particle--g4 {
      width: 9px; height: 9px;
      background: var(--color-gold);
      box-shadow: 0 0 13px 4px rgba(242, 183, 5, 0.7);
      top: 42%; left: 92%;
      animation: float3 15s ease-in-out infinite;
      animation-delay: -2s;
    }
    .particle--g5 {
      width: 7px; height: 7px;
      background: var(--color-gold);
      box-shadow: 0 0 10px 3px rgba(242, 183, 5, 0.6);
      top: 88%; left: 28%;
      animation: float5 28s ease-in-out infinite;
      animation-delay: -20s;
    }

    /* ─── Main content ───────────────────────────────────────────── */

    .main-layout {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 80px;
      width: 100%;
      padding: 0 120px;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      text-align: center;
      flex-shrink: 0;
    }

    /* ─── Mini Clip Player ───────────────────────────────────────── */

    .clip-player {
      width: 440px;
      aspect-ratio: 16 / 9;
      background: #000;
      border: 2px solid var(--color-purple);
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(94, 42, 121, 0.3);
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }

    .clip-player iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .clip-player .clip-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--color-text-muted);
      font-size: 13px;
      letter-spacing: 1px;
    }

    @keyframes fadeOut {
      0%   { opacity: 1; }
      100% { opacity: 0; letter-spacing: 20px; }
    }

    .title {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 12px;
      text-transform: uppercase;
      color: var(--color-text);
      text-shadow:
        0 0 20px rgba(94, 42, 121, 0.9),
        0 0 50px rgba(201, 160, 220, 0.5),
        0 0 90px rgba(94, 42, 121, 0.3);
      line-height: 1.15;
      opacity: 0;
    }

    .divider {
      width: 200px;
      height: 3px;
      margin: 28px 0 24px;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--color-gold) 50%,
        transparent 100%
      );
      border: none;
      animation: pulse 3s ease-in-out infinite;
    }

    .subtitle {
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--color-text-muted);
      opacity: 0;
    }

    .divider {
      transition: opacity 0.8s ease;
    }
  </style>
</head>
<body>

  <!-- Geometric accent lines -->
  <div class="accent-line accent-line--top"></div>
  <div class="accent-line accent-line--mid"></div>
  <div class="accent-line accent-line--bottom-inner"></div>

  <!-- Bottom accent bar -->
  <div class="bottom-bar"></div>

  <!-- Floating particles – purple -->
  <div class="particle particle--p1"></div>
  <div class="particle particle--p2"></div>
  <div class="particle particle--p3"></div>
  <div class="particle particle--p4"></div>
  <div class="particle particle--p5"></div>

  <!-- Floating particles – gold -->
  <div class="particle particle--g1"></div>
  <div class="particle particle--g2"></div>
  <div class="particle particle--g3"></div>
  <div class="particle particle--g4"></div>
  <div class="particle particle--g5"></div>

  <!-- Main content -->
  <div class="main-layout">
    <div class="content">
      <h1 class="title">Starting Soon</h1>
      <div class="divider"></div>
      <p class="subtitle">Stream beginnt gleich</p>
    </div>
    <div class="clip-player" id="clipContainer">
      <div class="clip-placeholder" id="clipPlaceholder">
        <p class="clip-placeholder__text">Clips laden...</p>
      </div>
    </div>
  </div>

  <script src="../js/clip-player.js"></script>
  <script>
    (function () {
      var W = 1920;
      var H = 1080;
      document.documentElement.style.width  = W + 'px';
      document.documentElement.style.height = H + 'px';
      document.body.style.width  = W + 'px';
      document.body.style.height = H + 'px';

      var params   = new URLSearchParams(window.location.search);
      var HOLD_SEC = parseInt(params.get('hold'), 10) || 20;

      var title    = document.querySelector('.title');
      var subtitle = document.querySelector('.subtitle');
      var divider  = document.querySelector('.divider');

      function delay(ms) {
        return new Promise(function (r) { setTimeout(r, ms); });
      }

      function animateIn() {
        title.style.animation = 'fadeInGlow 2s ease-out forwards';
        return delay(500).then(function () {
          divider.style.opacity = '1';
          subtitle.style.animation = 'fadeInUp 0.8s ease-out forwards';
          return delay(2000);
        });
      }

      function animateOut() {
        subtitle.style.animation = 'fadeOut 0.8s ease-in forwards';
        divider.style.opacity = '0';
        return delay(400).then(function () {
          title.style.animation = 'fadeOut 1.2s ease-in forwards';
          return delay(1200);
        });
      }

      async function runLoop() {
        while (true) {
          await animateIn();
          await delay(HOLD_SEC * 1000);
          await animateOut();
          await delay(1500);
          // Reset für nächsten Durchlauf
          title.style.animation = 'none';
          subtitle.style.animation = 'none';
          title.style.opacity = '0';
          subtitle.style.opacity = '0';
          await delay(100);
        }
      }

      runLoop();
    })();

    // Clip-Player (stumm, läuft im Hintergrund)
    ClipPlayer.init({ containerId: 'clipContainer', muted: true });
  </script>
</body>
</html>
