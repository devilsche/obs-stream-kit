<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Gameplay Overlay</title>
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-display: swap;
    }

    :root {
      --color-purple: #5e2a79;
      --color-purple-light: #c9a0dc;
      --color-gold: #f2b705;
      --color-bg-dark: #0d0d1a;
      --color-bg-purple: #1a0d2e;
      --color-text: #ffffff;
      --color-text-muted: #888888;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      background: transparent;
    }

  </style>
</head>
<body>
  <div id="sparkle-container" style="position:absolute;inset:0;overflow:hidden;pointer-events:none;"></div>

  <script src="../js/sparkles.js"></script>
  <script>
    new SparkleEngine(document.getElementById('sparkle-container'), {
      count: 18,
      speed: 0.3,
      maxOpacity: 0.7,
      colors: { gold: 0.35, purple: 0.35, white: 0.30 },
      sizeWeights: { big: 0.05, normal: 0.2, small: 0.4, tiny: 0.35 }
    }).start();
  </script>
</body>
</html>
