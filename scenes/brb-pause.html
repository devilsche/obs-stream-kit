<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>BRB – LuCKoR_HD</title>
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color-purple:       #5e2a79;
      --color-purple-light: #c9a0dc;
      --color-gold:         #f2b705;
      --color-bg-dark:      #0d0d1a;
      --color-bg-purple:    #1a0d2e;
      --color-text:         #ffffff;
      --color-text-muted:   #888888;
    }

    /* ─── Keyframes ─────────────────────────────────────────────── */

    @keyframes fadeInUp {
      0%   { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%   { opacity: 0.7; }
      50%  { opacity: 1; }
      100% { opacity: 0.7; }
    }

    @keyframes glowPulse {
      0%, 100% {
        text-shadow:
          0 0 20px rgba(94, 42, 121, 0.8),
          0 0 50px rgba(201, 160, 220, 0.4),
          0 0 90px rgba(94, 42, 121, 0.2);
      }
      50% {
        text-shadow:
          0 0 30px rgba(94, 42, 121, 1),
          0 0 70px rgba(201, 160, 220, 0.7),
          0 0 120px rgba(94, 42, 121, 0.5);
      }
    }

    @keyframes float1 {
      0%   { transform: translateY(0px)   translateX(0px); }
      25%  { transform: translateY(-28px) translateX(12px); }
      50%  { transform: translateY(-14px) translateX(25px); }
      75%  { transform: translateY(-36px) translateX(8px); }
      100% { transform: translateY(0px)   translateX(0px); }
    }
    @keyframes float2 {
      0%   { transform: translateY(0px)   translateX(0px); }
      30%  { transform: translateY(-20px) translateX(-15px); }
      60%  { transform: translateY(-40px) translateX(5px); }
      100% { transform: translateY(0px)   translateX(0px); }
    }
    @keyframes float3 {
      0%   { transform: translateY(0px)   translateX(0px); }
      40%  { transform: translateY(-32px) translateX(18px); }
      70%  { transform: translateY(-18px) translateX(-10px); }
      100% { transform: translateY(0px)   translateX(0px); }
    }
    @keyframes float4 {
      0%   { transform: translateY(0px)   translateX(0px); }
      20%  { transform: translateY(-22px) translateX(-20px); }
      55%  { transform: translateY(-45px) translateX(12px); }
      80%  { transform: translateY(-30px) translateX(-5px); }
      100% { transform: translateY(0px)   translateX(0px); }
    }
    @keyframes float5 {
      0%   { transform: translateY(0px)   translateX(0px); }
      35%  { transform: translateY(-38px) translateX(22px); }
      65%  { transform: translateY(-20px) translateX(-8px); }
      100% { transform: translateY(0px)   translateX(0px); }
    }

    /* ─── Layout ─────────────────────────────────────────────────── */

    body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #0d0d1a 0%, #1a0d2e 50%, #0d0d1a 100%);
      color: var(--color-text);
      position: relative;
      display: flex;
      flex-direction: row;
    }

    /* ─── Bottom accent bar ──────────────────────────────────────── */

    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg,
        transparent 5%,
        var(--color-purple) 30%,
        var(--color-gold) 50%,
        var(--color-purple) 70%,
        transparent 95%
      );
      z-index: 20;
    }

    /* ─── Particles ──────────────────────────────────────────────── */

    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 5;
    }

    /* Purple particles */
    .particle--p1 {
      width: 8px; height: 8px;
      background: var(--color-purple);
      box-shadow: 0 0 10px 3px rgba(94, 42, 121, 0.7);
      top: 12%; left: 8%;
      animation: float1 18s ease-in-out infinite;
    }
    .particle--p2 {
      width: 6px; height: 6px;
      background: var(--color-purple);
      box-shadow: 0 0 8px 2px rgba(94, 42, 121, 0.6);
      top: 68%; left: 14%;
      animation: float3 22s ease-in-out infinite;
      animation-delay: -4s;
    }
    .particle--p3 {
      width: 10px; height: 10px;
      background: var(--color-purple);
      box-shadow: 0 0 14px 4px rgba(94, 42, 121, 0.65);
      top: 35%; left: 55%;
      animation: float2 26s ease-in-out infinite;
      animation-delay: -8s;
    }
    .particle--p4 {
      width: 7px; height: 7px;
      background: var(--color-purple);
      box-shadow: 0 0 10px 3px rgba(94, 42, 121, 0.6);
      top: 82%; left: 38%;
      animation: float4 20s ease-in-out infinite;
      animation-delay: -12s;
    }
    .particle--p5 {
      width: 5px; height: 5px;
      background: var(--color-purple);
      box-shadow: 0 0 7px 2px rgba(94, 42, 121, 0.55);
      top: 22%; left: 70%;
      animation: float5 17s ease-in-out infinite;
      animation-delay: -3s;
    }

    /* Gold particles */
    .particle--g1 {
      width: 6px; height: 6px;
      background: var(--color-gold);
      box-shadow: 0 0 10px 3px rgba(242, 183, 5, 0.75);
      top: 55%; left: 6%;
      animation: float2 24s ease-in-out infinite;
      animation-delay: -6s;
    }
    .particle--g2 {
      width: 8px; height: 8px;
      background: var(--color-gold);
      box-shadow: 0 0 12px 3px rgba(242, 183, 5, 0.7);
      top: 18%; left: 42%;
      animation: float4 30s ease-in-out infinite;
      animation-delay: -15s;
    }
    .particle--g3 {
      width: 5px; height: 5px;
      background: var(--color-gold);
      box-shadow: 0 0 7px 2px rgba(242, 183, 5, 0.65);
      top: 75%; left: 65%;
      animation: float1 19s ease-in-out infinite;
      animation-delay: -9s;
    }
    .particle--g4 {
      width: 9px; height: 9px;
      background: var(--color-gold);
      box-shadow: 0 0 13px 4px rgba(242, 183, 5, 0.7);
      top: 42%; left: 75%;
      animation: float3 15s ease-in-out infinite;
      animation-delay: -2s;
    }
    .particle--g5 {
      width: 7px; height: 7px;
      background: var(--color-gold);
      box-shadow: 0 0 10px 3px rgba(242, 183, 5, 0.6);
      top: 88%; left: 28%;
      animation: float5 28s ease-in-out infinite;
      animation-delay: -20s;
    }

    /* ─── LEFT: Clip Player Area ─────────────────────────────────── */

    .clip-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 10;
      padding: 0 5%;
    }

    .clip-container {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000000;
      border: 2px solid var(--color-purple);
      border-radius: 10px;
      box-shadow: 0 0 40px rgba(94, 42, 121, 0.4);
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .clip-container iframe,
    .clip-container video {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      object-fit: cover;
      opacity: 1;
      transition: opacity 0.8s ease;
    }

    .clip-container iframe.fade-out,
    .clip-container video.fade-out {
      opacity: 0;
    }

    .clip-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--color-text-muted);
      text-align: center;
    }

    .clip-placeholder__icon {
      width: 64px;
      height: 64px;
      border: 2px solid rgba(94, 42, 121, 0.5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.6;
    }

    .clip-placeholder__icon svg {
      width: 28px;
      height: 28px;
      fill: var(--color-purple-light);
    }

    .clip-placeholder__text {
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 2px;
      opacity: 0.7;
    }

    /* ─── Countdown Overlay ──────────────────────────────────────── */

    .countdown-overlay {
      position: absolute;
      inset: 0;
      background: rgba(13, 13, 26, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 15;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .countdown-overlay--visible {
      opacity: 1;
    }

    .countdown__label {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--color-gold);
    }

    .countdown__title {
      font-size: 22px;
      font-weight: 700;
      color: var(--color-text);
      text-align: center;
      max-width: 80%;
      line-height: 1.3;
    }

    .countdown__timer {
      font-size: 64px;
      font-weight: 900;
      color: var(--color-gold);
      text-shadow: 0 0 12px rgba(242, 183, 5, 0.3);
    }

    .countdown__timer.boom-3 {
      color: var(--color-gold);
      text-shadow: 0 0 10px rgba(242, 183, 5, 0.4), 0 0 25px rgba(242, 183, 5, 0.2);
      animation: boom3 0.4s cubic-bezier(0.22, 1.2, 0.36, 1);
    }
    .countdown__timer.boom-2 {
      color: var(--color-gold);
      text-shadow: 0 0 16px rgba(242, 183, 5, 0.6), 0 0 40px rgba(242, 183, 5, 0.3);
      animation: boom2 0.45s cubic-bezier(0.22, 1.2, 0.36, 1);
    }
    .countdown__timer.boom-1 {
      color: var(--color-gold);
      text-shadow: 0 0 24px rgba(242, 183, 5, 0.8), 0 0 60px rgba(242, 183, 5, 0.5);
      animation: boom1 0.5s cubic-bezier(0.22, 1.2, 0.36, 1);
    }

    @keyframes boom3 {
      0%   { transform: scale(1.3); opacity: 0.5; }
      50%  { transform: scale(0.95); opacity: 1; }
      100% { transform: scale(1); }
    }
    @keyframes boom2 {
      0%   { transform: scale(1.6); opacity: 0.4; }
      50%  { transform: scale(0.93); opacity: 1; }
      70%  { transform: scale(1.03); }
      100% { transform: scale(1); }
    }
    @keyframes boom1 {
      0%   { transform: scale(2); opacity: 0.3; }
      45%  { transform: scale(0.9); opacity: 1; }
      65%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    /* ─── RIGHT: Sidebar ─────────────────────────────────────────── */

    .sidebar {
      width: 280px;
      height: 100%;
      background: rgba(13, 13, 26, 0.9);
      border-left: 2px solid rgba(94, 42, 121, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .sidebar__content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      text-align: center;
      position: relative;
    }

    .sidebar__brb {
      font-size: 48px;
      font-weight: 900;
      text-transform: uppercase;
      color: var(--color-purple-light);
      text-shadow:
        0 0 20px rgba(94, 42, 121, 0.8),
        0 0 50px rgba(201, 160, 220, 0.4),
        0 0 90px rgba(94, 42, 121, 0.2);
      display: flex;
      justify-content: center;
      min-height: 60px;
    }

    .sidebar__brb span {
      display: block;
      width: 42px;
      text-align: center;
      margin: 0 5px;
    }

    .sidebar__brb span.wave {
      animation: letterPulse 0.5s ease-in-out;
    }

    @keyframes letterPulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.5); color: var(--color-gold); text-shadow: 0 0 20px rgba(242, 183, 5, 0.8); }
      100% { transform: scale(1); }
    }

    /* Expanded mode: BE RIGHT BACK */
    .sidebar__brb-expanded {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 5;
    }

    .sidebar__brb-expanded span {
      position: absolute;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--color-purple-light);
      text-shadow:
        0 0 20px rgba(94, 42, 121, 0.8),
        0 0 50px rgba(201, 160, 220, 0.4);
      opacity: 0;
      transform: scale(2.5);
    }

    /* BE — klein */
    .sidebar__brb-expanded span:nth-child(1) { font-size: 22px; }
    /* RIGHT — mittel */
    .sidebar__brb-expanded span:nth-child(2) { font-size: 32px; }
    /* BACK — groß wie BRB, gold */
    .sidebar__brb-expanded span:nth-child(3) {
      font-size: 48px;
      color: var(--color-gold);
      text-shadow:
        0 0 20px rgba(242, 183, 5, 0.8),
        0 0 50px rgba(242, 183, 5, 0.4);
    }

    .sidebar__brb-expanded span.show {
      animation: stampIn 0.35s cubic-bezier(0.22, 1.2, 0.36, 1) forwards;
    }

    @keyframes stampIn {
      0%   { opacity: 0; transform: scale(2.5); }
      50%  { opacity: 1; transform: scale(0.9); }
      70%  { transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* ─── Clip Meta Bar ──────────────────────────────────────────── */

    .clip-meta {
      width: 100%;
      padding: 14px 16px;
      display: flex;
      align-items: baseline;
      gap: 20px;
      opacity: 0;
      transition: opacity 0.6s ease;
      background: linear-gradient(180deg,
        rgba(94, 42, 121, 0.12) 0%,
        transparent 100%
      );
      border-bottom-left-radius: 10px;
      border-bottom-right-radius: 10px;
    }

    .clip-meta--visible {
      opacity: 1;
    }

    .clip-meta__title {
      flex: 1;
      font-size: 16px;
      font-weight: 700;
      color: var(--color-gold);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .clip-meta__detail {
      font-size: 12px;
      font-weight: 400;
      color: var(--color-text-muted);
      letter-spacing: 0.5px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .clip-meta__dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(94, 42, 121, 0.6);
      flex-shrink: 0;
    }

    .sidebar__divider {
      width: 60px;
      height: 3px;
      margin: 24px 0 20px;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--color-gold) 50%,
        transparent 100%
      );
      border: none;
      animation: pulse 3s ease-in-out infinite;
    }

    .sidebar__subtitle {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--color-text-muted);
      animation: fadeInUp 0.8s ease-out 0.5s both;
    }
  </style>
</head>
<body>

  <!-- Bottom accent bar -->
  <div class="bottom-bar"></div>

  <!-- Floating particles – purple -->
  <div class="particle particle--p1"></div>
  <div class="particle particle--p2"></div>
  <div class="particle particle--p3"></div>
  <div class="particle particle--p4"></div>
  <div class="particle particle--p5"></div>

  <!-- Floating particles – gold -->
  <div class="particle particle--g1"></div>
  <div class="particle particle--g2"></div>
  <div class="particle particle--g3"></div>
  <div class="particle particle--g4"></div>
  <div class="particle particle--g5"></div>

  <!-- LEFT: Clip player area -->
  <div class="clip-area">
    <div class="clip-container" id="clipContainer">
      <div class="clip-placeholder" id="clipPlaceholder">
        <div class="clip-placeholder__icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 5v14l11-7z"/>
          </svg>
        </div>
        <p class="clip-placeholder__text">Keine Clips verfügbar</p>
      </div>
      <div class="countdown-overlay" id="countdownOverlay">
        <span class="countdown__label">Nächster Clip</span>
        <p class="countdown__title" id="countdownTitle"></p>
        <span class="countdown__timer" id="countdownTimer"></span>
      </div>
    </div>
    <div class="clip-meta" id="clipMeta">
      <span class="clip-meta__title" id="clipMetaTitle"></span>
      <span class="clip-meta__detail" id="clipMetaDetails"></span>
    </div>
  </div>

  <!-- RIGHT: Sidebar -->
  <div class="sidebar">
    <div class="sidebar__content">
      <span class="sidebar__brb" id="brbLetters"><span>B</span><span>R</span><span>B</span></span>
      <span class="sidebar__brb-expanded" id="brbExpanded"><span>BE</span><span>RIGHT</span><span>BACK</span></span>
      <div class="sidebar__divider"></div>
      <p class="sidebar__subtitle">Bin gleich zurück</p>
    </div>
  </div>

  <script>
    /*
     * HINWEIS: Twitch Embed funktioniert NICHT mit file://-URLs.
     * Datei über lokalen Server laden: python3 -m http.server 8080
     *
     * URL-Parameter:
     *   Automatisch (Twitch API):
     *     ?channel=LuCKoR_HD&client_id=xxx&client_secret=xxx
     *
     *   Manuell (Clip-Slugs):
     *     ?clips=Slug1,Slug2,Slug3
     *
     *   Optional:
     *     &count=20       — Anzahl Clips (default: 20, max: 100)
     *     &countdown=5    — Countdown-Sekunden zwischen Clips (default: 5)
     */

    (function () {
      var W = 1920;
      var H = 1080;
      document.documentElement.style.width  = W + 'px';
      document.documentElement.style.height = H + 'px';
      document.body.style.width  = W + 'px';
      document.body.style.height = H + 'px';

      var params        = new URLSearchParams(window.location.search);
      var channel       = params.get('channel') || 'LuCKoR_HD';
      var clientId      = params.get('client_id') || window.__TWITCH_CLIENT_ID__ || '';
      var clientSecret  = params.get('client_secret') || window.__TWITCH_CLIENT_SECRET__ || '';
      var manualClips   = params.get('clips');
      var clipCount     = parseInt(params.get('count'), 10) || 100;
      var countdownSec  = parseInt(params.get('countdown'), 10) || 5;

      var placeholder      = document.getElementById('clipPlaceholder');
      var container        = document.getElementById('clipContainer');
      var clipMeta         = document.getElementById('clipMeta');
      var clipMetaTitle    = document.getElementById('clipMetaTitle');
      var clipMetaDetails  = document.getElementById('clipMetaDetails');
      var countdownOverlay = document.getElementById('countdownOverlay');
      var countdownTitle   = document.getElementById('countdownTitle');
      var countdownTimer   = document.getElementById('countdownTimer');

      // ── Hilfsfunktionen ────────────────────────────────────────

      function shuffle(arr) {
        for (var i = arr.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = arr[i];
          arr[i] = arr[j];
          arr[j] = tmp;
        }
        return arr;
      }

      function buildEmbedUrl(slug) {
        var host = window.location.hostname;
        var parentParam = '&parent=' + host;
        if (host === '127.0.0.1') parentParam += '&parent=localhost';
        if (host === 'localhost') parentParam += '&parent=127.0.0.1';
        return 'https://clips.twitch.tv/embed?clip=' + encodeURIComponent(slug)
          + parentParam
          + '&autoplay=true'
          + '&muted=false';
      }

      function showError(msg) {
        placeholder.querySelector('.clip-placeholder__text').textContent = msg;
      }

      function formatDate(isoString) {
        if (!isoString) return '';
        var d = new Date(isoString);
        return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
      }

      function formatViews(n) {
        if (!n && n !== 0) return '';
        return n.toLocaleString('de-DE') + ' Views';
      }

      function showMeta(clip) {
        clipMetaTitle.textContent = clip.title || '';
        var parts = [];
        if (clip.creator) parts.push('von ' + clip.creator);
        if (clip.createdAt) parts.push(formatDate(clip.createdAt));
        if (clip.views !== undefined) parts.push(formatViews(clip.views));
        clipMetaDetails.innerHTML = parts.join(' <span class="clip-meta__dot"></span> ');
        clipMeta.classList.add('clip-meta--visible');
      }

      function hideMeta() {
        clipMeta.classList.remove('clip-meta--visible');
      }

      // ── Clip-Player ────────────────────────────────────────────

      // clips = [{id, title, duration}, ...]
      var clips = [];
      var currentIndex = 0;
      var clipTimer = null;

      function loadClip(index) {
        var clip = clips[index % clips.length];
        placeholder.style.display = 'none';
        countdownOverlay.classList.remove('countdown-overlay--visible');
        if (clipTimer) clearTimeout(clipTimer);

        var oldIframe = container.querySelector('iframe');
        if (oldIframe) oldIframe.remove();

        var iframe = document.createElement('iframe');
        iframe.src = buildEmbedUrl(clip.id);
        iframe.allow = 'autoplay; fullscreen';
        iframe.allowFullscreen = true;
        container.appendChild(iframe);

        // Meta anzeigen
        showMeta(clip);

        // Timer startet erst wenn iframe geladen ist
        iframe.addEventListener('load', function () {
          var durationMs = Math.ceil(clip.duration) * 1000 + 700;
          clipTimer = setTimeout(function () {
            // Fade-Out starten, dann Countdown
            iframe.classList.add('fade-out');
            hideMeta();
            setTimeout(function () {
              showCountdown(index);
            }, 800);
          }, durationMs);
        });
      }

      function showCountdown(currentIdx) {
        var nextIdx = (currentIdx + 1) % clips.length;
        var nextClip = clips[nextIdx];

        // Altes iframe entfernen
        var oldIframe = container.querySelector('iframe');
        if (oldIframe) oldIframe.remove();

        countdownTitle.textContent = nextClip.title || 'Clip ' + (nextIdx + 1);
        countdownTimer.classList.remove('boom-3', 'boom-2', 'boom-1');
        countdownOverlay.classList.add('countdown-overlay--visible');

        var remaining = countdownSec;
        countdownTimer.textContent = remaining;

        var interval = setInterval(function () {
          remaining--;
          if (remaining <= 0) {
            clearInterval(interval);
            currentIndex = nextIdx;
            loadClip(currentIndex);
          } else {
            countdownTimer.textContent = remaining;
            if (remaining <= 3) {
              countdownTimer.classList.remove('boom-3', 'boom-2', 'boom-1');
              void countdownTimer.offsetWidth;
              countdownTimer.classList.add('boom-' + remaining);
            }
          }
        }, 1000);
      }

      function startPlayer() {
        if (clips.length === 0) {
          showError('Keine Clips gefunden');
          return;
        }
        shuffle(clips);
        loadClip(0);
      }

      // ── Manueller Modus (Fallback) ────────────────────────────

      if (manualClips) {
        var ids = manualClips.split(',')
          .map(function (s) { return s.trim(); })
          .filter(function (s) { return s.length > 0; });
        clips = ids.map(function (id) {
          return { id: id, title: '', duration: 30 };
        });
        startPlayer();
        return;
      }

      // ── Twitch API Modus ───────────────────────────────────────

      if (!clientId || !clientSecret) {
        showError('client_id & client_secret oder clips Parameter fehlt');
        return;
      }

      fetch('https://id.twitch.tv/oauth2/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'client_id=' + encodeURIComponent(clientId)
          + '&client_secret=' + encodeURIComponent(clientSecret)
          + '&grant_type=client_credentials'
      })
      .then(function (r) { return r.json(); })
      .then(function (tokenData) {
        if (!tokenData.access_token) {
          throw new Error('Token-Fehler: ' + (tokenData.message || 'unbekannt'));
        }

        var token = tokenData.access_token;
        var headers = {
          'Client-ID': clientId,
          'Authorization': 'Bearer ' + token
        };

        return fetch('https://api.twitch.tv/helix/users?login=' + encodeURIComponent(channel), {
          headers: headers
        })
        .then(function (r) { return r.json(); })
        .then(function (userData) {
          if (!userData.data || userData.data.length === 0) {
            throw new Error('Kanal "' + channel + '" nicht gefunden');
          }
          return userData.data[0].id;
        })
        .then(function (broadcasterId) {
          return fetch('https://api.twitch.tv/helix/clips?broadcaster_id=' + broadcasterId
            + '&first=' + clipCount, { headers: headers });
        })
        .then(function (r) { return r.json(); })
        .then(function (clipData) {
          if (!clipData.data || clipData.data.length === 0) {
            throw new Error('Keine Clips für "' + channel + '" gefunden');
          }

          clips = clipData.data.map(function (c) {
            return {
              id: c.id,
              title: c.title || '',
              duration: c.duration || 30,
              createdAt: c.created_at || '',
              views: c.view_count || 0
            };
          });

          startPlayer();
        });
      })
      .catch(function (err) {
        console.error('Twitch API Fehler:', err);
        showError(err.message || 'API-Fehler');
      });

    })();
  </script>

  <script>
    // ── BRB Wave Animation ─────────────────────────────────────
    (function () {
      var letters = document.querySelectorAll('#brbLetters span');
      var brbLetters = document.getElementById('brbLetters');
      var brbExpanded = document.getElementById('brbExpanded');

      var WAVE_DELAY = 150;   // ms zwischen Buchstaben
      var WAVE_HOLD  = 250;   // ms wie lange Buchstabe groß bleibt
      var WAVE_PAUSE = 400;   // ms Pause zwischen Waves
      var WAVES      = 3;     // Anzahl Waves vor Wechsel
      var EXPANDED_HOLD = 3000; // ms wie lange "BE RIGHT BACK" angezeigt wird

      function delay(ms) {
        return new Promise(function (r) { setTimeout(r, ms); });
      }

      async function waveOnce() {
        for (var i = 0; i < letters.length; i++) {
          letters[i].classList.add('wave');
          await delay(WAVE_DELAY);
        }
        await delay(WAVE_HOLD);
        for (var i = 0; i < letters.length; i++) {
          letters[i].classList.remove('wave');
        }
        await delay(WAVE_DELAY);
      }

      async function showExpanded() {
        var words = brbExpanded.querySelectorAll('span');
        brbLetters.style.opacity = '0';
        await delay(400);
        brbExpanded.classList.add('sidebar__brb-expanded--visible');

        // Wörter einzeln zeigen — eins nach dem anderen
        for (var i = 0; i < words.length; i++) {
          words[i].classList.add('show');
          await delay(800);
          words[i].classList.remove('show');
          if (i < words.length - 1) await delay(150);
        }
        await delay(400);
        brbExpanded.classList.remove('sidebar__brb-expanded--visible');
        await delay(300);
        brbLetters.style.opacity = '1';
        await delay(300);
      }

      async function runLoop() {
        while (true) {
          // 3x Wave
          for (var w = 0; w < WAVES; w++) {
            await waveOnce();
            await delay(WAVE_PAUSE);
          }

          // Wechsel zu "BE RIGHT BACK"
          await showExpanded();
        }
      }

      runLoop();
    })();
  </script>
