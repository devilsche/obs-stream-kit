<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Stream Ending – LuCKoR_HD</title>
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('../assets/DM-Sans.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color-purple:       #5e2a79;
      --color-purple-light: #c9a0dc;
      --color-gold:         #f2b705;
      --color-bg-dark:      #0d0d1a;
      --color-bg-purple:    #1a0d2e;
      --color-text:         #ffffff;
      --color-text-muted:   #888888;
    }

    /* ─── Keyframes ─────────────────────────────────────────────── */

    @keyframes fadeIn {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes fadeInUp {
      0%   { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%   { opacity: 0.7; }
      50%  { opacity: 1; }
      100% { opacity: 0.7; }
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 1; text-shadow: 0 0 30px rgba(242, 183, 5, 0.4); }
      50%       { opacity: 1; text-shadow: 0 0 50px rgba(242, 183, 5, 0.6), 0 0 80px rgba(242, 183, 5, 0.3); }
    }

    @keyframes floatDown {
      0%   { transform: translateY(0px)   translateX(0px); }
      25%  { transform: translateY(28px)  translateX(10px); }
      50%  { transform: translateY(55px)  translateX(-8px); }
      75%  { transform: translateY(38px)  translateX(15px); }
      100% { transform: translateY(0px)   translateX(0px); }
    }
    @keyframes floatDown2 {
      0%   { transform: translateY(0px)   translateX(0px); }
      30%  { transform: translateY(22px)  translateX(-12px); }
      60%  { transform: translateY(48px)  translateX(6px); }
      100% { transform: translateY(0px)   translateX(0px); }
    }
    @keyframes floatDown3 {
      0%   { transform: translateY(0px)   translateX(0px); }
      40%  { transform: translateY(35px)  translateX(20px); }
      70%  { transform: translateY(60px)  translateX(-10px); }
      100% { transform: translateY(0px)   translateX(0px); }
    }
    @keyframes floatDown4 {
      0%   { transform: translateY(0px)   translateX(0px); }
      20%  { transform: translateY(18px)  translateX(-18px); }
      55%  { transform: translateY(44px)  translateX(10px); }
      80%  { transform: translateY(30px)  translateX(-6px); }
      100% { transform: translateY(0px)   translateX(0px); }
    }
    @keyframes floatDown5 {
      0%   { transform: translateY(0px)   translateX(0px); }
      35%  { transform: translateY(40px)  translateX(24px); }
      65%  { transform: translateY(20px)  translateX(-8px); }
      100% { transform: translateY(0px)   translateX(0px); }
    }

    /* ─── Layout ─────────────────────────────────────────────────── */

    body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #0d0d1a 0%, #1a0d2e 50%, #0d0d1a 100%);
      color: var(--color-text);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── Geometric accent lines ─────────────────────────────────── */

    .accent-line {
      position: absolute;
      height: 1px;
      width: 100%;
      pointer-events: none;
    }
    .accent-line--top {
      top: 180px;
      background: linear-gradient(90deg, transparent 0%, var(--color-purple) 30%, var(--color-gold) 50%, var(--color-purple) 70%, transparent 100%);
      opacity: 0.35;
    }
    .accent-line--mid {
      top: 50%;
      transform: translateY(-50%) scaleX(0.6);
      background: linear-gradient(90deg, transparent 0%, var(--color-purple-light) 40%, var(--color-purple-light) 60%, transparent 100%);
      opacity: 0.3;
    }
    .accent-line--bottom-inner {
      bottom: 220px;
      background: linear-gradient(90deg, transparent 0%, var(--color-gold) 35%, var(--color-purple) 65%, transparent 100%);
      opacity: 0.4;
    }

    /* ─── Bottom accent bar ──────────────────────────────────────── */

    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg,
        transparent 5%,
        var(--color-purple) 30%,
        var(--color-gold) 50%,
        var(--color-purple) 70%,
        transparent 95%
      );
    }

    /* ─── Particles ──────────────────────────────────────────────── */

    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    /* Purple particles */
    .particle--p1 {
      width: 8px; height: 8px;
      background: var(--color-purple);
      box-shadow: 0 0 10px 3px rgba(94, 42, 121, 0.7);
      top: 12%; left: 8%;
      animation: floatDown 28s ease-in-out infinite;
    }
    .particle--p2 {
      width: 6px; height: 6px;
      background: var(--color-purple);
      box-shadow: 0 0 8px 2px rgba(94, 42, 121, 0.6);
      top: 68%; left: 14%;
      animation: floatDown3 32s ease-in-out infinite;
      animation-delay: -4s;
    }
    .particle--p3 {
      width: 10px; height: 10px;
      background: var(--color-purple);
      box-shadow: 0 0 14px 4px rgba(94, 42, 121, 0.65);
      top: 35%; left: 78%;
      animation: floatDown2 36s ease-in-out infinite;
      animation-delay: -8s;
    }
    .particle--p4 {
      width: 7px; height: 7px;
      background: var(--color-purple);
      box-shadow: 0 0 10px 3px rgba(94, 42, 121, 0.6);
      top: 22%; left: 55%;
      animation: floatDown4 30s ease-in-out infinite;
      animation-delay: -12s;
    }
    .particle--p5 {
      width: 5px; height: 5px;
      background: var(--color-purple);
      box-shadow: 0 0 7px 2px rgba(94, 42, 121, 0.55);
      top: 55%; left: 88%;
      animation: floatDown5 27s ease-in-out infinite;
      animation-delay: -3s;
    }

    /* Gold particles */
    .particle--g1 {
      width: 6px; height: 6px;
      background: var(--color-gold);
      box-shadow: 0 0 10px 3px rgba(242, 183, 5, 0.75);
      top: 18%; left: 6%;
      animation: floatDown2 34s ease-in-out infinite;
      animation-delay: -6s;
    }
    .particle--g2 {
      width: 8px; height: 8px;
      background: var(--color-gold);
      box-shadow: 0 0 12px 3px rgba(242, 183, 5, 0.7);
      top: 8%; left: 48%;
      animation: floatDown4 40s ease-in-out infinite;
      animation-delay: -15s;
    }
    .particle--g3 {
      width: 5px; height: 5px;
      background: var(--color-gold);
      box-shadow: 0 0 7px 2px rgba(242, 183, 5, 0.65);
      top: 42%; left: 85%;
      animation: floatDown 29s ease-in-out infinite;
      animation-delay: -9s;
    }
    .particle--g4 {
      width: 9px; height: 9px;
      background: var(--color-gold);
      box-shadow: 0 0 13px 4px rgba(242, 183, 5, 0.7);
      top: 15%; left: 92%;
      animation: floatDown3 25s ease-in-out infinite;
      animation-delay: -2s;
    }
    .particle--g5 {
      width: 7px; height: 7px;
      background: var(--color-gold);
      box-shadow: 0 0 10px 3px rgba(242, 183, 5, 0.6);
      top: 60%; left: 28%;
      animation: floatDown5 38s ease-in-out infinite;
      animation-delay: -20s;
    }

    /* ─── Main content ───────────────────────────────────────────── */

    .main-layout {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 80px;
      width: 100%;
      padding: 0 120px;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      text-align: center;
      flex-shrink: 0;
      width: 680px;
    }

    /* ─── Mini Clip Player ───────────────────────────────────────── */

    @keyframes clipBreathe {
      0%   { transform: translateZ(0) scale(1)    translateX(0px); box-shadow: 0 0 30px rgba(94, 42, 121, 0.3); }
      30%  { transform: translateZ(0) scale(1.004) translateX(3px); box-shadow: 0 0 40px rgba(94, 42, 121, 0.45); }
      60%  { transform: translateZ(0) scale(1.007) translateX(-2px); box-shadow: 0 0 50px rgba(94, 42, 121, 0.55); }
      100% { transform: translateZ(0) scale(1)    translateX(0px); box-shadow: 0 0 30px rgba(94, 42, 121, 0.3); }
    }

    .clip-player {
      width: 660px;
      aspect-ratio: 16 / 9;
      background: #000;
      border: 2px solid var(--color-purple);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
      will-change: transform;
      animation: clipBreathe 9s ease-in-out infinite;
    }

    .clip-player iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      opacity: 1;
      transition: opacity 0.8s ease;
    }
    .clip-player iframe.fade-out { opacity: 0; }

    .clip-player .clip-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--color-text-muted);
      font-size: 13px;
      letter-spacing: 1px;
    }

    .countdown-overlay {
      position: absolute; inset: 0;
      background: rgba(13, 13, 26, 0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; z-index: 15;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .countdown-overlay--visible { opacity: 1; }
    .countdown__label { font-size: 11px; font-weight: 400; letter-spacing: 3px; text-transform: uppercase; color: var(--color-gold); }
    .countdown__title { font-size: 15px; font-weight: 700; color: var(--color-text); text-align: center; max-width: 90%; line-height: 1.3; }
    .countdown__timer { font-size: 48px; font-weight: 900; color: var(--color-gold); text-shadow: 0 0 12px rgba(242, 183, 5, 0.3); }

    .countdown__timer.boom-3 { color: var(--color-gold); text-shadow: 0 0 10px rgba(242, 183, 5, 0.4); animation: cboom3 0.4s cubic-bezier(0.22, 1.2, 0.36, 1); }
    .countdown__timer.boom-2 { color: var(--color-gold); text-shadow: 0 0 16px rgba(242, 183, 5, 0.6); animation: cboom2 0.45s cubic-bezier(0.22, 1.2, 0.36, 1); }
    .countdown__timer.boom-1 { color: var(--color-gold); text-shadow: 0 0 24px rgba(242, 183, 5, 0.8); animation: cboom1 0.5s cubic-bezier(0.22, 1.2, 0.36, 1); }

    @keyframes cboom3 { 0% { transform: scale(1.3); opacity: 0.5; } 50% { transform: scale(0.95); opacity: 1; } 100% { transform: scale(1); } }
    @keyframes cboom2 { 0% { transform: scale(1.6); opacity: 0.4; } 50% { transform: scale(0.93); opacity: 1; } 70% { transform: scale(1.03); } 100% { transform: scale(1); } }
    @keyframes cboom1 { 0% { transform: scale(2); opacity: 0.3; } 45% { transform: scale(0.9); opacity: 1; } 65% { transform: scale(1.06); } 100% { transform: scale(1); } }

    .clip-meta { width: 660px; min-height: 38px; padding: 10px 12px; display: flex; align-items: baseline; gap: 14px; opacity: 0; transition: opacity 0.6s ease; }
    .clip-meta--visible { opacity: 1; }
    .clip-meta__title { flex: 1; font-size: 13px; font-weight: 700; color: var(--color-gold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .clip-meta__detail { font-size: 11px; color: var(--color-text-muted); white-space: nowrap; display: flex; align-items: center; gap: 5px; }
    .clip-meta__dot { width: 3px; height: 3px; border-radius: 50%; background: rgba(94, 42, 121, 0.6); }

    .title-danke {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 12px;
      text-transform: uppercase;
      color: var(--color-text);
      line-height: 1.2;
      opacity: 0;
    }

    .title-zuschauen {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 12px;
      text-transform: uppercase;
      color: var(--color-gold);
      line-height: 1.2;
      opacity: 0;
    }

    .divider {
      width: 180px;
      height: 3px;
      margin: 28px 0 24px;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--color-gold) 50%,
        transparent 100%
      );
      border: none;
      animation: pulse 3s ease-in-out infinite;
      transition: opacity 0.5s ease;
    }

    .subtitle {
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--color-text-muted);
      opacity: 0;
    }

    /* ─── Glitch ─────────────────────────────────────────────────── */

    .content--glitch .title-danke,
    .content--glitch .title-zuschauen {
      animation: glitch 0.15s steps(2) infinite;
    }

    @keyframes glitch {
      0%   { transform: translate(0); text-shadow: -2px 0 #ff00ff, 2px 0 #00ffff; }
      25%  { transform: translate(-3px, 1px); text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff; }
      50%  { transform: translate(2px, -1px); text-shadow: -1px 0 #ff00ff, 1px 0 #00ffff; }
      75%  { transform: translate(-1px, 2px); text-shadow: 3px 0 #ff00ff, -3px 0 #00ffff; }
      100% { transform: translate(0); text-shadow: -2px 0 #ff00ff, 2px 0 #00ffff; }
    }

    /* ─── Tear Slices ────────────────────────────────────────────── */

    .tear-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }

    .tear-slice {
      position: absolute;
      width: 100%;
      overflow: hidden;
      transition: none;
    }
  </style>
</head>
<body>

  <!-- Geometric accent lines -->
  <div class="accent-line accent-line--top"></div>
  <div class="accent-line accent-line--mid"></div>
  <div class="accent-line accent-line--bottom-inner"></div>

  <!-- Bottom accent bar -->
  <div class="bottom-bar"></div>

  <!-- Floating particles – purple -->
  <div class="particle particle--p1"></div>
  <div class="particle particle--p2"></div>
  <div class="particle particle--p3"></div>
  <div class="particle particle--p4"></div>
  <div class="particle particle--p5"></div>

  <!-- Floating particles – gold -->
  <div class="particle particle--g1"></div>
  <div class="particle particle--g2"></div>
  <div class="particle particle--g3"></div>
  <div class="particle particle--g4"></div>
  <div class="particle particle--g5"></div>

  <!-- Main content -->
  <div class="main-layout">
    <div class="content" id="content">
      <h1 class="title-danke" id="titleDanke">Danke fürs</h1>
      <h1 class="title-zuschauen" id="titleZuschauen">Zuschauen</h1>
      <div class="divider" id="divider"></div>
      <p class="subtitle" id="subtitle">Bis zum nächsten Mal</p>
    </div>
    <div>
      <div class="clip-player" id="clipContainer">
        <div class="clip-placeholder" id="clipPlaceholder">
          <p class="clip-placeholder__text">Clips laden...</p>
        </div>
        <div class="countdown-overlay" id="countdownOverlay">
          <span class="countdown__label">Nächster Clip</span>
          <p class="countdown__title" id="countdownTitle"></p>
          <span class="countdown__timer" id="countdownTimer"></span>
        </div>
      </div>
      <div class="clip-meta" id="clipMeta">
        <span class="clip-meta__title" id="clipMetaTitle"></span>
        <span class="clip-meta__detail" id="clipMetaDetails"></span>
      </div>
    </div>
  </div>
  <div class="tear-container" id="tearContainer"></div>

  <script src="../js/clip-player.js"></script>
  <script>
    // Clip-Player sofort starten — unabhängig vom Rest
    ClipPlayer.init({ containerId: 'clipContainer', muted: false, countdown: 10 });
  </script>
  <script>
    (function () {
      var W = 1920;
      var H = 1080;
      document.documentElement.style.width  = W + 'px';
      document.documentElement.style.height = H + 'px';
      document.body.style.width  = W + 'px';
      document.body.style.height = H + 'px';

      var params  = new URLSearchParams(window.location.search);
      var HOLD_S  = parseInt(params.get('hold'), 10) || 12;
      var SLICES  = 8;

      var content       = document.getElementById('content');
      var titleDanke    = document.getElementById('titleDanke');
      var titleZuschauen = document.getElementById('titleZuschauen');
      var divider       = document.getElementById('divider');
      var subtitle      = document.getElementById('subtitle');
      var tearContainer = document.getElementById('tearContainer');

      function delay(ms) {
        return new Promise(function (r) { setTimeout(r, ms); });
      }

      // ── Fade In ──────────────────────────────────────────────────

      async function animateIn() {
        titleDanke.style.animation = 'fadeIn 1.5s ease-out forwards';
        await delay(600);
        titleZuschauen.style.animation = 'fadeIn 1.5s ease-out forwards';
        titleZuschauen.style.textShadow = '0 0 30px rgba(242, 183, 5, 0.4)';
        await delay(400);
        divider.style.opacity = '1';
        subtitle.style.animation = 'fadeInUp 0.8s ease-out forwards';
        await delay(1500);
        // Gold glow pulse starten
        titleZuschauen.style.opacity = '1';
        titleZuschauen.style.animation = 'glowPulse 3s ease-in-out infinite';
      }

      // ── Glitch Phase ─────────────────────────────────────────────

      async function glitchPhase() {
        // Kurze Glitch-Bursts
        for (var i = 0; i < 3; i++) {
          content.classList.add('content--glitch');
          await delay(150 + Math.random() * 100);
          content.classList.remove('content--glitch');
          await delay(300 + Math.random() * 400);
        }
        // Längerer Glitch
        content.classList.add('content--glitch');
        await delay(600);
      }

      // ── Tear Apart ───────────────────────────────────────────────

      async function tearApart() {
        // Content-Box messen
        var rect = content.getBoundingClientRect();
        var sliceH = rect.height / SLICES;

        // Content verstecken
        content.style.visibility = 'hidden';
        content.classList.remove('content--glitch');

        // Slices erzeugen
        for (var i = 0; i < SLICES; i++) {
          var slice = document.createElement('div');
          slice.className = 'tear-slice';
          slice.style.left = rect.left + 'px';
          slice.style.top = (rect.top + i * sliceH) + 'px';
          slice.style.width = rect.width + 'px';
          slice.style.height = sliceH + 'px';
          slice.innerHTML = content.innerHTML;

          // Inneres Content-Div positionieren
          var inner = slice.firstElementChild || slice;
          slice.style.position = 'absolute';

          // Clone den ganzen Content-Block rein
          slice.innerHTML = '';
          var clone = content.cloneNode(true);
          clone.style.visibility = 'visible';
          clone.style.position = 'absolute';
          clone.style.top = -(i * sliceH) + 'px';
          clone.style.left = '0';
          clone.style.width = rect.width + 'px';
          // Animationen entfernen
          clone.querySelectorAll('*').forEach(function (el) {
            el.style.animation = 'none';
            el.style.opacity = el.id === 'divider' ? '1' : '1';
          });
          clone.querySelector('.title-danke').style.opacity = '1';
          clone.querySelector('.title-zuschauen').style.opacity = '1';
          clone.querySelector('.title-zuschauen').style.textShadow = '0 0 30px rgba(242, 183, 5, 0.4)';
          clone.querySelector('.subtitle').style.opacity = '1';
          clone.classList.remove('content--glitch');
          slice.appendChild(clone);

          tearContainer.appendChild(slice);
        }

        // Slices auseinanderfliegen lassen
        var slices = tearContainer.querySelectorAll('.tear-slice');
        slices.forEach(function (s, i) {
          var dir = (i % 2 === 0) ? 1 : -1;
          var tx = dir * (200 + Math.random() * 600);
          var ty = (i - SLICES / 2) * 40 + (Math.random() - 0.5) * 100;
          var rot = dir * (5 + Math.random() * 15);

          s.style.transition = 'transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.8s ease';
          // Force reflow
          void s.offsetWidth;
          s.style.transform = 'translate(' + tx + 'px, ' + ty + 'px) rotate(' + rot + 'deg)';
          s.style.opacity = '0';
        });

        await delay(1000);
        tearContainer.innerHTML = '';
      }

      // ── Reset ────────────────────────────────────────────────────

      function reset() {
        content.style.visibility = 'visible';
        titleDanke.style.animation = 'none';
        titleDanke.style.opacity = '0';
        titleZuschauen.style.animation = 'none';
        titleZuschauen.style.opacity = '0';
        titleZuschauen.style.textShadow = '';
        divider.style.opacity = '0';
        subtitle.style.animation = 'none';
        subtitle.style.opacity = '0';
      }

      // ── Loop ─────────────────────────────────────────────────────

      async function runLoop() {
        while (true) {
          await animateIn();
          await delay(HOLD_S * 1000);
          await glitchPhase();
          await tearApart();
          await delay(2000);
          reset();
          await delay(500);
        }
      }

      runLoop();
    })();
  </script>
</body>
</html>
