<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Stinger Transition — Premium</title>
  <!-- Theme-Fundament: Tokens (--theme-*). data-theme kommt server-injiziert. -->
  <link rel="stylesheet" href="../widgets/_theme.css">
  <!-- Wählbare Gaming-Fonts für den Stinger-Namen (Dashboard-Setting bzw.
       Theme-Default via --theme-stinger-font). Alle Kandidaten vorgeladen. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Russo+One&family=Black+Ops+One&family=Audiowide&family=Teko:wght@700&family=Saira+Stencil+One&family=Wallpoet&family=Bungee&family=Chakra+Petch:wght@700&family=Oxanium:wght@800&family=Rajdhani:wght@700&family=Syncopate:wght@700&family=Metamorphous&family=MedievalSharp&family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Alias auf Theme-Tokens — Fallback = bisheriger Entry-Look (Purple/Gold). */
    :root {
      --st-primary:  var(--theme-primary, #5e2a79);
      --st-accent:   var(--theme-accent, #f2b705);
      --st-accent-2: var(--theme-accent-2, #c985ff);
      --st-bg-deep:  var(--theme-bg, #08040f);
    }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
    }

    /* Basisstile — kein opacity:0, alles sichtbar bis JS ran ist */
    #bg {
      position: absolute;
      top: 0; left: 0;
      width: 1920px; height: 1080px;
      background: radial-gradient(ellipse at 50% 50%,
        color-mix(in srgb, var(--st-accent-2) 98%, transparent) 0%,
        var(--st-primary)                                       28%,
        color-mix(in srgb, var(--st-primary) 35%, #000)         62%,
        var(--st-bg-deep)                                       100%
      );
    }
    #glow {
      position: absolute;
      top: 90px; left: 510px;
      width: 900px; height: 900px;
      border-radius: 50%;
      opacity: 0;
      background: radial-gradient(circle,
        color-mix(in srgb, var(--st-accent) 88%, #fff) 0%,
        color-mix(in srgb, var(--st-accent) 55%, transparent) 22%,
        color-mix(in srgb, var(--st-primary) 18%, transparent) 56%,
        transparent 78%
      );
    }
    #rays     { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; opacity: 0; }
    #rings    { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; }
    #sparkles { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; pointer-events: none; }
    #flash {
      position: absolute;
      top: 0; left: 0;
      width: 1920px; height: 1080px;
      opacity: 0;
      background: radial-gradient(circle at 50% 50%,
        color-mix(in srgb, var(--st-accent) 95%, #fff) 0%,
        color-mix(in srgb, var(--st-accent) 65%, transparent) 18%,
        color-mix(in srgb, var(--st-primary) 22%, transparent) 46%,
        transparent 65%
      );
    }
    #frame {
      position: absolute;
      top: 0; left: 0;
      width: 1920px; height: 1080px;
      opacity: 0;
      box-shadow:
        inset 0 0 100px 50px color-mix(in srgb, var(--st-accent) 25%, transparent),
        inset 0 0 200px 80px color-mix(in srgb, var(--st-primary) 35%, transparent);
    }
    .ring { position: absolute; border-radius: 50%; opacity: 0; }
    .ray  {
      position: absolute;
      top: 540px; left: 960px;
      height: 2px;
      transform-origin: 0 50%;
      border-radius: 1px;
      margin-top: -1px;
    }
    .dot { position: absolute; border-radius: 50%; opacity: 0; }

    /* Wrapper: Positionierung + Font — Kinder erben alles */
    #logo-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      z-index: 10;
      display: inline-grid;
      /* Dashboard-Override (--stinger-font) > Theme-Default (--theme-stinger-font) > Orbitron */
      font-family: var(--stinger-font, var(--theme-stinger-font, "Orbitron", sans-serif));
      font-weight: 900;
      font-size: 150px;
      line-height: 1;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    /* Alle Layer in dieselbe Grid-Zelle stapeln */
    #logo-text > * { grid-area: 1 / 1; }

    /* Layer 1: Accent-Glow-Halo */
    #logo-glow {
      color: var(--st-accent);
      filter: blur(28px);
      opacity: 0.75;
      pointer-events: none;
      user-select: none;
    }

    /* Layer 2: Akzent-Schatten (theme-accent statt hartem Dunkel) */
    #logo-shadow {
      color: var(--st-accent);
      filter: blur(2px);
      transform: translateY(1px);
      opacity: 0.75;
      pointer-events: none;
      user-select: none;
    }

    /* Layer 3: solider Theme-Akzent (kein Chrome-Metallic mehr) */
    #logo-chrome {
      color: var(--st-accent);
    }
  </style>
</head>
<body>

  <div id="bg"></div>
  <div id="glow"></div>
  <div id="rays"></div>
  <div id="rings"></div>
  <div id="sparkles"></div>
  <div id="flash"></div>
  <div id="frame"></div>
  <div id="logo-text">
    <div id="logo-glow"   aria-hidden="true"></div>
    <div id="logo-shadow" aria-hidden="true"></div>
    <div id="logo-chrome"></div>
  </div>

  <script>
    (function () {
      'use strict';

      var CX = 960, CY = 540;
      var TOTAL = 3000;

      /* Theme-Farben aus den Tokens lesen (Fallback = Entry Gold/Purple), damit
         Rays/Ringe/Sparkles dem aktiven Theme folgen. */
      var _cs = getComputedStyle(document.documentElement);
      function _tok(n, fb) { return ((_cs.getPropertyValue(n) || '').trim()) || fb; }
      var GOLD   = _tok('--theme-accent',   '#f2b705');
      var PURPLE = _tok('--theme-primary',  '#5e2a79');
      var ACC2   = _tok('--theme-accent-2', '#c985ff');
      function mix(c, pct) { return 'color-mix(in srgb, ' + c + ' ' + pct + '%, transparent)'; }

      /* Name: ?name= override, sonst der server-injizierte Twitch-Channel. */
      var _params = new URLSearchParams(location.search);
      var _name = _params.get('name') || window.__TWITCH_CHANNEL__ || '';
      // Großschreibung in JS — ß bleibt ß (CSS text-transform:uppercase würde ß→SS machen).
      _name = Array.from(_name).map(function (c) { return c === 'ß' ? 'ß' : c.toUpperCase(); }).join('');
      document.getElementById('logo-glow').textContent   = _name;
      document.getElementById('logo-shadow').textContent = _name;
      document.getElementById('logo-chrome').textContent = _name;

      /* Font: ?font= override > Dashboard-Setting (__STINGER_FONT__) > Theme-Default.
         Als CSS-Custom-Property gesetzt (berechneter Wert, kein statisches Styling). */
      var _font = _params.get('font') || window.__STINGER_FONT__ || '';
      if (_font) document.documentElement.style.setProperty(
        '--stinger-font', "'" + _font + "', sans-serif");

      /* ── Hintergrund: Fade-In über 20%, dann halten, am Ende ausblenden ── */
      document.getElementById('bg').animate([
        { opacity: 0 },
        { opacity: 1, offset: 0.20 },
        { opacity: 1, offset: 0.62 },
        { opacity: 0 }
      ], { duration: TOTAL, easing: 'linear', fill: 'forwards' });

      /* Rand-Glow deaktiviert */

      /* ── Zentraler Glow ── */
      document.getElementById('glow').animate([
        { opacity: 0, transform: 'scale(0.05)' },
        { opacity: 1, transform: 'scale(1)',     offset: 0.22 },
        { opacity: 0.85, transform: 'scale(1.12)', offset: 0.62 },
        { opacity: 0, transform: 'scale(1.8)' }
      ], { duration: TOTAL, easing: 'ease-in-out', fill: 'forwards' });

      /* ── Lichtstrahlen ── */
      var raysEl = document.getElementById('rays');
      for (var r = 0; r < 20; r++) {
        var ray   = document.createElement('div');
        ray.className = 'ray';
        var angle = (r / 20) * 360;
        var len   = 680 + Math.random() * 560;
        var alpha = (22 + Math.random() * 58).toFixed(0);
        var gold  = Math.random() > 0.4;
        var col   = gold ? mix(GOLD, alpha) : mix(ACC2, alpha);
        ray.style.width      = len.toFixed(0) + 'px';
        ray.style.background = 'linear-gradient(90deg,' + col + ',transparent)';
        ray.style.transform  = 'rotate(' + angle.toFixed(1) + 'deg)';
        raysEl.appendChild(ray);
      }
      raysEl.animate([
        { opacity: 0 },
        { opacity: 1, offset: 0.16 },
        { opacity: 0.7, offset: 0.62 },
        { opacity: 0 }
      ], { duration: TOTAL, fill: 'forwards' });

      /* ── Ringe ── */
      var ringsEl  = document.getElementById('rings');
      var ringDefs = [
        { r: 140,  color: mix(GOLD, 95), glow: mix(GOLD, 65), bw: 3, dur: 1350, delay:  55 },
        { r: 265,  color: mix(ACC2, 78), glow: mix(ACC2, 50), bw: 2, dur: 1450, delay: 145 },
        { r: 410,  color: mix(GOLD, 72), glow: mix(GOLD, 42), bw: 3, dur: 1550, delay: 235 },
        { r: 590,  color: mix(ACC2, 52), glow: mix(ACC2, 28), bw: 2, dur: 1650, delay: 315 },
        { r: 820,  color: mix(GOLD, 38), glow: mix(GOLD, 18), bw: 2, dur: 1750, delay: 395 }
      ];
      ringDefs.forEach(function (d) {
        var el = document.createElement('div');
        el.className = 'ring';
        var size = d.r * 2;
        el.style.width     = size + 'px';
        el.style.height    = size + 'px';
        el.style.left      = (CX - d.r) + 'px';
        el.style.top       = (CY - d.r) + 'px';
        el.style.border    = d.bw + 'px solid ' + d.color;
        el.style.boxShadow = '0 0 22px 5px ' + d.glow + ',inset 0 0 10px ' + d.glow;
        ringsEl.appendChild(el);
        el.animate([
          { opacity: 0, transform: 'scale(0)' },
          { opacity: 1, transform: 'scale(1)',   offset: 0.12 },
          { opacity: 0.55, transform: 'scale(2)', offset: 0.65 },
          { opacity: 0, transform: 'scale(3.5)' }
        ], { duration: d.dur, delay: d.delay, easing: 'cubic-bezier(0.15,0.85,0.35,1)', fill: 'forwards' });
      });

      /* ── Flash ── */
      document.getElementById('flash').animate([
        { opacity: 0 },
        { opacity: 0, offset: 0.20 },
        { opacity: 1, offset: 0.26 },
        { opacity: 0, offset: 0.40 },
        { opacity: 0 }
      ], { duration: TOTAL, fill: 'forwards' });

      /* ── Sparkles / Sternenstaub ── */
      var sparklesEl = document.getElementById('sparkles');

      /* 2 Schichten: große Sterne (wenige) + feiner Staub (viele kleine) */
      var layers = [
        { count: 60,  minSize: 5,  maxSize: 16, minDur: 400, maxDur: 900,  minDelay: 50,  maxDelay: 1400 },
        { count: 160, minSize: 1,  maxSize: 5,  minDur: 250, maxDur: 700,  minDelay: 0,   maxDelay: 1600 }
      ];

      layers.forEach(function (layer) {
        for (var i = 0; i < layer.count; i++) {
          var el   = document.createElement('div');
          el.className = 'dot';

          var size  = layer.minSize + Math.random() * (layer.maxSize - layer.minSize);
          var x     = 80 + Math.random() * 1760;
          var y     = 50 + Math.random() * 980;
          var delay = layer.minDelay + Math.random() * (layer.maxDelay - layer.minDelay);
          var dur   = layer.minDur   + Math.random() * (layer.maxDur   - layer.minDur);

          var rnd = Math.random();
          var col2, sh;
          if (rnd < 0.60) {
            col2 = GOLD;
            sh   = '0 0 ' + (size * 2.5).toFixed(0) + 'px 1px ' + mix(GOLD, 95) + ',' +
                   '0 0 ' + (size * 5).toFixed(0)   + 'px 2px ' + mix(GOLD, 40);
          } else if (rnd < 0.82) {
            col2 = ACC2;
            sh   = '0 0 ' + (size * 2.5).toFixed(0) + 'px 1px ' + mix(ACC2, 90) + ',' +
                   '0 0 ' + (size * 5).toFixed(0)   + 'px 2px ' + mix(ACC2, 35);
          } else {
            col2 = 'color-mix(in srgb, ' + GOLD + ' 60%, #fff)';
            sh   = '0 0 ' + (size * 2.5).toFixed(0) + 'px 1px ' + mix(GOLD, 95) + ',' +
                   '0 0 ' + (size * 5).toFixed(0)   + 'px 2px ' + mix(GOLD, 45);
          }

          el.style.width      = Math.max(1, size).toFixed(1) + 'px';
          el.style.height     = Math.max(1, size).toFixed(1) + 'px';
          el.style.left       = (x - size / 2).toFixed(0) + 'px';
          el.style.top        = (y - size / 2).toFixed(0) + 'px';
          el.style.background = col2;
          el.style.boxShadow  = sh;
          sparklesEl.appendChild(el);

          el.animate([
            { opacity: 0, transform: 'scale(0)' },
            { opacity: 1, transform: 'scale(1)',     offset: 0.3 },
            { opacity: 0.9, transform: 'scale(1.1)', offset: 0.6 },
            { opacity: 0, transform: 'scale(0)' }
          ], { duration: dur, delay: delay, easing: 'ease-in-out', fill: 'forwards' });
        }
      });

      /* ── Logo-Boom + Shake bei 600ms, 1200ms sichtbar ── */
      document.getElementById('logo-text').animate([
        { opacity: 0,   transform: 'translate(-50%, -50%) scale(1.9)',                 offset: 0    },
        { opacity: 1,   transform: 'translate(-50%, -50%) scale(0.88)',                offset: 0.08 },
        { opacity: 1,   transform: 'translate(-50%, -50%) scale(1.04)',                offset: 0.13 },
        { opacity: 1,   transform: 'translate(-50%, -50%) translateX(-18px) scale(1)', offset: 0.19 },
        { opacity: 1,   transform: 'translate(-50%, -50%) translateX(13px)  scale(1)', offset: 0.24 },
        { opacity: 1,   transform: 'translate(-50%, -50%) translateX(-9px)  scale(1)', offset: 0.29 },
        { opacity: 1,   transform: 'translate(-50%, -50%) translateX(5px)   scale(1)', offset: 0.34 },
        { opacity: 1,   transform: 'translate(-50%, -50%) scale(1)',                   offset: 0.40 },
        { opacity: 1,   transform: 'translate(-50%, -50%) scale(1)',                   offset: 0.78 },
        { opacity: 0,   transform: 'translate(-50%, -50%) scale(1.06)' }
      ], { duration: 1400, delay: 700, easing: 'ease-out', fill: 'forwards' });
    })();
  </script>

</body>
</html>
