<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Stinger Transition — Premium</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
    }

    /* ── Hintergrund ── */
    @keyframes bgIn {
      0%   { opacity: 0; }
      20%  { opacity: 1; }
      65%  { opacity: 1; }
      100% { opacity: 0; }
    }

    .bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 50% 50%,
          rgba(160, 70, 230, 0.95) 0%,
          rgba(94, 42, 121, 1)     28%,
          rgba(30, 8, 55, 1)       60%,
          rgba(10, 5, 20, 1)       100%
        );
      animation: bgIn 2000ms ease-in-out forwards;
    }

    /* ── Zentraler Gold-Glow ── */
    @keyframes glowPulse {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.1); }
      25%  { opacity: 1; transform: translate(-50%, -50%) scale(1);   }
      60%  { opacity: 0.85; transform: translate(-50%, -50%) scale(1.15); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.6); }
    }

    .glow-center {
      position: absolute;
      top: 50%; left: 50%;
      width: 1000px; height: 1000px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0.1);
      background: radial-gradient(circle,
        rgba(255, 245, 180, 0.85) 0%,
        rgba(242, 183, 5, 0.6)   20%,
        rgba(180, 80, 240, 0.25) 55%,
        transparent 80%
      );
      mix-blend-mode: screen;
      animation: glowPulse 2000ms ease-in-out forwards;
    }

    /* ── Gold-Rand-Frame ── */
    @keyframes frameIn {
      0%   { opacity: 0; }
      20%  { opacity: 1; }
      70%  { opacity: 0.7; }
      100% { opacity: 0; }
    }

    .frame {
      position: absolute; inset: 0;
      box-shadow:
        inset 0 0 80px  40px rgba(242, 183, 5, 0.25),
        inset 0 0 180px 80px rgba(94, 42, 121, 0.35);
      animation: frameIn 2000ms ease-in-out forwards;
    }

    /* ── Ringe ── */
    @keyframes ringExpand {
      0%   { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      12%  { opacity: 1; }
      65%  { opacity: 0.5; }
      100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
    }

    .ring {
      position: absolute;
      top: 50%; left: 50%;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      animation: ringExpand var(--dur) cubic-bezier(0.2, 0.8, 0.4, 1) var(--delay) forwards;
    }

    .ring-1 {
      width: 280px; height: 280px;
      border: 3px solid rgba(242, 183, 5, 0.9);
      box-shadow: 0 0 24px 4px rgba(242, 183, 5, 0.6), inset 0 0 12px rgba(242, 183, 5, 0.2);
      --dur: 1300ms; --delay: 80ms;
    }
    .ring-2 {
      width: 520px; height: 520px;
      border: 2px solid rgba(180, 100, 255, 0.7);
      box-shadow: 0 0 20px 4px rgba(160, 60, 240, 0.5);
      --dur: 1400ms; --delay: 180ms;
    }
    .ring-3 {
      width: 800px; height: 800px;
      border: 3px solid rgba(242, 183, 5, 0.65);
      box-shadow: 0 0 28px 6px rgba(242, 183, 5, 0.4);
      --dur: 1500ms; --delay: 280ms;
    }
    .ring-4 {
      width: 1150px; height: 1150px;
      border: 2px solid rgba(200, 120, 255, 0.45);
      box-shadow: 0 0 20px 4px rgba(160, 60, 240, 0.3);
      --dur: 1600ms; --delay: 380ms;
    }
    .ring-5 {
      width: 1600px; height: 1600px;
      border: 1px solid rgba(242, 183, 5, 0.3);
      box-shadow: 0 0 20px 4px rgba(242, 183, 5, 0.15);
      --dur: 1700ms; --delay: 460ms;
    }

    /* ── Lichtstrahlen ── */
    @keyframes raysIn {
      0%   { opacity: 0; }
      18%  { opacity: 1; }
      65%  { opacity: 0.6; }
      100% { opacity: 0; }
    }

    .rays {
      position: absolute; inset: 0;
      animation: raysIn 2000ms ease-in-out forwards;
    }

    .ray {
      position: absolute;
      top: 50%; left: 50%;
      height: 2px;
      transform-origin: left center;
      border-radius: 1px;
    }

    /* ── Sparkles Container — Rand-Fade via Mask ── */
    #sparkles {
      position: absolute; inset: 0;
      -webkit-mask-image: radial-gradient(ellipse 80% 75% at center, #000 45%, transparent 85%);
              mask-image: radial-gradient(ellipse 80% 75% at center, #000 45%, transparent 85%);
    }

    .sparkle {
      position: absolute;
      opacity: 0;
      animation: sparkleAnim var(--dur) ease-in-out var(--delay) forwards;
      will-change: transform, opacity;
    }

    @keyframes sparkleAnim {
      0%   { opacity: 0; transform: scale(0) rotate(0deg); }
      20%  { opacity: 1; transform: scale(1) rotate(45deg); }
      55%  { opacity: 0.9; transform: scale(1.15) rotate(90deg); }
      100% { opacity: 0; transform: scale(0) rotate(180deg); }
    }

    /* ── Zentraler Flash ── */
    @keyframes flashBurst {
      0%   { opacity: 0; }
      15%  { opacity: 1; }
      40%  { opacity: 0; }
      100% { opacity: 0; }
    }

    .flash {
      position: absolute; inset: 0;
      background: radial-gradient(circle at center,
        rgba(255, 252, 230, 1)  0%,
        rgba(242, 183, 5, 0.7) 20%,
        rgba(160, 60, 240, 0.3) 50%,
        transparent 70%
      );
      opacity: 0;
      animation: flashBurst 500ms ease-out 440ms forwards;
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="glow-center"></div>

  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>
  <div class="ring ring-4"></div>
  <div class="ring ring-5"></div>

  <div class="rays" id="rays"></div>
  <div id="sparkles"></div>
  <div class="flash"></div>
  <div class="frame"></div>

  <script>
    (function () {
      'use strict';
      var W = 1920, H = 1080;

      /* ── Lichtstrahlen ── */
      var raysEl = document.getElementById('rays');
      var RAY_COUNT = 18;
      for (var r = 0; r < RAY_COUNT; r++) {
        var ray = document.createElement('div');
        ray.className = 'ray';
        var angle = (r / RAY_COUNT) * 360;
        var len   = 700 + Math.random() * 500;
        var alpha = (0.25 + Math.random() * 0.55).toFixed(2);
        var isGold = Math.random() > 0.35;
        var c = isGold
          ? 'rgba(242,183,5,' + alpha + ')'
          : 'rgba(200,140,255,' + alpha + ')';
        ray.style.cssText =
          'width:' + len + 'px;' +
          'background:linear-gradient(90deg,' + c + ' 0%, transparent 100%);' +
          'transform:rotate(' + angle.toFixed(1) + 'deg);' +
          'margin-top:-1px;';
        raysEl.appendChild(ray);
      }

      /* ── Sparkles ── */
      var sparklesEl = document.getElementById('sparkles');
      var COUNT = 90;
      /* Sicherer Bereich: 150px Rand-Puffer — Mask übernimmt den Rest */
      var PAD = 150;

      for (var i = 0; i < COUNT; i++) {
        var el = document.createElement('div');
        el.className = 'sparkle';

        var size  = 7 + Math.random() * 18;
        var x     = PAD + Math.random() * (W - PAD * 2);
        var y     = PAD + Math.random() * (H - PAD * 2);
        var delay = 80 + Math.random() * 1300;
        var dur   = 450 + Math.random() * 750;

        /* Gold 70 %, helles Lila 20 %, Weiß-Gold 10 % */
        var rand = Math.random();
        var color, glow1, glow2;
        if (rand < 0.70) {
          color = '#f2b705';
          glow1 = 'rgba(242,183,5,0.9)';
          glow2 = 'rgba(242,183,5,0.35)';
        } else if (rand < 0.90) {
          color = '#c985ff';
          glow1 = 'rgba(180,80,255,0.8)';
          glow2 = 'rgba(160,60,240,0.3)';
        } else {
          color = '#fff5c0';
          glow1 = 'rgba(255,245,180,0.95)';
          glow2 = 'rgba(242,183,5,0.4)';
        }

        var gs1 = (size * 1.6).toFixed(0);
        var gs2 = (size * 3.5).toFixed(0);

        el.style.cssText =
          'left:'   + (x - size / 2).toFixed(0) + 'px;' +
          'top:'    + (y - size / 2).toFixed(0) + 'px;' +
          'width:'  + size.toFixed(0) + 'px;' +
          'height:' + size.toFixed(0) + 'px;' +
          'background:' + color + ';' +
          'clip-path:polygon(50% 0%,56% 44%,100% 50%,56% 56%,50% 100%,44% 56%,0% 50%,44% 44%);' +
          'filter:drop-shadow(0 0 ' + gs1 + 'px ' + glow1 + ')' +
                 ' drop-shadow(0 0 ' + gs2 + 'px ' + glow2 + ');' +
          '--delay:' + delay.toFixed(0) + 'ms;' +
          '--dur:'   + dur.toFixed(0)   + 'ms;';

        sparklesEl.appendChild(el);
      }
    })();
  </script>

</body>
</html>
