<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Stinger Transition — Premium</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
    }

    @keyframes bgIn {
      0%   { opacity: 0; }
      22%  { opacity: 1; }
      65%  { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes glowIn {
      0%   { opacity: 0; transform: scale(0.05); }
      28%  { opacity: 1; transform: scale(1);    }
      65%  { opacity: 0.8; transform: scale(1.1); }
      100% { opacity: 0; transform: scale(1.8);  }
    }
    @keyframes ringOut {
      0%   { transform: scale(0); opacity: 0; }
      10%  { opacity: 1; }
      60%  { opacity: 0.6; }
      100% { transform: scale(3.5); opacity: 0; }
    }
    @keyframes flashIn {
      0%   { opacity: 0; }
      20%  { opacity: 1; }
      60%  { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes raysShow {
      0%   { opacity: 0; }
      20%  { opacity: 1; }
      65%  { opacity: 0.7; }
      100% { opacity: 0; }
    }
    @keyframes sparkle {
      0%   { opacity: 0; transform: scale(0) rotate(0deg);   }
      25%  { opacity: 1; transform: scale(1) rotate(45deg);  }
      60%  { opacity: 0.8; transform: scale(1.1) rotate(90deg); }
      100% { opacity: 0; transform: scale(0) rotate(180deg); }
    }

    #bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 50%,
          rgba(150, 60, 220, 0.95) 0%,
          rgba(94, 42, 121, 1)     30%,
          rgba(25, 8, 48, 1)       65%,
          rgba(8, 4, 16, 1)        100%
        );
      animation: bgIn 2000ms ease-in-out forwards;
    }

    #glow {
      position: absolute;
      width: 900px; height: 900px;
      left: 510px; top: 90px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(255, 240, 140, 0.9) 0%,
        rgba(242, 183, 5, 0.55)  22%,
        rgba(140, 60, 200, 0.2)  55%,
        transparent 78%
      );
      animation: glowIn 2000ms ease-in-out forwards;
    }

    #rays {
      position: absolute;
      inset: 0;
      animation: raysShow 2000ms ease-in-out forwards;
    }

    .ray {
      position: absolute;
      top: 540px;
      left: 960px;
      height: 2px;
      transform-origin: 0 50%;
      border-radius: 1px;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
    }

    #flash {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%,
        rgba(255, 250, 210, 0.95) 0%,
        rgba(242, 183, 5, 0.65)   18%,
        rgba(140, 50, 220, 0.25)  45%,
        transparent 65%
      );
      animation: flashIn 500ms ease-out 430ms forwards;
    }

    #frame {
      position: absolute;
      inset: 0;
      box-shadow:
        inset 0 0 100px 50px rgba(242, 183, 5, 0.22),
        inset 0 0 200px 80px rgba(94, 42, 121, 0.3);
      animation: bgIn 2000ms ease-in-out forwards;
    }

    .sparkle {
      position: absolute;
      border-radius: 0;
      clip-path: polygon(50% 0%, 56% 44%, 100% 50%, 56% 56%, 50% 100%, 44% 56%, 0% 50%, 44% 44%);
    }
  </style>
</head>
<body>

  <div id="bg"></div>
  <div id="glow"></div>
  <div id="rays"></div>
  <div id="rings"></div>
  <div id="sparkles"></div>
  <div id="flash"></div>
  <div id="frame"></div>

  <script>
    (function () {
      'use strict';

      var CX = 960, CY = 540;

      /* ── Ringe ── */
      var ringDefs = [
        { r: 140,  color: 'rgba(242,183,5,0.95)',   glow: 'rgba(242,183,5,0.7)',   bw: 3, dur: 1300, delay: 60  },
        { r: 260,  color: 'rgba(180,90,255,0.75)',  glow: 'rgba(160,60,240,0.5)',  bw: 2, dur: 1400, delay: 150 },
        { r: 400,  color: 'rgba(242,183,5,0.7)',    glow: 'rgba(242,183,5,0.45)',  bw: 3, dur: 1500, delay: 240 },
        { r: 575,  color: 'rgba(200,110,255,0.5)',  glow: 'rgba(160,60,240,0.3)',  bw: 2, dur: 1600, delay: 320 },
        { r: 800,  color: 'rgba(242,183,5,0.4)',    glow: 'rgba(242,183,5,0.2)',   bw: 2, dur: 1700, delay: 400 }
      ];
      var ringsEl = document.getElementById('rings');
      ringDefs.forEach(function (d) {
        var el = document.createElement('div');
        el.className = 'ring';
        var size = d.r * 2;
        el.style.width      = size + 'px';
        el.style.height     = size + 'px';
        el.style.left       = (CX - d.r) + 'px';
        el.style.top        = (CY - d.r) + 'px';
        el.style.border     = d.bw + 'px solid ' + d.color;
        el.style.boxShadow  = '0 0 20px 5px ' + d.glow + ', inset 0 0 10px ' + d.glow;
        el.style.animation  = 'ringOut ' + d.dur + 'ms cubic-bezier(0.15,0.85,0.35,1) ' + d.delay + 'ms forwards';
        ringsEl.appendChild(el);
      });

      /* ── Lichtstrahlen ── */
      var raysEl = document.getElementById('rays');
      for (var r = 0; r < 20; r++) {
        var ray   = document.createElement('div');
        ray.className = 'ray';
        var angle = (r / 20) * 360;
        var len   = 680 + Math.random() * 550;
        var alpha = (0.2 + Math.random() * 0.6).toFixed(2);
        var gold  = Math.random() > 0.38;
        var c     = gold ? 'rgba(242,183,5,' + alpha + ')' : 'rgba(190,120,255,' + alpha + ')';
        ray.style.width      = len.toFixed(0) + 'px';
        ray.style.background = 'linear-gradient(90deg,' + c + ',transparent)';
        ray.style.transform  = 'rotate(' + angle.toFixed(1) + 'deg)';
        raysEl.appendChild(ray);
      }

      /* ── Sparkles ── */
      var sparklesEl = document.getElementById('sparkles');
      /* Rand-Fade per Maske — nur wenn Breite korrekt gesetzt */
      sparklesEl.style.cssText = 'position:absolute;inset:0;' +
        '-webkit-mask-image:radial-gradient(ellipse 82% 78% at 50% 50%,#000 40%,transparent 82%);' +
        'mask-image:radial-gradient(ellipse 82% 78% at 50% 50%,#000 40%,transparent 82%);';

      var COUNT = 88;
      /* Sparkle-Positionen gleichmäßig verteilt, mit Rand-Puffer */
      for (var i = 0; i < COUNT; i++) {
        var el    = document.createElement('div');
        el.className = 'sparkle';

        var size  = 8 + Math.random() * 18;
        /* Gleichmäßige Verteilung über gesamten Screen */
        var x     = 120 + Math.random() * (1920 - 240);
        var y     = 80  + Math.random() * (1080 - 160);
        var delay = 60  + Math.random() * 1350;
        var dur   = 420 + Math.random() * 780;

        var rnd = Math.random();
        var col, ds1, ds2;
        if (rnd < 0.68) {
          col = '#f2b705';
          ds1 = 'drop-shadow(0 0 ' + (size*1.4).toFixed(0) + 'px rgba(242,183,5,0.95))';
          ds2 = 'drop-shadow(0 0 ' + (size*3).toFixed(0)   + 'px rgba(242,183,5,0.45))';
        } else if (rnd < 0.88) {
          col = '#c985ff';
          ds1 = 'drop-shadow(0 0 ' + (size*1.4).toFixed(0) + 'px rgba(180,80,255,0.9))';
          ds2 = 'drop-shadow(0 0 ' + (size*3).toFixed(0)   + 'px rgba(160,60,240,0.38))';
        } else {
          col = '#fff8d0';
          ds1 = 'drop-shadow(0 0 ' + (size*1.4).toFixed(0) + 'px rgba(255,245,180,1))';
          ds2 = 'drop-shadow(0 0 ' + (size*3).toFixed(0)   + 'px rgba(242,183,5,0.5))';
        }

        el.style.left       = (x - size/2).toFixed(0) + 'px';
        el.style.top        = (y - size/2).toFixed(0) + 'px';
        el.style.width      = size.toFixed(0) + 'px';
        el.style.height     = size.toFixed(0) + 'px';
        el.style.background = col;
        el.style.filter     = ds1 + ' ' + ds2;
        el.style.animation  = 'sparkle ' + dur.toFixed(0) + 'ms ease-in-out ' + delay.toFixed(0) + 'ms forwards';

        sparklesEl.appendChild(el);
      }
    })();
  </script>

</body>
</html>
