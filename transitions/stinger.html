<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Stinger Transition — Premium</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
    }

    /* Basisstile — kein opacity:0, alles sichtbar bis JS ran ist */
    #bg {
      position: absolute;
      top: 0; left: 0;
      width: 1920px; height: 1080px;
      background: radial-gradient(ellipse at 50% 50%,
        rgba(155, 65, 225, 0.98) 0%,
        rgba(94,  42, 121, 1)    28%,
        rgba(25,   8,  48, 1)    62%,
        rgba(8,    4,  16, 1)    100%
      );
    }
    #glow {
      position: absolute;
      top: 90px; left: 510px;
      width: 900px; height: 900px;
      border-radius: 50%;
      opacity: 0;
      background: radial-gradient(circle,
        rgba(255, 242, 140, 0.88) 0%,
        rgba(242, 183,   5, 0.55) 22%,
        rgba(140,  55, 200, 0.18) 56%,
        transparent 78%
      );
    }
    #rays     { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; opacity: 0; }
    #rings    { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; }
    #sparkles { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; pointer-events: none; }
    #flash {
      position: absolute;
      top: 0; left: 0;
      width: 1920px; height: 1080px;
      opacity: 0;
      background: radial-gradient(circle at 50% 50%,
        rgba(255, 252, 215, 0.95) 0%,
        rgba(242, 183,   5, 0.65) 18%,
        rgba(140,  50, 220, 0.22) 46%,
        transparent 65%
      );
    }
    #frame {
      position: absolute;
      top: 0; left: 0;
      width: 1920px; height: 1080px;
      opacity: 0;
      box-shadow:
        inset 0 0 100px 50px rgba(242, 183, 5, 0.25),
        inset 0 0 200px 80px rgba(94, 42, 121, 0.35);
    }
    .ring { position: absolute; border-radius: 50%; opacity: 0; }
    .ray  {
      position: absolute;
      top: 540px; left: 960px;
      height: 2px;
      transform-origin: 0 50%;
      border-radius: 1px;
      margin-top: -1px;
    }
    .dot { position: absolute; border-radius: 50%; opacity: 0; }

    #logo-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 1100px;
      height: auto;
      opacity: 0;
      filter:
        drop-shadow(0 0 30px rgba(242, 183, 5, 0.9))
        drop-shadow(0 0 70px rgba(242, 183, 5, 0.5))
        drop-shadow(0 0 120px rgba(140, 55, 200, 0.4));
      z-index: 10;
    }
  </style>
</head>
<body>

  <div id="bg"></div>
  <div id="glow"></div>
  <div id="rays"></div>
  <div id="rings"></div>
  <div id="sparkles"></div>
  <div id="flash"></div>
  <div id="frame"></div>
  <img id="logo-text" src="../assets/logo_text_luckor_hd.png" alt="" />

  <script>
    (function () {
      'use strict';

      var CX = 960, CY = 540;
      var TOTAL = 3000;

      /* ── Hintergrund: Fade-In über 20%, dann halten, am Ende ausblenden ── */
      document.getElementById('bg').animate([
        { opacity: 0 },
        { opacity: 1, offset: 0.20 },
        { opacity: 1, offset: 0.62 },
        { opacity: 0 }
      ], { duration: TOTAL, easing: 'linear', fill: 'forwards' });

      /* Rand-Glow deaktiviert */

      /* ── Zentraler Glow ── */
      document.getElementById('glow').animate([
        { opacity: 0, transform: 'scale(0.05)' },
        { opacity: 1, transform: 'scale(1)',     offset: 0.22 },
        { opacity: 0.85, transform: 'scale(1.12)', offset: 0.62 },
        { opacity: 0, transform: 'scale(1.8)' }
      ], { duration: TOTAL, easing: 'ease-in-out', fill: 'forwards' });

      /* ── Lichtstrahlen ── */
      var raysEl = document.getElementById('rays');
      for (var r = 0; r < 20; r++) {
        var ray   = document.createElement('div');
        ray.className = 'ray';
        var angle = (r / 20) * 360;
        var len   = 680 + Math.random() * 560;
        var alpha = (0.22 + Math.random() * 0.58).toFixed(2);
        var gold  = Math.random() > 0.4;
        var col   = gold
          ? 'rgba(242,183,5,' + alpha + ')'
          : 'rgba(190,120,255,' + alpha + ')';
        ray.style.width      = len.toFixed(0) + 'px';
        ray.style.background = 'linear-gradient(90deg,' + col + ',transparent)';
        ray.style.transform  = 'rotate(' + angle.toFixed(1) + 'deg)';
        raysEl.appendChild(ray);
      }
      raysEl.animate([
        { opacity: 0 },
        { opacity: 1, offset: 0.16 },
        { opacity: 0.7, offset: 0.62 },
        { opacity: 0 }
      ], { duration: TOTAL, fill: 'forwards' });

      /* ── Ringe ── */
      var ringsEl  = document.getElementById('rings');
      var ringDefs = [
        { r: 140,  color: 'rgba(242,183,5,0.95)',    glow: 'rgba(242,183,5,0.65)',   bw: 3, dur: 1350, delay:  55 },
        { r: 265,  color: 'rgba(180,90,255,0.78)',   glow: 'rgba(160,55,240,0.5)',   bw: 2, dur: 1450, delay: 145 },
        { r: 410,  color: 'rgba(242,183,5,0.72)',    glow: 'rgba(242,183,5,0.42)',   bw: 3, dur: 1550, delay: 235 },
        { r: 590,  color: 'rgba(200,110,255,0.52)',  glow: 'rgba(160,55,240,0.28)',  bw: 2, dur: 1650, delay: 315 },
        { r: 820,  color: 'rgba(242,183,5,0.38)',    glow: 'rgba(242,183,5,0.18)',   bw: 2, dur: 1750, delay: 395 }
      ];
      ringDefs.forEach(function (d) {
        var el = document.createElement('div');
        el.className = 'ring';
        var size = d.r * 2;
        el.style.width     = size + 'px';
        el.style.height    = size + 'px';
        el.style.left      = (CX - d.r) + 'px';
        el.style.top       = (CY - d.r) + 'px';
        el.style.border    = d.bw + 'px solid ' + d.color;
        el.style.boxShadow = '0 0 22px 5px ' + d.glow + ',inset 0 0 10px ' + d.glow;
        ringsEl.appendChild(el);
        el.animate([
          { opacity: 0, transform: 'scale(0)' },
          { opacity: 1, transform: 'scale(1)',   offset: 0.12 },
          { opacity: 0.55, transform: 'scale(2)', offset: 0.65 },
          { opacity: 0, transform: 'scale(3.5)' }
        ], { duration: d.dur, delay: d.delay, easing: 'cubic-bezier(0.15,0.85,0.35,1)', fill: 'forwards' });
      });

      /* ── Flash ── */
      document.getElementById('flash').animate([
        { opacity: 0 },
        { opacity: 0, offset: 0.20 },
        { opacity: 1, offset: 0.26 },
        { opacity: 0, offset: 0.40 },
        { opacity: 0 }
      ], { duration: TOTAL, fill: 'forwards' });

      /* ── Sparkles / Sternenstaub ── */
      var sparklesEl = document.getElementById('sparkles');

      /* 2 Schichten: große Sterne (wenige) + feiner Staub (viele kleine) */
      var layers = [
        { count: 60,  minSize: 5,  maxSize: 16, minDur: 400, maxDur: 900,  minDelay: 50,  maxDelay: 1400 },
        { count: 160, minSize: 1,  maxSize: 5,  minDur: 250, maxDur: 700,  minDelay: 0,   maxDelay: 1600 }
      ];

      layers.forEach(function (layer) {
        for (var i = 0; i < layer.count; i++) {
          var el   = document.createElement('div');
          el.className = 'dot';

          var size  = layer.minSize + Math.random() * (layer.maxSize - layer.minSize);
          var x     = 80 + Math.random() * 1760;
          var y     = 50 + Math.random() * 980;
          var delay = layer.minDelay + Math.random() * (layer.maxDelay - layer.minDelay);
          var dur   = layer.minDur   + Math.random() * (layer.maxDur   - layer.minDur);

          var rnd = Math.random();
          var col2, sh;
          if (rnd < 0.60) {
            col2 = '#f2b705';
            sh   = '0 0 ' + (size * 2.5).toFixed(0) + 'px 1px rgba(242,183,5,0.95),' +
                   '0 0 ' + (size * 5).toFixed(0)   + 'px 2px rgba(242,183,5,0.4)';
          } else if (rnd < 0.82) {
            col2 = '#c985ff';
            sh   = '0 0 ' + (size * 2.5).toFixed(0) + 'px 1px rgba(180,80,255,0.9),' +
                   '0 0 ' + (size * 5).toFixed(0)   + 'px 2px rgba(160,60,240,0.35)';
          } else {
            col2 = '#fff8d0';
            sh   = '0 0 ' + (size * 2.5).toFixed(0) + 'px 1px rgba(255,245,180,1),' +
                   '0 0 ' + (size * 5).toFixed(0)   + 'px 2px rgba(242,183,5,0.45)';
          }

          el.style.width      = Math.max(1, size).toFixed(1) + 'px';
          el.style.height     = Math.max(1, size).toFixed(1) + 'px';
          el.style.left       = (x - size / 2).toFixed(0) + 'px';
          el.style.top        = (y - size / 2).toFixed(0) + 'px';
          el.style.background = col2;
          el.style.boxShadow  = sh;
          sparklesEl.appendChild(el);

          el.animate([
            { opacity: 0, transform: 'scale(0)' },
            { opacity: 1, transform: 'scale(1)',     offset: 0.3 },
            { opacity: 0.9, transform: 'scale(1.1)', offset: 0.6 },
            { opacity: 0, transform: 'scale(0)' }
          ], { duration: dur, delay: delay, easing: 'ease-in-out', fill: 'forwards' });
        }
      });

      /* ── Logo-Boom + Shake bei 600ms, 1200ms sichtbar ── */
      document.getElementById('logo-text').animate([
        { opacity: 0,   transform: 'translate(-50%, -50%) scale(1.9)',                 offset: 0    },
        { opacity: 1,   transform: 'translate(-50%, -50%) scale(0.88)',                offset: 0.08 },
        { opacity: 1,   transform: 'translate(-50%, -50%) scale(1.04)',                offset: 0.13 },
        { opacity: 1,   transform: 'translate(-50%, -50%) translateX(-18px) scale(1)', offset: 0.19 },
        { opacity: 1,   transform: 'translate(-50%, -50%) translateX(13px)  scale(1)', offset: 0.24 },
        { opacity: 1,   transform: 'translate(-50%, -50%) translateX(-9px)  scale(1)', offset: 0.29 },
        { opacity: 1,   transform: 'translate(-50%, -50%) translateX(5px)   scale(1)', offset: 0.34 },
        { opacity: 1,   transform: 'translate(-50%, -50%) scale(1)',                   offset: 0.40 },
        { opacity: 1,   transform: 'translate(-50%, -50%) scale(1)',                   offset: 0.78 },
        { opacity: 0,   transform: 'translate(-50%, -50%) scale(1.06)' }
      ], { duration: 1400, delay: 700, easing: 'ease-out', fill: 'forwards' });
    })();
  </script>

</body>
</html>
